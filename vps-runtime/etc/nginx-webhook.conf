# =============================================================================
# Nginx reverse proxy for GitHub webhook receiver
# Provides HTTPS termination via Let's Encrypt
#
# Install: cp nginx-webhook.conf /etc/nginx/sites-available/webhook
#          ln -sf /etc/nginx/sites-available/webhook /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
# =============================================================================

server {
    listen 80;
    server_name webhook.marbomebel.ru;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name webhook.marbomebel.ru;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/webhook.marbomebel.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webhook.marbomebel.ru/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Request size limit — 15m for voice audio (base64-encoded, up to 10MB decoded)
    client_max_body_size 15m;

    # Rate limiting zone (defined in http block)
    # Add to /etc/nginx/nginx.conf http block:
    #   limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;

    # GitHub webhook endpoint
    location /webhook/github {
        limit_req zone=webhook burst=10 nodelay;

        proxy_pass http://127.0.0.1:3900;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # BlueSales webhook endpoint
    location /webhook/bluesales-webhook {
        limit_req zone=webhook burst=10 nodelay;

        proxy_pass http://127.0.0.1:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GitHub webhook endpoint (already defined above)

    # All traffic → Next.js dashboard (port 3200)
    # Dashboard reads SQLite for GET, proxies mutations to Control API internally
    location / {
        limit_req zone=webhook burst=20 nodelay;

        proxy_pass http://127.0.0.1:3200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Next.js SSR + API calls need longer timeouts
        proxy_read_timeout 60s;
    }
}
