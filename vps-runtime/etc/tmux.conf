# =============================================================================
# Claude Code tmux configuration
# =============================================================================

# Bigger scrollback (100k lines)
set-option -g history-limit 100000

# Mouse support (for convenience when connected from GUI terminal)
set-option -g mouse on

# Status bar
set-option -g status on
set-option -g status-interval 30
set-option -g status-style 'bg=#1a1a2e,fg=#e0e0e0'
set-option -g status-left '#[fg=#00d4ff,bold] CC #[fg=#888]│ '
set-option -g status-left-length 20
set-option -g status-right '#[fg=#888]│ #[fg=#aaa]%H:%M #[fg=#888]│ #[fg=#aaa]%Y-%m-%d'
set-option -g status-right-length 30

# Window status
set-window-option -g window-status-format ' #I:#W '
set-window-option -g window-status-current-format '#[fg=#00d4ff,bold] #I:#W '

# Pane borders
set-option -g pane-border-style 'fg=#333'
set-option -g pane-active-border-style 'fg=#00d4ff'

# Auto-rename windows based on running command
set-window-option -g automatic-rename on

# Start window numbering from 1
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Faster escape time (for vim users)
set-option -sg escape-time 10

# Activity monitoring
set-window-option -g monitor-activity on
set-option -g visual-activity off

# Terminal overrides for better color support
set-option -g default-terminal "screen-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'
