# =============================================================================
# Nginx configuration for xn--e1afaihifegddo7k.xn--p1ai
# WordPress site alongside existing N8N (n8n.marbomebel.ru)
# =============================================================================

# Rate limiting zone for wp-login.php brute-force protection
limit_req_zone $binary_remote_addr zone=wplogin:10m rate=3r/m;

# Upstream PHP-FPM
upstream php-fpm-kuhnirema {
    server unix:/run/php/php8.2-fpm.sock;
}

# ---------------------------------------------------------------------------
# HTTP -> HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;

    server_name xn--e1afaihifegddo7k.xn--p1ai www.xn--e1afaihifegddo7k.xn--p1ai;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/kuhnirema;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://xn--e1afaihifegddo7k.xn--p1ai$request_uri;
    }
}

# ---------------------------------------------------------------------------
# Cross-domain redirect: mebelit.site -> kuhnirema
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name mebelit.site www.mebelit.site;

    # SSL certs (use kuhnirema certs or separate mebelit certs)
    ssl_certificate     /etc/letsencrypt/live/xn--e1afaihifegddo7k.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--e1afaihifegddo7k.xn--p1ai/privkey.pem;

    # Path-specific redirects from old mebelit.site URLs
    location = /straight  { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/pryamye-kuhni/; }
    location = /straight/ { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/pryamye-kuhni/; }
    location = /corner    { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/uglovye-kuhni/; }
    location = /corner/   { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/uglovye-kuhni/; }
    location = /quiz      { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/kalkulyator/; }
    location = /quiz/     { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/kalkulyator/; }
    location = /catalog   { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/uglovye-kuhni/; }
    location = /catalog/  { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/uglovye-kuhni/; }
    location = /about     { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/o-kompanii/; }
    location = /about/    { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/o-kompanii/; }
    location = /contacts  { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/kontakty/; }
    location = /contacts/ { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/kontakty/; }
    location = /portfolio  { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/portfolio/; }
    location = /portfolio/ { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/portfolio/; }
    location = /privacy-policy  { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/politika-konfidencialnosti/; }
    location = /privacy-policy/ { return 301 https://xn--e1afaihifegddo7k.xn--p1ai/politika-konfidencialnosti/; }

    # Catch-all redirect
    location / {
        return 301 https://xn--e1afaihifegddo7k.xn--p1ai$request_uri;
    }
}

# ---------------------------------------------------------------------------
# www -> non-www redirect (HTTPS)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name www.xn--e1afaihifegddo7k.xn--p1ai;

    ssl_certificate     /etc/letsencrypt/live/xn--e1afaihifegddo7k.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--e1afaihifegddo7k.xn--p1ai/privkey.pem;

    return 301 https://xn--e1afaihifegddo7k.xn--p1ai$request_uri;
}

# ---------------------------------------------------------------------------
# Main HTTPS server block
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name xn--e1afaihifegddo7k.xn--p1ai;

    root /var/www/kuhnirema;
    index index.php index.html;

    # ── SSL ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/xn--e1afaihifegddo7k.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--e1afaihifegddo7k.xn--p1ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/xn--e1afaihifegddo7k.xn--p1ai/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ─────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Upload max size ──────────────────────────────
    client_max_body_size 20M;

    # ── Gzip compression ─────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/html
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── WordPress main location ──────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP-FPM ──────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm-kuhnirema;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;

        # Hide PHP version
        fastcgi_hide_header X-Powered-By;
    }

    # ── Static files with long cache ─────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|otf|mp4|webm)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;

        # Re-add security headers (add_header in location overrides server-level)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # ── Block xmlrpc.php ─────────────────────────────
    location = /xmlrpc.php {
        deny all;
        access_log off;
        log_not_found off;
        return 444;
    }

    # ── Rate-limit wp-login.php ──────────────────────
    location = /wp-login.php {
        limit_req zone=wplogin burst=3 nodelay;
        limit_req_status 429;

        fastcgi_pass php-fpm-kuhnirema;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ── Protect sensitive files ──────────────────────
    location = /wp-config.php {
        deny all;
        return 444;
    }

    location ~ /\.(ht|git|svn|env) {
        deny all;
        return 444;
    }

    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
        return 444;
    }

    # ── WordPress admin area ─────────────────────────
    location /wp-admin/ {
        try_files $uri $uri/ /wp-admin/index.php?$args;
    }

    # ── Robots.txt ───────────────────────────────────
    location = /robots.txt {
        allow all;
        access_log off;
        log_not_found off;
    }

    # ── Favicon ──────────────────────────────────────
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 365d;
    }

    # ── Disable directory listing ────────────────────
    autoindex off;

    # ── Logging ──────────────────────────────────────
    access_log /var/log/nginx/kuhnirema-access.log;
    error_log  /var/log/nginx/kuhnirema-error.log warn;
}
