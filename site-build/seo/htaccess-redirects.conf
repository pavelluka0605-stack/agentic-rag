# =============================================================================
# .htaccess redirects for кухнирема.рф
# 301 redirects from old mebelit.site URLs to new кухнирема.рф URLs
# Include in WordPress .htaccess BEFORE the WordPress rewrite rules
# =============================================================================

# Enable rewrite engine
<IfModule mod_rewrite.c>
RewriteEngine On

# ---------------------------------------------------------------------------
# SECTION 1: Force HTTPS + canonical domain
# ---------------------------------------------------------------------------

# Redirect HTTP to HTTPS
RewriteCond %{HTTPS} !=on
RewriteRule ^(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]

# Redirect www to non-www (if applicable)
RewriteCond %{HTTP_HOST} ^www\.xn--e1afaihifegddo7k\.xn--p1ai$ [NC]
RewriteRule ^(.*)$ https://xn--e1afaihifegddo7k.xn--p1ai/$1 [R=301,L]

# ---------------------------------------------------------------------------
# SECTION 2: 301 redirects from old mebelit.site paths
# These work when the domain mebelit.site points to the same server,
# or when these paths exist on кухнирема.рф from the old structure.
# ---------------------------------------------------------------------------

# Catalog pages: old English slugs -> new transliterated Russian slugs
RewriteRule ^straight/?$ /pryamye-kuhni/ [R=301,L]
RewriteRule ^straight/(.*)$ /pryamye-kuhni/ [R=301,L]

RewriteRule ^corner/?$ /uglovye-kuhni/ [R=301,L]
RewriteRule ^corner/(.*)$ /uglovye-kuhni/ [R=301,L]

# Quiz -> Calculator
RewriteRule ^quiz/?$ /kalkulyator/ [R=301,L]
RewriteRule ^quiz/(.*)$ /kalkulyator/ [R=301,L]

# Generic catalog
RewriteRule ^catalog/?$ /uglovye-kuhni/ [R=301,L]
RewriteRule ^catalog/(.*)$ /uglovye-kuhni/ [R=301,L]

# About and contacts
RewriteRule ^about/?$ /o-kompanii/ [R=301,L]
RewriteRule ^contacts/?$ /kontakty/ [R=301,L]

# Portfolio
RewriteRule ^portfolio/?$ /portfolio/ [R=301,L]

# Privacy policy (two old paths that were 404 on mebelit.site)
RewriteRule ^privacy-policy/?$ /politika-konfidencialnosti/ [R=301,L]
RewriteRule ^politika-konfidencialnosti/?$ /politika-konfidencialnosti/ [R=301,L]

# Old dead pages that were 404 on mebelit.site (ensure they now work)
# /uglovye-kuhni and /p-obraznye-kuhni were dead on mebelit.site
# Now they are proper pages on кухнирема.рф, no redirect needed

# ---------------------------------------------------------------------------
# SECTION 3: Cross-domain redirect (mebelit.site -> кухнирема.рф)
# Only active when mebelit.site DNS points to the same server
# ---------------------------------------------------------------------------

RewriteCond %{HTTP_HOST} ^(www\.)?mebelit\.site$ [NC]
RewriteRule ^straight/?$ https://xn--e1afaihifegddo7k.xn--p1ai/pryamye-kuhni/ [R=301,L]

RewriteCond %{HTTP_HOST} ^(www\.)?mebelit\.site$ [NC]
RewriteRule ^corner/?$ https://xn--e1afaihifegddo7k.xn--p1ai/uglovye-kuhni/ [R=301,L]

RewriteCond %{HTTP_HOST} ^(www\.)?mebelit\.site$ [NC]
RewriteRule ^quiz/?$ https://xn--e1afaihifegddo7k.xn--p1ai/kalkulyator/ [R=301,L]

RewriteCond %{HTTP_HOST} ^(www\.)?mebelit\.site$ [NC]
RewriteRule ^about/?$ https://xn--e1afaihifegddo7k.xn--p1ai/o-kompanii/ [R=301,L]

RewriteCond %{HTTP_HOST} ^(www\.)?mebelit\.site$ [NC]
RewriteRule ^contacts/?$ https://xn--e1afaihifegddo7k.xn--p1ai/kontakty/ [R=301,L]

RewriteCond %{HTTP_HOST} ^(www\.)?mebelit\.site$ [NC]
RewriteRule ^portfolio/?$ https://xn--e1afaihifegddo7k.xn--p1ai/portfolio/ [R=301,L]

RewriteCond %{HTTP_HOST} ^(www\.)?mebelit\.site$ [NC]
RewriteRule ^catalog/?$ https://xn--e1afaihifegddo7k.xn--p1ai/uglovye-kuhni/ [R=301,L]

RewriteCond %{HTTP_HOST} ^(www\.)?mebelit\.site$ [NC]
RewriteRule ^privacy-policy/?$ https://xn--e1afaihifegddo7k.xn--p1ai/politika-konfidencialnosti/ [R=301,L]

# Catch-all: any other mebelit.site URL -> кухнирема.рф homepage
RewriteCond %{HTTP_HOST} ^(www\.)?mebelit\.site$ [NC]
RewriteRule ^(.*)$ https://xn--e1afaihifegddo7k.xn--p1ai/ [R=301,L]

# ---------------------------------------------------------------------------
# SECTION 4: Trailing slash enforcement (SEO consistency)
# ---------------------------------------------------------------------------

# Add trailing slash to URLs without file extension
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_URI} !(.*)/$
RewriteCond %{REQUEST_URI} !\.(jpg|jpeg|png|gif|webp|svg|css|js|ico|pdf|xml|txt|woff|woff2)$
RewriteRule ^(.*)$ /$1/ [R=301,L]

# ---------------------------------------------------------------------------
# SECTION 5: Remove UTM parameters from cached URLs (Yandex recommendation)
# This prevents duplicate pages in index from UTM-tagged URLs
# ---------------------------------------------------------------------------

# Note: Clean-param directive in robots.txt handles this for Yandex.
# For Apache, canonical URLs in HTML head are the proper solution.
# RankMath handles canonical URLs automatically.

</IfModule>

# ---------------------------------------------------------------------------
# SECTION 6: Security headers (SEO-relevant)
# ---------------------------------------------------------------------------

<IfModule mod_headers.c>
# Prevent clickjacking
Header always set X-Frame-Options "SAMEORIGIN"

# XSS protection
Header always set X-Content-Type-Options "nosniff"

# Referrer policy (preserves referral data for analytics)
Header always set Referrer-Policy "strict-origin-when-cross-origin"
</IfModule>

# ---------------------------------------------------------------------------
# SECTION 7: Compression (page speed -> SEO ranking factor)
# ---------------------------------------------------------------------------

<IfModule mod_deflate.c>
AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
AddOutputFilterByType DEFLATE application/javascript application/json
AddOutputFilterByType DEFLATE application/xml application/xhtml+xml
AddOutputFilterByType DEFLATE image/svg+xml
</IfModule>

# ---------------------------------------------------------------------------
# SECTION 8: Browser caching (page speed)
# ---------------------------------------------------------------------------

<IfModule mod_expires.c>
ExpiresActive On
ExpiresByType image/jpeg "access plus 1 year"
ExpiresByType image/png "access plus 1 year"
ExpiresByType image/gif "access plus 1 year"
ExpiresByType image/webp "access plus 1 year"
ExpiresByType image/svg+xml "access plus 1 year"
ExpiresByType image/x-icon "access plus 1 year"
ExpiresByType text/css "access plus 1 month"
ExpiresByType application/javascript "access plus 1 month"
ExpiresByType application/x-font-woff "access plus 1 year"
ExpiresByType application/x-font-woff2 "access plus 1 year"
ExpiresByType font/woff "access plus 1 year"
ExpiresByType font/woff2 "access plus 1 year"
</IfModule>
