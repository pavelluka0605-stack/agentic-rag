# nginx config for api.marbomebel.ru -> control-bridge (127.0.0.1:3000)
# Place at: /etc/nginx/sites-available/api-marbomebel
# Symlink: /etc/nginx/sites-enabled/api-marbomebel

server {
    listen 80;
    server_name api.marbomebel.ru;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.marbomebel.ru;

    # SSL — will be filled by certbot
    ssl_certificate /etc/letsencrypt/live/api.marbomebel.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.marbomebel.ru/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting (defined in http block or separate conf)
    # limit_req zone=api burst=20 nodelay;

    # Proxy to uvicorn
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
