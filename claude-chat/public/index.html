<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI Ассистент</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="theme-color" content="#7c5cfc">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a14;
  --surface: #12121e;
  --surface2: #1a1a2e;
  --border: #2a2a3e;
  --text: #e0e0f0;
  --text2: #8888aa;
  --accent: #7c5cfc;
  --accent2: #9b7dff;
  --user-bg: #7c5cfc;
  --bot-bg: #1e1e32;
  --error: #ff4466;
  --success: #44cc88;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
}
/* Header */
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header .avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.header .info { flex: 1; }
.header .info h1 { font-size: 17px; font-weight: 600; }
.header .status { font-size: 12px; color: var(--success); }
.header .status::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--success); margin-right: 4px; }
.header .menu-btn {
  width: 36px; height: 36px; border-radius: 8px; border: none;
  background: var(--surface2); color: var(--text); font-size: 18px; cursor: pointer;
}

/* Messages area */
.messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  -webkit-overflow-scrolling: touch;
}
.msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
.msg.user { align-self: flex-end; background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
.msg.bot { align-self: flex-start; background: var(--bot-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.error { align-self: center; background: rgba(255,68,102,0.15); color: var(--error); border: 1px solid rgba(255,68,102,0.3); font-size: 14px; text-align: center; max-width: 90%; }
.msg .elapsed { font-size: 11px; color: var(--text2); margin-top: 6px; text-align: right; }
.msg img { max-width: 100%; border-radius: 8px; margin-top: 8px; }
.msg pre { background: #0d0d18; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 13px; margin-top: 8px; }
.msg code { font-family: 'SF Mono', Monaco, monospace; font-size: 13px; }
.msg .copy-btn {
  display: inline-block; margin-top: 6px; padding: 4px 10px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text2); font-size: 11px; cursor: pointer;
}
.typing { align-self: flex-start; color: var(--text2); font-size: 14px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; }
.typing .dots::after { content: ''; animation: dots 1.5s infinite; }
@keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
.typing .cancel-link { color: var(--error); font-size: 12px; cursor: pointer; text-decoration: underline; margin-left: 8px; }

/* Thinking block */
.thinking-block {
  margin-bottom: 10px; border-radius: 12px;
  background: rgba(124,92,252,0.08); border: 1px solid rgba(124,92,252,0.2);
  overflow: hidden; font-size: 13px;
}
.thinking-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; cursor: pointer; user-select: none;
  color: var(--accent2);
}
.thinking-header:active { background: rgba(124,92,252,0.12); }
.thinking-icon { font-size: 14px; }
.thinking-toggle { margin-left: auto; font-size: 12px; transition: transform 0.2s; }
.thinking-block.expanded .thinking-toggle { transform: rotate(90deg); }
.thinking-content {
  max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
  padding: 0 12px; color: var(--text2); line-height: 1.5;
  font-size: 13px; white-space: pre-wrap; word-break: break-word;
}
.thinking-block.expanded .thinking-content {
  max-height: 400px; overflow-y: auto; padding: 0 12px 10px;
}
.thinking-block.streaming .thinking-header .thinking-label::after {
  content: ''; animation: dots 1.5s infinite;
}
@keyframes thinkPulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
.thinking-block.streaming .thinking-icon {
  animation: thinkPulse 1.5s ease-in-out infinite;
}

/* Tool use block */
.tool-block {
  margin-bottom: 8px; border-radius: 10px;
  background: rgba(68,204,136,0.08); border: 1px solid rgba(68,204,136,0.2);
  font-size: 13px; overflow: hidden;
}
.tool-header {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; color: var(--success); font-weight: 500;
}
.tool-header .tool-icon { font-size: 12px; }
.tool-input {
  padding: 4px 10px 6px; color: var(--text2); font-family: 'SF Mono', Monaco, monospace;
  font-size: 12px; white-space: pre-wrap; word-break: break-all;
  max-height: 80px; overflow-y: auto;
}
.tool-result-block {
  padding: 4px 10px 6px; color: var(--text2); font-size: 12px;
  border-top: 1px solid rgba(68,204,136,0.15);
  max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-word;
}

/* Quick buttons */
.quick-btns {
  display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto;
  flex-shrink: 0; -webkit-overflow-scrolling: touch;
}
.quick-btns button {
  flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 13px; cursor: pointer;
  white-space: nowrap;
}
.quick-btns button:active { background: var(--accent); border-color: var(--accent); }

/* Input area */
.input-area {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 8px 12px; padding-bottom: calc(8px + var(--safe-bottom));
  background: var(--surface); border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.input-area .add-btn, .input-area .mic-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: var(--surface2); color: var(--text); font-size: 20px;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.input-area .mic-btn { background: var(--accent); color: #fff; }
.input-area .mic-btn.recording { background: var(--error); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(255,68,102,0.5)} 70%{box-shadow:0 0 0 12px rgba(255,68,102,0)} }
.input-area .text-wrap {
  flex: 1; display: flex; align-items: flex-end;
  background: var(--surface2); border-radius: 20px; border: 1px solid var(--border);
  padding: 4px 12px; min-height: 40px;
}
.input-area textarea {
  flex: 1; border: none; background: transparent; color: var(--text);
  font-size: 15px; font-family: inherit; resize: none;
  max-height: 120px; min-height: 32px; line-height: 1.4;
  padding: 4px 0; outline: none;
}
.input-area .send-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent); border: none; color: #fff;
  font-size: 16px; cursor: pointer; flex-shrink: 0;
  display: none; align-items: center; justify-content: center;
  margin-bottom: 4px;
}
.input-area .send-btn.visible { display: flex; }
.input-area .send-btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
.input-area .send-btn { touch-action: manipulation; }

/* Attachments preview */
.attachments {
  display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto;
  flex-shrink: 0;
}
.attachments:empty { display: none; }
.att-preview {
  position: relative; width: 60px; height: 60px; border-radius: 8px;
  overflow: hidden; flex-shrink: 0;
}
.att-preview img { width: 100%; height: 100%; object-fit: cover; }
.att-preview .remove {
  position: absolute; top: 2px; right: 2px; width: 20px; height: 20px;
  border-radius: 50%; background: rgba(0,0,0,0.7); color: #fff;
  border: none; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* File picker menu */
.file-menu {
  display: none; position: fixed; bottom: 70px; left: 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.file-menu.open { display: block; }
.file-menu button {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 14px 20px; border: none;
  background: transparent; color: var(--text); font-size: 15px;
  cursor: pointer; text-align: left;
}
.file-menu button:active { background: var(--surface); }
.file-menu button + button { border-top: 1px solid var(--border); }

/* Overlay for menu */
.overlay { display: none; position: fixed; inset: 0; z-index: 99; }
.overlay.open { display: block; }

/* Connection banner */
.conn-banner {
  display: none; padding: 10px 16px;
  background: rgba(255,68,102,0.15); color: var(--error);
  font-size: 13px; text-align: center;
  border-bottom: 1px solid rgba(255,68,102,0.3);
}
.conn-banner.show { display: block; }
.conn-banner button {
  margin-left: 8px; padding: 4px 12px; border-radius: 6px;
  background: var(--error); color: #fff; border: none;
  font-size: 12px; cursor: pointer;
}
</style>
</head>
<body>

<div class="header">
  <div class="avatar"><img src="/logo.svg" alt="AI" style="width:28px;height:28px;"></div>
  <div class="info">
    <h1>AI Ассистент</h1>
    <div class="status" id="statusLine">онлайн</div>
  </div>
  <button class="menu-btn" onclick="toggleSettings()">&#9776;</button>
</div>

<div class="conn-banner" id="connBanner">
  Соединение прервано
  <button onclick="recoverSession()">Повторить</button>
</div>

<div class="messages" id="messages"></div>

<div class="attachments" id="attachments"></div>

<div class="quick-btns">
  <button onclick="quickCmd('покажи статус VPS')">VPS статус</button>
  <button onclick="quickCmd('покажи последние логи N8N')">N8N логи</button>
  <button onclick="quickCmd('docker ps')">docker ps</button>
  <button onclick="quickCmd('покажи ресурсы сервера')">Ресурсы</button>
</div>

<div class="input-area">
  <button class="add-btn" onclick="toggleFileMenu()">+</button>
  <div class="text-wrap">
    <textarea id="msgInput" placeholder="Сообщение" rows="1"
      oninput="autoGrow(this); toggleSendBtn()"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#8593;</button>
  </div>
  <button class="mic-btn" id="micBtn" onclick="toggleVoice()">&#127908;</button>
</div>

<div class="overlay" id="overlay" onclick="closeFileMenu()"></div>
<div class="file-menu" id="fileMenu">
  <button onclick="pickPhoto('camera')">&#128247; Take Photo</button>
  <button onclick="pickPhoto('gallery')">&#128444; Choose Photo</button>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhotos(this)">
<input type="file" id="galleryInput" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)">

<script>
// --- Config ---
const CONFIG = window.__CHAT_CONFIG__ || {};
const API = CONFIG.url || '';
const TOKEN = CONFIG.token || '';
const AUTH = { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };

// --- Session ---
let sessionId = localStorage.getItem('chat_session_id');
if (!sessionId) {
  sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
  localStorage.setItem('chat_session_id', sessionId);
}

let currentRequestId = null;
let sending = false;
let pendingPhotos = []; // { file, dataUrl }
let history = [];
let pollAbort = null; // AbortController for polling
let clientTimeout = null; // total client-side timeout
let requestStartTime = null; // когда начался текущий запрос

const $messages = document.getElementById('messages');
const $input = document.getElementById('msgInput');
const $sendBtn = document.getElementById('sendBtn');
const $attachments = document.getElementById('attachments');
const $connBanner = document.getElementById('connBanner');

// --- Load history from localStorage ---
function loadLocalHistory() {
  try {
    const saved = localStorage.getItem('chat_history_' + sessionId);
    if (saved) {
      const msgs = JSON.parse(saved);
      msgs.forEach(m => addMessage(m.role, m.content, { elapsed: m.elapsed, save: false }));
      history = msgs.map(m => ({ role: m.role, content: m.content }));
    }
  } catch (_) {}
}

function saveLocalHistory() {
  try {
    const toSave = history.slice(-50).map((m, i) => {
      const el = $messages.children[i];
      return { role: m.role, content: m.content, elapsed: el?.querySelector('.elapsed')?.textContent || '' };
    });
    localStorage.setItem('chat_history_' + sessionId, JSON.stringify(toSave));
  } catch (_) {}
}

// --- Messages ---
function addMessage(role, content, opts = {}) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'bot' || role === 'assistant') {
    div.className = 'msg bot';
    div.innerHTML = formatMarkdown(content);
    if (opts.elapsed) {
      const el = document.createElement('div');
      el.className = 'elapsed';
      el.textContent = opts.elapsed;
      div.appendChild(el);
    }
    // Copy button
    const cb = document.createElement('button');
    cb.className = 'copy-btn';
    cb.textContent = 'Copy';
    cb.onclick = () => { navigator.clipboard.writeText(content).then(() => { cb.textContent = 'Copied!'; setTimeout(() => cb.textContent = 'Copy', 1500); }); };
    div.appendChild(cb);
  } else if (role === 'error') {
    div.innerHTML = `<b>Ошибка:</b> ${escapeHtml(content)}`;
  } else {
    // user
    div.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
    // Append photos if any
    if (opts.photos) {
      opts.photos.forEach(p => {
        const img = document.createElement('img');
        img.src = p;
        div.appendChild(img);
      });
    }
  }

  $messages.appendChild(div);
  $messages.scrollTop = $messages.scrollHeight;

  if (opts.save !== false) {
    const r = role === 'bot' || role === 'assistant' ? 'assistant' : role;
    if (r === 'user' || r === 'assistant') {
      history.push({ role: r, content });
      saveLocalHistory();
    }
  }

  return div;
}

function showTyping(text = 'Ожидание ответа') {
  removeTyping();
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = `<span>${escapeHtml(text)}</span><span class="dots"></span><span class="cancel-link" onclick="cancelCurrentRequest()">отменить</span>`;
  $messages.appendChild(div);
  $messages.scrollTop = $messages.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

// --- Send message ---
let lastSendTime = 0;
async function sendMessage() {
  if (sending) return; // debounce

  // Защита от двойного тапа на мобильном (минимум 1.5с между отправками)
  const now = Date.now();
  if (now - lastSendTime < 1500) return;

  const text = $input.value.trim();
  const photos = [...pendingPhotos];

  if (!text && photos.length === 0) return;

  // Prevent double send
  lastSendTime = now;
  sending = true;
  $sendBtn.disabled = true;
  $input.value = '';
  autoGrow($input);
  toggleSendBtn();

  // Show user message
  const photoUrls = photos.map(p => p.dataUrl);
  addMessage('user', text || '(фото)', { photos: photoUrls });

  // Clear attachments
  pendingPhotos = [];
  $attachments.innerHTML = '';

  // Upload photos first
  let uploadedUrls = [];
  for (const p of photos) {
    try {
      const fd = new FormData();
      fd.append('image', p.file);
      const resp = await fetch(`${API}/api/upload`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${TOKEN}` },
        body: fd,
      });
      if (resp.ok) {
        const data = await resp.json();
        uploadedUrls.push(data.url);
      }
    } catch (_) {}
  }

  // Build message with photo references
  let fullMessage = text;
  if (uploadedUrls.length > 0) {
    fullMessage += (text ? '\n\n' : '') + 'Attached photos:\n' + uploadedUrls.join('\n');
  }

  showTyping();
  $connBanner.classList.remove('show');

  // Запоминаем время начала запроса в localStorage
  requestStartTime = Date.now();
  localStorage.setItem('chat_request_start', requestStartTime.toString());

  // Hard client-side timeout: 6 minutes — guarantees UI never hangs forever
  clientTimeout = setTimeout(() => {
    if (sending && currentRequestId) {
      console.warn('Client timeout — forcing cleanup');
      cancelCurrentRequest();
    }
  }, 6 * 60 * 1000);

  let sseCompleted = false;

  try {
    const resp = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: AUTH,
      body: JSON.stringify({
        message: fullMessage,
        history: history.slice(-6),
        sessionId,
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
      removeTyping();
      if (clientTimeout) { clearTimeout(clientTimeout); clientTimeout = null; }
      addMessage('error', err.error || `HTTP ${resp.status}`);
      sending = false;
      $sendBtn.disabled = false;
      return;
    }

    // Read SSE stream
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let botText = '';
    let botDiv = null;
    let thinkingDiv = null;
    let thinkingContent = null;
    let thinkingText = '';
    let responseDiv = null;
    let lastToolDiv = null;
    let buffer = '';

    function ensureBotDiv() {
      if (!botDiv) {
        removeTyping();
        botDiv = document.createElement('div');
        botDiv.className = 'msg bot';
        $messages.appendChild(botDiv);
      }
      return botDiv;
    }

    function ensureThinkingBlock() {
      if (!thinkingDiv) {
        ensureBotDiv();
        thinkingDiv = document.createElement('div');
        thinkingDiv.className = 'thinking-block streaming';
        thinkingDiv.innerHTML = `
          <div class="thinking-header" onclick="toggleThinkingBlock(this)">
            <span class="thinking-icon">&#9889;</span>
            <span class="thinking-label">Размышляет</span>
            <span class="thinking-toggle">&#9656;</span>
          </div>
          <div class="thinking-content"></div>`;
        botDiv.appendChild(thinkingDiv);
        thinkingContent = thinkingDiv.querySelector('.thinking-content');
      }
      return thinkingContent;
    }

    function ensureResponseDiv() {
      if (!responseDiv) {
        ensureBotDiv();
        responseDiv = document.createElement('div');
        responseDiv.className = 'response-text';
        botDiv.appendChild(responseDiv);
      }
      return responseDiv;
    }

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6);
        if (!raw) continue;

        let event;
        try { event = JSON.parse(raw); } catch (_) { continue; }

        if (event.type === 'start') {
          currentRequestId = event.id;
        } else if (event.type === 'thinking') {
          const tc = ensureThinkingBlock();
          thinkingText += event.text;
          tc.textContent = thinkingText;
          $messages.scrollTop = $messages.scrollHeight;
        } else if (event.type === 'tool_use') {
          ensureBotDiv();
          // Finish thinking if it was streaming
          if (thinkingDiv && thinkingDiv.classList.contains('streaming')) {
            thinkingDiv.classList.remove('streaming');
            thinkingDiv.querySelector('.thinking-label').textContent = 'Размышления';
          }
          const toolDiv = document.createElement('div');
          toolDiv.className = 'tool-block';
          const toolName = escapeHtml(event.tool || 'tool');
          const toolInput = typeof event.input === 'string'
            ? escapeHtml(event.input.slice(0, 500))
            : escapeHtml(JSON.stringify(event.input).slice(0, 500));
          toolDiv.innerHTML = `
            <div class="tool-header"><span class="tool-icon">&#9881;</span> ${toolName}</div>
            <div class="tool-input">${toolInput}</div>`;
          botDiv.appendChild(toolDiv);
          lastToolDiv = toolDiv;
          $messages.scrollTop = $messages.scrollHeight;
        } else if (event.type === 'tool_result') {
          if (lastToolDiv) {
            const resultDiv = document.createElement('div');
            resultDiv.className = 'tool-result-block';
            resultDiv.textContent = (event.output || '').slice(0, 1000);
            lastToolDiv.appendChild(resultDiv);
            $messages.scrollTop = $messages.scrollHeight;
          }
        } else if (event.type === 'chunk') {
          // Finish thinking if it was streaming
          if (thinkingDiv && thinkingDiv.classList.contains('streaming')) {
            thinkingDiv.classList.remove('streaming');
            thinkingDiv.querySelector('.thinking-label').textContent = 'Размышления';
          }
          const rd = ensureResponseDiv();
          botText += event.text;
          rd.innerHTML = formatMarkdown(botText);
          $messages.scrollTop = $messages.scrollHeight;
        } else if (event.type === 'rag') {
          // RAG memory context found — show subtle indicator
          ensureBotDiv();
          const ragBadge = document.createElement('div');
          ragBadge.style.cssText = 'font-size:11px;color:#f0b429;margin-bottom:6px;';
          ragBadge.textContent = `\u{1F4BE} Найдено ${event.found} записей в памяти`;
          botDiv.insertBefore(ragBadge, botDiv.firstChild);
        } else if (event.type === 'error') {
          botText += event.text;
        } else if (event.type === 'done') {
          sseCompleted = true;
          removeTyping();
          if (clientTimeout) { clearTimeout(clientTimeout); clientTimeout = null; }
          // Finish thinking
          if (thinkingDiv && thinkingDiv.classList.contains('streaming')) {
            thinkingDiv.classList.remove('streaming');
            thinkingDiv.querySelector('.thinking-label').textContent = 'Размышления';
          }
          if (botDiv) {
            const el = document.createElement('div');
            el.className = 'elapsed';
            el.textContent = `${event.elapsed}s`;
            botDiv.appendChild(el);
            // Copy button
            const cb = document.createElement('button');
            cb.className = 'copy-btn';
            cb.textContent = 'Copy';
            cb.onclick = () => { navigator.clipboard.writeText(botText).then(() => { cb.textContent = 'Copied!'; setTimeout(() => cb.textContent = 'Copy', 1500); }); };
            botDiv.appendChild(cb);
          }
          if (botText) {
            history.push({ role: 'assistant', content: botText });
            saveLocalHistory();
          }
          currentRequestId = null;
          localStorage.removeItem('chat_request_start');
        }
      }
    }

    // SSE stream ended without 'done' event — server closed unexpectedly
    if (!sseCompleted && currentRequestId) {
      showTyping('Восстанавливаю соединение');
      pollForResult(currentRequestId);
      return; // pollForResult handles cleanup
    }
  } catch (err) {
    removeTyping();
    // Connection lost — try to recover
    $connBanner.classList.add('show');
    if (currentRequestId) {
      showTyping('Соединение потеряно, ожидаю ответ');
      pollForResult(currentRequestId);
      return; // pollForResult handles cleanup
    } else {
      addMessage('error', 'Соединение прервано. Проверьте интернет.');
    }
  } finally {
    if (sseCompleted || !currentRequestId) {
      if (clientTimeout) { clearTimeout(clientTimeout); clientTimeout = null; }
      sending = false;
      $sendBtn.disabled = false;
    }
  }
}

// --- Cancel current request ---
async function cancelCurrentRequest() {
  if (pollAbort) pollAbort.abort();
  if (clientTimeout) { clearTimeout(clientTimeout); clientTimeout = null; }

  if (currentRequestId) {
    try {
      await fetch(`${API}/api/cancel/${currentRequestId}`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${TOKEN}` },
      });
    } catch (_) {}
  }

  removeTyping();
  $connBanner.classList.remove('show');
  currentRequestId = null;
  sending = false;
  $sendBtn.disabled = false;
  requestStartTime = null;
  localStorage.removeItem('chat_request_start');
  addMessage('error', 'Запрос отменён');
}

// --- Poll for result after disconnect ---
async function pollForResult(requestId) {
  pollAbort = new AbortController();
  const maxAttempts = 60; // 5 minutes max (every 5s)
  let lastPartialText = '';

  for (let i = 0; i < maxAttempts; i++) {
    if (pollAbort.signal.aborted) return;
    await new Promise(r => setTimeout(r, 5000));
    if (pollAbort.signal.aborted) return;

    try {
      const resp = await fetch(`${API}/api/result/${requestId}`, {
        headers: { 'Authorization': `Bearer ${TOKEN}` },
        signal: pollAbort.signal,
      });
      if (!resp.ok) continue;
      const data = await resp.json();

      // Show partial text as it arrives
      if (data.fullText && data.fullText !== lastPartialText) {
        lastPartialText = data.fullText;
        const typingEl = document.getElementById('typing');
        if (typingEl) {
          typingEl.querySelector('span').textContent = `Получаю ответ (${data.fullText.length} символов)`;
        }
      }

      if (data.done) {
        removeTyping();
        $connBanner.classList.remove('show');
        if (data.fullText) {
          addMessage('bot', data.fullText, { elapsed: `${data.elapsed}s` });
        } else {
          addMessage('error', 'Сервер обработал запрос, но ответ пустой. Попробуйте снова.');
        }
        currentRequestId = null;
        sending = false;
        $sendBtn.disabled = false;
        pollAbort = null;
        return;
      }
    } catch (e) {
      if (e.name === 'AbortError') return;
      // Still offline, keep trying
    }
  }
  removeTyping();
  addMessage('error', 'Не удалось получить ответ за 5 минут. Попробуйте снова.');
  currentRequestId = null;
  sending = false;
  $sendBtn.disabled = false;
  pollAbort = null;
}

// --- Recover session on app reopen ---
async function recoverSession() {
  $connBanner.classList.remove('show');
  showTyping('Восстанавливаю');
  try {
    const resp = await fetch(`${API}/api/recover/${sessionId}`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` },
    });
    if (!resp.ok) {
      removeTyping();
      addMessage('error', 'Не удалось восстановить. Отправьте сообщение заново.');
      return;
    }
    const data = await resp.json();
    removeTyping();

    // Старые запросы (>5 мин) — не ждём
    const MAX_AGE_MS = 5 * 60 * 1000;
    if (data.status === 'running' && data.ageMs && data.ageMs > MAX_AGE_MS) {
      addMessage('error', 'Предыдущий запрос истёк. Отправьте сообщение заново.');
      if (data.requestId) {
        fetch(`${API}/api/cancel/${data.requestId}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${TOKEN}` },
        }).catch(() => {});
      }
      return;
    }

    if (data.status === 'running') {
      showTyping('Запрос обрабатывается');
      if (data.requestId) {
        currentRequestId = data.requestId;
        pollForResult(data.requestId);
      }
    } else if (data.status === 'completed' && data.fullText) {
      addMessage('bot', data.fullText, { elapsed: data.elapsed ? `${data.elapsed}s` : '' });
    }
  } catch (err) {
    removeTyping();
    $connBanner.classList.add('show');
  }
}

// --- Auto-recover on page load ---
async function checkPendingOnLoad() {
  // Первая проверка: клиентский возраст запроса (не зависит от сервера)
  const MAX_AGE_MS = 5 * 60 * 1000;
  const savedStart = localStorage.getItem('chat_request_start');
  if (savedStart) {
    const age = Date.now() - parseInt(savedStart, 10);
    if (age > MAX_AGE_MS) {
      // Запрос старше 5 мин — точно мёртвый, убираем
      localStorage.removeItem('chat_request_start');
      removeTyping();
      return;
    }
  } else {
    // Нет активного запроса — нечего восстанавливать
    return;
  }

  try {
    const resp = await fetch(`${API}/api/recover/${sessionId}`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` },
    });
    if (!resp.ok) {
      localStorage.removeItem('chat_request_start');
      return;
    }
    const data = await resp.json();

    // Двойная проверка: серверный возраст
    if (data.ageMs && data.ageMs > MAX_AGE_MS && data.status === 'running') {
      localStorage.removeItem('chat_request_start');
      if (data.requestId) {
        fetch(`${API}/api/cancel/${data.requestId}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${TOKEN}` },
        }).catch(() => {});
      }
      return;
    }

    if (data.status === 'running') {
      showTyping('Запрос обрабатывается');
      if (data.requestId) {
        currentRequestId = data.requestId;
        pollForResult(data.requestId);
      }
    } else if (data.status === 'completed' && data.fullText) {
      localStorage.removeItem('chat_request_start');
      const lastBot = history.filter(m => m.role === 'assistant').pop();
      if (!lastBot || lastBot.content !== data.fullText) {
        addMessage('bot', data.fullText, { elapsed: data.elapsed ? `${data.elapsed}s` : '' });
      }
    } else {
      // status: 'none' — запрос потерян
      localStorage.removeItem('chat_request_start');
    }
  } catch (_) {
    // Сервер недоступен — не показываем зависший индикатор
    localStorage.removeItem('chat_request_start');
  }
}

// --- Photos ---
function toggleFileMenu() {
  document.getElementById('fileMenu').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeFileMenu() {
  document.getElementById('fileMenu').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function pickPhoto(source) {
  closeFileMenu();
  if (source === 'camera') {
    document.getElementById('cameraInput').click();
  } else {
    document.getElementById('galleryInput').click();
  }
}
function handlePhotos(input) {
  const files = Array.from(input.files || []);
  for (const file of files) {
    if (pendingPhotos.length >= 4) break; // max 4 photos
    const reader = new FileReader();
    reader.onload = (e) => {
      pendingPhotos.push({ file, dataUrl: e.target.result });
      renderAttachments();
    };
    reader.readAsDataURL(file);
  }
  input.value = '';
}
function renderAttachments() {
  $attachments.innerHTML = '';
  pendingPhotos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'att-preview';
    div.innerHTML = `<img src="${p.dataUrl}"><button class="remove" onclick="removePhoto(${i})">&#10005;</button>`;
    $attachments.appendChild(div);
  });
  toggleSendBtn();
}
function removePhoto(idx) {
  pendingPhotos.splice(idx, 1);
  renderAttachments();
}

// --- Quick commands ---
function quickCmd(text) {
  $input.value = text;
  autoGrow($input);
  toggleSendBtn();
  sendMessage();
}

// --- Voice ---
let mediaRecorder = null;
let audioChunks = [];
function toggleVoice() {
  const btn = document.getElementById('micBtn');
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    btn.classList.remove('recording');
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    btn.classList.add('recording');
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      // Transcribe
      const fd = new FormData();
      fd.append('audio', blob, 'voice.webm');
      try {
        const resp = await fetch(`${API}/api/transcribe`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${TOKEN}` },
          body: fd,
        });
        if (resp.ok) {
          const data = await resp.json();
          if (data.text) {
            $input.value = ($input.value ? $input.value + ' ' : '') + data.text;
            autoGrow($input);
            toggleSendBtn();
          }
        }
      } catch (_) {}
    };
    mediaRecorder.start();
  }).catch(() => {});
}

// --- UI helpers ---
function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function toggleSendBtn() {
  const hasContent = $input.value.trim() || pendingPhotos.length > 0;
  $sendBtn.classList.toggle('visible', hasContent);
}
function toggleSettings() {
  // TODO: settings panel
}
function toggleThinkingBlock(header) {
  const block = header.parentElement;
  block.classList.toggle('expanded');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatMarkdown(text) {
  if (!text) return '';
  let html = escapeHtml(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`);
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<i>$1</i>');
  // Lists
  html = html.replace(/^[-*] (.+)/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  // Numbered lists
  html = html.replace(/^\d+\. (.+)/gm, '<li>$1</li>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

// --- Init ---
loadLocalHistory();
checkPendingOnLoad();

// Visibility change — recover when app comes back to foreground
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    checkPendingOnLoad();
  }
});
