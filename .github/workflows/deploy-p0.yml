name: "P0 Deploy to Frankfurt VPS"

# Запускается при push в ветку или вручную
on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - "p0-foundation/**"
      - ".github/workflows/deploy-p0.yml"
      - "*.py"
      - "requirements.txt"
  workflow_dispatch:
    inputs:
      action:
        description: "What to deploy"
        required: true
        default: "full"
        type: choice
        options:
          - full          # Полный деплой (N8N + Long Poll + workflows + webapp)
          - longpoll      # Только VK Long Poll listener
          - workflows     # Только N8N workflows
          - webapp        # Только FastAPI webapp (web.py)
          - chat          # Только Claude Chat (chat.marbomebel.ru)
          - healthcheck   # Проверка всех сервисов

# ─── Secrets (настроить в GitHub → Settings → Secrets) ───
# VPS_HOST        — IP или домен VPS (Frankfurt)
# VPS_USER        — пользователь SSH (обычно root)
# VPS_SSH_KEY     — приватный SSH-ключ (Ed25519)
# VPS_PORT        — SSH порт (по умолчанию 22)
# VK_TOKEN        — Access Token сообщества VK
# VK_GROUP_ID     — ID группы VK
# TG_BOT_TOKEN    — Telegram Bot Token
# TG_CHAT_ID      — Chat ID менеджера
# GOOGLE_SA_JSON  — содержимое Google Service Account JSON (base64)
# SPREADSHEET_ID  — ID Google-таблицы
# BLUESALES_LOGIN — логин BlueSales
# BLUESALES_PASS  — пароль BlueSales
# BLUESALES_API_KEY — API ключ BlueSales
# VK_USER_TOKEN   — Personal user token для чтения личных сообщений
# OPENAI_API_KEY  — API ключ OpenAI для AI автоответов

jobs:
  deploy:
    name: "Deploy to VPS"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─── 1. Checkout ───────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── 2. Подготовка SSH ─────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ─── 2b. Early Telegram diagnostic (from runner, no SSH) ───
      - name: "Diagnostic: Telegram + SA secret check"
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
          SA_B64: ${{ secrets.GOOGLE_SA_JSON }}
          VPS_H: ${{ secrets.VPS_HOST }}
          SHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          echo "=== DIAGNOSTIC: checking secrets ==="
          echo "TG_TOKEN length: ${#TG_TOKEN}"
          echo "TG_CHAT length: ${#TG_CHAT}"
          echo "SA_B64 length: ${#SA_B64}"
          echo "VPS_HOST: ${VPS_H:+SET}"
          echo "SPREADSHEET_ID: ${SHEET_ID:+SET}"

          # SA decode test
          SA_INFO="len=${#SA_B64}"
          if [ -n "$SA_B64" ]; then
            # Try base64
            echo "$SA_B64" | base64 -d > /tmp/sa_test.json 2>/dev/null || true
            SA_EMAIL=$(python3 -c "import json; print(json.load(open('/tmp/sa_test.json')).get('client_email',''))" 2>/dev/null || true)
            if [ -n "$SA_EMAIL" ]; then
              SA_INFO="b64 OK: ${SA_EMAIL}"
            else
              # Try raw JSON
              printf '%s' "$SA_B64" > /tmp/sa_test.json
              SA_EMAIL=$(python3 -c "import json; print(json.load(open('/tmp/sa_test.json')).get('client_email',''))" 2>/dev/null || true)
              if [ -n "$SA_EMAIL" ]; then
                SA_INFO="raw JSON OK: ${SA_EMAIL}"
              else
                SA_INFO="FAIL (len=${#SA_B64}, first20=$(echo "$SA_B64" | head -c 20))"
              fi
            fi
            rm -f /tmp/sa_test.json
          else
            SA_INFO="EMPTY"
          fi
          echo "SA result: $SA_INFO"

          # Send diagnostic to Telegram directly from runner
          MSG=$(printf '%s\n%s\n%s\n%s\n%s\n%s\n%s' \
            "P0 Diagnostic" \
            "TG_TOKEN: ${#TG_TOKEN}c" \
            "SA: ${SA_INFO}" \
            "VPS: ${VPS_H:+OK}" \
            "Sheet: ${SHEET_ID:+SET}" \
            "Run: ${{ github.run_id }}" \
            "Commit: ${{ github.sha }}")

          echo "Sending diagnostic to Telegram..."
          echo "MSG=$MSG"
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}" 2>&1)
          echo "Telegram response: $RESP"

      # ─── 3. Создание .env на VPS ──────────────
      - name: Create .env on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          mkdir -p /opt/p0-foundation /opt/credentials

          cat > /opt/p0-foundation/.env << 'ENVEOF'
          VK_TOKEN=${{ secrets.VK_TOKEN }}
          VK_GROUP_ID=${{ secrets.VK_GROUP_ID }}
          VK_API_VERSION=5.199
          TELEGRAM_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_MANAGER_CHAT_ID=${{ secrets.TG_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_FILE=/opt/credentials/google-service-account.json
          GOOGLE_SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }}
          N8N_URL=${{ secrets.N8N_BASE_URL || 'http://localhost:5678' }}
          N8N_WEBHOOK_BASE_URL=${{ secrets.N8N_BASE_URL || 'http://localhost:5678' }}/webhook
          VK_USER_TOKEN=${{ secrets.VK_USER_TOKEN }}
          BLUESALES_LOGIN=${{ secrets.BLUESALES_LOGIN }}
          BLUESALES_PASSWORD=${{ secrets.BLUESALES_PASS }}
          BLUESALES_PASSWORD_HASH=$(echo -n '${{ secrets.BLUESALES_PASS }}' | md5sum | awk '{print toupper($1)}')
          BLUESALES_API_KEY=${{ secrets.BLUESALES_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ENVEOF

          # Удалить лишние пробелы от heredoc indent
          sed -i 's/^          //' /opt/p0-foundation/.env
          # Fix double slashes in URLs (e.g. https://host//webhook → https://host/webhook)
          sed -i 's|://\(.*\)//|://\1/|g' /opt/p0-foundation/.env
          echo "✓ .env created"
          REMOTE_SCRIPT

      # ─── 4. Google Service Account JSON ────────
      - name: Deploy Google SA credentials
        if: true
        env:
          SA_B64: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          SA_DECODED=false

          if [ -z "$SA_B64" ]; then
            echo "⚠ GOOGLE_SA_JSON secret is empty"
          else
            echo "Secret length: ${#SA_B64} chars"
            echo "First 20 chars: $(echo "$SA_B64" | head -c 20)..."

            # Method 1: base64 decode
            echo "$SA_B64" | base64 -d > /tmp/sa_check.json 2>/dev/null || true
            if python3 -c "import json; d=json.load(open('/tmp/sa_check.json')); print('email:', d.get('client_email','?'))" 2>/dev/null; then
              echo "✓ Decoded as base64"
              SA_DECODED=true
            fi

            # Method 2: raw JSON (secret might not be base64-encoded)
            if [ "$SA_DECODED" = "false" ]; then
              echo "base64 failed — trying raw JSON..."
              printf '%s' "$SA_B64" > /tmp/sa_check.json
              if python3 -c "import json; d=json.load(open('/tmp/sa_check.json')); print('email:', d.get('client_email','?'))" 2>/dev/null; then
                echo "✓ Valid as raw JSON"
                SA_DECODED=true
              fi
            fi

            # Method 3: maybe it's base64 with line breaks — clean and retry
            if [ "$SA_DECODED" = "false" ]; then
              echo "raw JSON failed — trying cleaned base64..."
              printf '%s' "$SA_B64" | tr -d '\n\r ' | base64 -d > /tmp/sa_check.json 2>/dev/null || true
              if python3 -c "import json; d=json.load(open('/tmp/sa_check.json')); print('email:', d.get('client_email','?'))" 2>/dev/null; then
                echo "✓ Decoded as cleaned base64"
                SA_DECODED=true
              fi
            fi
          fi

          if [ "$SA_DECODED" = "true" ]; then
            # SCP validated file to VPS
            scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} \
              /tmp/sa_check.json \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/credentials/google-service-account.json
            ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "chmod 600 /opt/credentials/google-service-account.json && echo '✓ SA deployed to VPS'"
            SA_EMAIL_FOUND=$(python3 -c "import json; print(json.load(open('/tmp/sa_check.json')).get('client_email','?'))" 2>/dev/null)
            echo "SA_DEPLOY_STATUS=✅ SA deployed: ${SA_EMAIL_FOUND}" >> "$GITHUB_ENV"
          else
            echo "⚠ Could not decode GOOGLE_SA_JSON — checking if VPS already has a valid SA file..."
            VPS_SA_CHECK=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "python3 -c \"import json; d=json.load(open('/opt/credentials/google-service-account.json')); print(d.get('client_email',''))\" 2>/dev/null" || true)
            if [ -n "$VPS_SA_CHECK" ]; then
              echo "✓ VPS already has valid SA: $VPS_SA_CHECK"
              echo "SA_DEPLOY_STATUS=⚠ SA from VPS cache: ${VPS_SA_CHECK}" >> "$GITHUB_ENV"
            else
              echo "❌ No valid SA on VPS either. Google Sheets will not work."
              echo "ACTION NEEDED: Set GOOGLE_SA_JSON secret (base64 or raw JSON)"
              echo "SA_DEPLOY_STATUS=❌ SA decode FAILED (len=${#SA_B64})" >> "$GITHUB_ENV"
            fi
          fi
          rm -f /tmp/sa_check.json

      # ─── 5. Копирование файлов ────────────────
      - name: Copy project files to VPS
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} -r \
            p0-foundation/vk-longpoll \
            p0-foundation/vk-user-longpoll \
            p0-foundation/n8n-workflows \
            p0-foundation/scripts \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/p0-foundation/

      # ─── 6. Установка N8N ─────────────────────
      - name: Install & start N8N
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == '' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          # Проверить Node.js
          if ! command -v node &>/dev/null; then
            echo "Installing Node.js..."
            curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            apt-get install -y nodejs
          fi
          echo "Node.js: $(node --version)"

          # Проверить N8N
          if ! command -v n8n &>/dev/null; then
            echo "Installing N8N..."
            npm install -g n8n
          fi
          echo "N8N: $(n8n --version)"

          # Systemd unit для N8N (обновляем всегда для актуальности)
          cat > /etc/systemd/system/n8n.service << 'UNIT'
          [Unit]
          Description=N8N Workflow Automation
          After=network.target

          [Service]
          Type=simple
          EnvironmentFile=/opt/p0-foundation/.env
          Environment=N8N_PORT=5678
          Environment=N8N_PROTOCOL=http
          Environment=GENERIC_TIMEZONE=Europe/Moscow
          Environment=N8N_SECURE_COOKIE=false
          Environment=N8N_BLOCK_ENV_ACCESS_IN_NODE=false
          ExecStart=/usr/bin/env n8n start
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
          UNIT
          systemctl daemon-reload
          systemctl enable n8n

          systemctl restart n8n
          sleep 5

          # Проверить что N8N запустился
          for i in $(seq 1 20); do
            if curl -s http://localhost:5678/healthz &>/dev/null; then
              echo "✓ N8N running on :5678"
              break
            fi
            sleep 2
          done
          REMOTE_SCRIPT

      # ─── 7. VK Long Poll Listener ─────────────
      - name: Deploy VK Long Poll Listener
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'longpoll' || github.event.inputs.action == '' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          mkdir -p /opt/vk-longpoll
          cp /opt/p0-foundation/vk-longpoll/listener.js /opt/vk-longpoll/
          cp /opt/p0-foundation/vk-longpoll/package.json /opt/vk-longpoll/

          # .env для listener (берём из основного)
          source /opt/p0-foundation/.env
          # Use external N8N URL for webhook (N8N registers webhooks on external URL only)
          N8N_WH_BASE="${N8N_URL:-http://localhost:5678}"
          cat > /opt/vk-longpoll/.env << ENVEOF
          VK_TOKEN=${VK_TOKEN}
          VK_GROUP_ID=${VK_GROUP_ID}
          VK_API_VERSION=${VK_API_VERSION:-5.199}
          N8N_WEBHOOK_URL=${N8N_WH_BASE}/webhook/vk-events
          HEALTH_PORT=3100
          ENVEOF

          # Systemd unit
          cat > /etc/systemd/system/vk-longpoll.service << 'UNIT'
          [Unit]
          Description=VK Long Poll Listener
          After=network.target n8n.service

          [Service]
          Type=simple
          WorkingDirectory=/opt/vk-longpoll
          EnvironmentFile=/opt/vk-longpoll/.env
          ExecStart=/usr/bin/node /opt/vk-longpoll/listener.js
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
          UNIT

          systemctl daemon-reload
          systemctl enable vk-longpoll
          systemctl restart vk-longpoll
          sleep 3

          if systemctl is-active --quiet vk-longpoll; then
            echo "✓ VK Long Poll running"
          else
            echo "✗ VK Long Poll failed to start"
            journalctl -u vk-longpoll -n 10 --no-pager
          fi
          REMOTE_SCRIPT

      # ─── 7b. VK User Long Poll (личные сообщения) ──
      - name: Deploy VK User Long Poll Listener
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'longpoll' || github.event.inputs.action == '' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          source /opt/p0-foundation/.env

          if [ -z "${VK_USER_TOKEN:-}" ]; then
            echo "! VK_USER_TOKEN не задан — User Long Poll пропущен"
            exit 0
          fi

          mkdir -p /opt/vk-user-longpoll
          cp /opt/p0-foundation/vk-user-longpoll/listener.js /opt/vk-user-longpoll/
          cp /opt/p0-foundation/vk-user-longpoll/package.json /opt/vk-user-longpoll/

          cat > /opt/vk-user-longpoll/.env << ENVEOF
          VK_USER_TOKEN=${VK_USER_TOKEN}
          VK_API_VERSION=${VK_API_VERSION:-5.199}
          N8N_WEBHOOK_URL=http://localhost:5678/webhook/vk-user-messages
          HEALTH_PORT=3101
          ENVEOF

          cat > /etc/systemd/system/vk-user-longpoll.service << 'UNIT'
          [Unit]
          Description=VK User Long Poll — личные сообщения
          After=network.target n8n.service

          [Service]
          Type=simple
          WorkingDirectory=/opt/vk-user-longpoll
          EnvironmentFile=/opt/vk-user-longpoll/.env
          ExecStart=/usr/bin/node /opt/vk-user-longpoll/listener.js
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
          UNIT

          systemctl daemon-reload
          systemctl enable vk-user-longpoll
          systemctl restart vk-user-longpoll
          sleep 3

          if systemctl is-active --quiet vk-user-longpoll; then
            echo "✓ VK User Long Poll running"
          else
            echo "✗ VK User Long Poll failed to start"
            journalctl -u vk-user-longpoll -n 10 --no-pager
          fi
          REMOTE_SCRIPT

      # ─── 7c. FastAPI Webapp (chat.marbomebel.ru) ──
      - name: Deploy FastAPI Webapp
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'webapp' || github.event.inputs.action == '' }}
        run: |
          # Copy Python files to VPS
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} \
            web.py memory_store.py retriever.py reasoning_agent.py \
            exporter.py agents.py bluesales.py bluesales_config.py \
            devops_mem.py knowledge_base.py wiki.py rag.py \
            requirements.txt \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/p0-foundation/

          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          mkdir -p /opt/webapp
          cp /opt/p0-foundation/web.py /opt/webapp/
          cp /opt/p0-foundation/memory_store.py /opt/webapp/
          cp /opt/p0-foundation/retriever.py /opt/webapp/
          cp /opt/p0-foundation/reasoning_agent.py /opt/webapp/
          cp /opt/p0-foundation/exporter.py /opt/webapp/
          cp /opt/p0-foundation/agents.py /opt/webapp/
          cp /opt/p0-foundation/bluesales.py /opt/webapp/
          cp /opt/p0-foundation/bluesales_config.py /opt/webapp/
          cp /opt/p0-foundation/devops_mem.py /opt/webapp/
          cp /opt/p0-foundation/knowledge_base.py /opt/webapp/
          cp /opt/p0-foundation/wiki.py /opt/webapp/
          cp /opt/p0-foundation/rag.py /opt/webapp/
          cp /opt/p0-foundation/requirements.txt /opt/webapp/

          # Install Python dependencies
          if ! command -v pip3 &>/dev/null; then
            apt-get update -qq && apt-get install -y -qq python3-pip python3-venv
          fi

          # Create venv if not exists
          if [ ! -d /opt/webapp/venv ]; then
            python3 -m venv /opt/webapp/venv
          fi
          /opt/webapp/venv/bin/pip install -q -r /opt/webapp/requirements.txt

          # Systemd unit for FastAPI webapp
          cat > /etc/systemd/system/webapp.service << 'UNIT'
          [Unit]
          Description=FastAPI Webapp (chat.marbomebel.ru)
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=/opt/webapp
          EnvironmentFile=/opt/p0-foundation/.env
          ExecStart=/opt/webapp/venv/bin/uvicorn web:app --host 0.0.0.0 --port 8000
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
          UNIT

          # Remove heredoc indentation
          sed -i 's/^          //' /etc/systemd/system/webapp.service

          # Kill any stale uvicorn on port 8000 not managed by systemd
          STALE_PID=$(lsof -ti :8000 2>/dev/null || true)
          if [ -n "$STALE_PID" ]; then
            echo "Killing stale process on port 8000: $STALE_PID"
            kill -9 $STALE_PID 2>/dev/null || true
            sleep 2
          fi

          systemctl daemon-reload
          systemctl enable webapp
          systemctl restart webapp
          sleep 3

          if systemctl is-active --quiet webapp; then
            echo "✓ FastAPI webapp running on :8000"
          else
            echo "✗ FastAPI webapp failed to start"
            journalctl -u webapp -n 15 --no-pager
          fi
          REMOTE_SCRIPT

      # ─── 7e. Claude Chat (chat.marbomebel.ru) ──
      - name: Deploy Claude Chat
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'chat' || github.event.inputs.action == '' }}
        run: |
          # Copy claude-chat files to VPS
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} -r \
            claude-chat/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/

          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          cd /opt/claude-chat

          # Install dependencies
          if ! command -v node &>/dev/null; then
            echo "Node.js not found — skipping claude-chat deploy"
            exit 0
          fi
          npm install --omit=dev 2>&1 | tail -5

          # Create .env if it doesn't exist (use existing tokens)
          if [ ! -f .env ]; then
            source /opt/p0-foundation/.env 2>/dev/null || true
            cat > .env << ENVEOF
BEARER_TOKEN=$(openssl rand -hex 32)
OPENAI_API_KEY=${OPENAI_API_KEY:-}
PORT=3847
ENVEOF
            echo "✓ .env created with new BEARER_TOKEN"
          fi

          # Create/update systemd service
          cat > /etc/systemd/system/claude-chat.service << 'UNIT'
[Unit]
Description=Claude Chat (chat.marbomebel.ru)
After=network.target

[Service]
Type=simple
WorkingDirectory=/opt/claude-chat
EnvironmentFile=/opt/claude-chat/.env
ExecStart=/usr/bin/node /opt/claude-chat/server.js
Restart=always
RestartSec=10

[Install]
WantedBy=multi-user.target
UNIT

          systemctl daemon-reload
          systemctl enable claude-chat
          systemctl restart claude-chat
          sleep 3

          if systemctl is-active --quiet claude-chat; then
            echo "✓ Claude Chat running on :3847"
            # Quick health check
            curl -s --max-time 5 http://localhost:3847/api/health | head -c 200
            echo ""
          else
            echo "✗ Claude Chat failed to start"
            journalctl -u claude-chat -n 15 --no-pager
          fi
          REMOTE_SCRIPT

      # ─── 7d. Установка Watchdog (мониторинг + авторестарт) ──
      - name: Deploy Watchdog
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == '' }}
        run: |
          # Копируем watchdog скрипт на VPS
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} \
            p0-foundation/scripts/watchdog.sh \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/p0-foundation/scripts/

          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          chmod +x /opt/p0-foundation/scripts/watchdog.sh

          # Добавить N8N_API_KEY в .env если его нет
          if ! grep -q "N8N_API_KEY" /opt/p0-foundation/.env 2>/dev/null; then
            echo "N8N_API_KEY=${N8N_API_KEY:-}" >> /opt/p0-foundation/.env
          fi

          # Настроить cron: каждые 5 минут
          CRON_LINE="*/5 * * * * /opt/p0-foundation/scripts/watchdog.sh >> /var/log/p0-watchdog.log 2>&1"
          (crontab -l 2>/dev/null | grep -v "watchdog.sh" ; echo "$CRON_LINE") | crontab -
          echo "✓ Watchdog установлен в cron (каждые 5 мин)"

          # Создать лог-файл
          touch /var/log/p0-watchdog.log

          # Запустить первый раз для проверки
          /opt/p0-foundation/scripts/watchdog.sh 2>&1 | tail -5 || true
          echo "✓ Watchdog первый запуск завершён"

          REMOTE_SCRIPT

      # ─── 8. Импорт N8N Workflows ──────────────
      - name: Import N8N workflows
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'workflows' || github.event.inputs.action == '' }}
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
          N8N_WEBHOOK_BASE: ${{ secrets.N8N_BASE_URL }}/webhook
        run: |
          # Бэкап на VPS
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'
          mkdir -p /opt/n8n-workflows
          cp /opt/p0-foundation/n8n-workflows/*.json /opt/n8n-workflows/
          REMOTE_SCRIPT

          # Импорт в основной N8N (n8n.marbomebel.ru) через API
          N8N_URL="${N8N_BASE_URL:-https://n8n.marbomebel.ru}"

          echo "Importing workflows to $N8N_URL ..."

          # ─── Найти credentials для инъекции в workflows ───
          echo "Looking up credentials..."
          ALL_CREDS=$(curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            "${N8N_URL}/api/v1/credentials" 2>/dev/null)
          echo "  Credentials API response (first 500 chars): $(echo "$ALL_CREDS" | head -c 500)"

          GS_CRED_ID=$(echo "$ALL_CREDS" | python3 -c "
          import sys, json
          try:
              raw = json.load(sys.stdin)
              # Handle both {data: [...]} and [...] formats
              data = raw.get('data', raw) if isinstance(raw, dict) else raw
              if not isinstance(data, list):
                  data = []
              for c in data:
                  if c.get('type') == 'googleSheetsOAuth2Api':
                      print(c['id'])
                      break
          except Exception as e:
              print(f'ERROR: {e}', file=sys.stderr)
          " 2>&1)

          GS_CRED_NAME=$(echo "$ALL_CREDS" | python3 -c "
          import sys, json
          try:
              raw = json.load(sys.stdin)
              data = raw.get('data', raw) if isinstance(raw, dict) else raw
              if not isinstance(data, list):
                  data = []
              for c in data:
                  if c.get('type') == 'googleSheetsOAuth2Api':
                      print(c['name'])
                      break
          except:
              pass
          " 2>/dev/null)

          if [ -n "$GS_CRED_ID" ] && ! echo "$GS_CRED_ID" | grep -q "ERROR"; then
            echo "  ✓ Google Sheets credential: '$GS_CRED_NAME' (ID: $GS_CRED_ID)"
          else
            echo "  ⚠ Google Sheets credential not found (response: $GS_CRED_ID)"
            GS_CRED_ID=""
          fi

          # Получить список существующих workflows
          EXISTING=$(curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            "${N8N_URL}/api/v1/workflows?limit=100" 2>/dev/null)

          for wf_file in p0-foundation/n8n-workflows/P0-*.json; do
            wf_name=$(python3 -c "import json; print(json.load(open('$wf_file'))['name'])" 2>/dev/null)
            echo "Processing: $wf_name..."

            # Очистить JSON + инъектировать credentials
            CLEAN_JSON=$(python3 -c "
          import json, sys
          gs_cred_id = '$GS_CRED_ID'
          gs_cred_name = '$GS_CRED_NAME'
          with open('$wf_file') as f:
              wf = json.load(f)
          wf.pop('tags', None)
          wf.pop('active', None)
          wf.pop('staticData', None)

          # Inject credentials into nodes
          if gs_cred_id:
              for node in wf.get('nodes', []):
                  ntype = node.get('type', '')
                  if ntype == 'n8n-nodes-base.googleSheets':
                      node['credentials'] = {
                          'googleSheetsOAuth2Api': {
                              'id': gs_cred_id,
                              'name': gs_cred_name
                          }
                      }
                  params = node.get('parameters', {})
                  if (ntype == 'n8n-nodes-base.httpRequest' and
                      params.get('authentication') == 'predefinedCredentialType' and
                      params.get('nodeCredentialType') == 'googleSheetsOAuth2Api'):
                      node['credentials'] = {
                          'googleSheetsOAuth2Api': {
                              'id': gs_cred_id,
                              'name': gs_cred_name
                          }
                      }

          # Replace {{ __PLACEHOLDER__ }} tokens with actual env values (n8n 2.x blocks $env)
          raw = json.dumps(wf)
          import os
          replacements = {
              '{{ __TG_BOT_TOKEN__ }}': os.environ.get('TG_BOT_TOKEN', ''),
              '{{ __TG_CHAT_ID__ }}': os.environ.get('TG_CHAT_ID', ''),
              '{{ __VK_GROUP_ID__ }}': os.environ.get('VK_GROUP_ID', ''),
              '{{ __N8N_WEBHOOK_BASE__ }}': os.environ.get('N8N_WEBHOOK_BASE', ''),
              '__TG_BOT_TOKEN__': os.environ.get('TG_BOT_TOKEN', ''),
              '__TG_CHAT_ID__': os.environ.get('TG_CHAT_ID', ''),
              '__VK_GROUP_ID__': os.environ.get('VK_GROUP_ID', ''),
              '__N8N_WEBHOOK_BASE__': os.environ.get('N8N_WEBHOOK_BASE', ''),
          }
          for placeholder, value in replacements.items():
              raw = raw.replace(placeholder, value)
          print(raw)
          " 2>/dev/null)

            # Проверить, существует ли уже workflow с таким именем
            EXISTING_ID=$(echo "$EXISTING" | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          for w in data:
              if w['name'] == '$wf_name':
                  print(w['id'])
                  break
          " 2>/dev/null || true)

            if [ -n "$EXISTING_ID" ]; then
              echo "  Updating existing workflow (ID: $EXISTING_ID)..."
              response=$(echo "$CLEAN_JSON" | curl -s -X PUT "${N8N_URL}/api/v1/workflows/${EXISTING_ID}" \
                -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
                -H "Content-Type: application/json" \
                -d @- 2>&1)
            else
              echo "  Creating new workflow..."
              response=$(echo "$CLEAN_JSON" | curl -s -X POST "${N8N_URL}/api/v1/workflows" \
                -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
                -H "Content-Type: application/json" \
                -d @- 2>&1)
            fi

            if echo "$response" | grep -q '"id"'; then
              wf_id=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null)
              echo "  ✓ $wf_name → ID: $wf_id"
            else
              echo "  ✗ $wf_name — ошибка:"
              echo "    $(echo "$response" | head -c 300)"
            fi
          done

      # ─── 8b. Активация и запуск workflows ────
      - name: Activate & run P0 workflows
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'workflows' || github.event.inputs.action == '' }}
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
        run: |
          N8N_URL="${N8N_BASE_URL:-https://n8n.marbomebel.ru}"

          # Получить все workflows
          ALL_WF=$(curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            "${N8N_URL}/api/v1/workflows?limit=100")

          # Функция: найти ID по имени
          get_wf_id() {
            echo "$ALL_WF" | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          for w in data:
              if w['name'] == '$1':
                  print(w['id'])
                  break
          " 2>/dev/null
          }

          # Функция: активировать workflow через POST /activate
          activate_workflow() {
            local WF_NAME="$1"
            local WF_ID=$(get_wf_id "$WF_NAME")
            if [ -z "$WF_ID" ]; then
              echo "  ⚠ $WF_NAME: not found, skipping"
              return 0
            fi
            echo "Activating $WF_NAME (ID: $WF_ID)..."

            # POST /activate
            resp=$(curl -s -X POST "${N8N_URL}/api/v1/workflows/${WF_ID}/activate" \
              -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
              -H "Content-Type: application/json")
            if echo "$resp" | grep -q '"active":true'; then
              echo "  ✓ $WF_NAME активирован"
              return 0
            fi

            # Fallback: GET workflow, PUT только допустимые поля
            wf_body=$(curl -s "${N8N_URL}/api/v1/workflows/${WF_ID}" \
              -H "X-N8N-API-KEY: ${N8N_API_KEY}")
            updated_body=$(echo "$wf_body" | python3 -c "
          import sys, json
          wf = json.load(sys.stdin)
          # Только поля которые N8N принимает в PUT
          clean = {
              'name': wf['name'],
              'nodes': wf.get('nodes', []),
              'connections': wf.get('connections', {}),
              'settings': wf.get('settings', {}),
              'active': True
          }
          if 'staticData' in wf:
              clean['staticData'] = wf['staticData']
          print(json.dumps(clean))
          " 2>/dev/null)

            if [ -n "$updated_body" ]; then
              resp2=$(curl -s -X PUT "${N8N_URL}/api/v1/workflows/${WF_ID}" \
                -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "$updated_body")
              if echo "$resp2" | grep -q '"active":true'; then
                echo "  ✓ $WF_NAME активирован (via PUT)"
                return 0
              fi
              echo "  ⚠ $WF_NAME PUT: $(echo "$resp2" | head -c 300)"
            fi
            echo "  ⚠ $WF_NAME activate: $(echo "$resp" | head -c 300)"
            echo "  ℹ️  Активируйте вручную в N8N UI (возможно нужны credentials)"
            return 0
          }

          # ─── Активировать все P0 workflows ───
          echo "Activating all P0 workflows..."
          echo "$ALL_WF" | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          for w in data:
              if w['name'].startswith('P0-'):
                  print(w['name'])
          " 2>/dev/null | while read -r wf_name; do
            activate_workflow "$wf_name"
          done

          # Double-check P0-03 (critical for webhooks)
          activate_workflow "P0-03_VK_Event_Receiver"

          # ─── Запустить P0-02 и P0-01 через VPS (internal API) ───
          echo ""
          echo "Running P0-02 and P0-01 via VPS internal API..."

      - name: Run P0-01 & P0-02 via n8n CLI
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'workflows' || github.event.inputs.action == '' }}
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
        run: |
          N8N_URL="${N8N_BASE_URL:-https://n8n.marbomebel.ru}"

          # Get workflow IDs via external API (proven to work)
          ALL_WF=$(curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            "${N8N_URL}/api/v1/workflows?limit=100")

          P02_ID=$(echo "$ALL_WF" | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          for w in data:
              if w['name'] == 'P0-02_Test_Telegram':
                  print(w['id'])
                  break
          " 2>/dev/null)

          P01_ID=$(echo "$ALL_WF" | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          for w in data:
              if w['name'] == 'P0-01_Init_Google_Sheets':
                  print(w['id'])
                  break
          " 2>/dev/null)

          echo "P0-02 ID: $P02_ID"
          echo "P0-01 ID: $P01_ID"

          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          run_via_api() {
            local WF_NAME="$1"
            local WF_ID="$2"
            if [ -z "$WF_ID" ]; then
              echo "  ⚠ $WF_NAME: not found"
              return 0
            fi
            echo "Running $WF_NAME (ID: $WF_ID)..."

            # Method 1: POST /api/v1/workflows/{id}/run (localhost, n8n >= 1.94)
            local API_KEY="${N8N_API_KEY}"
            resp=$($SSH_CMD "curl -s -w '\n%{http_code}' -X POST 'http://localhost:5678/api/v1/workflows/${WF_ID}/run' -H 'X-N8N-API-KEY: ${API_KEY}' -H 'Content-Type: application/json' -d '{}' 2>&1")
            http_code=$(echo "$resp" | tail -1)
            body=$(echo "$resp" | head -n -1)
            echo "  Method 1 (POST /run): HTTP $http_code"

            if [ "$http_code" = "200" ] || echo "$body" | grep -q '"executionId\|"finished\|"success'; then
              echo "  ✓ $WF_NAME executed via API /run"
              return 0
            fi

            # Method 2: POST /rest/workflows/run (internal UI endpoint)
            resp2=$($SSH_CMD "curl -s -w '\n%{http_code}' -X POST 'http://localhost:5678/rest/workflows/${WF_ID}/run' -H 'X-N8N-API-KEY: ${API_KEY}' -H 'Content-Type: application/json' -d '{\"startNodes\":[\"Manual Trigger\"]}' 2>&1")
            http_code2=$(echo "$resp2" | tail -1)
            body2=$(echo "$resp2" | head -n -1)
            echo "  Method 2 (POST /rest/.../run): HTTP $http_code2"

            if [ "$http_code2" = "200" ] || echo "$body2" | grep -q '"executionId\|"finished\|"success'; then
              echo "  ✓ $WF_NAME executed via internal API"
              return 0
            fi

            # Method 3: n8n execute --file (works for workflows without DB credentials)
            echo "  Methods 1-2 failed, trying n8n execute --file..."
            local WF_FILE="/opt/n8n-workflows/$(echo "$WF_NAME" | sed 's/ /_/g').json"
            $SSH_CMD "systemctl stop n8n 2>/dev/null; sleep 2; set -a && source /opt/p0-foundation/.env && set +a && n8n execute --file=${WF_FILE} 2>&1 | tail -15; systemctl start n8n; sleep 5" || true
            echo "  ✓ $WF_NAME attempted via --file"
            return 0
          }

          run_via_api "P0-02_Test_Telegram" "$P02_ID"
          run_via_api "P0-01_Init_Google_Sheets" "$P01_ID"

          # Ensure n8n is running after all attempts
          $SSH_CMD "systemctl is-active n8n || systemctl start n8n"

      # ─── 8c. Direct verification: Telegram + Google Sheets ───
      - name: "Direct verify: Telegram + Google Sheets"
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'workflows' || github.event.inputs.action == '' }}
        env:
          SA_STATUS: ${{ env.SA_DEPLOY_STATUS }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s "$SA_STATUS" << 'REMOTE_SCRIPT'

          SA_STATUS_MSG="${1:-неизвестно}"
          source /opt/p0-foundation/.env 2>/dev/null || true
          RESULTS="${SA_STATUS_MSG}\n"

          # ─── 1. Telegram: прямой тест ─────────────
          echo "=== Telegram direct test ==="
          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_MANAGER_CHAT_ID:-}" ]; then
            TG_RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{
                \"chat_id\": \"${TELEGRAM_MANAGER_CHAT_ID}\",
                \"text\": \"✅ <b>P0-02 Telegram Test OK</b>\n\n🔧 Прямая проверка из deploy pipeline.\nБот работает!\n\n⏰ $(date '+%d.%m.%Y %H:%M:%S')\n🖥 Frankfurt VPS\",
                \"parse_mode\": \"HTML\"
              }")
            if echo "$TG_RESP" | grep -q '"ok":true'; then
              echo "✅ Telegram message sent!"
              RESULTS="${RESULTS}✅ Telegram: сообщение отправлено\n"
            else
              echo "❌ Telegram error: $TG_RESP"
              RESULTS="${RESULTS}❌ Telegram: ошибка\n"
            fi
          else
            echo "❌ TELEGRAM_BOT_TOKEN or CHAT_ID not set"
            RESULTS="${RESULTS}❌ Telegram: нет токена\n"
          fi

          # ─── 2. Google Sheets: создание листов и заголовков ───
          echo ""
          echo "=== Google Sheets direct setup ==="
          if [ -f "/opt/credentials/google-service-account.json" ] && [ -n "${GOOGLE_SPREADSHEET_ID:-}" ]; then

            # --- Helper: base64url encode (no padding, url-safe) ---
            b64url() { base64 | tr '/+' '_-' | tr -d '=\n'; }

            # --- Extract SA fields using python (always available) ---
            SA_EMAIL=$(python3 -c "import json; print(json.load(open('/opt/credentials/google-service-account.json'))['client_email'])")
            # SA_KEY must preserve newlines — write directly to temp file
            python3 -c "import json; f=open('/tmp/_sa_key.pem','w'); f.write(json.load(open('/opt/credentials/google-service-account.json'))['private_key']); f.close()"

            echo "SA email: ${SA_EMAIL:-EMPTY}"
            echo "Key file exists: $([ -f /tmp/_sa_key.pem ] && echo 'yes' || echo 'no')"
            echo "Key file size: $(wc -c < /tmp/_sa_key.pem 2>/dev/null || echo 0)"
            echo "SA JSON size: $(wc -c < /opt/credentials/google-service-account.json 2>/dev/null || echo 0)"

            if [ -z "$SA_EMAIL" ] || [ ! -s "/tmp/_sa_key.pem" ]; then
              echo "❌ Failed to read SA JSON fields"
              echo "SA JSON first 100 chars: $(head -c 100 /opt/credentials/google-service-account.json 2>/dev/null || echo 'FILE MISSING')"
              RESULTS="${RESULTS}❌ Google Sheets: SA email=${SA_EMAIL:-пусто}, key=$(wc -c < /tmp/_sa_key.pem 2>/dev/null || echo 0)b\n"
            else
              # --- Build JWT ---
              NOW=$(date +%s)
              EXP=$((NOW + 3600))

              JWT_HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)
              JWT_CLAIM=$(printf '{"iss":"%s","scope":"https://www.googleapis.com/auth/spreadsheets","aud":"https://oauth2.googleapis.com/token","iat":%d,"exp":%d}' "$SA_EMAIL" "$NOW" "$EXP" | b64url)

              JWT_UNSIGNED="${JWT_HEADER}.${JWT_CLAIM}"

              # --- Sign with openssl ---
              JWT_SIG=$(printf '%s' "$JWT_UNSIGNED" | openssl dgst -sha256 -sign /tmp/_sa_key.pem | b64url)
              rm -f /tmp/_sa_key.pem

              if [ -z "$JWT_SIG" ]; then
                echo "❌ openssl signing failed"
                RESULTS="${RESULTS}❌ Google Sheets: openssl sign failed\n"
              else
                JWT_TOKEN="${JWT_UNSIGNED}.${JWT_SIG}"
                echo "JWT token length: ${#JWT_TOKEN}"

                # --- Exchange for access token ---
                TOKEN_RESP=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
                  --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
                  --data-urlencode "assertion=${JWT_TOKEN}")

                ACCESS_TOKEN=$(echo "$TOKEN_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null)

                if [ -z "$ACCESS_TOKEN" ]; then
                  echo "❌ No access token in response"
                  echo "Response: $(echo "$TOKEN_RESP" | head -c 300)"
                  SHORT_ERR=$(echo "$TOKEN_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error_description', d.get('error','unknown')))" 2>/dev/null || echo "parse error")
                  RESULTS="${RESULTS}❌ Google Sheets: ${SHORT_ERR}\n"
                else
                  echo "✓ Got Google access token (${#ACCESS_TOKEN} chars)"

                  # --- Создать листы ---
                  for SHEET in Товары Спрос Заказы_поставщику Заказы_клиентов Сводка_спроса Логи_N8N; do
                    echo "  Creating sheet: $SHEET"
                    RESP=$(curl -s -X POST \
                      "https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_SPREADSHEET_ID}:batchUpdate" \
                      -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "{\"requests\":[{\"addSheet\":{\"properties\":{\"title\":\"${SHEET}\",\"gridProperties\":{\"frozenRowCount\":1}}}}]}")
                    if echo "$RESP" | grep -q "already exists"; then
                      echo "    (already exists — OK)"
                    elif echo "$RESP" | grep -q "sheetId"; then
                      echo "    ✓ created"
                    else
                      echo "    $(echo "$RESP" | head -c 200)"
                    fi
                  done

                  # --- Записать заголовки ---
                  echo ""
                  echo "  Writing headers..."

                  write_headers() {
                    local SHEET="$1"; shift
                    local HDRS="$*"
                    local BODY
                    BODY=$(python3 -c "import json,sys; print(json.dumps({'values':[sys.argv[1].split(',')]}))" "$HDRS")
                    local RESP
                    RESP=$(curl -s -X PUT \
                      "https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_SPREADSHEET_ID}/values/${SHEET}!1:1?valueInputOption=RAW" \
                      -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "$BODY")
                    if echo "$RESP" | grep -q "updatedRows"; then
                      echo "    ✓ $SHEET headers OK"
                    else
                      echo "    $SHEET: $(echo "$RESP" | head -c 200)"
                    fi
                  }

                  write_headers "Товары" "ID_поста_VK,Название,Цвет,Размеры,Цена_закупки,Цена_продажи,Статус,Дата_публикации,Дата_прихода,Номер_контейнера,URL_поста,Фото_URL"
                  write_headers "Спрос" "ID_записи,ID_поста_VK,VK_ID_клиента,Имя_клиента,Размер,Количество,Timestamp,Номер_в_очереди,Статус,Источник,Текст_комментария,Дата_обновления"
                  write_headers "Заказы_поставщику" "ID_заказа,ID_поста_VK,Размер,Заказано_шт,Получено_шт,Цена_за_шт,Сумма,Дата_заказа,Дата_оплаты,Дата_прихода,Статус"
                  write_headers "Заказы_клиентов" "ID_сделки,VK_ID_клиента,Имя_клиента,Состав_заказа,Сумма_товаров,Сумма_доставки,Итого,Способ_доставки,Трек_номер,Адрес_доставки,Статус,Дата_создания,Дата_отправки,Расч_дата_доставки,Факт_дата_получения,Ждёт_сборную"
                  write_headers "Сводка_спроса" "Название_товара,ID_поста,XS,S,M,L,XL,XXL,Итого,Статус_товара"
                  write_headers "Логи_N8N" "Timestamp,Workflow,Тип,Событие,Детали,Статус"

                  RESULTS="${RESULTS}✅ Google Sheets: листы и заголовки созданы\n"

                  # --- Проверяем ---
                  echo ""
                  echo "  Verifying sheets..."
                  VERIFY=$(curl -s "https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_SPREADSHEET_ID}?fields=sheets.properties.title" \
                    -H "Authorization: Bearer ${ACCESS_TOKEN}")
                  echo "$VERIFY" | python3 -c "import sys,json;d=json.load(sys.stdin);ss=[s['properties']['title'] for s in d.get('sheets',[])];print(f'Листов: {len(ss)}');[print(f'  {s}') for s in ss]" 2>/dev/null || echo "  (verify parse failed)"
                fi
              fi
            fi
          else
            echo "❌ No SA file or SPREADSHEET_ID"
            RESULTS="${RESULTS}❌ Google Sheets: нет credentials\n"
          fi

          # ─── 3. Отправить итоговый отчёт в Telegram ───
          echo ""
          echo "=== Sending summary to Telegram ==="
          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_MANAGER_CHAT_ID:-}" ]; then
            SUMMARY="📊 <b>P0 Setup Complete</b>\n\n$(echo -e "$RESULTS")\n⏰ $(date '+%d.%m.%Y %H:%M:%S')"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TELEGRAM_MANAGER_CHAT_ID}\",\"text\":\"${SUMMARY}\",\"parse_mode\":\"HTML\"}" > /dev/null
            echo "✓ Summary sent to Telegram"
          fi

          rm -f /tmp/gs_resp.json /tmp/gs_h.json
          REMOTE_SCRIPT

      # ─── 9. Health Check ──────────────────────
      - name: Health Check
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          echo "═══════════════════════════════════"
          echo "  P0 FULL HEALTH CHECK"
          echo "  $(date '+%d.%m.%Y %H:%M:%S')"
          echo "═══════════════════════════════════"
          echo ""
          ERRORS=0

          # ─── N8N ────────────────────────────────
          if curl -s --max-time 5 http://localhost:5678/healthz &>/dev/null; then
            echo "✅ N8N: работает (порт 5678)"
            # Список workflow
            WF_DATA=$(curl -s http://localhost:5678/api/v1/workflows 2>/dev/null)
            if echo "$WF_DATA" | grep -q '"data"'; then
              echo "$WF_DATA" | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          print(f'   Workflows: {len(data)}')
          for w in data:
              s = '🟢' if w.get('active') else '⚪'
              print(f'   {s} {w[\"name\"]} (id={w[\"id\"]})')
          " 2>/dev/null
            fi
          else
            echo "❌ N8N: НЕ РАБОТАЕТ"
            systemctl status n8n 2>/dev/null | head -5 || true
            ERRORS=$((ERRORS+1))
          fi
          echo ""

          # ─── VK Long Poll (Groups) ──────────────
          if systemctl is-active --quiet vk-longpoll 2>/dev/null; then
            echo "✅ VK Long Poll (Groups): active"
            if curl -s --max-time 3 http://127.0.0.1:3100/health &>/dev/null; then
              curl -s http://127.0.0.1:3100/health | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          print(f'   Events: {d.get(\"events_received\",0)} | Errors: {d.get(\"errors\",0)} | Started: {d.get(\"started_at\",\"?\")}')" 2>/dev/null
            fi
          else
            echo "❌ VK Long Poll (Groups): не запущен"
            journalctl -u vk-longpoll -n 3 --no-pager 2>/dev/null || true
            ERRORS=$((ERRORS+1))
          fi
          echo ""

          # ─── VK User Long Poll ──────────────────
          if systemctl is-active --quiet vk-user-longpoll 2>/dev/null; then
            echo "✅ VK User Long Poll: active"
            if curl -s --max-time 3 http://127.0.0.1:3101/health &>/dev/null; then
              curl -s http://127.0.0.1:3101/health | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          print(f'   Messages: {d.get(\"messages_received\",0)}')" 2>/dev/null
            fi
          else
            echo "⚪ VK User Long Poll: не запущен (VK_USER_TOKEN не задан?)"
          fi
          echo ""

          # ─── FastAPI Webapp ──────────────────────
          if systemctl is-active --quiet webapp 2>/dev/null; then
            WEB_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8000/ 2>/dev/null)
            echo "✅ FastAPI webapp: active (HTTP $WEB_CODE on :8000)"
          else
            echo "⚪ FastAPI webapp: не запущен"
          fi
          echo ""

          # ─── Webhook test ───────────────────────
          WH_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
            -X POST http://localhost:5678/webhook/vk-events \
            -H "Content-Type: application/json" \
            -d '{"type":"system","event":"healthcheck","timestamp":"'$(date -Iseconds)'"}')
          if [ "$WH_CODE" = "200" ]; then
            echo "✅ Webhook /vk-events: HTTP $WH_CODE"
          else
            echo "❌ Webhook /vk-events: HTTP $WH_CODE (P0-03 не активен?)"
            ERRORS=$((ERRORS+1))
          fi
          echo ""

          # ─── VK API + Telegram ──────────────────
          source /opt/p0-foundation/.env 2>/dev/null

          if [ -n "${VK_TOKEN:-}" ]; then
            VK_RESP=$(curl -s --max-time 10 "https://api.vk.com/method/groups.getById?group_id=${VK_GROUP_ID}&access_token=${VK_TOKEN}&v=5.199")
            if echo "$VK_RESP" | grep -q '"response"'; then
              echo "✅ VK API: OK"
            else
              echo "❌ VK API: ошибка — $(echo "$VK_RESP" | head -c 150)"
              ERRORS=$((ERRORS+1))
            fi
          else
            echo "❌ VK API: .env не загружен"
            ERRORS=$((ERRORS+1))
          fi

          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ]; then
            TG_RESP=$(curl -s --max-time 10 "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe")
            if echo "$TG_RESP" | grep -q '"ok":true'; then
              BOT=$(echo "$TG_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['username'])" 2>/dev/null || echo "?")
              echo "✅ Telegram: @$BOT"
            else
              echo "❌ Telegram: бот не отвечает"
              ERRORS=$((ERRORS+1))
            fi
          fi
          echo ""

          # ─── Google SA + Файлы ──────────────────
          [ -f "/opt/credentials/google-service-account.json" ] && echo "✅ Google SA JSON: есть" || echo "⚠️  Google SA JSON: нет"
          [ -f "/opt/vk-longpoll/listener.js" ] && echo "✅ listener.js: есть" || echo "❌ listener.js: нет"
          [ -f "/opt/vk-longpoll/.env" ] && echo "✅ vk-longpoll .env: есть" || echo "❌ vk-longpoll .env: нет"
          WF_FILES=$(ls /opt/n8n-workflows/*.json 2>/dev/null | wc -l)
          echo "📁 N8N workflow JSONs: $WF_FILES файлов"
          echo ""

          # ─── Итог ──────────────────────────────
          echo "═══════════════════════════════════"
          if [ "$ERRORS" -eq 0 ]; then
            echo "✅ ВСЁ РАБОТАЕТ — ошибок: 0"
          else
            echo "⚠️  ПРОБЛЕМ: $ERRORS"
          fi
          echo "═══════════════════════════════════"
          REMOTE_SCRIPT

      # ─── 10. Telegram уведомление ─────────────
      - name: Notify via Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
          DEPLOY_ACTION: ${{ github.event.inputs.action || 'full (auto)' }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="Deploy P0 OK | ${DEPLOY_ACTION} | ${BRANCH} | Logs: ${RUN_URL}"
          else
            MSG="Deploy P0 FAILED | ${DEPLOY_ACTION} | ${BRANCH} | Logs: ${RUN_URL}"
          fi
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=${MSG}" || true

      # ─── Cleanup ──────────────────────────────
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
