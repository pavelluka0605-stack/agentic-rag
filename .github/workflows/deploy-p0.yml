name: "P0 Deploy to Frankfurt VPS"

# Запускается при push в ветку или вручную
on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - "p0-foundation/**"
      - ".github/workflows/deploy-p0.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "What to deploy"
        required: true
        default: "full"
        type: choice
        options:
          - full          # Полный деплой (N8N + Long Poll + workflows)
          - longpoll      # Только VK Long Poll listener
          - workflows     # Только N8N workflows
          - healthcheck   # Проверка всех сервисов

# ─── Secrets (настроить в GitHub → Settings → Secrets) ───
# VPS_HOST        — IP или домен VPS (Frankfurt)
# VPS_USER        — пользователь SSH (обычно root)
# VPS_SSH_KEY     — приватный SSH-ключ (Ed25519)
# VPS_PORT        — SSH порт (по умолчанию 22)
# VK_TOKEN        — Access Token сообщества VK
# VK_GROUP_ID     — ID группы VK
# TG_BOT_TOKEN    — Telegram Bot Token
# TG_CHAT_ID      — Chat ID менеджера
# GOOGLE_SA_JSON  — содержимое Google Service Account JSON (base64)
# SPREADSHEET_ID  — ID Google-таблицы
# BLUESALES_LOGIN — логин BlueSales
# BLUESALES_PASS  — пароль BlueSales
# VK_USER_TOKEN   — Personal user token для чтения личных сообщений

jobs:
  deploy:
    name: "Deploy to VPS"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─── 1. Checkout ───────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── 2. Подготовка SSH ─────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ─── 3. Создание .env на VPS ──────────────
      - name: Create .env on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          mkdir -p /opt/p0-foundation /opt/credentials

          cat > /opt/p0-foundation/.env << 'ENVEOF'
          VK_TOKEN=${{ secrets.VK_TOKEN }}
          VK_GROUP_ID=${{ secrets.VK_GROUP_ID }}
          VK_API_VERSION=5.199
          TELEGRAM_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_MANAGER_CHAT_ID=${{ secrets.TG_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_FILE=/opt/credentials/google-service-account.json
          GOOGLE_SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }}
          N8N_URL=${{ secrets.N8N_BASE_URL || 'http://localhost:5678' }}
          N8N_WEBHOOK_BASE_URL=${{ secrets.N8N_BASE_URL || 'http://localhost:5678' }}/webhook
          VK_USER_TOKEN=${{ secrets.VK_USER_TOKEN }}
          BLUESALES_LOGIN=${{ secrets.BLUESALES_LOGIN }}
          BLUESALES_PASSWORD=${{ secrets.BLUESALES_PASS }}
          ENVEOF

          # Удалить лишние пробелы от heredoc indent
          sed -i 's/^          //' /opt/p0-foundation/.env
          echo "✓ .env created"
          REMOTE_SCRIPT

      # ─── 4. Google Service Account JSON ────────
      - name: Deploy Google SA credentials
        if: true
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << REMOTE_SCRIPT
          echo '${{ secrets.GOOGLE_SA_JSON }}' | base64 -d > /opt/credentials/google-service-account.json
          chmod 600 /opt/credentials/google-service-account.json
          echo "✓ Google SA JSON deployed"
          REMOTE_SCRIPT

      # ─── 5. Копирование файлов ────────────────
      - name: Copy project files to VPS
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} -r \
            p0-foundation/vk-longpoll \
            p0-foundation/vk-user-longpoll \
            p0-foundation/n8n-workflows \
            p0-foundation/scripts \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/p0-foundation/

      # ─── 6. Установка N8N ─────────────────────
      - name: Install & start N8N
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == '' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          # Проверить Node.js
          if ! command -v node &>/dev/null; then
            echo "Installing Node.js..."
            curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            apt-get install -y nodejs
          fi
          echo "Node.js: $(node --version)"

          # Проверить N8N
          if ! command -v n8n &>/dev/null; then
            echo "Installing N8N..."
            npm install -g n8n
          fi
          echo "N8N: $(n8n --version)"

          # Systemd unit для N8N
          if [ ! -f /etc/systemd/system/n8n.service ]; then
            cat > /etc/systemd/system/n8n.service << 'UNIT'
          [Unit]
          Description=N8N Workflow Automation
          After=network.target

          [Service]
          Type=simple
          Environment=N8N_PORT=5678
          Environment=N8N_PROTOCOL=http
          Environment=GENERIC_TIMEZONE=Europe/Moscow
          Environment=N8N_SECURE_COOKIE=false
          ExecStart=/usr/bin/env n8n start
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
          UNIT
            systemctl daemon-reload
            systemctl enable n8n
          fi

          systemctl restart n8n
          sleep 5

          # Проверить что N8N запустился
          for i in $(seq 1 20); do
            if curl -s http://localhost:5678/healthz &>/dev/null; then
              echo "✓ N8N running on :5678"
              break
            fi
            sleep 2
          done
          REMOTE_SCRIPT

      # ─── 7. VK Long Poll Listener ─────────────
      - name: Deploy VK Long Poll Listener
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'longpoll' || github.event.inputs.action == '' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          mkdir -p /opt/vk-longpoll
          cp /opt/p0-foundation/vk-longpoll/listener.js /opt/vk-longpoll/
          cp /opt/p0-foundation/vk-longpoll/package.json /opt/vk-longpoll/

          # .env для listener (берём из основного)
          source /opt/p0-foundation/.env
          cat > /opt/vk-longpoll/.env << ENVEOF
          VK_TOKEN=${VK_TOKEN}
          VK_GROUP_ID=${VK_GROUP_ID}
          VK_API_VERSION=${VK_API_VERSION:-5.199}
          N8N_WEBHOOK_URL=${N8N_WEBHOOK_BASE_URL:-https://n8n.marbomebel.ru/webhook}/vk-events
          HEALTH_PORT=3100
          ENVEOF

          # Systemd unit
          cat > /etc/systemd/system/vk-longpoll.service << 'UNIT'
          [Unit]
          Description=VK Long Poll Listener
          After=network.target n8n.service

          [Service]
          Type=simple
          WorkingDirectory=/opt/vk-longpoll
          EnvironmentFile=/opt/vk-longpoll/.env
          ExecStart=/usr/bin/node /opt/vk-longpoll/listener.js
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
          UNIT

          systemctl daemon-reload
          systemctl enable vk-longpoll
          systemctl restart vk-longpoll
          sleep 3

          if systemctl is-active --quiet vk-longpoll; then
            echo "✓ VK Long Poll running"
          else
            echo "✗ VK Long Poll failed to start"
            journalctl -u vk-longpoll -n 10 --no-pager
          fi
          REMOTE_SCRIPT

      # ─── 7b. VK User Long Poll (личные сообщения) ──
      - name: Deploy VK User Long Poll Listener
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'longpoll' || github.event.inputs.action == '' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          source /opt/p0-foundation/.env

          if [ -z "${VK_USER_TOKEN:-}" ]; then
            echo "! VK_USER_TOKEN не задан — User Long Poll пропущен"
            exit 0
          fi

          mkdir -p /opt/vk-user-longpoll
          cp /opt/p0-foundation/vk-user-longpoll/listener.js /opt/vk-user-longpoll/
          cp /opt/p0-foundation/vk-user-longpoll/package.json /opt/vk-user-longpoll/

          cat > /opt/vk-user-longpoll/.env << ENVEOF
          VK_USER_TOKEN=${VK_USER_TOKEN}
          VK_API_VERSION=${VK_API_VERSION:-5.199}
          N8N_WEBHOOK_URL=${N8N_WEBHOOK_BASE_URL:-https://n8n.marbomebel.ru/webhook}/vk-user-messages
          HEALTH_PORT=3101
          ENVEOF

          cat > /etc/systemd/system/vk-user-longpoll.service << 'UNIT'
          [Unit]
          Description=VK User Long Poll — личные сообщения
          After=network.target n8n.service

          [Service]
          Type=simple
          WorkingDirectory=/opt/vk-user-longpoll
          EnvironmentFile=/opt/vk-user-longpoll/.env
          ExecStart=/usr/bin/node /opt/vk-user-longpoll/listener.js
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
          UNIT

          systemctl daemon-reload
          systemctl enable vk-user-longpoll
          systemctl restart vk-user-longpoll
          sleep 3

          if systemctl is-active --quiet vk-user-longpoll; then
            echo "✓ VK User Long Poll running"
          else
            echo "✗ VK User Long Poll failed to start"
            journalctl -u vk-user-longpoll -n 10 --no-pager
          fi
          REMOTE_SCRIPT

      # ─── 8. Импорт N8N Workflows ──────────────
      - name: Import N8N workflows
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'workflows' || github.event.inputs.action == '' }}
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
        run: |
          # Бэкап на VPS
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'
          mkdir -p /opt/n8n-workflows
          cp /opt/p0-foundation/n8n-workflows/*.json /opt/n8n-workflows/
          REMOTE_SCRIPT

          # Импорт в основной N8N (n8n.marbomebel.ru) через API
          N8N_URL="${N8N_BASE_URL:-https://n8n.marbomebel.ru}"

          echo "Importing workflows to $N8N_URL ..."

          # Получить список существующих workflows
          EXISTING=$(curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            "${N8N_URL}/api/v1/workflows?limit=100" 2>/dev/null)

          for wf_file in p0-foundation/n8n-workflows/P0-*.json; do
            wf_name=$(python3 -c "import json; print(json.load(open('$wf_file'))['name'])" 2>/dev/null)
            echo "Processing: $wf_name..."

            # Убрать read-only поля (tags, active) перед отправкой
            CLEAN_JSON=$(python3 -c "
          import json
          with open('$wf_file') as f:
              wf = json.load(f)
          wf.pop('tags', None)
          wf.pop('active', None)
          print(json.dumps(wf))
          " 2>/dev/null)

            # Проверить, существует ли уже workflow с таким именем
            EXISTING_ID=$(echo "$EXISTING" | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          for w in data:
              if w['name'] == '$wf_name':
                  print(w['id'])
                  break
          " 2>/dev/null || true)

            if [ -n "$EXISTING_ID" ]; then
              echo "  Updating existing workflow (ID: $EXISTING_ID)..."
              response=$(echo "$CLEAN_JSON" | curl -s -X PUT "${N8N_URL}/api/v1/workflows/${EXISTING_ID}" \
                -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
                -H "Content-Type: application/json" \
                -d @- 2>&1)
            else
              echo "  Creating new workflow..."
              response=$(echo "$CLEAN_JSON" | curl -s -X POST "${N8N_URL}/api/v1/workflows" \
                -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
                -H "Content-Type: application/json" \
                -d @- 2>&1)
            fi

            if echo "$response" | grep -q '"id"'; then
              wf_id=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null)
              echo "  ✓ $wf_name → ID: $wf_id"
            else
              echo "  ✗ $wf_name — ошибка:"
              echo "    $(echo "$response" | head -c 300)"
            fi
          done

      # ─── 8b. Активация и запуск workflows ────
      - name: Activate & run P0 workflows
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'workflows' || github.event.inputs.action == '' }}
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
        run: |
          N8N_URL="${N8N_BASE_URL:-https://n8n.marbomebel.ru}"

          # Получить все workflows
          ALL_WF=$(curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            "${N8N_URL}/api/v1/workflows?limit=100")

          # Функция: найти ID по имени
          get_wf_id() {
            echo "$ALL_WF" | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          for w in data:
              if w['name'] == '$1':
                  print(w['id'])
                  break
          " 2>/dev/null
          }

          # Функция: активировать workflow через GET+PUT (N8N PUT требует полный body с name)
          activate_workflow() {
            local WF_NAME="$1"
            local WF_ID=$(get_wf_id "$WF_NAME")
            if [ -z "$WF_ID" ]; then
              echo "  ✗ $WF_NAME: not found"
              return 1
            fi
            echo "Activating $WF_NAME (ID: $WF_ID)..."

            # Сначала попробовать POST /activate
            resp=$(curl -s -X POST "${N8N_URL}/api/v1/workflows/${WF_ID}/activate" \
              -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
              -H "Content-Type: application/json")
            if echo "$resp" | grep -q '"active":true'; then
              echo "  ✓ $WF_NAME активирован"
              return 0
            fi

            # Fallback: GET workflow, потом PUT с active=true
            wf_body=$(curl -s "${N8N_URL}/api/v1/workflows/${WF_ID}" \
              -H "X-N8N-API-KEY: ${N8N_API_KEY}")
            updated_body=$(echo "$wf_body" | python3 -c "
          import sys, json
          wf = json.load(sys.stdin)
          wf['active'] = True
          # Убрать поля которые N8N не принимает в PUT
          for key in ['id', 'createdAt', 'updatedAt', 'versionId', 'homeProject', 'sharedWithProjects']:
              wf.pop(key, None)
          print(json.dumps(wf))
          " 2>/dev/null)

            if [ -n "$updated_body" ]; then
              resp2=$(curl -s -X PUT "${N8N_URL}/api/v1/workflows/${WF_ID}" \
                -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "$updated_body")
              if echo "$resp2" | grep -q '"active":true'; then
                echo "  ✓ $WF_NAME активирован (via PUT)"
                return 0
              fi
              echo "  ✗ $WF_NAME PUT: $(echo "$resp2" | head -c 200)"
            else
              echo "  ✗ $WF_NAME: failed to parse workflow body"
            fi
            echo "  ✗ $WF_NAME activate: $(echo "$resp" | head -c 200)"
            return 1
          }

          # ─── Активировать P0-03 (webhook receiver — должен быть всегда active) ───
          activate_workflow "P0-03_VK_Event_Receiver"

          # ─── Активировать P0-04 (health check каждые 30 мин) ───
          activate_workflow "P0-04_Health_Check"

          # ─── P0-01 и P0-02 используют Manual Trigger — запустите вручную в UI N8N ───
          echo ""
          echo "ℹ️  P0-01_Init_Google_Sheets и P0-02_Test_Telegram используют Manual Trigger."
          echo "    Запустите их вручную в N8N UI: ${N8N_URL}"

      # ─── 9. Health Check ──────────────────────
      - name: Health Check
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_SCRIPT'

          echo "═══════════════════════════════════"
          echo "  P0 FULL HEALTH CHECK"
          echo "  $(date '+%d.%m.%Y %H:%M:%S')"
          echo "═══════════════════════════════════"
          echo ""
          ERRORS=0

          # ─── N8N ────────────────────────────────
          if curl -s --max-time 5 http://localhost:5678/healthz &>/dev/null; then
            echo "✅ N8N: работает (порт 5678)"
            # Список workflow
            WF_DATA=$(curl -s http://localhost:5678/api/v1/workflows 2>/dev/null)
            if echo "$WF_DATA" | grep -q '"data"'; then
              echo "$WF_DATA" | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          print(f'   Workflows: {len(data)}')
          for w in data:
              s = '🟢' if w.get('active') else '⚪'
              print(f'   {s} {w[\"name\"]} (id={w[\"id\"]})')
          " 2>/dev/null
            fi
          else
            echo "❌ N8N: НЕ РАБОТАЕТ"
            systemctl status n8n 2>/dev/null | head -5 || true
            ERRORS=$((ERRORS+1))
          fi
          echo ""

          # ─── VK Long Poll (Groups) ──────────────
          if systemctl is-active --quiet vk-longpoll 2>/dev/null; then
            echo "✅ VK Long Poll (Groups): active"
            if curl -s --max-time 3 http://127.0.0.1:3100/health &>/dev/null; then
              curl -s http://127.0.0.1:3100/health | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          print(f'   Events: {d.get(\"events_received\",0)} | Errors: {d.get(\"errors\",0)} | Started: {d.get(\"started_at\",\"?\")}')" 2>/dev/null
            fi
          else
            echo "❌ VK Long Poll (Groups): не запущен"
            journalctl -u vk-longpoll -n 3 --no-pager 2>/dev/null || true
            ERRORS=$((ERRORS+1))
          fi
          echo ""

          # ─── VK User Long Poll ──────────────────
          if systemctl is-active --quiet vk-user-longpoll 2>/dev/null; then
            echo "✅ VK User Long Poll: active"
            if curl -s --max-time 3 http://127.0.0.1:3101/health &>/dev/null; then
              curl -s http://127.0.0.1:3101/health | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          print(f'   Messages: {d.get(\"messages_received\",0)}')" 2>/dev/null
            fi
          else
            echo "⚪ VK User Long Poll: не запущен (VK_USER_TOKEN не задан?)"
          fi
          echo ""

          # ─── Webhook test ───────────────────────
          WH_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
            -X POST http://localhost:5678/webhook/vk-events \
            -H "Content-Type: application/json" \
            -d '{"type":"system","event":"healthcheck","timestamp":"'$(date -Iseconds)'"}')
          if [ "$WH_CODE" = "200" ]; then
            echo "✅ Webhook /vk-events: HTTP $WH_CODE"
          else
            echo "❌ Webhook /vk-events: HTTP $WH_CODE (P0-03 не активен?)"
            ERRORS=$((ERRORS+1))
          fi
          echo ""

          # ─── VK API + Telegram ──────────────────
          source /opt/p0-foundation/.env 2>/dev/null

          if [ -n "${VK_TOKEN:-}" ]; then
            VK_RESP=$(curl -s --max-time 10 "https://api.vk.com/method/groups.getById?group_id=${VK_GROUP_ID}&access_token=${VK_TOKEN}&v=5.199")
            if echo "$VK_RESP" | grep -q '"response"'; then
              echo "✅ VK API: OK"
            else
              echo "❌ VK API: ошибка — $(echo "$VK_RESP" | head -c 150)"
              ERRORS=$((ERRORS+1))
            fi
          else
            echo "❌ VK API: .env не загружен"
            ERRORS=$((ERRORS+1))
          fi

          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ]; then
            TG_RESP=$(curl -s --max-time 10 "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe")
            if echo "$TG_RESP" | grep -q '"ok":true'; then
              BOT=$(echo "$TG_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['username'])" 2>/dev/null || echo "?")
              echo "✅ Telegram: @$BOT"
            else
              echo "❌ Telegram: бот не отвечает"
              ERRORS=$((ERRORS+1))
            fi
          fi
          echo ""

          # ─── Google SA + Файлы ──────────────────
          [ -f "/opt/credentials/google-service-account.json" ] && echo "✅ Google SA JSON: есть" || echo "⚠️  Google SA JSON: нет"
          [ -f "/opt/vk-longpoll/listener.js" ] && echo "✅ listener.js: есть" || echo "❌ listener.js: нет"
          [ -f "/opt/vk-longpoll/.env" ] && echo "✅ vk-longpoll .env: есть" || echo "❌ vk-longpoll .env: нет"
          WF_FILES=$(ls /opt/n8n-workflows/*.json 2>/dev/null | wc -l)
          echo "📁 N8N workflow JSONs: $WF_FILES файлов"
          echo ""

          # ─── Итог ──────────────────────────────
          echo "═══════════════════════════════════"
          if [ "$ERRORS" -eq 0 ]; then
            echo "✅ ВСЁ РАБОТАЕТ — ошибок: 0"
          else
            echo "⚠️  ПРОБЛЕМ: $ERRORS"
          fi
          echo "═══════════════════════════════════"
          REMOTE_SCRIPT

      # ─── 10. Telegram уведомление ─────────────
      - name: Notify via Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
          DEPLOY_ACTION: ${{ github.event.inputs.action || 'full (auto)' }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MSG="Deploy P0 OK | ${DEPLOY_ACTION} | ${BRANCH} | Logs: ${RUN_URL}"
          else
            MSG="Deploy P0 FAILED | ${DEPLOY_ACTION} | ${BRANCH} | Logs: ${RUN_URL}"
          fi
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=${MSG}" || true

      # ─── Cleanup ──────────────────────────────
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
