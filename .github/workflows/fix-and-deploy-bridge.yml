name: "Fix and Deploy Bridge"

on:
  push:
    branches: ["claude/**"]
    paths: [".github/workflows/fix-and-deploy-bridge.yml"]
  workflow_dispatch:

jobs:
  fix-deploy:
    name: "Fix and Deploy"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Full deploy and diagnostics
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          SCP="scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }}"

          echo "=== STEP 1: Copy files ==="
          $SSH "rm -rf /tmp/cb-deploy && mkdir -p /tmp/cb-deploy"
          $SCP control-bridge/app.py control-bridge/requirements.txt control-bridge/control-bridge.service \
            control-bridge/rotate-token.sh control-bridge/report-complete.sh control-bridge/report-review.sh \
            control-bridge/traefik-api-bridge.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/cb-deploy/

          echo "=== STEP 2: Deploy on VPS ==="
          $SSH 'bash -s' << 'REMOTE'
          set -e

          # Cleanup
          ps -eo pid,ppid,stat --no-headers | awk '$3~/^Z/{print $2}' | sort -u | while read P; do kill -SIGCHLD $P 2>/dev/null; done || true
          ps -eo pid,etimes,comm --no-headers | awk '$2>7200 && ($3~/claude|timeout/)' | awk '{print $1}' | xargs kill -9 2>/dev/null || true

          # Install deps
          apt-get update -qq 2>/dev/null; apt-get install -y -qq python3 python3-venv curl 2>&1 | tail -2

          # Copy app
          mkdir -p /opt/control-bridge
          cp /tmp/cb-deploy/app.py /tmp/cb-deploy/requirements.txt /opt/control-bridge/
          cp /tmp/cb-deploy/rotate-token.sh /tmp/cb-deploy/report-complete.sh /tmp/cb-deploy/report-review.sh /opt/control-bridge/
          chmod +x /opt/control-bridge/*.sh

          # Venv
          test -d /opt/control-bridge/venv || python3 -m venv /opt/control-bridge/venv
          /opt/control-bridge/venv/bin/pip install -q --upgrade pip
          /opt/control-bridge/venv/bin/pip install -q -r /opt/control-bridge/requirements.txt
          echo "VENV_OK"

          # Token
          if [ -f /opt/control-bridge/.env ] && grep -q BRIDGE_API_TOKEN /opt/control-bridge/.env; then
            echo "TOKEN_EXISTS"
          else
            T=$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')
            echo "BRIDGE_API_TOKEN=$T" > /opt/control-bridge/.env
            chmod 600 /opt/control-bridge/.env
            echo "TOKEN_GENERATED"
          fi
          grep -q MEMORY_DB_PATH /opt/control-bridge/.env || echo "MEMORY_DB_PATH=/opt/claude-code/memory/memory.db" >> /opt/control-bridge/.env

          # Systemd
          cp /tmp/cb-deploy/control-bridge.service /etc/systemd/system/
          systemctl daemon-reload
          systemctl enable control-bridge
          systemctl restart control-bridge
          sleep 3
          systemctl is-active control-bridge && echo "SERVICE_ACTIVE" || { journalctl -u control-bridge -n 30 --no-pager; exit 1; }

          # Local health
          echo "--- LOCAL HEALTH ---"
          curl -sf http://127.0.0.1:3000/health && echo " OK" || echo "FAIL"

          # Traefik
          echo "--- TRAEFIK ---"
          for d in /opt/n8n-traefik/dynamic /opt/traefik/dynamic /etc/traefik/dynamic; do
            if [ -d "$d" ]; then
              cp /tmp/cb-deploy/traefik-api-bridge.yml "$d/api-bridge.yml"
              echo "Traefik config installed: $d/api-bridge.yml"
              break
            fi
          done

          # Remove conflicting nginx
          rm -f /etc/nginx/sites-enabled/api-marbomebel 2>/dev/null || true

          # DNS
          echo "--- DNS ---"
          dig +short api.marbomebel.ru 2>/dev/null || host api.marbomebel.ru 2>/dev/null || echo "DNS_FAIL"

          # Ports
          echo "--- PORTS ---"
          ss -tlnp | grep -E '3000|80|443' || echo "no relevant ports"

          # HTTPS health
          echo "--- HTTPS HEALTH ---"
          curl -svf https://api.marbomebel.ru/health 2>&1 || echo "HTTPS_FAIL"

          # Check what Traefik sees
          echo "--- TRAEFIK CONTAINERS ---"
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' 2>/dev/null | head -20 || echo "no docker"

          echo "--- TRAEFIK LOGS (last 30) ---"
          docker logs $(docker ps -q --filter "name=traefik" 2>/dev/null) --tail 30 2>&1 || echo "no traefik logs"

          # Token for TG
          TOKEN=$(grep BRIDGE_API_TOKEN /opt/control-bridge/.env | cut -d= -f2-)
          echo "TOKEN_LEN=${#TOKEN}"

          rm -rf /tmp/cb-deploy
          echo "=== ALL DONE ==="
          REMOTE

      - name: Send token to Telegram
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          BRIDGE_TOKEN=$($SSH "grep BRIDGE_API_TOKEN /opt/control-bridge/.env | cut -d= -f2-")
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=Bridge deployed! Token: ${BRIDGE_TOKEN} | URL: https://api.marbomebel.ru | Auth: Bearer" > /dev/null 2>&1 || true

      - name: Status notification
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=Bridge Fix+Deploy: ${{ job.status }} | Run: ${{ github.run_id }}" > /dev/null 2>&1 || true
