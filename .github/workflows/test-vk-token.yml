name: "Test VK Token & Services"

on:
  push:
    branches:
      - 'claude/vk-token-*'
    paths:
      - '.github/workflows/test-vk-token.yml'

jobs:
  test-vk:
    name: "VK Token & Services Test"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: "Test 1 — VK Community Token (groups.getById)"
        id: test_community
        run: |
          RESULT=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'

          source /opt/p0-foundation/.env 2>/dev/null

          echo "=== VK COMMUNITY TOKEN TEST ==="
          if [ -z "${VK_TOKEN:-}" ]; then
            echo "FAIL: VK_TOKEN not set"
            exit 1
          fi
          echo "VK_TOKEN: set (${#VK_TOKEN} chars)"
          echo "VK_GROUP_ID: ${VK_GROUP_ID:-NOT SET}"

          # Test 1a: groups.getById
          RESP=$(curl -s --max-time 10 \
            "https://api.vk.com/method/groups.getById?group_id=${VK_GROUP_ID}&access_token=${VK_TOKEN}&v=5.199")
          if echo "$RESP" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'error' in data:
            e = data['error']
            print(f\"ERROR {e['error_code']}: {e['error_msg']}\")
            sys.exit(1)
          groups = data.get('response', {}).get('groups', data.get('response', []))
          if isinstance(groups, list) and len(groups) > 0:
            g = groups[0]
            print(f\"OK: {g.get('name', '?')} (id={g.get('id', '?')})\")
          else:
            print(f\"OK (response): {str(data)[:200]}\")
          " 2>/dev/null; then
            echo "✅ groups.getById: PASS"
          else
            echo "❌ groups.getById: FAIL"
            echo "$RESP" | head -c 500
          fi

          # Test 1b: groups.getLongPollServer
          echo ""
          RESP2=$(curl -s --max-time 10 \
            "https://api.vk.com/method/groups.getLongPollServer?group_id=${VK_GROUP_ID}&access_token=${VK_TOKEN}&v=5.199")
          if echo "$RESP2" | grep -q '"server"'; then
            echo "✅ groups.getLongPollServer: PASS"
          else
            echo "❌ groups.getLongPollServer: FAIL"
            echo "$RESP2" | head -c 500
          fi

          # Test 1c: Long Poll Settings
          echo ""
          RESP3=$(curl -s --max-time 10 \
            "https://api.vk.com/method/groups.getLongPollSettings?group_id=${VK_GROUP_ID}&access_token=${VK_TOKEN}&v=5.199")
          echo "--- Long Poll Settings ---"
          echo "$RESP3" | python3 -c "
          import sys, json
          try:
            r = json.load(sys.stdin)['response']
            enabled = r.get('is_enabled')
            print(f'is_enabled: {enabled}')
            events = r.get('events', {})
            active = [k for k,v in events.items() if v]
            print(f'Active events ({len(active)}): {', '.join(active)}')
            if enabled:
              print('✅ Long Poll Settings: PASS')
            else:
              print('❌ Long Poll NOT ENABLED')
          except Exception as e:
            print(f'ERROR: {e}')
          " 2>/dev/null

          REMOTE
          )
          echo "$RESULT"

      - name: "Test 2 — VK Long Poll Listener Service"
        id: test_listener
        run: |
          RESULT=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'

          echo "=== VK LONG POLL LISTENER ==="

          # Service status
          STATUS=$(systemctl is-active vk-longpoll 2>/dev/null || echo "not-found")
          echo "Service: $STATUS"
          if [ "$STATUS" = "active" ]; then
            echo "✅ vk-longpoll service: RUNNING"
          else
            echo "❌ vk-longpoll service: $STATUS"
            systemctl status vk-longpoll --no-pager 2>&1 | tail -10
          fi

          # Health endpoint
          echo ""
          HEALTH=$(curl -s --max-time 5 http://127.0.0.1:3100/health 2>&1)
          if echo "$HEALTH" | grep -q '"status"'; then
            echo "✅ Health endpoint (port 3100): OK"
            echo "$HEALTH" | python3 -m json.tool 2>/dev/null || echo "$HEALTH"
          else
            echo "❌ Health endpoint (port 3100): NOT RESPONDING"
          fi

          # Recent logs (last 10 lines)
          echo ""
          echo "--- Recent logs ---"
          journalctl -u vk-longpoll -n 10 --no-pager 2>&1

          REMOTE
          )
          echo "$RESULT"

      - name: "Test 3 — VK User Long Poll (optional)"
        id: test_user_lp
        run: |
          RESULT=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'

          echo "=== VK USER LONG POLL ==="
          source /opt/p0-foundation/.env 2>/dev/null

          if [ -z "${VK_USER_TOKEN:-}" ]; then
            echo "⏭️ VK_USER_TOKEN not set — skipped (optional)"
            exit 0
          fi

          STATUS=$(systemctl is-active vk-user-longpoll 2>/dev/null || echo "not-found")
          echo "Service: $STATUS"

          # Test user token
          RESP=$(curl -s --max-time 10 \
            "https://api.vk.com/method/users.get?access_token=${VK_USER_TOKEN}&v=5.199")
          if echo "$RESP" | grep -q '"first_name"'; then
            echo "✅ VK_USER_TOKEN: valid"
            echo "$RESP" | python3 -c "
          import sys, json
          u = json.load(sys.stdin)['response'][0]
          print(f\"  User: {u['first_name']} {u['last_name']} (id={u['id']})\")
          " 2>/dev/null
          else
            echo "❌ VK_USER_TOKEN: invalid or expired"
            echo "$RESP" | head -c 300
          fi

          REMOTE
          )
          echo "$RESULT"

      - name: "Test 4 — N8N Workflows Status"
        id: test_n8n
        run: |
          RESULT=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'

          echo "=== N8N WORKFLOWS STATUS ==="

          N8N_STATUS=$(systemctl is-active n8n 2>/dev/null || echo "not-found")
          echo "N8N Service: $N8N_STATUS"

          if [ "$N8N_STATUS" != "active" ]; then
            echo "❌ N8N not running"
            exit 0
          fi

          source /opt/p0-foundation/.env 2>/dev/null

          # List workflows
          curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY:-}" \
            http://localhost:5678/api/v1/workflows 2>/dev/null | python3 -c "
          import sys, json
          try:
            data = json.load(sys.stdin).get('data', [])
            vk_related = []
            for w in data:
              status = '✅ ACTIVE' if w.get('active') else '⬚ INACTIVE'
              name = w['name']
              print(f'  {status}  {name} (id={w[\"id\"]})')
              if 'vk' in name.lower() or 'comment' in name.lower() or 'p0-03' in name.lower() or 'p0-07' in name.lower():
                vk_related.append(name)
            print(f'\nVK-related workflows: {len(vk_related)}')
            for w in vk_related:
              print(f'  → {w}')
          except Exception as e:
            print(f'ERROR: {e}')
          " 2>/dev/null || echo "  Cannot query N8N API"

          REMOTE
          )
          echo "$RESULT"

      - name: "Test 5 — N8N Webhook endpoint"
        id: test_webhook
        run: |
          RESULT=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'

          echo "=== N8N WEBHOOK TEST ==="
          echo "Sending test event to /webhook/vk-events..."

          RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" --max-time 10 \
            -X POST http://localhost:5678/webhook/vk-events \
            -H "Content-Type: application/json" \
            -d '{
              "type": "wall_reply_new",
              "group_id": 0,
              "event_id": "test_token_check_'"$(date +%s)"'",
              "object": {
                "id": 99999,
                "from_id": 1,
                "post_id": 1,
                "text": "TOKEN_TEST: проверка работоспособности '"$(date '+%d.%m.%Y %H:%M')"'",
                "date": '"$(date +%s)"',
                "owner_id": -1
              }
            }')

          HTTP_CODE=$(echo "$RESP" | grep "HTTP_CODE:" | sed 's/HTTP_CODE://')
          BODY=$(echo "$RESP" | grep -v "HTTP_CODE:")

          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Webhook /vk-events: PASS"
          else
            echo "❌ Webhook /vk-events: FAIL (HTTP $HTTP_CODE)"
          fi

          REMOTE
          )
          echo "$RESULT"

      - name: "Send results to Telegram"
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          # Collect all step outcomes
          MSG="🔍 VK Token & Services Test
          ────────────────────────
          $(date '+%d.%m.%Y %H:%M UTC')
          Branch: claude/vk-token-implementation

          Steps:
          1️⃣ Community Token: ${{ steps.test_community.outcome }}
          2️⃣ Long Poll Listener: ${{ steps.test_listener.outcome }}
          3️⃣ User Long Poll: ${{ steps.test_user_lp.outcome }}
          4️⃣ N8N Workflows: ${{ steps.test_n8n.outcome }}
          5️⃣ Webhook Test: ${{ steps.test_webhook.outcome }}

          Run: https://github.com/pavelluka0605-stack/agentic-rag/actions/runs/${{ github.run_id }}"

          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}" > /dev/null 2>&1 || true

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
