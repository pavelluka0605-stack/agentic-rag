name: "P0 Remote Health Check"

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

jobs:
  healthcheck:
    name: "Full System Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run Diagnostics on VPS
        id: diag
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Run diagnostics on VPS, capture output to file
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "N8N_API_KEY=$N8N_API_KEY" "N8N_BASE_URL=$N8N_BASE_URL" \
            'bash -s' > /tmp/diag_output.txt 2>&1 << 'REMOTE'

          MSG=""
          add() { MSG="${MSG}${1}\n"; }

          add "VPS DIAGNOSTICS $(date '+%H:%M:%S')"
          add ""

          # 1. Services
          N8N_ST=$(systemctl is-active n8n 2>&1 || true)
          LP_ST=$(systemctl is-active vk-longpoll 2>&1 || true)
          ULP_ST=$(systemctl is-active vk-user-longpoll 2>&1 || true)
          add "Services: n8n=$N8N_ST | lp=$LP_ST | ulp=$ULP_ST"

          # 2. VK LP Health
          LP_HEALTH=$(curl -s --max-time 3 http://127.0.0.1:3100/health 2>&1 || echo "NO_RESPONSE")
          add "LP Health: $LP_HEALTH"

          # 3. N8N Workflows via API
          add ""
          add "--- N8N Workflows ---"
          N8N_API_URL="${N8N_BASE_URL:-http://localhost:5678}"
          WF_LIST=$(curl -s --max-time 10 -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            "${N8N_API_URL}/api/v1/workflows?limit=100" 2>&1)
          WF_INFO=$(echo "$WF_LIST" | python3 -c "
          import sys,json
          try:
              data = json.load(sys.stdin).get('data', [])
              if not data: print('  (no workflows found)')
              for w in sorted(data, key=lambda x: x.get('name','')):
                  st = 'ON' if w.get('active') else 'OFF'
                  print(f'  {st} {w[\"name\"]} (id={w[\"id\"]})')
          except Exception as e: print(f'ERR: {e}')
          " 2>/dev/null || echo "API_ERR")
          add "$WF_INFO"

          # 4. Force re-activate P0-03
          add ""
          P03_ID=$(echo "$WF_LIST" | python3 -c "
          import sys,json
          data = json.load(sys.stdin).get('data', [])
          for w in data:
              if 'P0-03' in w.get('name',''): print(w['id']); break
          " 2>/dev/null)

          if [ -n "$P03_ID" ]; then
            add "Re-activating P0-03 (id=$P03_ID)..."
            curl -s -X POST "${N8N_API_URL}/api/v1/workflows/${P03_ID}/deactivate" \
              -H "X-N8N-API-KEY: ${N8N_API_KEY}" > /dev/null 2>&1
            sleep 2
            REACTIVATE=$(curl -s -X POST "${N8N_API_URL}/api/v1/workflows/${P03_ID}/activate" \
              -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
              -H "Content-Type: application/json" 2>&1)
            if echo "$REACTIVATE" | grep -q '"active":true'; then
              add "  P0-03 re-activated OK"
            else
              add "  P0-03 FAIL: $(echo "$REACTIVATE" | head -c 200)"
            fi
          else
            add "P0-03 not found!"
          fi

          # 5. Webhook test — both localhost and external
          add ""
          sleep 3
          WH_LOCAL=$(curl -s -w "|HTTP:%{http_code}" --max-time 5 \
            -X POST http://localhost:5678/webhook/vk-events \
            -H "Content-Type: application/json" \
            -d '{"type":"system","event":"diag_test"}' 2>&1)
          WH_LOCAL_CODE=$(echo "$WH_LOCAL" | grep -o 'HTTP:[0-9]*')
          add "Webhook localhost: $WH_LOCAL_CODE"

          WH_EXT=$(curl -s -w "|HTTP:%{http_code}" --max-time 10 \
            -X POST "${N8N_API_URL}/webhook/vk-events" \
            -H "Content-Type: application/json" \
            -d '{"type":"system","event":"diag_test"}' 2>&1)
          WH_EXT_CODE=$(echo "$WH_EXT" | grep -o 'HTTP:[0-9]*')
          WH_EXT_BODY=$(echo "$WH_EXT" | head -c 150)
          add "Webhook external: $WH_EXT_CODE ($WH_EXT_BODY)"

          # 5b. N8N journal
          add ""
          add "--- N8N Journal ---"
          N8N_LOG=$(journalctl -u n8n -n 5 --no-pager -o short-iso 2>&1 | tail -5)
          add "$N8N_LOG"

          # 5c. Fix LP .env webhook URL if pointing to localhost
          LP_URL=$(grep N8N_WEBHOOK_URL /opt/vk-longpoll/.env 2>/dev/null || echo "NOT_FOUND")
          add "LP .env: $LP_URL"
          if echo "$LP_URL" | grep -q "localhost" && [ -n "${N8N_BASE_URL:-}" ]; then
            add "  Fixing LP webhook URL to ${N8N_BASE_URL}..."
            sed -i "s|N8N_WEBHOOK_URL=.*|N8N_WEBHOOK_URL=${N8N_BASE_URL}/webhook/vk-events|" /opt/vk-longpoll/.env
            systemctl restart vk-longpoll 2>/dev/null || true
            sleep 2
            NEW_LP_URL=$(grep N8N_WEBHOOK_URL /opt/vk-longpoll/.env 2>/dev/null)
            add "  Updated: $NEW_LP_URL"
          fi

          # 6. VK diagnostics
          source /opt/p0-foundation/.env 2>/dev/null
          if [ -n "${VK_TOKEN:-}" ]; then
            add "VK_GROUP_ID=$VK_GROUP_ID"
            add "VK_TOKEN=${VK_TOKEN:0:10}...${VK_TOKEN: -5}"

            # Check which group the token belongs to
            GRP_INFO=$(curl -s --max-time 10 \
              "https://api.vk.com/method/groups.getById?access_token=${VK_TOKEN}&v=5.199" 2>&1)
            add "groups.getById: $(echo "$GRP_INFO" | head -c 300)"

            # Check getLongPollServer raw response
            LP_RAW=$(curl -s --max-time 10 \
              "https://api.vk.com/method/groups.getLongPollServer?group_id=${VK_GROUP_ID}&access_token=${VK_TOKEN}&v=5.199" 2>&1)
            add "getLongPollServer: $(echo "$LP_RAW" | head -c 300)"

            LP_SET=$(echo "$LP_RAW" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if 'error' in d:
              e=d['error']
              print(f'ERROR {e.get(\"error_code\")}: {e.get(\"error_msg\")}')
          else:
              r=d.get('response',{})
              print(f'server={r.get(\"server\",\"?\")[:50]}')
          " 2>/dev/null || echo "PARSE_ERR")
            add "VK LP: $LP_SET"
          else
            add "VK: .env NOT LOADED"
          fi

          # 6b. Watchdog status
          add ""
          add "--- Watchdog ---"
          if crontab -l 2>/dev/null | grep -q "watchdog.sh"; then
            add "Watchdog cron: ACTIVE"
          else
            add "Watchdog cron: NOT FOUND"
          fi
          if [ -f /var/log/p0-watchdog.log ]; then
            LAST_WD=$(tail -1 /var/log/p0-watchdog.log 2>/dev/null || echo "empty")
            add "Last watchdog: $LAST_WD"
          fi
          if [ -f /tmp/p0-watchdog-state.json ]; then
            WD_STATE=$(python3 -c "
          import json
          d = json.load(open('/tmp/p0-watchdog-state.json'))
          print(f\"CPU:{d.get('cpu_pct','?')}% RAM:{d.get('ram_pct','?')}% Disk:{d.get('disk_pct','?')}% Issues:{d.get('issues',False)}\")
          " 2>/dev/null || echo "parse error")
            add "Watchdog state: $WD_STATE"
          fi

          # 6c. N8N env check
          add ""
          add "--- N8N Service Env ---"
          N8N_VER=$(n8n --version 2>/dev/null || echo "?")
          add "N8N version: $N8N_VER"
          N8N_BLOCK=$(grep N8N_BLOCK /etc/systemd/system/n8n.service 2>/dev/null || echo "NOT_FOUND")
          add "Unit block setting: $N8N_BLOCK"
          N8N_ENV_CHECK=$(systemctl show n8n --property=Environment 2>/dev/null | head -c 500)
          add "Service env: $N8N_ENV_CHECK"

          # 7. LP Journal
          add ""
          add "--- LP Journal ---"
          JOURNAL=$(journalctl -u vk-longpoll -n 5 --no-pager -o short-iso 2>&1 | tail -5)
          add "$JOURNAL"

          # Output to stdout (captured to file on runner)
          printf "$MSG"

          REMOTE

          # Show output
          cat /tmp/diag_output.txt

          # Write Job Summary
          {
            echo '```'
            cat /tmp/diag_output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Write as annotation (readable via check-runs API)
          DIAG_ONELINE=$(cat /tmp/diag_output.txt | tr '\n' ' | ' | head -c 3000)
          echo "::notice title=Diagnostics::${DIAG_ONELINE}"

          # Send to Telegram
          DIAG_TEXT=$(cat /tmp/diag_output.txt)
          curl -s --max-time 15 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${DIAG_TEXT}" > /dev/null 2>&1 || true

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics
          path: /tmp/diag_output.txt
          retention-days: 3

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
