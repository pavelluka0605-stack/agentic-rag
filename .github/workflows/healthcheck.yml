name: "P0 Remote Health Check"

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

jobs:
  healthcheck:
    name: "Full System Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run Diagnostics on VPS (sends to Telegram directly)
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "TG_TOKEN=$TG_TOKEN" "TG_CHAT=$TG_CHAT" "RUN_URL=$RUN_URL" "N8N_API_KEY=$N8N_API_KEY" "N8N_BASE_URL=$N8N_BASE_URL" \
            'bash -s' << 'REMOTE'

          send_tg() {
            curl -s --max-time 15 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=$1" > /dev/null 2>&1
          }

          MSG=""
          add() { MSG="${MSG}${1}\n"; }

          add "🔍 VPS DIAGNOSTICS $(date '+%H:%M:%S')"
          add ""

          # 1. Services
          N8N_ST=$(systemctl is-active n8n 2>&1 || true)
          LP_ST=$(systemctl is-active vk-longpoll 2>&1 || true)
          ULP_ST=$(systemctl is-active vk-user-longpoll 2>&1 || true)
          add "Services: n8n=$N8N_ST | lp=$LP_ST | ulp=$ULP_ST"

          # 2. VK LP Health
          LP_HEALTH=$(curl -s --max-time 3 http://127.0.0.1:3100/health 2>&1 || echo "NO_RESPONSE")
          add "LP Health: $LP_HEALTH"

          # 3. N8N Workflows via API
          add ""
          add "--- N8N Workflows ---"
          # Try external URL first (works in deploy), fallback to localhost
          N8N_API_URL="${N8N_BASE_URL:-http://localhost:5678}"
          WF_LIST=$(curl -s --max-time 10 -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            "${N8N_API_URL}/api/v1/workflows?limit=100" 2>&1)
          # Show raw response snippet for debugging
          RAW_SNIPPET=$(echo "$WF_LIST" | head -c 120)
          add "API(${N8N_API_URL}): ${RAW_SNIPPET}"
          add ""
          WF_INFO=$(echo "$WF_LIST" | python3 -c "
          import sys,json
          try:
              data = json.load(sys.stdin).get('data', [])
              if not data: print('  (no workflows found)')
              for w in sorted(data, key=lambda x: x.get('name','')):
                  st = 'ON' if w.get('active') else 'OFF'
                  print(f'  {st} {w[\"name\"]} (id={w[\"id\"]})')
          except Exception as e: print(f'ERR: {e}')
          " 2>/dev/null || echo "API_ERR")
          add "$WF_INFO"

          # 4. Auto-activate inactive P0 workflows (especially P0-03 for webhook)
          add ""
          ACTIVATED=$(echo "$WF_LIST" | python3 -c "
          import sys,json
          try:
              data = json.load(sys.stdin).get('data', [])
              inactive = [w for w in data if w.get('name','').startswith('P0-') and not w.get('active')]
              for w in inactive:
                  print(w['id'], w['name'])
          except: pass
          " 2>/dev/null)

          if [ -n "$ACTIVATED" ]; then
            add "Activating inactive P0 workflows..."
            echo "$ACTIVATED" | while read -r wf_id wf_name; do
              resp=$(curl -s -X POST "${N8N_API_URL}/api/v1/workflows/${wf_id}/activate" \
                -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
                -H "Content-Type: application/json" 2>&1)
              if echo "$resp" | grep -q '"active":true'; then
                add "  ✓ ${wf_name} activated"
              else
                # Fallback: PUT with active:true
                wf_body=$(curl -s "${N8N_API_URL}/api/v1/workflows/${wf_id}" \
                  -H "X-N8N-API-KEY: ${N8N_API_KEY}" 2>&1)
                put_body=$(echo "$wf_body" | python3 -c "
          import sys,json
          wf=json.load(sys.stdin)
          out={'name':wf['name'],'nodes':wf.get('nodes',[]),'connections':wf.get('connections',{}),'settings':wf.get('settings',{}),'active':True}
          if 'staticData' in wf: out['staticData']=wf['staticData']
          print(json.dumps(out))
          " 2>/dev/null)
                resp2=$(curl -s -X PUT "${N8N_API_URL}/api/v1/workflows/${wf_id}" \
                  -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "$put_body" 2>&1)
                if echo "$resp2" | grep -q '"active":true'; then
                  add "  ✓ ${wf_name} activated (PUT)"
                else
                  add "  ✗ ${wf_name}: $(echo "$resp2" | head -c 150)"
                fi
              fi
            done
          else
            add "All P0 workflows active"
          fi

          # 5. Webhook test (after activation)
          add ""
          WH=$(curl -s -w "HTTP:%{http_code}" --max-time 5 \
            -X POST http://localhost:5678/webhook/vk-events \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"system\",\"event\":\"diag_test\"}" 2>&1)
          WH_SHORT=$(echo "$WH" | head -c 200)
          add "Webhook: $WH_SHORT"

          # 6. VK LP Settings
          source /opt/p0-foundation/.env 2>/dev/null
          if [ -n "${VK_TOKEN:-}" ]; then
            LP_SET=$(curl -s --max-time 10 \
              "https://api.vk.com/method/groups.getLongPollSettings?group_id=${VK_GROUP_ID}&access_token=${VK_TOKEN}&v=5.199" | \
              python3 -c "
          import sys,json
          r=json.load(sys.stdin).get('response',{})
          en=r.get('is_enabled','?')
          evts=[k for k,v in r.get('events',{}).items() if v]
          print(f'enabled={en} events={evts}')
          " 2>/dev/null || echo "PARSE_ERR")
            add "VK LP: $LP_SET"
          else
            add "VK: .env NOT LOADED"
          fi

          # 7. LP Journal (last 5 lines)
          add ""
          add "--- LP Journal ---"
          JOURNAL=$(journalctl -u vk-longpoll -n 5 --no-pager -o short-iso 2>&1 | tail -5)
          add "$JOURNAL"

          add ""
          add "Run: $RUN_URL"

          # Send to Telegram
          FINAL=$(printf "$MSG")
          send_tg "$FINAL"

          REMOTE

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
