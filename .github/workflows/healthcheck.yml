name: "P0 Remote Health Check"

on:
  workflow_dispatch:

jobs:
  healthcheck:
    name: "Full System Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run Health Check on VPS
        id: hc
        run: |
          RESULT=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'

          echo "═══════════════════════════════"
          echo "  P0 HEALTH CHECK — $(date '+%d.%m.%Y %H:%M')"
          echo "═══════════════════════════════"
          echo ""

          ERRORS=0

          # ─── 1. N8N ─────────────────────────────
          if curl -s --max-time 5 http://localhost:5678/healthz &>/dev/null; then
            echo "✅ N8N: работает (порт 5678)"
            N8N_VER=$(curl -s http://localhost:5678/api/v1/workflows 2>/dev/null | head -c 100)
            if echo "$N8N_VER" | grep -q '"data"'; then
              WF_COUNT=$(curl -s http://localhost:5678/api/v1/workflows | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('data',[])))" 2>/dev/null || echo "?")
              echo "   Workflows: $WF_COUNT"
              # Список workflow
              curl -s http://localhost:5678/api/v1/workflows | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          for w in data:
              status = '🟢' if w.get('active') else '⚪'
              print(f\"   {status} {w['name']} (id={w['id']})\")" 2>/dev/null
            fi
          else
            echo "❌ N8N: НЕ РАБОТАЕТ"
            echo "   systemctl: $(systemctl is-active n8n 2>/dev/null || echo 'unknown')"
            ERRORS=$((ERRORS+1))
          fi
          echo ""

          # ─── 2. VK Long Poll (Groups) ───────────
          if systemctl is-active --quiet vk-longpoll 2>/dev/null; then
            echo "✅ VK Long Poll (Groups): сервис active"
            if curl -s --max-time 3 http://127.0.0.1:3100/health &>/dev/null; then
              STATS=$(curl -s http://127.0.0.1:3100/health)
              EVENTS=$(echo "$STATS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('events_received',0))" 2>/dev/null || echo "?")
              STARTED=$(echo "$STATS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('started_at','?'))" 2>/dev/null || echo "?")
              echo "   Events: $EVENTS | Started: $STARTED"
            else
              echo "   ⚠️ Health endpoint не отвечает (порт 3100)"
            fi
          else
            echo "❌ VK Long Poll (Groups): НЕ ЗАПУЩЕН"
            echo "   $(journalctl -u vk-longpoll -n 3 --no-pager 2>/dev/null | tail -3)"
            ERRORS=$((ERRORS+1))
          fi
          echo ""

          # ─── 3. VK User Long Poll ───────────────
          if systemctl is-active --quiet vk-user-longpoll 2>/dev/null; then
            echo "✅ VK User Long Poll: сервис active"
            if curl -s --max-time 3 http://127.0.0.1:3101/health &>/dev/null; then
              STATS=$(curl -s http://127.0.0.1:3101/health)
              MSGS=$(echo "$STATS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('messages_received',0))" 2>/dev/null || echo "?")
              echo "   Messages: $MSGS"
            fi
          else
            echo "⚪ VK User Long Poll: не запущен (VK_USER_TOKEN не задан?)"
          fi
          echo ""

          # ─── 4. Webhook test ────────────────────
          WH_RESP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
            -X POST http://localhost:5678/webhook/vk-events \
            -H "Content-Type: application/json" \
            -d '{"type":"system","event":"healthcheck_test","timestamp":"'$(date -Iseconds)'"}')
          if [ "$WH_RESP" = "200" ]; then
            echo "✅ Webhook /vk-events: отвечает (HTTP $WH_RESP)"
          else
            echo "❌ Webhook /vk-events: HTTP $WH_RESP"
            echo "   Возможно P0-03 workflow не активирован"
            ERRORS=$((ERRORS+1))
          fi
          echo ""

          # ─── 5. VK API ─────────────────────────
          source /opt/p0-foundation/.env 2>/dev/null
          if [ -n "${VK_TOKEN:-}" ]; then
            VK_RESP=$(curl -s --max-time 10 "https://api.vk.com/method/groups.getById?group_id=${VK_GROUP_ID}&access_token=${VK_TOKEN}&v=5.199")
            if echo "$VK_RESP" | grep -q '"response"'; then
              GROUP_NAME=$(echo "$VK_RESP" | python3 -c "import sys,json; r=json.load(sys.stdin)['response']; print(r.get('groups',[r])[0].get('name','?') if isinstance(r,dict) else r[0].get('name','?'))" 2>/dev/null || echo "?")
              echo "✅ VK API: OK — группа '$GROUP_NAME'"
            else
              echo "❌ VK API: ошибка"
              echo "   $(echo "$VK_RESP" | head -c 200)"
              ERRORS=$((ERRORS+1))
            fi
          else
            echo "⚠️ VK API: .env не найден"
            ERRORS=$((ERRORS+1))
          fi
          echo ""

          # ─── 6. Telegram Bot ────────────────────
          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ]; then
            TG_RESP=$(curl -s --max-time 10 "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe")
            if echo "$TG_RESP" | grep -q '"ok":true'; then
              BOT_NAME=$(echo "$TG_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['username'])" 2>/dev/null || echo "?")
              echo "✅ Telegram: @$BOT_NAME"
            else
              echo "❌ Telegram: бот не отвечает"
              ERRORS=$((ERRORS+1))
            fi
          fi
          echo ""

          # ─── 7. Google Sheets ───────────────────
          if [ -f "/opt/credentials/google-service-account.json" ]; then
            echo "✅ Google SA JSON: файл существует"
          else
            echo "⚠️ Google SA JSON: файл НЕ найден"
          fi
          echo ""

          # ─── 8. Файлы на VPS ────────────────────
          echo "📁 Файлы:"
          ls -la /opt/vk-longpoll/listener.js 2>/dev/null && echo "   ✅ /opt/vk-longpoll/listener.js" || echo "   ❌ /opt/vk-longpoll/listener.js отсутствует"
          ls -la /opt/vk-longpoll/.env 2>/dev/null && echo "   ✅ /opt/vk-longpoll/.env" || echo "   ❌ /opt/vk-longpoll/.env отсутствует"
          ls /opt/n8n-workflows/*.json 2>/dev/null | wc -l | xargs -I{} echo "   📄 N8N workflow JSONs: {} файлов"
          echo ""

          # ─── Итог ──────────────────────────────
          echo "═══════════════════════════════"
          if [ "$ERRORS" -eq 0 ]; then
            echo "✅ ВСЁ РАБОТАЕТ. Ошибок: 0"
          else
            echo "⚠️ НАЙДЕНО ПРОБЛЕМ: $ERRORS"
          fi
          echo "═══════════════════════════════"
          echo "ERRORS=$ERRORS"

          REMOTE
          )

          echo "$RESULT"
          echo "result<<HCEOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "HCEOF" >> $GITHUB_OUTPUT

          # Определить количество ошибок
          HC_ERRORS=$(echo "$RESULT" | grep "^ERRORS=" | tail -1 | cut -d= -f2)
          echo "errors=${HC_ERRORS:-0}" >> $GITHUB_OUTPUT

      - name: Send report to Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
          HC_ERRORS: ${{ steps.hc.outputs.errors }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${HC_ERRORS:-1}" = "0" ]; then
            ICON="✅"
          else
            ICON="⚠️"
          fi

          # Отправляем краткий отчёт
          MSG="${ICON} Health Check | Ошибок: ${HC_ERRORS:-?} | Logs: ${RUN_URL}"
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=${MSG}" || true

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
