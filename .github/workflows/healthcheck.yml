name: "P0 Remote Health Check"

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

jobs:
  healthcheck:
    name: "Full System Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run Diagnostics on VPS (sends to Telegram directly)
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "TG_TOKEN=$TG_TOKEN" "TG_CHAT=$TG_CHAT" "RUN_URL=$RUN_URL" \
            'bash -s' << 'REMOTE'

          send_tg() {
            curl -s --max-time 15 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=$1" > /dev/null 2>&1
          }

          MSG=""
          add() { MSG="${MSG}${1}\n"; }

          add "🔍 VPS DIAGNOSTICS $(date '+%H:%M:%S')"
          add ""

          # 1. Services
          N8N_ST=$(systemctl is-active n8n 2>&1 || true)
          LP_ST=$(systemctl is-active vk-longpoll 2>&1 || true)
          ULP_ST=$(systemctl is-active vk-user-longpoll 2>&1 || true)
          add "Services: n8n=$N8N_ST | lp=$LP_ST | ulp=$ULP_ST"

          # 2. VK LP Health
          LP_HEALTH=$(curl -s --max-time 3 http://127.0.0.1:3100/health 2>&1 || echo "NO_RESPONSE")
          add "LP Health: $LP_HEALTH"

          # 3. LP Journal (last 10 lines, compact)
          add ""
          add "--- LP Journal ---"
          JOURNAL=$(journalctl -u vk-longpoll -n 10 --no-pager -o short-iso 2>&1 | tail -10)
          add "$JOURNAL"

          # 4. Webhook test
          add ""
          WH=$(curl -s -w "HTTP:%{http_code}" --max-time 5 \
            -X POST http://localhost:5678/webhook/vk-events \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"system\",\"event\":\"diag_test\"}" 2>&1)
          add "Webhook: $WH"

          # 5. VK LP Settings
          source /opt/p0-foundation/.env 2>/dev/null
          if [ -n "${VK_TOKEN:-}" ]; then
            LP_SET=$(curl -s --max-time 10 \
              "https://api.vk.com/method/groups.getLongPollSettings?group_id=${VK_GROUP_ID}&access_token=${VK_TOKEN}&v=5.199" | \
              python3 -c "
          import sys,json
          r=json.load(sys.stdin).get('response',{})
          en=r.get('is_enabled','?')
          evts=[k for k,v in r.get('events',{}).items() if v]
          print(f'enabled={en} events={evts}')
          " 2>/dev/null || echo "PARSE_ERR")
            add "LP Settings: $LP_SET"

            # LP Server test
            LP_SRV=$(curl -s --max-time 10 \
              "https://api.vk.com/method/groups.getLongPollServer?group_id=${VK_GROUP_ID}&access_token=${VK_TOKEN}&v=5.199" | \
              python3 -c "
          import sys,json
          r=json.load(sys.stdin)
          if 'response' in r: print('OK server='+r['response']['server'][:40])
          else: print('ERR: '+str(r.get('error',{}).get('error_msg','?')))
          " 2>/dev/null || echo "PARSE_ERR")
            add "LP Server: $LP_SRV"
          else
            add "VK: .env NOT LOADED"
          fi

          # 6. VK LP .env webhook URL
          add ""
          LP_URL=$(grep N8N_WEBHOOK_URL /opt/vk-longpoll/.env 2>/dev/null || echo "NOT_FOUND")
          add "LP .env: $LP_URL"

          # 7. Node processes
          NODES=$(ps aux | grep "[n]ode" | awk '{print $11,$12}' | head -3)
          add "Nodes: $NODES"

          add ""
          add "Run: $RUN_URL"

          # Send to Telegram
          FINAL=$(printf "$MSG")
          send_tg "$FINAL"

          REMOTE

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
