name: "Verify Control Bridge API"

on:
  push:
    branches:
      - "claude/*"
    paths:
      - ".github/workflows/verify-control-bridge.yml"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  verify:
    name: "Verify Bridge"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run verification on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'VERIFY' | tee /tmp/verify-output.txt
          TOKEN=$(grep BRIDGE_API_TOKEN /opt/control-bridge/.env | cut -d= -f2-)
          MASKED="$(echo ${TOKEN} | cut -c1-4)****"

          echo "=== VERIFICATION REPORT ==="
          echo "date: $(date -u)"
          echo "token: ${MASKED}"
          echo ""

          echo "=== systemctl status control-bridge ==="
          systemctl status control-bridge --no-pager 2>&1 || true
          echo ""

          echo "=== nginx -t ==="
          nginx -t 2>&1
          echo ""

          echo "=== .env file ==="
          test -f /opt/control-bridge/.env && echo "EXISTS (permissions: $(stat -c '%a' /opt/control-bridge/.env))" || echo "MISSING"
          echo ""

          echo "=== 1. health (local) ==="
          curl -si http://127.0.0.1:3000/health 2>&1
          echo ""

          echo "=== 2. health (HTTPS) ==="
          curl -si https://api.marbomebel.ru/health 2>&1 || echo "UNREACHABLE"
          echo ""

          echo "=== 3. Control API tasks (last 5) ==="
          curl -s http://127.0.0.1:3901/api/tasks 2>&1 | python3 -c "
          import sys, json
          tasks = json.load(sys.stdin)
          for t in tasks[:5]:
              print(f'  #{t[\"id\"]} status={t[\"status\"]} mode={t.get(\"mode\",\"?\")} created={t[\"created_at\"]}')
              raw = t.get('raw_input','')[:80]
              print(f'    input: {raw}')
              if t.get('error'): print(f'    ERROR: {t[\"error\"]}')
          " 2>&1
          echo ""

          echo "=== 4. Bridge DB jobs (last 5) ==="
          python3 -c "
          import sqlite3, json
          conn = sqlite3.connect('/opt/control-bridge/bridge_jobs.db')
          conn.row_factory = sqlite3.Row
          rows = conn.execute('SELECT * FROM jobs ORDER BY created_at DESC LIMIT 5').fetchall()
          for r in rows:
              d = dict(r)
              print(json.dumps(d, ensure_ascii=False, indent=2))
          conn.close()
          " 2>&1
          echo ""

          echo "=== 5. Bridge logs (last 50 lines) ==="
          journalctl -u control-bridge -n 50 --no-pager 2>&1 || true
          echo ""

          echo "=== 6. Control API logs (last 30 lines) ==="
          journalctl -u control-api -n 30 --no-pager 2>&1 || true
          echo ""

          echo "=== 7. Control API health ==="
          curl -s http://127.0.0.1:3901/health 2>&1
          echo ""

          echo "=== DONE ==="
          VERIFY

      - name: Post results to issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 -c "
          import json, os, urllib.request, traceback
          try:
              with open('/tmp/verify-output.txt') as f:
                  content = f.read()
              body = '## Control Bridge API Verification\n\nRun: ${{ github.run_id }}\n\n\`\`\`\n' + content[:60000] + '\n\`\`\`'
              payload = json.dumps({'title': 'Bridge Verification ${{ github.run_id }}', 'body': body, 'labels': ['automated']}).encode()
              req = urllib.request.Request(
                  'https://api.github.com/repos/${{ github.repository }}/issues',
                  data=payload,
                  headers={'Authorization': 'Bearer ' + os.environ['GH_TOKEN'], 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'},
                  method='POST')
              resp = urllib.request.urlopen(req)
              data = json.loads(resp.read())
              print(f'Issue #{data[\"number\"]} created: {data[\"html_url\"]}')
          except Exception as e:
              traceback.print_exc()
              print('Fallback: printing output directly')
              with open('/tmp/verify-output.txt') as f:
                  print(f.read())
          "

      - name: Send to Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          # Send first 4000 chars to Telegram
          MSG=$(head -c 4000 /tmp/verify-output.txt)
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}" > /dev/null 2>&1 || true
