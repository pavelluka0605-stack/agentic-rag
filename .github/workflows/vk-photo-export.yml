name: "VK Photo Export — mebelit_krsk"

on:
  push:
    branches:
      - 'claude/mebelit-discovery-audit-*'
    paths:
      - '.github/workflows/vk-photo-export.yml'
  workflow_dispatch:
    inputs:
      action:
        description: "Что делать"
        required: true
        default: "scan"
        type: choice
        options:
          - scan        # Только сканировать — показать что есть (альбомы, кол-во фото, посты)
          - download    # Скачать все фото в максимальном разрешении

permissions:
  contents: write

concurrency:
  group: vk-photo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    name: "VK Photo Export"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Export VK photos
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          ACTION: ${{ inputs.action || 'scan' }}
          VK_SCREEN_NAME: mebelit_krsk
        run: |
          python3 << 'PYTHON'
          import requests, json, os, time, hashlib
          from pathlib import Path

          TOKEN = os.environ["VK_TOKEN"]
          SCREEN_NAME = os.environ.get("VK_SCREEN_NAME", "mebelit_krsk")
          ACTION = os.environ.get("ACTION", "scan")
          API = "https://api.vk.com/method"
          V = "5.199"
          PHOTO_DIR = Path("site-analysis/vk-photos")
          REPORT_FILE = Path("site-analysis/vk-photo-report.md")

          def vk(method, **params):
              params.update(access_token=TOKEN, v=V)
              r = requests.get(f"{API}/{method}", params=params, timeout=30)
              data = r.json()
              if "error" in data:
                  print(f"  VK API error: {data['error'].get('error_msg', data['error'])}")
                  return None
              return data.get("response")

          # ── 0. Определяем GROUP_ID по screen_name ──
          print(f"=== Определяем ID группы по screen_name: {SCREEN_NAME} ===")
          resolved = vk("utils.resolveScreenName", screen_name=SCREEN_NAME)
          if resolved and resolved.get("type") in ("group", "page"):
              GROUP_ID = str(resolved["object_id"])
              print(f"  Найдена группа ID: {GROUP_ID}")
          else:
              # Попробуем как есть — может SCREEN_NAME = числовой ID
              GROUP_ID = SCREEN_NAME
              print(f"  Не удалось разрешить screen_name, используем как ID: {GROUP_ID}")

          # ── 1. Получаем инфо о группе ──
          print("=== Информация о группе ===")
          group_info = vk("groups.getById", group_id=GROUP_ID, fields="members_count,description,status,site,contacts")
          if group_info and "groups" in group_info:
              g = group_info["groups"][0]
              group_name = g.get("name", "?")
              members = g.get("members_count", "?")
              desc = g.get("description", "")
              site = g.get("site", "")
              status = g.get("status", "")
              print(f"  Название: {group_name}")
              print(f"  Подписчики: {members}")
              print(f"  Описание: {desc[:200]}")
              print(f"  Сайт: {site}")
              print(f"  Статус: {status}")
          elif group_info and isinstance(group_info, list):
              g = group_info[0]
              group_name = g.get("name", "?")
              members = g.get("members_count", "?")
              desc = g.get("description", "")
              site = g.get("site", "")
              status = g.get("status", "")
              print(f"  Название: {group_name}")
              print(f"  Подписчики: {members}")
          else:
              group_name = "mebelit_krsk"
              members = "?"
              desc = ""
              site = ""
              status = ""
              print("  Не удалось получить инфо о группе")

          owner_id = f"-{GROUP_ID}"

          # ── 2. Альбомы ──
          print("\n=== Альбомы ===")
          albums = vk("photos.getAlbums", owner_id=owner_id, need_system=1)
          album_list = []
          if albums:
              for a in albums.get("items", []):
                  aid = a["id"]
                  title = a.get("title", "?")
                  size = a.get("size", 0)
                  album_list.append({"id": aid, "title": title, "size": size})
                  print(f"  [{aid}] {title} — {size} фото")
              print(f"  Итого альбомов: {albums.get('count', 0)}")
          else:
              print("  Нет доступа к альбомам или альбомов нет")

          # ── 3. Фото со стены (посты с фото) ──
          print("\n=== Посты с фото (стена) ===")
          wall_photos = []
          offset = 0
          total_posts = 0
          posts_with_photos = 0

          while offset < 500:  # макс 500 постов
              wall = vk("wall.get", owner_id=owner_id, count=100, offset=offset)
              if not wall or not wall.get("items"):
                  break
              total_posts = wall["count"]
              for post in wall["items"]:
                  attachments = post.get("attachments", [])
                  for att in attachments:
                      if att["type"] == "photo":
                          photo = att["photo"]
                          # Берём максимальный размер
                          sizes = photo.get("sizes", [])
                          if sizes:
                              best = max(sizes, key=lambda s: s.get("width", 0) * s.get("height", 0))
                              wall_photos.append({
                                  "url": best["url"],
                                  "width": best.get("width", 0),
                                  "height": best.get("height", 0),
                                  "photo_id": photo.get("id"),
                                  "date": photo.get("date", 0),
                                  "text": post.get("text", "")[:200],
                                  "post_id": post.get("id"),
                                  "likes": post.get("likes", {}).get("count", 0),
                                  "source": "wall"
                              })
                              posts_with_photos += 1
              offset += 100
              time.sleep(0.35)

          print(f"  Всего постов: {total_posts}")
          print(f"  Фото со стены: {len(wall_photos)}")

          # ── 4. Фото из альбомов ──
          print("\n=== Фото из альбомов ===")
          album_photos = []
          for album in album_list:
              if album["size"] == 0:
                  continue
              print(f"  Сканирую альбом: {album['title']}...")
              offset = 0
              while offset < album["size"]:
                  photos = vk("photos.get", owner_id=owner_id, album_id=album["id"],
                              count=200, offset=offset, photo_sizes=1)
                  if not photos or not photos.get("items"):
                      break
                  for photo in photos["items"]:
                      sizes = photo.get("sizes", [])
                      if sizes:
                          best = max(sizes, key=lambda s: s.get("width", 0) * s.get("height", 0))
                          album_photos.append({
                              "url": best["url"],
                              "width": best.get("width", 0),
                              "height": best.get("height", 0),
                              "photo_id": photo.get("id"),
                              "date": photo.get("date", 0),
                              "text": photo.get("text", "")[:200],
                              "album_id": album["id"],
                              "album_title": album["title"],
                              "likes": photo.get("likes", {}).get("count", 0) if "likes" in photo else 0,
                              "source": "album"
                          })
                  offset += 200
                  time.sleep(0.35)
              print(f"    → {album['title']}: найдено {sum(1 for p in album_photos if p['album_id']==album['id'])} фото")

          all_photos = wall_photos + album_photos

          # Дедупликация по photo_id
          seen = set()
          unique_photos = []
          for p in all_photos:
              pid = p.get("photo_id")
              if pid and pid not in seen:
                  seen.add(pid)
                  unique_photos.append(p)

          print(f"\n=== ИТОГО ===")
          print(f"  Фото со стены: {len(wall_photos)}")
          print(f"  Фото из альбомов: {len(album_photos)}")
          print(f"  Уникальных фото: {len(unique_photos)}")

          # Фильтр: только фото > 600px (отсекаем аватарки и мелочь)
          good_photos = [p for p in unique_photos if p["width"] >= 600 or p["height"] >= 600]
          print(f"  Фото >= 600px: {len(good_photos)}")

          # ── 5. Генерируем отчёт ──
          from datetime import datetime

          report = []
          report.append(f"# VK Photo Export Report — {group_name}")
          report.append(f"")
          report.append(f"**Дата:** {datetime.now().strftime('%Y-%m-%d %H:%M')}")
          report.append(f"**Группа:** vk.com/mebelit_krsk (ID: {GROUP_ID})")
          report.append(f"**Подписчики:** {members}")
          report.append(f"**Описание:** {desc[:300]}")
          report.append(f"**Сайт:** {site}")
          report.append(f"")
          report.append(f"## Статистика")
          report.append(f"")
          report.append(f"| Метрика | Значение |")
          report.append(f"|---------|----------|")
          report.append(f"| Всего постов на стене | {total_posts} |")
          report.append(f"| Фото со стены | {len(wall_photos)} |")
          report.append(f"| Альбомов | {len(album_list)} |")
          report.append(f"| Фото из альбомов | {len(album_photos)} |")
          report.append(f"| Уникальных фото (всего) | {len(unique_photos)} |")
          report.append(f"| Фото >= 600px (для сайта) | {len(good_photos)} |")
          report.append(f"")

          if album_list:
              report.append(f"## Альбомы")
              report.append(f"")
              report.append(f"| ID | Название | Кол-во фото |")
              report.append(f"|----|----------|------------|")
              for a in album_list:
                  report.append(f"| {a['id']} | {a['title']} | {a['size']} |")
              report.append(f"")

          # Топ-10 фото по лайкам
          top_liked = sorted(good_photos, key=lambda p: p.get("likes", 0), reverse=True)[:10]
          if top_liked:
              report.append(f"## Топ-10 фото по лайкам")
              report.append(f"")
              for i, p in enumerate(top_liked, 1):
                  report.append(f"{i}. **{p['likes']} лайков** ({p['width']}x{p['height']}) — {p.get('text', '')[:80]}")
                  report.append(f"   URL: {p['url']}")
              report.append(f"")

          # ── 6. Скачиваем если action=download ──
          if ACTION == "download" and good_photos:
              PHOTO_DIR.mkdir(parents=True, exist_ok=True)
              print(f"\n=== Скачивание {len(good_photos)} фото ===")
              downloaded = 0
              for i, p in enumerate(good_photos):
                  ext = "jpg"
                  if ".png" in p["url"]:
                      ext = "png"
                  fname = f"{p.get('source', 'unknown')}_{p.get('photo_id', i)}.{ext}"
                  fpath = PHOTO_DIR / fname
                  if fpath.exists():
                      continue
                  try:
                      r = requests.get(p["url"], timeout=30)
                      if r.status_code == 200:
                          fpath.write_bytes(r.content)
                          downloaded += 1
                          if downloaded % 20 == 0:
                              print(f"  Скачано: {downloaded}/{len(good_photos)}")
                  except Exception as e:
                      print(f"  Ошибка: {fname} — {e}")
                  time.sleep(0.1)
              print(f"  Скачано всего: {downloaded}")
              report.append(f"## Скачанные фото")
              report.append(f"")
              report.append(f"Скачано **{downloaded}** фото в `site-analysis/vk-photos/`")
              report.append(f"")
          elif ACTION == "scan":
              report.append(f"## Следующий шаг")
              report.append(f"")
              report.append(f"Запустите workflow с action=**download** для скачивания фото.")
              report.append(f"")

          # Сохраняем JSON со всеми URL (всегда)
          json_path = Path("site-analysis/vk-photos-index.json")
          json_path.parent.mkdir(parents=True, exist_ok=True)
          with open(json_path, "w", encoding="utf-8") as f:
              json.dump({
                  "group": group_name,
                  "group_id": GROUP_ID,
                  "members": members,
                  "total_photos": len(unique_photos),
                  "good_photos": len(good_photos),
                  "albums": album_list,
                  "photos": good_photos
              }, f, ensure_ascii=False, indent=2)
          report.append(f"Индекс фото сохранён в `site-analysis/vk-photos-index.json`")

          # Сохраняем отчёт
          REPORT_FILE.write_text("\n".join(report), encoding="utf-8")
          print(f"\nОтчёт сохранён в {REPORT_FILE}")

          PYTHON

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f site-analysis/vk-photo-report.md site-analysis/vk-photos-index.json
          if [ "${{ inputs.action }}" = "download" ]; then
            git add -f site-analysis/vk-photos/ 2>/dev/null || true
          fi
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "data: VK photo export (${{ inputs.action }}) [skip ci]"
            git push
          }
