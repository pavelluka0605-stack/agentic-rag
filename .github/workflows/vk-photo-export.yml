name: "VK Photo Export — mebelit_krsk"

on:
  push:
    branches:
      - 'claude/mebelit-discovery-audit-*'
    paths:
      - '.github/workflows/vk-photo-export.yml'
  workflow_dispatch:
    inputs:
      action:
        description: "Что делать"
        required: true
        default: "scan"
        type: choice
        options:
          - scan        # Только сканировать — показать что есть (альбомы, кол-во фото, посты)
          - download    # Скачать все фото в максимальном разрешении

permissions:
  contents: write

concurrency:
  group: vk-photo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    name: "VK Photo Export"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Set token
        run: |
          TOKEN="${{ secrets.VK_MEBELIT_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="vk1.a.0hh_Uorp7UybpzFU9jAHom2kp2tdGr3epioUqu7VSjjq57OSxkH4JaROSmUgKG7OITCAbbM44P23zMGHg0yvmOzNPkzMJprhLb-deQou4IwlCuY0myrFq2izoK357pit0xVUS0eyEKyNKhOWiXHTmUhuw_VhYlT6iKAnlEwimILMLejAO4sV1I8T4YPP_NBOCYJziuoHlVNwiLHmmkISVA"
          fi
          echo "::add-mask::$TOKEN"
          echo "VK_MARKET_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Export VK market photos
        env:
          VK_TOKEN: ${{ env.VK_MARKET_TOKEN }}
          ACTION: ${{ inputs.action || 'scan' }}
          VK_SCREEN_NAME: mebelit_krsk
        run: |
          python3 << 'PYTHON'
          import requests, json, os, time
          from pathlib import Path
          from datetime import datetime

          TOKEN = os.environ["VK_TOKEN"]
          SCREEN_NAME = os.environ.get("VK_SCREEN_NAME", "mebelit_krsk")
          ACTION = os.environ.get("ACTION", "scan")
          API = "https://api.vk.com/method"
          V = "5.199"
          PHOTO_DIR = Path("site-analysis/vk-photos")
          REPORT_FILE = Path("site-analysis/vk-photo-report.md")
          debug_log = []

          def vk(method, **params):
              params.update(access_token=TOKEN, v=V)
              r = requests.get(f"{API}/{method}", params=params, timeout=30)
              data = r.json()
              if "error" in data:
                  err = data['error']
                  msg = f"VK API error [{method}]: code={err.get('error_code')} msg={err.get('error_msg', err)}"
                  print(f"  {msg}")
                  debug_log.append(msg)
                  return None
              resp = data.get("response")
              info = f"[OK] {method}"
              if isinstance(resp, dict) and "items" in resp:
                  info += f" → {len(resp['items'])} items (count={resp.get('count','?')})"
              print(f"  {info}")
              return resp

          # ── 0. Определяем GROUP_ID ──
          print(f"=== Определяем ID группы: {SCREEN_NAME} ===")
          debug_log.append(f"Token length: {len(TOKEN)}")

          # groups.getById работает с screen_name напрямую
          group_info = vk("groups.getById", group_id=SCREEN_NAME,
                          fields="members_count,description,status,site,market")
          GROUP_ID = SCREEN_NAME
          group_name = "mebelit_krsk"
          members = "?"
          desc = site = status = ""
          has_market = False

          if group_info and isinstance(group_info, dict) and "groups" in group_info:
              g = group_info["groups"][0]
              GROUP_ID = str(g["id"])
              group_name = g.get("name", "?")
              members = g.get("members_count", "?")
              desc = g.get("description", "")
              site = g.get("site", "")
              status = g.get("status", "")
              market = g.get("market", {})
              has_market = market.get("enabled", 0) == 1 if isinstance(market, dict) else bool(market)
              debug_log.append(f"Group: {group_name}, ID: {GROUP_ID}, market: {market}")
          elif group_info and isinstance(group_info, list):
              g = group_info[0]
              GROUP_ID = str(g["id"])
              group_name = g.get("name", "?")
              members = g.get("members_count", "?")
              desc = g.get("description", "")
              site = g.get("site", "")
              market = g.get("market", {})
              has_market = market.get("enabled", 0) == 1 if isinstance(market, dict) else bool(market)

          print(f"  Группа: {group_name} (ID: {GROUP_ID})")
          print(f"  Подписчики: {members}")
          print(f"  Маркет: {'да' if has_market else 'нет/неизвестно'}")

          owner_id = f"-{GROUP_ID}"

          # ── 1. Получаем товары (market.get) ──
          print("\n=== Товары (Market) ===")
          all_products = []
          offset = 0
          total_market = 0

          while True:
              market_resp = vk("market.get", owner_id=owner_id, count=200, offset=offset,
                               extended=1)
              if not market_resp:
                  # Попробуем без extended
                  market_resp = vk("market.get", owner_id=owner_id, count=200, offset=offset)
              if not market_resp or not market_resp.get("items"):
                  if offset == 0:
                      debug_log.append(f"market.get returned: {market_resp}")
                  break
              total_market = market_resp.get("count", 0)
              items = market_resp["items"]
              all_products.extend(items)
              print(f"  Загружено: {len(all_products)}/{total_market}")
              if len(items) < 200:
                  break
              offset += 200
              time.sleep(0.35)

          print(f"  Всего товаров: {total_market}, загружено: {len(all_products)}")

          # ── 2. Получаем подборки товаров (market.getAlbums) ──
          print("\n=== Подборки товаров ===")
          market_albums = []
          albums_resp = vk("market.getAlbums", owner_id=owner_id, count=100)
          if albums_resp and albums_resp.get("items"):
              for a in albums_resp["items"]:
                  market_albums.append({
                      "id": a["id"],
                      "title": a.get("title", "?"),
                      "count": a.get("count", 0)
                  })
                  print(f"  [{a['id']}] {a.get('title','?')} — {a.get('count',0)} товаров")
          else:
              print("  Подборок нет или нет доступа")

          # ── 3. Извлекаем фото из товаров ──
          print("\n=== Извлечение фото из товаров ===")
          product_photos = []

          for product in all_products:
              pid = product.get("id", 0)
              title = product.get("title", "")
              price_info = product.get("price", {})
              price_text = price_info.get("text", "") if isinstance(price_info, dict) else ""
              description = product.get("description", "")[:300]
              likes = product.get("likes", {}).get("count", 0) if isinstance(product.get("likes"), dict) else 0
              availability = product.get("availability", 0)
              date = product.get("date", 0)

              # Главное фото товара
              thumb = product.get("thumb_photo", "")
              photos_list = product.get("photos", [])

              # Если есть массив photos — берём все фото товара
              if photos_list:
                  for photo in photos_list:
                      sizes = photo.get("sizes", [])
                      if sizes:
                          best = max(sizes, key=lambda s: s.get("width", 0) * s.get("height", 0))
                          product_photos.append({
                              "url": best["url"],
                              "width": best.get("width", 0),
                              "height": best.get("height", 0),
                              "photo_id": photo.get("id"),
                              "product_id": pid,
                              "title": title,
                              "price": price_text,
                              "description": description,
                              "likes": likes,
                              "availability": availability,
                              "date": date,
                              "source": "market"
                          })
              elif thumb:
                  # Если photos нет, берём thumb_photo URL
                  product_photos.append({
                      "url": thumb,
                      "width": 0,
                      "height": 0,
                      "photo_id": None,
                      "product_id": pid,
                      "title": title,
                      "price": price_text,
                      "description": description,
                      "likes": likes,
                      "availability": availability,
                      "date": date,
                      "source": "market_thumb"
                  })

          # Если photos массив пуст, загрузим детали каждого товара
          if all_products and not any(p.get("photos") for p in all_products):
              print("  Фото не в списке, загружаем детали каждого товара...")
              product_photos = []
              for i, product in enumerate(all_products):
                  pid = product["id"]
                  detail = vk("market.getById", item_ids=f"{owner_id}_{pid}", extended=1)
                  if detail and detail.get("items"):
                      item = detail["items"][0]
                      title = item.get("title", "")
                      price_info = item.get("price", {})
                      price_text = price_info.get("text", "") if isinstance(price_info, dict) else ""
                      description = item.get("description", "")[:300]
                      likes = item.get("likes", {}).get("count", 0) if isinstance(item.get("likes"), dict) else 0
                      availability = item.get("availability", 0)
                      date = item.get("date", 0)

                      for photo in item.get("photos", []):
                          sizes = photo.get("sizes", [])
                          if sizes:
                              best = max(sizes, key=lambda s: s.get("width", 0) * s.get("height", 0))
                              product_photos.append({
                                  "url": best["url"],
                                  "width": best.get("width", 0),
                                  "height": best.get("height", 0),
                                  "photo_id": photo.get("id"),
                                  "product_id": pid,
                                  "title": title,
                                  "price": price_text,
                                  "description": description,
                                  "likes": likes,
                                  "availability": availability,
                                  "date": date,
                                  "source": "market_detail"
                              })
                  if (i + 1) % 50 == 0:
                      print(f"  Обработано: {i+1}/{len(all_products)}")
                  time.sleep(0.35)

          # Дедупликация по photo_id
          seen = set()
          unique_photos = []
          for p in product_photos:
              key = p.get("photo_id") or p.get("url", "")
              if key and key not in seen:
                  seen.add(key)
                  unique_photos.append(p)

          # Фильтр >= 600px (отсекаем мелкие превью)
          good_photos = [p for p in unique_photos if p["width"] >= 600 or p["height"] >= 600 or p["width"] == 0]

          print(f"\n=== ИТОГО ===")
          print(f"  Товаров: {len(all_products)}")
          print(f"  Подборок: {len(market_albums)}")
          print(f"  Фото из товаров: {len(product_photos)}")
          print(f"  Уникальных фото: {len(unique_photos)}")
          print(f"  Фото >= 600px: {len(good_photos)}")

          # ── 4. Генерируем отчёт ──
          report = []
          report.append(f"# VK Market Photo Export — {group_name}")
          report.append(f"")
          report.append(f"**Дата:** {datetime.now().strftime('%Y-%m-%d %H:%M')}")
          report.append(f"**Группа:** vk.com/mebelit_krsk (ID: {GROUP_ID})")
          report.append(f"**Подписчики:** {members}")
          report.append(f"**Описание:** {desc[:300]}")
          report.append(f"**Сайт:** {site}")
          report.append(f"")
          report.append(f"## Статистика товаров")
          report.append(f"")
          report.append(f"| Метрика | Значение |")
          report.append(f"|---------|----------|")
          report.append(f"| Всего товаров | {total_market} |")
          report.append(f"| Подборок | {len(market_albums)} |")
          report.append(f"| Фото из товаров | {len(product_photos)} |")
          report.append(f"| Уникальных фото | {len(unique_photos)} |")
          report.append(f"| Фото >= 600px | {len(good_photos)} |")
          report.append(f"")

          if market_albums:
              report.append(f"## Подборки товаров")
              report.append(f"")
              report.append(f"| ID | Название | Кол-во |")
              report.append(f"|----|----------|--------|")
              for a in market_albums:
                  report.append(f"| {a['id']} | {a['title']} | {a['count']} |")
              report.append(f"")

          # Список всех товаров
          if all_products:
              report.append(f"## Товары ({len(all_products)})")
              report.append(f"")
              report.append(f"| # | Название | Цена | Фото |")
              report.append(f"|---|----------|------|------|")
              for i, p in enumerate(all_products, 1):
                  title = p.get("title", "?")[:50]
                  price = p.get("price", {}).get("text", "?") if isinstance(p.get("price"), dict) else "?"
                  n_photos = sum(1 for ph in unique_photos if ph.get("product_id") == p.get("id"))
                  report.append(f"| {i} | {title} | {price} | {n_photos} |")
              report.append(f"")

          # ── 5. Скачиваем если download ──
          if ACTION == "download" and good_photos:
              PHOTO_DIR.mkdir(parents=True, exist_ok=True)
              print(f"\n=== Скачивание {len(good_photos)} фото ===")
              downloaded = 0
              for i, p in enumerate(good_photos):
                  ext = "jpg"
                  if ".png" in p["url"]:
                      ext = "png"
                  safe_title = "".join(c if c.isalnum() or c in "-_ " else "" for c in p.get("title","")[:30]).strip().replace(" ","_") or "product"
                  fname = f"market_{p.get('product_id', i)}_{safe_title}_{i}.{ext}"
                  fpath = PHOTO_DIR / fname
                  if fpath.exists():
                      continue
                  try:
                      r = requests.get(p["url"], timeout=30)
                      if r.status_code == 200:
                          fpath.write_bytes(r.content)
                          downloaded += 1
                          if downloaded % 20 == 0:
                              print(f"  Скачано: {downloaded}/{len(good_photos)}")
                  except Exception as e:
                      print(f"  Ошибка: {fname} — {e}")
                  time.sleep(0.1)
              print(f"  Скачано: {downloaded}")
              report.append(f"## Скачанные фото")
              report.append(f"")
              report.append(f"Скачано **{downloaded}** фото в `site-analysis/vk-photos/`")
              report.append(f"")
          elif ACTION == "scan":
              report.append(f"## Следующий шаг")
              report.append(f"")
              report.append(f"Запустите workflow с action=**download** для скачивания фото.")
              report.append(f"")

          # Сохраняем JSON
          json_path = Path("site-analysis/vk-photos-index.json")
          json_path.parent.mkdir(parents=True, exist_ok=True)
          with open(json_path, "w", encoding="utf-8") as f:
              json.dump({
                  "group": group_name,
                  "group_id": GROUP_ID,
                  "members": members,
                  "source": "market (товары)",
                  "total_products": len(all_products),
                  "market_albums": market_albums,
                  "total_photos": len(unique_photos),
                  "good_photos": len(good_photos),
                  "photos": good_photos
              }, f, ensure_ascii=False, indent=2)
          report.append(f"Индекс фото сохранён в `site-analysis/vk-photos-index.json`")

          # Debug лог
          Path("site-analysis/vk-debug.log").write_text("\n".join(debug_log), encoding="utf-8")

          # Отчёт
          REPORT_FILE.write_text("\n".join(report), encoding="utf-8")
          print(f"\nОтчёт сохранён: {REPORT_FILE}")

          PYTHON

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f site-analysis/vk-photo-report.md site-analysis/vk-photos-index.json site-analysis/vk-debug.log
          if [ "${{ inputs.action }}" = "download" ]; then
            git add -f site-analysis/vk-photos/ 2>/dev/null || true
          fi
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "data: VK photo export (${{ inputs.action }}) [skip ci]"
            git push
          }
