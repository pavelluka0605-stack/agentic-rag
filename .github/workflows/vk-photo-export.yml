name: "VK Photo Export — Market Photos"

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source for photo list"
        required: true
        default: "index"
        type: choice
        options:
          - index      # Use existing vk-photos-index.json
          - api        # Fetch fresh data from VK API market.get

permissions:
  contents: write

concurrency:
  group: vk-photo-export-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    name: "Download & Convert VK Market Photos"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Download and convert photos
        env:
          VK_TOKEN: ${{ secrets.VK_USER_TOKEN }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
          SOURCE: ${{ inputs.source || 'index' }}
        run: |
          python3 << 'PYTHON'
          import requests, json, os, re, time, unicodedata
          from pathlib import Path
          from PIL import Image
          from io import BytesIO
          from datetime import datetime

          TOKEN = os.environ["VK_TOKEN"]
          GROUP_ID = os.environ["VK_GROUP_ID"]
          SOURCE = os.environ.get("SOURCE", "index")
          API = "https://api.vk.com/method"
          V = "5.199"

          OUTPUT_DIR = Path("vk-photos")
          INDEX_FILE = Path("site-analysis/vk-photos-index.json")

          def vk(method, **params):
              """Call VK API with rate limiting."""
              params.update(access_token=TOKEN, v=V)
              r = requests.get(f"{API}/{method}", params=params, timeout=30)
              data = r.json()
              if "error" in data:
                  err = data["error"]
                  print(f"  VK API error [{method}]: code={err.get('error_code')} msg={err.get('error_msg')}")
                  return None
              return data.get("response")

          def slugify(text):
              """Convert Russian/English text to a URL-safe slug."""
              # Remove special characters but keep Cyrillic and Latin
              text = text.strip()
              # Common transliteration map for Russian
              translit = {
                  'а': 'a', 'б': 'b', 'в': 'v', 'г': 'g', 'д': 'd', 'е': 'e', 'ё': 'yo',
                  'ж': 'zh', 'з': 'z', 'и': 'i', 'й': 'y', 'к': 'k', 'л': 'l', 'м': 'm',
                  'н': 'n', 'о': 'o', 'п': 'p', 'р': 'r', 'с': 's', 'т': 't', 'у': 'u',
                  'ф': 'f', 'х': 'kh', 'ц': 'ts', 'ч': 'ch', 'ш': 'sh', 'щ': 'shch',
                  'ъ': '', 'ы': 'y', 'ь': '', 'э': 'e', 'ю': 'yu', 'я': 'ya',
              }
              result = []
              for ch in text.lower():
                  if ch in translit:
                      result.append(translit[ch])
                  elif ch.isascii() and ch.isalnum():
                      result.append(ch)
                  elif ch in (' ', '-', '_', '.'):
                      result.append('-')
                  # skip other chars
              slug = '-'.join(filter(None, ''.join(result).split('-')))
              return slug or 'product'

          # ── 1. Get photo list ──────────────────────────────────────────────

          photos_by_product = {}  # product_id -> {title, price, description, photos: [...]}

          if SOURCE == "index" and INDEX_FILE.exists():
              print("=== Reading photos from vk-photos-index.json ===")
              with open(INDEX_FILE, "r", encoding="utf-8") as f:
                  index_data = json.load(f)

              for photo in index_data.get("photos", []):
                  pid = photo.get("product_id", 0)
                  if pid not in photos_by_product:
                      photos_by_product[pid] = {
                          "title": photo.get("title", ""),
                          "price": photo.get("price", ""),
                          "description": photo.get("description", ""),
                          "photos": []
                      }
                  photos_by_product[pid]["photos"].append({
                      "url": photo["url"],
                      "width": photo.get("width", 0),
                      "height": photo.get("height", 0),
                      "photo_id": photo.get("photo_id"),
                  })

              print(f"  Found {len(photos_by_product)} products, "
                    f"{sum(len(p['photos']) for p in photos_by_product.values())} photos")

          else:
              print("=== Fetching products from VK API market.get ===")
              owner_id = f"-{GROUP_ID}"

              # Get all products
              all_products = []
              offset = 0
              while True:
                  resp = vk("market.get", owner_id=owner_id, count=200, offset=offset, extended=1)
                  if not resp:
                      resp = vk("market.get", owner_id=owner_id, count=200, offset=offset)
                  if not resp or not resp.get("items"):
                      break
                  items = resp["items"]
                  all_products.extend(items)
                  total = resp.get("count", 0)
                  print(f"  Loaded: {len(all_products)}/{total}")
                  if len(items) < 200:
                      break
                  offset += 200
                  time.sleep(0.35)

              print(f"  Total products: {len(all_products)}")

              # For each product, get detailed photos via market.getById
              for i, product in enumerate(all_products):
                  pid = product["id"]
                  title = product.get("title", "")
                  price_info = product.get("price", {})
                  price_text = price_info.get("text", "") if isinstance(price_info, dict) else ""
                  description = product.get("description", "")[:500]

                  # Check if photos are already in the listing
                  product_photo_list = product.get("photos", [])

                  if not product_photo_list:
                      # Fetch details
                      detail = vk("market.getById", item_ids=f"{owner_id}_{pid}", extended=1)
                      if detail and detail.get("items"):
                          item = detail["items"][0]
                          product_photo_list = item.get("photos", [])
                          if not title:
                              title = item.get("title", "")
                          if not price_text:
                              pi = item.get("price", {})
                              price_text = pi.get("text", "") if isinstance(pi, dict) else ""
                          if not description:
                              description = item.get("description", "")[:500]
                      time.sleep(0.35)

                  photos_by_product[pid] = {
                      "title": title,
                      "price": price_text,
                      "description": description,
                      "photos": []
                  }

                  for photo in product_photo_list:
                      sizes = photo.get("sizes", [])
                      if sizes:
                          best = max(sizes, key=lambda s: s.get("width", 0) * s.get("height", 0))
                          photos_by_product[pid]["photos"].append({
                              "url": best["url"],
                              "width": best.get("width", 0),
                              "height": best.get("height", 0),
                              "photo_id": photo.get("id"),
                          })

                  if (i + 1) % 10 == 0:
                      print(f"  Processed: {i+1}/{len(all_products)}")

              print(f"  Products with photos: {len(photos_by_product)}")

          # ── 2. Download & convert ──────────────────────────────────────────

          total_photos = sum(len(p["photos"]) for p in photos_by_product.values())
          print(f"\n=== Downloading {total_photos} photos from {len(photos_by_product)} products ===")

          manifest = {
              "exported_at": datetime.now().isoformat(),
              "total_products": len(photos_by_product),
              "total_photos": 0,
              "products": []
          }

          downloaded = 0
          errors = 0

          for pid, product_data in photos_by_product.items():
              title = product_data["title"]
              slug = slugify(title)
              model_dir = OUTPUT_DIR / slug
              model_dir.mkdir(parents=True, exist_ok=True)

              product_manifest = {
                  "product_id": pid,
                  "title": title,
                  "slug": slug,
                  "price": product_data["price"],
                  "description": product_data.get("description", "")[:300],
                  "photo_count": 0,
                  "photos": []
              }

              for idx, photo in enumerate(product_data["photos"], 1):
                  url = photo["url"]
                  jpg_name = f"photo-{idx}.jpg"
                  webp_name = f"photo-{idx}.webp"
                  jpg_path = model_dir / jpg_name
                  webp_path = model_dir / webp_name

                  try:
                      r = requests.get(url, timeout=30)
                      if r.status_code != 200:
                          print(f"  HTTP {r.status_code} for {slug}/photo-{idx}")
                          errors += 1
                          continue

                      img_data = r.content

                      # Save original JPEG
                      jpg_path.write_bytes(img_data)

                      # Convert to WebP (quality 85%)
                      img = Image.open(BytesIO(img_data))
                      if img.mode in ("RGBA", "P"):
                          img = img.convert("RGB")
                      img.save(str(webp_path), "WEBP", quality=85)

                      jpg_size = jpg_path.stat().st_size
                      webp_size = webp_path.stat().st_size

                      product_manifest["photos"].append({
                          "index": idx,
                          "jpg": f"{slug}/{jpg_name}",
                          "webp": f"{slug}/{webp_name}",
                          "width": photo.get("width", img.width),
                          "height": photo.get("height", img.height),
                          "jpg_size": jpg_size,
                          "webp_size": webp_size,
                          "photo_id": photo.get("photo_id"),
                          "original_url": url
                      })

                      downloaded += 1
                      if downloaded % 20 == 0:
                          print(f"  Downloaded: {downloaded}/{total_photos}")

                  except Exception as e:
                      print(f"  Error downloading {slug}/photo-{idx}: {e}")
                      errors += 1

                  time.sleep(0.1)

              product_manifest["photo_count"] = len(product_manifest["photos"])
              manifest["products"].append(product_manifest)

          manifest["total_photos"] = downloaded

          # ── 3. Save manifest ───────────────────────────────────────────────

          manifest_path = OUTPUT_DIR / "manifest.json"
          with open(manifest_path, "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)

          # ── 4. Summary ─────────────────────────────────────────────────────

          total_jpg = sum(
              p.get("jpg_size", 0)
              for prod in manifest["products"]
              for p in prod["photos"]
          )
          total_webp = sum(
              p.get("webp_size", 0)
              for prod in manifest["products"]
              for p in prod["photos"]
          )

          print(f"\n=== RESULTS ===")
          print(f"  Products: {len(manifest['products'])}")
          print(f"  Photos downloaded: {downloaded}")
          print(f"  Errors: {errors}")
          print(f"  JPEG total size: {total_jpg / 1024 / 1024:.1f} MB")
          print(f"  WebP total size: {total_webp / 1024 / 1024:.1f} MB")
          print(f"  WebP savings: {(1 - total_webp / max(total_jpg, 1)) * 100:.0f}%")
          print(f"  Manifest: {manifest_path}")

          # List all model directories
          print(f"\n=== Model directories ===")
          for prod in sorted(manifest["products"], key=lambda p: p["title"]):
              print(f"  {prod['slug']}/ — {prod['photo_count']} photos — {prod['title']} — {prod['price']}")

          PYTHON

      - name: Upload photos as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vk-market-photos
          path: vk-photos/
          retention-days: 30
          if-no-files-found: error
