name: "Deploy Claude Chat"

on:
  push:
    branches: [main, "claude/*"]
    paths:
      - "claude-chat/**"
      - ".github/workflows/deploy-chat.yml"
  workflow_dispatch:

concurrency:
  group: deploy-chat
  cancel-in-progress: true

jobs:
  deploy-chat:
    name: "Deploy chat.marbomebel.ru"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Stop service on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'systemctl stop claude-chat 2>/dev/null || true; sleep 2; kill $(lsof -t -i:3847) 2>/dev/null || true; sleep 1; echo "Service stopped"'

      - name: Copy files to VPS
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} -r \
            claude-chat/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} \
            memory_store.py retriever.py \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/

      - name: Install deps and start service
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'bash -s' << 'ENDSSH'
          set -e
          cd /opt/claude-chat

          npm install --omit=dev 2>&1 | tail -5
          command -v python3 &>/dev/null && pip3 install --quiet numpy openai 2>&1 | tail -3 || true
          mkdir -p /opt/claude-chat/data

          if [ ! -f .env ]; then
            source /opt/p0-foundation/.env 2>/dev/null || true
            printf 'BEARER_TOKEN=%s\nOPENAI_API_KEY=%s\nPORT=3847\n' \
              "$(openssl rand -hex 32)" "${OPENAI_API_KEY:-}" > .env
            echo "created .env"
          fi

          cat > /etc/systemd/system/claude-chat.service << 'UNIT'
          [Unit]
          Description=Claude Chat (chat.marbomebel.ru)
          After=network.target
          [Service]
          Type=simple
          WorkingDirectory=/opt/claude-chat
          EnvironmentFile=/opt/claude-chat/.env
          ExecStart=/usr/bin/node /opt/claude-chat/server.js
          Restart=always
          RestartSec=10
          KillSignal=SIGTERM
          TimeoutStopSec=15
          [Install]
          WantedBy=multi-user.target
          UNIT
          sed -i 's/^          //' /etc/systemd/system/claude-chat.service

          systemctl daemon-reload
          systemctl enable claude-chat

          # Make sure port is free
          kill $(lsof -t -i:3847) 2>/dev/null || true
          sleep 1

          systemctl start claude-chat
          sleep 4

          if systemctl is-active --quiet claude-chat; then
            echo "OK: Claude Chat running on :3847"
            curl -s --max-time 5 http://localhost:3847/api/health | head -c 300
            echo ""
          else
            echo "FAIL: Claude Chat not running"
            journalctl -u claude-chat -n 30 --no-pager
            exit 1
          fi
          ENDSSH
