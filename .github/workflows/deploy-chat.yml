name: "Deploy Claude Chat"

on:
  push:
    branches: [main, "claude/*"]
    paths:
      - "claude-chat/**"
      - ".github/workflows/deploy-chat.yml"
  workflow_dispatch:

concurrency:
  group: deploy-chat
  cancel-in-progress: true

jobs:
  deploy-chat:
    name: "Deploy chat.marbomebel.ru"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy files to VPS
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} -r \
            claude-chat/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} \
            memory_store.py retriever.py \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/

      - name: Deploy and restart
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'bash -s' <<'SCRIPT'
          set -ex

          cd /opt/claude-chat
          npm install --omit=dev 2>&1 | tail -5
          command -v python3 &>/dev/null && pip3 install --quiet numpy openai 2>&1 | tail -3 || true
          mkdir -p data

          test -f .env || {
            . /opt/p0-foundation/.env 2>/dev/null || true
            printf 'BEARER_TOKEN=%s\nOPENAI_API_KEY=%s\nPORT=3847\n' \
              "$(openssl rand -hex 32)" "${OPENAI_API_KEY:-}" > .env
            echo "created .env"
          }

          # === STOP ===
          systemctl stop claude-chat 2>/dev/null || true
          sleep 2
          # Force-kill anything on port 3847
          for pid in $(lsof -t -i:3847 2>/dev/null); do
            echo "Killing PID $pid on port 3847"
            kill -9 "$pid" 2>/dev/null || true
          done
          sleep 1
          # Verify port is free
          if lsof -i:3847 >/dev/null 2>&1; then
            echo "ERROR: Port 3847 still in use!"
            lsof -i:3847
            exit 1
          fi
          echo "Port 3847 is free"

          # === START ===
          systemctl daemon-reload
          systemctl enable claude-chat
          systemctl start claude-chat
          sleep 4

          if systemctl is-active --quiet claude-chat; then
            echo "OK: Claude Chat running"
            curl -s --max-time 5 http://localhost:3847/api/health | head -c 300 || true
            echo ""
          else
            echo "FAIL — journal:"
            journalctl -u claude-chat -n 30 --no-pager
            exit 1
          fi
          SCRIPT
