name: "Deploy Claude Chat"

on:
  push:
    branches: [main, "claude/*"]
    paths:
      - "claude-chat/**"
      - ".github/workflows/deploy-chat.yml"
  workflow_dispatch:

concurrency:
  group: deploy-chat
  cancel-in-progress: true

jobs:
  deploy-chat:
    name: "Deploy chat.marbomebel.ru"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy files to VPS
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} -r \
            claude-chat/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} \
            memory_store.py retriever.py \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/

      - name: Install deps and restart via PM2
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'bash -s' <<'SCRIPT'
          set -e
          cd /opt/claude-chat
          npm install --omit=dev 2>&1 | tail -5
          mkdir -p data

          test -f .env || {
            . /opt/p0-foundation/.env 2>/dev/null || true
            printf 'BEARER_TOKEN=%s\nOPENAI_API_KEY=%s\nPORT=3847\n' \
              "$(openssl rand -hex 32)" "${OPENAI_API_KEY:-}" > .env
            echo "created .env"
          }

          # Restart via PM2 (not systemd)
          pm2 restart claude-chat 2>/dev/null || pm2 start server.js --name claude-chat
          sleep 3

          pm2 list | grep claude-chat
          curl -s --max-time 5 http://localhost:3847/api/health || { echo "FAIL"; pm2 logs claude-chat --lines 20 --nostream; exit 1; }
          echo ""
          echo "Deploy OK"
          SCRIPT
