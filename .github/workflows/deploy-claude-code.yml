name: Deploy Claude Code Runtime

on:
  push:
    branches:
      - 'claude/vps-dev-environment-*'
    paths:
      - 'vps-runtime/**'
      - '.claude/mcp/**'
      - '.claude/hooks/**'
      - '.github/workflows/deploy-claude-code.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - bootstrap
          - start
          - stop
          - restart
          - health
          - smoke-test
          - live-pilot
          - update-scripts

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy runtime scripts
        if: inputs.action == 'bootstrap' || inputs.action == 'update-scripts' || github.event_name == 'push'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          CONTROL_API_TOKEN: ${{ secrets.CONTROL_API_TOKEN }}
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          SCP_CMD="scp -o StrictHostKeyChecking=no"
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          # Create dirs on VPS
          $SSH_CMD "mkdir -p /opt/claude-code/{bin,env,etc,logs,workspace,backups,control-api,memory-server}"

          # Copy scripts
          $SCP_CMD vps-runtime/bin/*.sh $VPS:/opt/claude-code/bin/

          # Copy configs
          $SCP_CMD vps-runtime/etc/tmux.conf $VPS:/opt/claude-code/etc/
          $SCP_CMD vps-runtime/etc/nginx-webhook.conf $VPS:/opt/claude-code/etc/
          $SCP_CMD vps-runtime/etc/*.service $VPS:/opt/claude-code/etc/
          $SCP_CMD vps-runtime/etc/*.timer $VPS:/opt/claude-code/etc/

          # Copy control API
          $SCP_CMD vps-runtime/control-api/server.js $VPS:/opt/claude-code/control-api/
          $SCP_CMD vps-runtime/control-api/package.json $VPS:/opt/claude-code/control-api/

          # Copy memory server (needed by control API for task DB)
          $SCP_CMD .claude/mcp/memory-server/db.js $VPS:/opt/claude-code/memory-server/
          $SCP_CMD .claude/mcp/memory-server/package.json $VPS:/opt/claude-code/memory-server/
          $SCP_CMD -r .claude/mcp/memory-server/migrations $VPS:/opt/claude-code/memory-server/

          # Install memory server deps (better-sqlite3) and ensure memory dir
          $SSH_CMD "cd /opt/claude-code/memory-server && npm install --production 2>&1 | tail -3"
          $SSH_CMD "mkdir -p /opt/claude-code/memory"

          # Write control-api.env with secrets (expand vars locally, write to remote)
          printf '%s\n' \
            "OPENAI_API_KEY=${OPENAI_API_KEY:-}" \
            "TG_BOT_TOKEN=${TG_BOT_TOKEN:-}" \
            "TG_CHAT_ID=${TG_CHAT_ID:-}" \
            "CONTROL_API_TOKEN=${CONTROL_API_TOKEN:-}" \
            "MEMORY_SERVER_PATH=/opt/claude-code/memory-server" \
            > /tmp/control-api.env
          $SCP_CMD /tmp/control-api.env $VPS:/opt/claude-code/env/control-api.env
          $SSH_CMD "chmod 600 /opt/claude-code/env/control-api.env"
          rm -f /tmp/control-api.env

          # Make executable
          $SSH_CMD "chmod +x /opt/claude-code/bin/*.sh"

          # Install systemd units from etc/
          $SSH_CMD "cp /opt/claude-code/etc/*.service /etc/systemd/system/ 2>/dev/null; cp /opt/claude-code/etc/*.timer /etc/systemd/system/ 2>/dev/null; systemctl daemon-reload"

          # Enable services
          $SSH_CMD "systemctl enable claude-code.service github-webhook.service control-api.service claude-code-health.timer 2>/dev/null || true"
          $SSH_CMD "systemctl start claude-code-health.timer 2>/dev/null || true"

          # Setup backup cron (idempotent)
          $SSH_CMD "crontab -l 2>/dev/null | grep -q backup-memory || (crontab -l 2>/dev/null; echo '*/30 * * * * /opt/claude-code/bin/backup-memory.sh >> /opt/claude-code/logs/backup.log 2>&1') | crontab -"

          echo "✓ Scripts, configs, systemd units, memory server, and control API deployed"

      - name: Bootstrap
        if: inputs.action == 'bootstrap'
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          $SSH_CMD "bash /opt/claude-code/bin/bootstrap.sh --force"

      - name: Set ANTHROPIC_API_KEY
        if: inputs.action == 'bootstrap'
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            $SSH_CMD "sed -i 's|^ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}|' /opt/claude-code/env/claude.env"
            echo "✓ ANTHROPIC_API_KEY set"
          else
            echo "⚠ ANTHROPIC_API_KEY secret not set in GitHub"
          fi

      - name: Ensure services running
        if: github.event_name == 'push'
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          # Start or restart services after push deploy
          $SSH_CMD "systemctl restart control-api.service 2>/dev/null || true"
          $SSH_CMD "systemctl is-active claude-code.service >/dev/null 2>&1 && /opt/claude-code/bin/restart.sh || /opt/claude-code/bin/start.sh" || true
          $SSH_CMD "systemctl restart github-webhook.service 2>/dev/null || true"
          echo "✓ Services started/restarted"

      - name: Start
        if: inputs.action == 'start' || inputs.action == 'bootstrap'
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          $SSH_CMD "/opt/claude-code/bin/start.sh"
          $SSH_CMD "systemctl start control-api.service 2>/dev/null || true"

      - name: Stop
        if: inputs.action == 'stop'
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          $SSH_CMD "/opt/claude-code/bin/stop.sh"
          $SSH_CMD "systemctl stop control-api.service 2>/dev/null || true"

      - name: Restart
        if: inputs.action == 'restart'
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          $SSH_CMD "/opt/claude-code/bin/restart.sh"
          $SSH_CMD "systemctl restart control-api.service 2>/dev/null || true"

      - name: Health Check
        if: inputs.action == 'health' || inputs.action == 'bootstrap' || inputs.action == 'start' || inputs.action == 'restart' || github.event_name == 'push'
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          $SSH_CMD "/opt/claude-code/bin/health.sh" || true

      - name: Smoke Test
        if: inputs.action == 'smoke-test' || inputs.action == 'bootstrap' || github.event_name == 'push'
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          $SSH_CMD "/opt/claude-code/bin/smoke-test.sh" || true

      - name: Live Pilot Test
        if: inputs.action == 'live-pilot' || github.event_name == 'push'
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          $SSH_CMD "bash /opt/claude-code/bin/live-pilot-test.sh" 2>&1 | tee /tmp/live-pilot-output.txt
          echo ""
          echo "=== LIVE PILOT OUTPUT SAVED ==="

      - name: Upload pilot results
        if: inputs.action == 'live-pilot' || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: live-pilot-results
          path: /tmp/live-pilot-output.txt
          retention-days: 7
        continue-on-error: true
