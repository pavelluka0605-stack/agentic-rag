name: "Debug Control Bridge"

on:
  push:
    branches: ["claude/*"]
    paths: [".github/workflows/debug-control-bridge.yml"]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  debug:
    name: "Debug Bridge"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run diagnostics
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'DIAG' | tee /tmp/debug-output.txt
          echo "=== 1. TOKEN CHECK ==="
          TOKEN=$(grep BRIDGE_API_TOKEN /opt/control-bridge/.env | cut -d= -f2-)
          echo "token_length: ${#TOKEN}"
          echo "token_prefix: $(echo ${TOKEN} | cut -c1-6)..."
          echo "token_has_newline: $(echo -n ${TOKEN} | wc -l)"
          echo "token_has_spaces: $(echo ${TOKEN} | grep -c ' ')"
          echo "env_file_lines: $(wc -l < /opt/control-bridge/.env)"
          echo "env_file_contents_escaped: $(cat -A /opt/control-bridge/.env | head -3)"
          echo ""

          echo "=== 2. SERVICE STATUS ==="
          systemctl status control-bridge --no-pager 2>&1 || true
          echo ""

          echo "=== 3. RECENT LOGS (last 200 lines) ==="
          journalctl -u control-bridge -n 200 --no-pager 2>&1 || true
          echo ""

          echo "=== 4. NGINX ERROR LOG ==="
          tail -50 /var/log/nginx/error.log 2>&1 || echo "no error log"
          echo ""

          echo "=== 5. NGINX ACCESS LOG (api domain) ==="
          grep -i "api.marbomebel" /var/log/nginx/access.log 2>/dev/null | tail -30 || echo "no api access entries"
          echo ""

          echo "=== 6. NGINX CONFIG TEST ==="
          nginx -t 2>&1
          echo ""

          echo "=== 7. NGINX SITES CONFIG ==="
          cat /etc/nginx/sites-available/api-marbomebel 2>&1 || echo "no config"
          echo ""

          echo "=== 8. SSL CERT CHECK ==="
          ls -la /etc/letsencrypt/live/api.marbomebel.ru/ 2>&1 || echo "no cert dir"
          echo ""

          echo "=== 9. EXTERNAL HTTPS TEST ==="
          curl -si --connect-timeout 5 https://api.marbomebel.ru/health 2>&1 || echo "HTTPS_FAILED"
          echo ""

          echo "=== 10. EXTERNAL HTTP TEST ==="
          curl -si --connect-timeout 5 http://api.marbomebel.ru/health 2>&1 || echo "HTTP_FAILED"
          echo ""

          echo "=== 11. LOCAL createJob TEST ==="
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"title":"Тестовая задача","raw_user_request":"Проверка моста GPT -> API","normalized_brief":"Тестовый запуск createJob"}' 2>&1
          echo ""

          echo "=== 12. HTTPS createJob TEST ==="
          curl -si --connect-timeout 5 -X POST https://api.marbomebel.ru/jobs \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"title":"HTTPS test","raw_user_request":"Test via HTTPS","normalized_brief":"HTTPS createJob"}' 2>&1 || echo "HTTPS_CREATEJOB_FAILED"
          echo ""

          echo "=== 13. DNS CHECK ==="
          dig +short api.marbomebel.ru 2>&1 || host api.marbomebel.ru 2>&1 || echo "DNS_FAIL"
          echo ""

          echo "=== 14. LISTENING PORTS ==="
          ss -tlnp | grep -E '3000|80|443' 2>&1 || netstat -tlnp | grep -E '3000|80|443' 2>&1 || echo "no ss/netstat"
          echo ""

          echo "=== 15. OPENAPI SCHEMA CHECK ==="
          curl -s http://127.0.0.1:3000/openapi.json 2>&1 | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(json.dumps(data, indent=2))
          " 2>&1 | head -200
          echo ""

          echo "=== 16. APP.PY VERSION ==="
          head -5 /opt/control-bridge/app.py
          grep 'version=' /opt/control-bridge/app.py
          echo ""

          echo "=== DONE ==="
          DIAG

      - name: Post results to issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, traceback
          try:
              with open("/tmp/debug-output.txt") as f:
                  content = f.read()
              body = "## Debug Control Bridge\n\nRun: ${{ github.run_id }}\n\n```\n" + content[:60000] + "\n```"
              payload = json.dumps({"title": "Bridge Debug ${{ github.run_id }}", "body": body}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/repos/${{ github.repository }}/issues",
                  data=payload,
                  headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"], "Accept": "application/vnd.github+json", "Content-Type": "application/json"},
                  method="POST")
              resp = urllib.request.urlopen(req)
              data = json.loads(resp.read())
              print(f"Issue #{data['number']} created: {data['html_url']}")
          except Exception as e:
              traceback.print_exc()
              with open("/tmp/debug-output.txt") as f:
                  print(f.read())
          PYEOF
