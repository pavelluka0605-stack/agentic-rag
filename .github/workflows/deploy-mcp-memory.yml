name: "Deploy MCP Memory Server"

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - "mcp-memory/**"
      - ".github/workflows/deploy-mcp-memory.yml"
  workflow_dispatch:

env:
  SSH_CMD: ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}

jobs:
  deploy:
    name: "Deploy MCP Memory to VPS"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy files to VPS
        run: |
          $SSH_CMD "mkdir -p /opt/mcp-memory/{src,data,backups}"
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} -r \
            mcp-memory/package.json \
            mcp-memory/src/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/mcp-memory/

      - name: Install Node.js deps
        run: |
          $SSH_CMD << 'EOF'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
          command -v node || { curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs; }
          echo "node=$(node --version) npm=$(npm --version) path=$(which node)"
          dpkg -l | grep -q build-essential || { apt-get update -qq && apt-get install -y -qq build-essential python3; }
          cd /opt/mcp-memory && npm install --no-audit --no-fund
          ls -la node_modules/@modelcontextprotocol/sdk/package.json node_modules/better-sqlite3/build/Release/better_sqlite3.node node_modules/zod/package.json
          EOF

      - name: Run migrate
        run: |
          $SSH_CMD << 'EOF'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
          cd /opt/mcp-memory && node src/migrate.js
          EOF

      - name: Run tests
        run: |
          $SSH_CMD << 'EOF'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
          cd /opt/mcp-memory && npm test
          EOF

      - name: Test MCP protocol
        run: |
          $SSH_CMD << 'EOF'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
          cd /opt/mcp-memory
          RESP=$(echo '{"jsonrpc":"2.0","method":"initialize","params":{"capabilities":{},"clientInfo":{"name":"test","version":"1.0"},"protocolVersion":"2024-11-05"},"id":1}' | timeout 5 node src/index.js 2>/dev/null || true)
          echo "Response: $RESP"
          echo "$RESP" | grep -q 'memory-server' && echo "✓ MCP OK" || echo "⚠ MCP response unexpected"
          EOF

      - name: Configure Claude Code
        run: |
          $SSH_CMD << 'EOF'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
          NODE_PATH=$(readlink -f $(which node))
          echo "Node: $NODE_PATH"
          mkdir -p ~/.claude
          which jq > /dev/null 2>&1 || apt-get install -y -qq jq
          if [ -f ~/.claude/settings.json ]; then
            echo "Merging into existing settings..."
            jq --arg node "$NODE_PATH" '.mcpServers.memory = {"command":$node,"args":["/opt/mcp-memory/src/index.js"],"env":{"MEMORY_DB_PATH":"/opt/mcp-memory/data/memory.db"}}' ~/.claude/settings.json > /tmp/cs.json
            jq . /tmp/cs.json > /dev/null 2>&1 && cp /tmp/cs.json ~/.claude/settings.json && echo "✓ Merged"
          fi
          if ! jq -e '.mcpServers.memory' ~/.claude/settings.json > /dev/null 2>&1; then
            echo "Creating settings.json..."
            printf '{"mcpServers":{"memory":{"command":"%s","args":["/opt/mcp-memory/src/index.js"],"env":{"MEMORY_DB_PATH":"/opt/mcp-memory/data/memory.db"}}}}\n' "$NODE_PATH" | jq . > ~/.claude/settings.json
          fi
          echo "Settings:"
          cat ~/.claude/settings.json
          EOF

      - name: Setup cron and seed data
        run: |
          $SSH_CMD << 'EOF'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
          NODE_PATH=$(readlink -f $(which node))
          cd /opt/mcp-memory

          # Cron
          (crontab -l 2>/dev/null | grep -v mcp-memory; echo "0 3 * * * cd /opt/mcp-memory && $NODE_PATH src/backup.js >> /var/log/mcp-memory-backup.log 2>&1") | crontab -
          crontab -l | grep mcp-memory && echo "✓ Cron OK"

          # Backup test
          node src/backup.js

          # Seed data
          which sqlite3 > /dev/null 2>&1 || apt-get install -y -qq sqlite3
          COUNT=$(sqlite3 data/memory.db "SELECT COUNT(*) FROM memories;" 2>/dev/null || echo "0")
          echo "Records: $COUNT"
          if [ "$COUNT" = "0" ] || [ -z "$COUNT" ]; then
            node src/seed.js
          else
            echo "✓ Already seeded ($COUNT records)"
          fi

          echo ""
          echo "=== DONE ==="
          node src/stats.js
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
