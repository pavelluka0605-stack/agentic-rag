name: "VPS Repair — kill zombies, free resources"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        required: true
        default: "diagnose-and-fix"
        type: choice
        options:
          - diagnose-and-fix
          - diagnose-only
          - restart-services
          - kill-zombies-only

jobs:
  repair:
    name: "VPS Repair"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run VPS Repair
        env:
          ACTION: ${{ inputs.action }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "ACTION=$ACTION" 'bash -s' << 'REPAIR'

          MSG=""
          add() { MSG="${MSG}${1}\n"; }

          add "=== VPS REPAIR $(date '+%Y-%m-%d %H:%M:%S') ==="
          add "Action: $ACTION"
          add ""

          # --- 1. Resource diagnostics ---
          add "--- Resources ---"
          add "$(free -h | head -3)"
          add ""
          add "Load: $(cat /proc/loadavg)"
          add "Processes: $(ps aux | wc -l)"
          ZOMBIE_COUNT=$(ps -eo stat | grep -c '^Z' || echo "0")
          add "Zombies: $ZOMBIE_COUNT"
          add ""

          # Top memory consumers
          add "--- Top Memory ---"
          add "$(ps aux --sort=-%mem | head -10)"
          add ""

          # Disk usage
          add "--- Disk ---"
          add "$(df -h / | tail -1)"
          add ""

          # nproc limits
          add "--- Process Limits ---"
          add "ulimit -u: $(ulimit -u)"
          add "Current processes: $(ps -e | wc -l)"
          add ""

          if [ "$ACTION" = "diagnose-only" ]; then
            printf "$MSG"
            exit 0
          fi

          # --- 2. Kill zombies ---
          add "--- Killing Zombies ---"
          ZOMBIE_PIDS=$(ps -eo pid,stat | awk '$2~/^Z/{print $1}')
          if [ -n "$ZOMBIE_PIDS" ]; then
            KILLED=0
            for PID in $ZOMBIE_PIDS; do
              PPID=$(ps -o ppid= -p $PID 2>/dev/null | tr -d ' ')
              if [ -n "$PPID" ] && [ "$PPID" != "1" ]; then
                kill -SIGCHLD $PPID 2>/dev/null
                KILLED=$((KILLED + 1))
              fi
              # Force kill zombie parent if it doesn't reap
              sleep 0.1
              if ps -p $PID -o stat= 2>/dev/null | grep -q '^Z'; then
                kill -9 $PPID 2>/dev/null || true
                KILLED=$((KILLED + 1))
              fi
            done
            add "Killed/reaped $KILLED zombie parents"
          else
            add "No zombies found"
          fi
          add ""

          if [ "$ACTION" = "kill-zombies-only" ]; then
            printf "$MSG"
            exit 0
          fi

          # --- 3. Kill stale claude/node processes ---
          add "--- Cleaning Stale Processes ---"
          # Kill any claude processes older than 2 hours
          STALE=$(ps -eo pid,etimes,comm | awk '$2 > 7200 && ($3 ~ /claude|timeout/)' | head -20)
          if [ -n "$STALE" ]; then
            add "Stale processes found:"
            add "$STALE"
            echo "$STALE" | awk '{print $1}' | xargs kill -9 2>/dev/null || true
            add "Killed stale processes"
          else
            add "No stale processes"
          fi
          add ""

          # --- 4. Restart services ---
          if [ "$ACTION" = "diagnose-and-fix" ] || [ "$ACTION" = "restart-services" ]; then
            add "--- Restarting Services ---"

            for SVC in control-bridge n8n vk-longpoll; do
              if systemctl is-enabled $SVC 2>/dev/null | grep -q enabled; then
                systemctl restart $SVC 2>/dev/null || true
                sleep 2
                STATUS=$(systemctl is-active $SVC 2>/dev/null)
                add "$SVC: $STATUS"
              else
                add "$SVC: not enabled, skipping"
              fi
            done
            add ""
          fi

          # --- 5. Post-fix diagnostics ---
          add "--- After Fix ---"
          add "$(free -h | head -3)"
          add "Processes: $(ps aux | wc -l)"
          ZOMBIE_AFTER=$(ps -eo stat | grep -c '^Z' || echo "0")
          add "Zombies: $ZOMBIE_AFTER"
          add "Load: $(cat /proc/loadavg)"

          # Control Bridge health
          add ""
          BRIDGE_HEALTH=$(curl -s --max-time 5 http://127.0.0.1:3000/health 2>&1 || echo "UNREACHABLE")
          add "Bridge API: $BRIDGE_HEALTH"

          printf "$MSG"

          REPAIR

          # Save output
          tee /tmp/repair_output.txt

          # Send to Telegram
          REPAIR_TEXT=$(cat /tmp/repair_output.txt)
          curl -s --max-time 15 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${REPAIR_TEXT}" > /dev/null 2>&1 || true

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
