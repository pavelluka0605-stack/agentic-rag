name: "Fix Bridge Routing (Traefik)"

on:
  push:
    branches: ["claude/*"]
    paths: [".github/workflows/fix-bridge-routing.yml", "control-bridge/app.py"]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  fix:
    name: "Fix and Retest"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy dual-token app.py, set legacy token, restart
        run: |
          SCP="scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }}"
          SSH="ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          $SCP control-bridge/app.py \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/control-bridge/app.py

          $SSH << 'FIX'
          echo "=== 1. ADD LEGACY TOKEN TO .ENV ==="
          # Add legacy token (the token that was active when the GPT was first configured)
          if grep -q BRIDGE_API_TOKEN_LEGACY /opt/control-bridge/.env; then
            echo "LEGACY_TOKEN_ALREADY_SET"
          else
            echo 'BRIDGE_API_TOKEN_LEGACY=0ORbpHTjaswJvP2J4wO9gUhSvrfl0mbK3h5BVDKSV60' >> /opt/control-bridge/.env
            chmod 600 /opt/control-bridge/.env
            echo "LEGACY_TOKEN_ADDED"
          fi
          echo "env lines: $(wc -l < /opt/control-bridge/.env)"
          echo ""

          echo "=== 2. RESTART SERVICE ==="
          systemctl restart control-bridge
          sleep 3
          systemctl is-active control-bridge && echo "SERVICE_OK" || echo "SERVICE_FAIL"
          echo ""

          echo "=== 3. VERIFY BOTH TOKENS WORK ==="
          CURRENT=$(grep '^BRIDGE_API_TOKEN=' /opt/control-bridge/.env | cut -d= -f2-)
          LEGACY=$(grep '^BRIDGE_API_TOKEN_LEGACY=' /opt/control-bridge/.env | cut -d= -f2-)
          echo "current prefix: $(echo ${CURRENT} | cut -c1-6)..."
          echo "legacy prefix: $(echo ${LEGACY} | cut -c1-6)..."

          echo ""
          echo "--- Test with CURRENT token ---"
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer ${CURRENT}" \
            -H "Content-Type: application/json" \
            -d '{"title":"Current token test","raw_user_request":"x","normalized_brief":"x"}' 2>&1
          echo ""

          echo ""
          echo "--- Test with LEGACY token ---"
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer ${LEGACY}" \
            -H "Content-Type: application/json" \
            -d '{"title":"Legacy token test","raw_user_request":"x","normalized_brief":"x"}' 2>&1
          echo ""

          echo ""
          echo "--- Test with BAD token ---"
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer WRONG_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"title":"Bad token test","raw_user_request":"x","normalized_brief":"x"}' 2>&1
          echo ""
          FIX

      - name: Run full HTTPS retest with legacy token
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'TEST' | tee /tmp/fix-output.txt
          LEGACY=$(grep '^BRIDGE_API_TOKEN_LEGACY=' /opt/control-bridge/.env | cut -d= -f2-)
          CURRENT=$(grep '^BRIDGE_API_TOKEN=' /opt/control-bridge/.env | cut -d= -f2-)

          echo "=== HTTPS TESTS WITH LEGACY TOKEN (GPT-configured) ==="
          echo "legacy prefix: $(echo ${LEGACY} | cut -c1-6)..."
          echo ""

          echo "=== health ==="
          curl -si --connect-timeout 15 https://api.marbomebel.ru/health 2>&1
          echo ""

          echo "=== createJob ==="
          CREATE=$(curl -si --connect-timeout 15 -X POST https://api.marbomebel.ru/jobs \
            -H "Authorization: Bearer ${LEGACY}" \
            -H "Content-Type: application/json" \
            -d '{"title":"Тестовая задача","raw_user_request":"Проверка моста GPT -> API","normalized_brief":"Тестовый запуск createJob"}' 2>&1)
          echo "${CREATE}"
          JOB_ID=$(echo "${CREATE}" | grep -o '"job_id":"[^"]*"' | cut -d'"' -f4)
          echo "job_id: ${JOB_ID}"
          echo ""

          if [ -n "${JOB_ID}" ]; then
            echo "=== confirmJob ==="
            curl -si --connect-timeout 15 -X POST "https://api.marbomebel.ru/jobs/${JOB_ID}/confirm" \
              -H "Authorization: Bearer ${LEGACY}" 2>&1
            echo ""

            echo "=== getJobStatus ==="
            curl -si --connect-timeout 15 "https://api.marbomebel.ru/jobs/${JOB_ID}/status" \
              -H "Authorization: Bearer ${LEGACY}" 2>&1
            echo ""

            echo "=== getJobResult ==="
            curl -si --connect-timeout 15 "https://api.marbomebel.ru/jobs/${JOB_ID}/result" \
              -H "Authorization: Bearer ${LEGACY}" 2>&1
            echo ""

            echo "=== cancelJob ==="
            C2=$(curl -s --connect-timeout 15 -X POST https://api.marbomebel.ru/jobs \
              -H "Authorization: Bearer ${LEGACY}" \
              -H "Content-Type: application/json" \
              -d '{"title":"Cancel test","raw_user_request":"x","normalized_brief":"x"}')
            CID=$(echo "${C2}" | grep -o '"job_id":"[^"]*"' | cut -d'"' -f4)
            curl -si --connect-timeout 15 -X POST "https://api.marbomebel.ru/jobs/${CID}/cancel" \
              -H "Authorization: Bearer ${LEGACY}" 2>&1
            echo ""
          else
            echo "createJob FAILED with legacy token"
          fi

          echo ""
          echo "=== CURRENT TOKEN ALSO WORKS ==="
          curl -si --connect-timeout 15 -X POST https://api.marbomebel.ru/jobs \
            -H "Authorization: Bearer ${CURRENT}" \
            -H "Content-Type: application/json" \
            -d '{"title":"Current token verify","raw_user_request":"x","normalized_brief":"x"}' 2>&1
          echo ""

          echo "=== AUTH REJECTION (bad token) ==="
          curl -si --connect-timeout 15 -X POST https://api.marbomebel.ru/jobs \
            -H "Authorization: Bearer INVALID" \
            -H "Content-Type: application/json" \
            -d '{"title":"x","raw_user_request":"x","normalized_brief":"x"}' 2>&1
          echo ""

          echo "=== TOKEN INFO ==="
          echo "current: $(echo ${CURRENT} | cut -c1-6)... (len ${#CURRENT})"
          echo "legacy:  $(echo ${LEGACY} | cut -c1-6)... (len ${#LEGACY})"
          echo "mode: dual-token"
          echo ""

          echo "=== DONE ==="
          TEST

      - name: Post results to issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, traceback
          try:
              with open("/tmp/fix-output.txt") as f:
                  content = f.read()
              body = "## Dual-Token Retest\n\nRun: ${{ github.run_id }}\n\n```\n" + content[:60000] + "\n```"
              payload = json.dumps({"title": "Dual-Token Retest ${{ github.run_id }}", "body": body}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/repos/${{ github.repository }}/issues",
                  data=payload,
                  headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"], "Accept": "application/vnd.github+json", "Content-Type": "application/json"},
                  method="POST")
              resp = urllib.request.urlopen(req)
              data = json.loads(resp.read())
              print(f"Issue #{data['number']} created: {data['html_url']}")
          except Exception as e:
              traceback.print_exc()
              with open("/tmp/fix-output.txt") as f:
                  print(f.read())
          PYEOF
