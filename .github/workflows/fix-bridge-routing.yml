name: "Fix Bridge Routing (Traefik)"

on:
  push:
    branches: ["claude/*"]
    paths: [".github/workflows/fix-bridge-routing.yml"]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  fix:
    name: "Enable Capture Mode"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy and enable persistent debug+capture
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} \
            control-bridge/app.py \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/control-bridge/app.py

          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENABLE'
          rm -f /opt/control-bridge/.captured-token

          # Enable debug + capture
          sed -i 's/^BRIDGE_DEBUG_ACCEPT_ANY=.*/BRIDGE_DEBUG_ACCEPT_ANY=1/' /opt/control-bridge/.env
          grep -q BRIDGE_CAPTURE_TOKEN_FILE /opt/control-bridge/.env && \
            sed -i 's|^BRIDGE_CAPTURE_TOKEN_FILE=.*|BRIDGE_CAPTURE_TOKEN_FILE=/opt/control-bridge/.captured-token|' /opt/control-bridge/.env || \
            echo 'BRIDGE_CAPTURE_TOKEN_FILE=/opt/control-bridge/.captured-token' >> /opt/control-bridge/.env

          systemctl restart control-bridge
          sleep 3
          systemctl is-active control-bridge && echo "DEBUG+CAPTURE ON — waiting for GPT call" || echo "FAIL"
          echo ""
          echo "NO sanity test — preserving one-shot capture for GPT"
          echo "Capture file exists: $(test -f /opt/control-bridge/.captured-token && echo YES || echo NO)"
          ENABLE
