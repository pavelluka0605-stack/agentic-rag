name: "Fix Bridge Routing (Traefik)"

on:
  push:
    branches: ["claude/*"]
    paths: [".github/workflows/fix-bridge-routing.yml", "control-bridge/app.py"]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  fix:
    name: "Deploy Executor Bridge"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy app.py with executor, configure, verify
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} \
            control-bridge/app.py \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/control-bridge/app.py

          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'bash -l -c '\''
          export PATH="/usr/bin:/bin:/usr/local/bin:$PATH"

          echo "=== 1. ADD CONTROL_API_TOKEN TO .ENV ==="
          CTRL_TOKEN=$(grep "^CONTROL_API_TOKEN=" /opt/claude-code/env/control-api.env 2>/dev/null | cut -d= -f2- || echo "")
          if [ -z "$CTRL_TOKEN" ]; then
            echo "WARNING: CONTROL_API_TOKEN not found in control-api.env"
            CTRL_TOKEN="not-configured"
          fi
          if ! grep -q "^CONTROL_API_TOKEN=" /opt/control-bridge/.env; then
            echo "CONTROL_API_TOKEN=${CTRL_TOKEN}" >> /opt/control-bridge/.env
            echo "Added CONTROL_API_TOKEN"
          else
            sed -i "s|^CONTROL_API_TOKEN=.*|CONTROL_API_TOKEN=${CTRL_TOKEN}|" /opt/control-bridge/.env
            echo "Updated CONTROL_API_TOKEN"
          fi
          chmod 600 /opt/control-bridge/.env
          echo ""

          echo "=== 2. RESTART ==="
          systemctl restart control-bridge
          sleep 3
          systemctl is-active control-bridge && echo "SERVICE_OK" || (journalctl -u control-bridge -n 20 --no-pager && exit 1)
          echo ""

          echo "=== 3. CHECK CONTROL API IS RUNNING ==="
          curl -s http://127.0.0.1:3901/health 2>&1 || echo "CONTROL_API_NOT_RUNNING"
          echo ""

          echo "=== 4. TEST createJob WITH DISPATCH ==="
          BRIDGE_TOKEN=$(grep "^BRIDGE_API_TOKEN=" /opt/control-bridge/.env | cut -d= -f2-)
          CREATE=$(curl -s -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer ${BRIDGE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"Executor test\",\"raw_user_request\":\"Тестовая задача для проверки пайплайна GPT -> Claude Code\",\"normalized_brief\":\"Test\"}")
          echo "createJob: ${CREATE}"
          JOB_ID=$(echo "${CREATE}" | grep -o "\"job_id\":\"[^\"]*\"" | cut -d"\"" -f4)
          echo ""

          echo "=== 5. WAIT FOR DISPATCH ==="
          sleep 15
          echo ""

          echo "=== 6. CHECK JOB STATUS ==="
          curl -s "http://127.0.0.1:3000/jobs/${JOB_ID}/status" \
            -H "Authorization: Bearer ${BRIDGE_TOKEN}" 2>&1
          echo ""

          echo "=== 7. CHECK CONTROL API TASKS ==="
          curl -s "http://127.0.0.1:3901/api/tasks?limit=3" \
            -H "Authorization: Bearer ${CTRL_TOKEN}" 2>&1
          echo ""

          echo "=== 8. CHECK TASK FILES ==="
          ls -la /opt/claude-code/workspace/task-*.md 2>/dev/null | tail -5 || echo "No task files yet"
          echo ""

          echo "=== 9. BRIDGE LOGS ==="
          journalctl -u control-bridge -n 30 --no-pager 2>&1 | grep -i "dispatch\|error\|task\|control" | tail -15
          echo ""

          echo "=== DONE ==="
          '\''' | tee /tmp/fix-output.txt

      - name: Post results
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, traceback
          try:
              with open("/tmp/fix-output.txt") as f:
                  content = f.read()
              body = "## Executor Bridge Deploy\n\n```\n" + content[:60000] + "\n```"
              payload = json.dumps({"title": "Executor Deploy ${{ github.run_id }}", "body": body}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/repos/${{ github.repository }}/issues",
                  data=payload,
                  headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"], "Accept": "application/vnd.github+json", "Content-Type": "application/json"},
                  method="POST")
              resp = urllib.request.urlopen(req)
              data = json.loads(resp.read())
              print(f"Issue #{data['number']}: {data['html_url']}")
          except Exception as e:
              traceback.print_exc()
              with open("/tmp/fix-output.txt") as f:
                  print(f.read())
          PYEOF
