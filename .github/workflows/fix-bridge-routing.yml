name: "Fix Bridge Routing (Traefik)"

on:
  push:
    branches: ["claude/*"]
    paths: [".github/workflows/fix-bridge-routing.yml"]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  fix:
    name: "Fix and Retest"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy fix (bind 0.0.0.0, Traefik config, restart)
        run: |
          SCP="scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }}"
          SSH="ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          # Copy updated service file and Traefik config
          $SCP control-bridge/control-bridge.service \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/control-bridge.service
          $SCP control-bridge/traefik-api-bridge.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/traefik-api-bridge.yml

          $SSH << 'FIX'
          echo "=== 1. UPDATE SYSTEMD SERVICE (bind 0.0.0.0) ==="
          cp /tmp/control-bridge.service /etc/systemd/system/control-bridge.service
          systemctl daemon-reload
          systemctl restart control-bridge
          sleep 3
          systemctl is-active control-bridge && echo "SERVICE_OK" || echo "SERVICE_FAIL"
          echo ""

          echo "=== 2. DEPLOY TRAEFIK CONFIG ==="
          for d in /opt/n8n-traefik/dynamic /opt/traefik/dynamic; do
            [ -d "$d" ] && TRAEFIK_DYN="$d" && break
          done
          cp /tmp/traefik-api-bridge.yml "$TRAEFIK_DYN/api-bridge.yml"
          echo "Config: $TRAEFIK_DYN/api-bridge.yml"
          rm -f /etc/nginx/sites-enabled/api-marbomebel 2>/dev/null || true
          echo ""

          echo "=== 3. VERIFY UVICORN BINDS 0.0.0.0 ==="
          ss -tlnp | grep 3000
          echo ""

          echo "=== 4. TEST DOCKER BRIDGE ACCESS ==="
          curl -si --connect-timeout 5 http://172.17.0.1:3000/health 2>&1
          echo ""

          echo "=== 5. WAIT FOR TRAEFIK TLS ==="
          echo "Waiting 30s for Traefik to reload and provision cert..."
          sleep 30
          TRAEFIK_CONTAINER=$(docker ps --filter "name=traefik" -q | head -1)
          docker logs --tail 20 "${TRAEFIK_CONTAINER}" 2>&1 | grep -i "api.marbomebel\|cert\|tls\|acme\|error" || echo "no relevant logs"
          FIX

      - name: Wait for TLS
        run: sleep 30

      - name: Run full HTTPS retest
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'TEST' | tee /tmp/fix-output.txt
          TOKEN=$(grep BRIDGE_API_TOKEN /opt/control-bridge/.env | cut -d= -f2-)

          echo "=== HTTPS HEALTH ==="
          curl -si --connect-timeout 15 https://api.marbomebel.ru/health 2>&1
          echo ""

          echo "=== HTTPS createJob ==="
          CREATE_RESP=$(curl -si --connect-timeout 15 -X POST https://api.marbomebel.ru/jobs \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"title":"Тестовая задача","raw_user_request":"Проверка моста GPT -> API","normalized_brief":"Тестовый запуск createJob"}' 2>&1)
          echo "${CREATE_RESP}"
          JOB_ID=$(echo "${CREATE_RESP}" | grep -o '"job_id":"[^"]*"' | cut -d'"' -f4)
          echo "job_id: ${JOB_ID}"
          echo ""

          if [ -n "${JOB_ID}" ]; then
            echo "=== HTTPS confirmJob ==="
            curl -si --connect-timeout 15 -X POST "https://api.marbomebel.ru/jobs/${JOB_ID}/confirm" \
              -H "Authorization: Bearer ${TOKEN}" 2>&1
            echo ""

            echo "=== HTTPS getJobStatus ==="
            curl -si --connect-timeout 15 "https://api.marbomebel.ru/jobs/${JOB_ID}/status" \
              -H "Authorization: Bearer ${TOKEN}" 2>&1
            echo ""

            echo "=== HTTPS getJobResult ==="
            curl -si --connect-timeout 15 "https://api.marbomebel.ru/jobs/${JOB_ID}/result" \
              -H "Authorization: Bearer ${TOKEN}" 2>&1
            echo ""

            echo "=== HTTPS cancelJob (new job) ==="
            C2=$(curl -s --connect-timeout 15 -X POST https://api.marbomebel.ru/jobs \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"title":"Cancel test","raw_user_request":"x","normalized_brief":"x"}')
            CID=$(echo "${C2}" | grep -o '"job_id":"[^"]*"' | cut -d'"' -f4)
            curl -si --connect-timeout 15 -X POST "https://api.marbomebel.ru/jobs/${CID}/cancel" \
              -H "Authorization: Bearer ${TOKEN}" 2>&1
            echo ""
          else
            echo "createJob FAILED — no job_id"
            echo "Traefik logs:"
            TRAEFIK_CONTAINER=$(docker ps --filter "name=traefik" -q | head -1)
            docker logs --tail 30 "${TRAEFIK_CONTAINER}" 2>&1 | tail -20
            echo ""
            echo "Docker bridge test:"
            curl -si --connect-timeout 5 http://172.17.0.1:3000/health 2>&1
          fi

          echo ""
          echo "=== AUTH REJECTION ==="
          curl -si --connect-timeout 15 -X POST https://api.marbomebel.ru/jobs \
            -H "Content-Type: application/json" \
            -d '{"title":"no auth","raw_user_request":"x","normalized_brief":""}' 2>&1
          echo ""

          echo "=== TOKEN INFO ==="
          echo "prefix: $(echo ${TOKEN} | cut -c1-6)..."
          echo "length: ${#TOKEN}"

          echo ""
          echo "=== DONE ==="
          TEST

      - name: Post results to issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, traceback
          try:
              with open("/tmp/fix-output.txt") as f:
                  content = f.read()
              body = "## Bridge Fix Retest\n\nRun: ${{ github.run_id }}\n\n```\n" + content[:60000] + "\n```"
              payload = json.dumps({"title": "Bridge Retest ${{ github.run_id }}", "body": body}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/repos/${{ github.repository }}/issues",
                  data=payload,
                  headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"], "Accept": "application/vnd.github+json", "Content-Type": "application/json"},
                  method="POST")
              resp = urllib.request.urlopen(req)
              data = json.loads(resp.read())
              print(f"Issue #{data['number']} created: {data['html_url']}")
          except Exception as e:
              traceback.print_exc()
              with open("/tmp/fix-output.txt") as f:
                  print(f.read())
          PYEOF
