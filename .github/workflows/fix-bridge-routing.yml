name: "Fix Bridge Routing (Traefik)"

on:
  push:
    branches: ["claude/*"]
    paths: [".github/workflows/fix-bridge-routing.yml", "control-bridge/app.py"]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  fix:
    name: "Clean Token Reset + Deploy"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy clean app.py, reset token, verify
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} \
            control-bridge/app.py \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/control-bridge/app.py

          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'bash -l -c '\''
          export PATH="/usr/bin:/bin:/usr/local/bin:$PATH"

          echo "=== 1. REPLACE .ENV WITH CLEAN TOKEN ONLY ==="
          cat > /opt/control-bridge/.env << ENVEOF
          BRIDGE_API_TOKEN=46924d4253c3dc5dc6474779fdbb595e3f83c29a
          ENVEOF
          # Remove leading whitespace from heredoc
          sed -i "s/^[[:space:]]*//" /opt/control-bridge/.env
          chmod 600 /opt/control-bridge/.env
          echo ".env reset to single clean token"
          wc -l /opt/control-bridge/.env
          echo ""

          echo "=== 2. CLEANUP ==="
          rm -f /opt/control-bridge/.captured-token
          echo "Removed capture artifacts"
          echo ""

          echo "=== 3. RESTART ==="
          systemctl restart control-bridge
          sleep 3
          systemctl is-active control-bridge && echo "SERVICE_OK" || (echo "SERVICE_FAIL" && journalctl -u control-bridge -n 20 --no-pager && exit 1)
          echo ""

          echo "=== 4. VERIFY: clean token accepted ==="
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer 46924d4253c3dc5dc6474779fdbb595e3f83c29a" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"clean token test\",\"raw_user_request\":\"x\",\"normalized_brief\":\"x\"}" 2>&1 | head -4
          echo ""

          echo "=== 5. VERIFY: invalid token rejected ==="
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer INVALID_GARBAGE" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"x\",\"raw_user_request\":\"x\",\"normalized_brief\":\"x\"}" 2>&1 | head -4
          echo ""

          echo "=== 6. VERIFY: old tokens rejected ==="
          curl -s -o /dev/null -w "old_legacy: HTTP %{http_code}\n" -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer 0ORbpHTjaswJvP2J4wO9gUhSvrfl0mbK3h5BVDKSV60" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"x\",\"raw_user_request\":\"x\",\"normalized_brief\":\"x\"}"
          echo ""

          echo "=== 7. HTTPS FULL CYCLE ==="
          TOKEN="46924d4253c3dc5dc6474779fdbb595e3f83c29a"

          echo "-- createJob --"
          CREATE=$(curl -s --connect-timeout 10 -X POST https://api.marbomebel.ru/jobs \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"Clean token HTTPS test\",\"raw_user_request\":\"Verify\",\"normalized_brief\":\"Test\"}")
          echo "${CREATE}"
          JOB_ID=$(echo "${CREATE}" | grep -o "\"job_id\":\"[^\"]*\"" | cut -d"\"" -f4)
          echo ""

          if [ -n "${JOB_ID}" ]; then
            echo "-- confirmJob --"
            curl -s --connect-timeout 10 -X POST "https://api.marbomebel.ru/jobs/${JOB_ID}/confirm" -H "Authorization: Bearer ${TOKEN}"
            echo ""

            echo "-- getJobStatus --"
            curl -s --connect-timeout 10 "https://api.marbomebel.ru/jobs/${JOB_ID}/status" -H "Authorization: Bearer ${TOKEN}"
            echo ""

            echo "-- getJobResult --"
            curl -s --connect-timeout 10 "https://api.marbomebel.ru/jobs/${JOB_ID}/result" -H "Authorization: Bearer ${TOKEN}"
            echo ""

            echo "-- cancelJob --"
            C2=$(curl -s --connect-timeout 10 -X POST https://api.marbomebel.ru/jobs \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"cancel\",\"raw_user_request\":\"x\",\"normalized_brief\":\"x\"}")
            CID=$(echo "${C2}" | grep -o "\"job_id\":\"[^\"]*\"" | cut -d"\"" -f4)
            curl -s --connect-timeout 10 -X POST "https://api.marbomebel.ru/jobs/${CID}/cancel" -H "Authorization: Bearer ${TOKEN}"
            echo ""

            echo ""
            echo "-- SQLite persistence --"
            echo "Job ${JOB_ID}: $(sqlite3 /opt/control-bridge/jobs.db "SELECT status FROM jobs WHERE job_id='"'"'${JOB_ID}'"'"'" 2>/dev/null)"
            echo "Total jobs: $(sqlite3 /opt/control-bridge/jobs.db "SELECT COUNT(*) FROM jobs" 2>/dev/null)"
          fi
          echo ""

          echo "=== 8. FINAL ENV ==="
          cat /opt/control-bridge/.env | sed "s/=.\{6\}/=XXXXXX/"
          echo ""
          echo "=== DONE ==="
          '\''' | tee /tmp/fix-output.txt

      - name: Post results
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, traceback
          try:
              with open("/tmp/fix-output.txt") as f:
                  content = f.read()
              body = "## Clean Token Reset\n\n```\n" + content[:60000] + "\n```"
              payload = json.dumps({"title": "Clean Token Reset ${{ github.run_id }}", "body": body}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/repos/${{ github.repository }}/issues",
                  data=payload,
                  headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"], "Accept": "application/vnd.github+json", "Content-Type": "application/json"},
                  method="POST")
              resp = urllib.request.urlopen(req)
              data = json.loads(resp.read())
              print(f"Issue #{data['number']}: {data['html_url']}")
          except Exception as e:
              traceback.print_exc()
              with open("/tmp/fix-output.txt") as f:
                  print(f.read())
          PYEOF
