name: "Fix Bridge Routing (Traefik)"

on:
  push:
    branches: ["claude/*"]
    paths: [".github/workflows/fix-bridge-routing.yml"]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  fix:
    name: "Enable Debug Auth"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Enable debug mode and deploy latest app.py
        run: |
          SCP="scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }}"
          SSH="ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          $SCP control-bridge/app.py \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/control-bridge/app.py

          $SSH << 'ENABLE'
          # Enable debug mode
          if grep -q BRIDGE_DEBUG_ACCEPT_ANY /opt/control-bridge/.env; then
            sed -i 's/^BRIDGE_DEBUG_ACCEPT_ANY=.*/BRIDGE_DEBUG_ACCEPT_ANY=1/' /opt/control-bridge/.env
          else
            echo 'BRIDGE_DEBUG_ACCEPT_ANY=1' >> /opt/control-bridge/.env
          fi

          systemctl restart control-bridge
          sleep 3
          systemctl is-active control-bridge && echo "SERVICE_OK — DEBUG MODE ON" || echo "SERVICE_FAIL"

          echo ""
          echo "Verify debug accepts any token:"
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer ANY_TOKEN_WORKS_NOW" \
            -H "Content-Type: application/json" \
            -d '{"title":"debug verify","raw_user_request":"x","normalized_brief":"x"}' 2>&1 | head -5
          echo ""

          echo "Verify via HTTPS too:"
          curl -si --connect-timeout 10 -X POST https://api.marbomebel.ru/jobs \
            -H "Authorization: Bearer ANY_TOKEN_WORKS_NOW" \
            -H "Content-Type: application/json" \
            -d '{"title":"HTTPS debug verify","raw_user_request":"x","normalized_brief":"x"}' 2>&1 | head -5
          echo ""

          echo "DEBUG MODE IS NOW LIVE. Test from GPT, then run the capture workflow."
          ENABLE

      - name: Post confirmation
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request
          try:
              body = "## Debug Mode Enabled\n\nRun: ${{ github.run_id }}\n\n**Debug auth is now LIVE on api.marbomebel.ru.** Any Bearer token will be accepted.\n\nPlease trigger the custom GPT to call createJob now.\n\nThen run the 'Capture GPT Token' workflow to see the token prefix and disable debug."
              payload = json.dumps({"title": "DEBUG MODE ON — test GPT now", "body": body}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/repos/${{ github.repository }}/issues",
                  data=payload,
                  headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"], "Accept": "application/vnd.github+json", "Content-Type": "application/json"},
                  method="POST")
              resp = urllib.request.urlopen(req)
              data = json.loads(resp.read())
              print(f"Issue #{data['number']}: {data['html_url']}")
          except Exception as e:
              print(f"Issue creation failed: {e}")
          PYEOF
