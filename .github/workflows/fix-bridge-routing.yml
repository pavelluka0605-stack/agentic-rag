name: "Fix Bridge Routing (Traefik)"

on:
  push:
    branches: ["claude/*"]
    paths: [".github/workflows/fix-bridge-routing.yml", "control-bridge/app.py"]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  fix:
    name: "Fix and Retest"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy debug app.py and enable BRIDGE_DEBUG_ACCEPT_ANY
        run: |
          SCP="scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }}"
          SSH="ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          $SCP control-bridge/app.py \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/control-bridge/app.py

          $SSH << 'FIX'
          # Add debug flag to .env (temporary)
          if grep -q BRIDGE_DEBUG_ACCEPT_ANY /opt/control-bridge/.env; then
            sed -i 's/^BRIDGE_DEBUG_ACCEPT_ANY=.*/BRIDGE_DEBUG_ACCEPT_ANY=1/' /opt/control-bridge/.env
          else
            echo 'BRIDGE_DEBUG_ACCEPT_ANY=1' >> /opt/control-bridge/.env
          fi
          echo ".env contents (redacted tokens):"
          grep -v "TOKEN" /opt/control-bridge/.env; grep "TOKEN" /opt/control-bridge/.env | sed 's/=.*/=***/'
          echo ""

          systemctl restart control-bridge
          sleep 3
          systemctl is-active control-bridge && echo "SERVICE_OK" || echo "SERVICE_FAIL"

          echo ""
          echo "Quick sanity with a random bearer:"
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer TOTALLY_RANDOM_TEST" \
            -H "Content-Type: application/json" \
            -d '{"title":"debug test","raw_user_request":"x","normalized_brief":"x"}' 2>&1
          echo ""

          echo "Check log for debug prefix:"
          sleep 1
          journalctl -u control-bridge -n 10 --no-pager 2>&1 | grep -i "AUTH_DEBUG" || echo "no debug lines yet"
          FIX

      - name: Wait 90s for user to test from GPT
        run: |
          echo "DEBUG MODE IS LIVE. Any Bearer token will be accepted on all endpoints."
          echo "Waiting 90 seconds to allow the GPT to make a request..."
          echo "The token prefix will be captured in journalctl."
          sleep 90

      - name: Capture GPT token prefix from logs, then disable debug
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'CAPTURE' | tee /tmp/fix-output.txt
          echo "=== CAPTURED AUTH_DEBUG ENTRIES ==="
          journalctl -u control-bridge --no-pager 2>&1 | grep "AUTH_DEBUG" | tail -20
          echo ""

          echo "=== ALL RECENT REQUESTS ==="
          journalctl -u control-bridge -n 40 --no-pager 2>&1 | grep -E "POST|GET|AUTH" | tail -20
          echo ""

          echo "=== DISABLE DEBUG MODE ==="
          sed -i 's/^BRIDGE_DEBUG_ACCEPT_ANY=.*/BRIDGE_DEBUG_ACCEPT_ANY=0/' /opt/control-bridge/.env
          systemctl restart control-bridge
          sleep 3
          systemctl is-active control-bridge && echo "SERVICE_OK (debug disabled)" || echo "SERVICE_FAIL"
          echo ""

          echo "=== VERIFY DEBUG IS OFF (random token should now fail) ==="
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer SHOULD_NOW_FAIL" \
            -H "Content-Type: application/json" \
            -d '{"title":"x","raw_user_request":"x","normalized_brief":"x"}' 2>&1
          echo ""

          echo "=== CURRENT .ENV FLAGS ==="
          grep -v "TOKEN=" /opt/control-bridge/.env
          grep "TOKEN" /opt/control-bridge/.env | sed 's/=.*/=***/'
          echo ""

          echo "=== DONE ==="
          CAPTURE

      - name: Post results to issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, traceback
          try:
              with open("/tmp/fix-output.txt") as f:
                  content = f.read()
              body = "## Debug Auth Capture\n\nRun: ${{ github.run_id }}\n\n```\n" + content[:60000] + "\n```"
              payload = json.dumps({"title": "Auth Debug Capture ${{ github.run_id }}", "body": body}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/repos/${{ github.repository }}/issues",
                  data=payload,
                  headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"], "Accept": "application/vnd.github+json", "Content-Type": "application/json"},
                  method="POST")
              resp = urllib.request.urlopen(req)
              data = json.loads(resp.read())
              print(f"Issue #{data['number']} created: {data['html_url']}")
          except Exception as e:
              traceback.print_exc()
              with open("/tmp/fix-output.txt") as f:
                  print(f.read())
          PYEOF
