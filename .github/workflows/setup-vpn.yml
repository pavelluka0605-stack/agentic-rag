name: "Setup VPN (3X-UI + VLESS Reality)"

on:
  push:
    branches: ["main", "claude/*", "claude/**"]
    paths: [".github/workflows/setup-vpn.yml"]
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "install"
        type: choice
        options:
          - install
          - status

permissions:
  contents: write

concurrency:
  group: vpn-setup
  cancel-in-progress: false

jobs:
  vpn-setup:
    name: "VPN Setup on VPS"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install and configure VPN
        id: vpn
        env:
          SSH_CMD: ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
        run: |
          set +e
          $SSH_CMD 'bash -s' << 'REMOTE' > /tmp/vpn-output.txt 2>&1
          #!/bin/bash
          set -eo pipefail
          export DEBIAN_FRONTEND=noninteractive

          SERVER_IP=$(curl -s4 ifconfig.me 2>/dev/null || hostname -I | awk '{print $1}')
          echo "SERVER_IP=$SERVER_IP"
          echo "DATE=$(date -u)"

          # === Check if 3X-UI already installed ===
          if systemctl is-active --quiet x-ui 2>/dev/null; then
              echo "STATUS=ALREADY_INSTALLED"
              x-ui settings 2>&1 || true
              echo "---PORTS---"
              ss -tlnp | grep -E '(2053|8443|x-ui|xray)' || true
              echo "PANEL=http://$SERVER_IP:2053"
              exit 0
          fi

          echo "STATUS=INSTALLING"

          # === Prerequisites ===
          apt-get update -qq
          apt-get install -y -qq curl wget jq > /dev/null 2>&1

          # === Enable BBR ===
          if ! sysctl net.ipv4.tcp_congestion_control 2>/dev/null | grep -q bbr; then
              cat >> /etc/sysctl.conf << 'SYSCTL'
          net.core.default_qdisc=fq
          net.ipv4.tcp_congestion_control=bbr
          SYSCTL
              sysctl -p > /dev/null 2>&1
              echo "BBR=ENABLED"
          else
              echo "BBR=ALREADY_ACTIVE"
          fi

          # === Install 3X-UI ===
          echo "INSTALL=STARTING"
          # Use the official install script with auto-yes
          bash <(curl -Ls https://raw.githubusercontent.com/mhsanaei/3x-ui/master/install.sh) << 'ANSWERS'
          y
          ANSWERS

          sleep 3

          if systemctl is-active --quiet x-ui; then
              echo "INSTALL=SUCCESS"
          else
              echo "INSTALL=FAILED"
              systemctl status x-ui --no-pager 2>&1 || true
              journalctl -u x-ui -n 30 --no-pager 2>&1 || true
              exit 1
          fi

          # === Open firewall for panel (2053) and VLESS (8443) ===
          iptables -I INPUT -p tcp --dport 2053 -j ACCEPT 2>/dev/null || true
          iptables -I INPUT -p tcp --dport 8443 -j ACCEPT 2>/dev/null || true
          echo "FIREWALL=OPENED"

          # === Get panel info ===
          echo "---PANEL_INFO---"
          x-ui settings 2>&1 || true
          echo "---END_PANEL_INFO---"
          echo "PANEL=http://$SERVER_IP:2053"
          echo "DONE=OK"
          REMOTE

          EXIT_CODE=$?
          echo "--- VPN OUTPUT ---"
          cat /tmp/vpn-output.txt
          echo "--- EXIT: $EXIT_CODE ---"

      - name: Commit result
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          output = ""
          try:
              with open('/tmp/vpn-output.txt', 'r', errors='replace') as f:
                  output = f.read().strip()
          except:
              output = "No output"
          result = {
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "intent": "VPN 3X-UI setup",
              "output": output[:50000]
          }
          os.makedirs('.claude/commands', exist_ok=True)
          with open('.claude/commands/vpn-result.json', 'w') as f:
              json.dump(result, f, indent=2, ensure_ascii=False)
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude/commands/vpn-result.json
          git commit -m "vpn-result: 3X-UI setup [skip ci]" || true

          for i in 1 2 3 4; do
            git pull --rebase origin ${{ github.ref_name }} 2>/dev/null || true
            git push origin HEAD:${{ github.ref_name }} && break || sleep $((i * 2))
          done

      - name: Send result to Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          OUTPUT=$(cat /tmp/vpn-output.txt 2>/dev/null | tail -40 || echo "no output")
          MSG="🔐 VPN Setup: ${{ job.status }}

          ${OUTPUT}"
          # Truncate to 4000 chars for Telegram
          MSG="${MSG:0:4000}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}" > /dev/null 2>&1 || true
