name: Fetch Site Content

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch'
        required: true
        default: 'https://mebelit.site/'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch main page
        run: |
          mkdir -p site-dump

          # Fetch main page
          curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            "${{ github.event.inputs.url }}" -o site-dump/index.html

          echo "=== Main page size ==="
          wc -c site-dump/index.html

          # Try to find links to subpages
          grep -oP 'href="[^"]*"' site-dump/index.html | head -50 || true

      - name: Fetch subpages
        run: |
          BASE="${{ github.event.inputs.url }}"
          BASE="${BASE%/}"

          # Common Tilda/kitchen site paths
          PAGES=(
            "/pryamye-kuhni"
            "/uglovye-kuhni"
            "/p-obraznye-kuhni"
            "/privacy-policy"
            "/politika-konfidencialnosti"
            "/straight-kitchens"
            "/corner-kitchens"
            "/u-shaped-kitchens"
            "/catalog"
            "/about"
            "/contacts"
            "/quiz"
          )

          for page in "${PAGES[@]}"; do
            echo "=== Fetching ${BASE}${page} ==="
            HTTP_CODE=$(curl -sL -o "site-dump/$(echo $page | tr '/' '_').html" -w "%{http_code}" \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "${BASE}${page}" 2>/dev/null)
            echo "Status: $HTTP_CODE"
          done

          # Also try to extract links from main page and fetch them
          grep -oP 'href="/[^"]*"' site-dump/index.html 2>/dev/null | \
            sed 's/href="//;s/"//' | sort -u | head -20 | while read link; do
            if [[ "$link" != "#"* && "$link" != "http"* && "$link" != "javascript"* ]]; then
              FILENAME=$(echo "$link" | tr '/' '_')
              echo "=== Fetching discovered: ${BASE}${link} ==="
              curl -sL -o "site-dump/discovered${FILENAME}.html" \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                "${BASE}${link}" 2>/dev/null
            fi
          done

          echo "=== All fetched files ==="
          ls -la site-dump/

      - name: Extract text content
        run: |
          # Install html2text
          pip install html2text >/dev/null 2>&1

          mkdir -p site-text

          for f in site-dump/*.html; do
            BASENAME=$(basename "$f" .html)
            SIZE=$(wc -c < "$f")
            if [ "$SIZE" -gt 100 ]; then
              echo "=== Converting $BASENAME (${SIZE} bytes) ==="
              python3 -c "
          import html2text
          h = html2text.HTML2Text()
          h.ignore_links = False
          h.ignore_images = False
          h.body_width = 0
          with open('$f', 'r', errors='ignore') as fh:
              content = fh.read()
          text = h.handle(content)
          with open('site-text/${BASENAME}.md', 'w') as out:
              out.write(text)
          print(f'Converted: {len(text)} chars')
          " 2>/dev/null || echo "Failed to convert $BASENAME"
            else
              echo "Skipping $BASENAME (too small: ${SIZE} bytes)"
            fi
          done

          echo "=== Text files ==="
          ls -la site-text/

      - name: Upload HTML dump
        uses: actions/upload-artifact@v4
        with:
          name: site-html-dump
          path: site-dump/

      - name: Upload text content
        uses: actions/upload-artifact@v4
        with:
          name: site-text-content
          path: site-text/

      - name: Print text content
        run: |
          echo "============================================"
          echo "=== FULL TEXT CONTENT OF ALL PAGES ==="
          echo "============================================"
          for f in site-text/*.md; do
            echo ""
            echo "########################################"
            echo "### FILE: $(basename $f)"
            echo "########################################"
            cat "$f"
            echo ""
          done
