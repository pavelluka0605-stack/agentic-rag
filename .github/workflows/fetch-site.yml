name: Fetch Site Content

on:
  push:
    branches:
      - claude/continue-work-lzjg4
    paths:
      - '.github/workflows/fetch-site.yml'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all pages
        run: |
          mkdir -p site-analysis
          URL="https://mebelit.site"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

          echo "=== Fetching main page ==="
          curl -sL -A "$UA" "${URL}/" -o site-analysis/index.html
          echo "Main page: $(wc -c < site-analysis/index.html) bytes"

          echo "=== All links on main page ==="
          grep -oP 'href="([^"]*)"' site-analysis/index.html | sed 's/href="//;s/"//' | sort -u | tee /tmp/all-links.txt

          echo "=== Fetching internal pages ==="
          while read link; do
            if [[ "$link" == "/"* && "$link" != "/#"* && ${#link} -gt 1 ]]; then
              FILENAME=$(echo "$link" | sed 's|^/||;s|/|_|g;s|\.html$||')
              echo "Fetching: ${URL}${link} -> ${FILENAME}.html"
              curl -sL -A "$UA" "${URL}${link}" -o "site-analysis/${FILENAME}.html" 2>/dev/null
              echo "  Size: $(wc -c < "site-analysis/${FILENAME}.html") bytes"
            fi
          done < /tmp/all-links.txt

          for page in pryamye-kuhni uglovye-kuhni p-obraznye-kuhni privacy-policy politika-konfidencialnosti; do
            if [ ! -f "site-analysis/${page}.html" ]; then
              echo "Trying: ${URL}/${page}"
              curl -sL -o "site-analysis/${page}.html" -A "$UA" "${URL}/${page}" 2>/dev/null
              SIZE=$(wc -c < "site-analysis/${page}.html")
              echo "  Size: ${SIZE} bytes"
              [ "$SIZE" -lt 500 ] && rm -f "site-analysis/${page}.html"
            fi
          done

          echo "=== Files collected ==="
          ls -lah site-analysis/

      - name: Convert to text
        run: |
          pip install html2text -q
          python3 << 'SCRIPT'
          import html2text, os, glob

          h = html2text.HTML2Text()
          h.ignore_links = False
          h.ignore_images = False
          h.body_width = 0

          for f in sorted(glob.glob("site-analysis/*.html")):
              size = os.path.getsize(f)
              if size > 500:
                  basename = os.path.splitext(os.path.basename(f))[0]
                  with open(f, "r", errors="ignore") as fh:
                      content = fh.read()
                  text = h.handle(content)
                  outpath = f"site-analysis/{basename}.md"
                  with open(outpath, "w") as out:
                      out.write(text)
                  print(f"Converted {basename}: {len(text)} chars")
              else:
                  print(f"Skipped {f}: too small ({size} bytes)")
          SCRIPT

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site-analysis/ -f
          git diff --cached --stat
          git commit -m "chore: mebelit.site content dump for analysis" || echo "Nothing to commit"
          git push || echo "Push failed"

      - name: Print content
        if: always()
        run: |
          for f in site-analysis/*.md; do
            [ -f "$f" ] || continue
            echo ""
            echo "======== $(basename $f) ========"
            cat "$f"
            echo ""
          done
