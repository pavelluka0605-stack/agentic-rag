name: "Test VK Pipeline"

on:
  workflow_dispatch:

jobs:
  test:
    name: "Send test event & check"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run full test
        env:
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          MSG=""
          add() { MSG="${MSG}${1}
          "; }

          # 1. Send test event
          add "=== STEP 1: Send test photo_comment_new ==="
          TIMESTAMP=$(date +%s)
          HTTP_CODE=$(curl -s -o /tmp/webhook_resp.txt -w "%{http_code}" --max-time 15 \
            -X POST "${N8N_BASE_URL}/webhook/vk-events" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"photo_comment_new\",
              \"group_id\": 137949809,
              \"event_id\": \"test-${TIMESTAMP}\",
              \"received_at\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\",
              \"comment\": {
                \"id\": ${TIMESTAMP},
                \"from_id\": 123456789,
                \"post_id\": 99999,
                \"text\": \"TEST M 2 - autotest pipeline\",
                \"date\": ${TIMESTAMP},
                \"owner_id\": -137949809
              }
            }")
          RESP=$(cat /tmp/webhook_resp.txt 2>/dev/null)
          add "Webhook response: HTTP ${HTTP_CODE} — ${RESP}"

          # 2. Wait for processing
          add ""
          add "=== STEP 2: Wait 15s for N8N processing ==="
          sleep 15

          # 3. Check latest execution detail
          add ""
          add "=== STEP 3: Latest execution detail ==="
          # Get latest execution ID
          LATEST=$(curl -s --max-time 10 \
            -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            "${N8N_BASE_URL}/api/v1/executions?limit=3" 2>&1)

          EXEC_IDS=$(echo "$LATEST" | python3 -c "
          import sys,json
          d = json.load(sys.stdin)
          for e in d.get('data',[])[:3]:
              print(e['id'])
          " 2>/dev/null)

          for EXEC_ID in $EXEC_IDS; do
            add "--- Execution $EXEC_ID ---"
            DETAIL=$(curl -s --max-time 10 \
              -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
              "${N8N_BASE_URL}/api/v1/executions/${EXEC_ID}?includeData=true" 2>&1)

            DETAIL_INFO=$(echo "$DETAIL" | python3 -c "
          import sys,json
          try:
              e = json.load(sys.stdin)
              wf = e.get('workflowData',{}).get('name','?')
              status = e.get('status','?')
              print(f'Workflow: {wf} | Status: {status}')
              rd = e.get('data',{}).get('resultData',{})
              run_data = rd.get('runData',{})
              for node_name, runs in run_data.items():
                  for r in runs:
                      s = r.get('executionStatus','?')
                      err = ''
                      if r.get('error'):
                          em = r['error']
                          err = ' ERR: ' + (em.get('message','') if isinstance(em,dict) else str(em))[:120]
                      # Show output data summary for key nodes
                      out = ''
                      data = r.get('data',{}).get('main',[[]])
                      if data and data[0]:
                          items = data[0]
                          out = f' items={len(items)}'
                          if items and isinstance(items[0], dict):
                              j = items[0].get('json',{})
                              keys = list(j.keys())[:5]
                              out += f' keys={keys}'
                      print(f'  [{s}] {node_name}{out}{err}')
          except Exception as ex:
              print(f'Parse error: {ex}')
          " 2>/dev/null || echo "  API/parse error")
            add "$DETAIL_INFO"
          done

          # 4. LP health
          add ""
          add "=== STEP 4: LP Health ==="
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${VPS_PORT} ${VPS_HOST} >> ~/.ssh/known_hosts 2>/dev/null
          LP_INFO=$(ssh -i ~/.ssh/deploy_key -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} \
            "curl -s http://127.0.0.1:3100/health 2>/dev/null" 2>&1)
          add "$LP_INFO"
          rm -f ~/.ssh/deploy_key

          # Output
          ONELINE=$(echo "$MSG" | tr '\n' ' | ' | head -c 4000)
          echo "::notice title=TestResult::${ONELINE}"
          {
            echo '```'
            echo "$MSG"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
