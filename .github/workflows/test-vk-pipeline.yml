name: "Test VK Pipeline"

on:
  workflow_dispatch:

jobs:
  test:
    name: "Send test event & check"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Test VK API + N8N pipeline
        env:
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          VK_USER_TOKEN: ${{ secrets.VK_USER_TOKEN }}
        run: |
          set +e

          # 1. Отправка тестового события в N8N
          TS=$(date +%s)
          HC=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            -X POST "${N8N_BASE_URL}/webhook/vk-events" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"photo_comment_new\",\"group_id\":137949809,\"event_id\":\"t-${TS}\",\"comment\":{\"id\":${TS},\"from_id\":123456789,\"post_id\":99999,\"text\":\"Test диван M\",\"date\":${TS},\"owner_id\":-137949809}}")
          echo "Webhook response: HTTP ${HC}"
          sleep 20

          # 2. Детальная диагностика выполнений
          python3 << 'PYEOF'
          import json, urllib.request, os

          base = os.environ['N8N_BASE_URL']
          key = os.environ['N8N_API_KEY']
          summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')

          def api(path):
              req = urllib.request.Request(f"{base}{path}", headers={"X-N8N-API-KEY": key})
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          execs = api("/api/v1/executions?limit=5")
          report = []

          for e in execs.get('data', []):
              eid = e['id']
              status = e.get('status', '?')
              wf = e.get('workflowData', {}).get('name', '?')
              block = [f"### Execution #{eid} [{status}] {wf}"]

              try:
                  det = api(f"/api/v1/executions/{eid}?includeData=true")
              except Exception as ex:
                  block.append(f"- Error getting detail: {ex}")
                  report.append('\n'.join(block))
                  continue

              # Workflow name from detail
              wf_detail = det.get('workflowData', {}).get('name', wf)
              if wf_detail != wf:
                  block[0] = f"### Execution #{eid} [{status}] {wf_detail}"

              rd = det.get('data', {}).get('resultData', {})

              # Top-level error
              top_err = rd.get('error')
              if top_err:
                  msg = top_err.get('message', str(top_err)) if isinstance(top_err, dict) else str(top_err)
                  block.append(f"- **WORKFLOW ERROR**: `{msg[:400]}`")

              # Node results
              run_data = rd.get('runData', {})
              if not run_data:
                  block.append("- _(no node data)_")
              else:
                  for nn, runs in run_data.items():
                      for r in runs:
                          s = r.get('executionStatus', '?')
                          err_str = ''
                          if r.get('error'):
                              em = r['error']
                              if isinstance(em, dict):
                                  err_str = f" **ERR**: `{em.get('message', '')[:300]}`"
                              else:
                                  err_str = f" **ERR**: `{str(em)[:300]}`"
                          block.append(f"- [{s}] {nn}{err_str}")

              report.append('\n'.join(block))

          # Write to step summary (markdown)
          with open(summary_file, 'w') as f:
              f.write("## N8N Execution Report\n\n")
              f.write('\n\n'.join(report))
              f.write('\n')

          # Also print for logs
          for block in report:
              print(block)
              print()
          PYEOF

      - name: VK API check
        env:
          VK_USER_TOKEN: ${{ secrets.VK_USER_TOKEN }}
        run: |
          set +e
          WALL=$(curl -s --max-time 10 \
            "https://api.vk.com/method/wall.get?owner_id=-137949809&count=1&access_token=${VK_USER_TOKEN}&v=5.199")
          echo "$WALL" | python3 -c "
          import sys,json
          d = json.load(sys.stdin)
          if 'error' in d: print('wall.get ERROR:', d['error'])
          else:
              items = d.get('response',{}).get('items',[])
              if items: print('wall.get OK, latest post #' + str(items[0]['id']))
              else: print('wall.get: NO POSTS')
          " 2>/dev/null || echo "parse error"
