name: "Test VK Pipeline"

on:
  workflow_dispatch:

jobs:
  test:
    name: "Send test event & check"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Test VK API + N8N pipeline
        env:
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          VK_USER_TOKEN: ${{ secrets.VK_USER_TOKEN }}
        run: |
          set +e
          MSG=""
          add() { MSG="${MSG}${1} "; }

          # 1. Direct VK API test
          add "=== VK API TEST ==="
          WALL=$(curl -s --max-time 10 \
            "https://api.vk.com/method/wall.get?owner_id=-137949809&count=1&access_token=${VK_USER_TOKEN}&v=5.199")
          WALL_RESULT=$(echo "$WALL" | python3 -c "
          import sys,json
          d = json.load(sys.stdin)
          if 'error' in d: print('ERROR: ' + str(d['error']))
          else:
              items = d.get('response',{}).get('items',[])
              if items: print('OK post#' + str(items[0]['id']))
              else: print('NO POSTS')
          " 2>/dev/null || echo "parse_err")
          add "wall.get: ${WALL_RESULT}"

          POST_ID=$(echo "$WALL" | python3 -c "
          import sys,json; items=json.load(sys.stdin).get('response',{}).get('items',[])
          if items: print(items[0]['id'])
          " 2>/dev/null)

          if [ -n "$POST_ID" ]; then
            REPLY=$(curl -s --max-time 10 \
              "https://api.vk.com/method/wall.createComment?owner_id=-137949809&post_id=${POST_ID}&message=test_$(date +%s)&access_token=${VK_USER_TOKEN}&v=5.199")
            add "wall.createComment: $(echo "$REPLY" | head -c 300)"
            CID=$(echo "$REPLY" | python3 -c "
            import sys,json; d=json.load(sys.stdin)
            if 'response' in d: print(d['response'].get('comment_id',''))
            " 2>/dev/null)
            if [ -n "$CID" ]; then
              add "COMMENT_OK id=$CID (deleting)"
              curl -s "https://api.vk.com/method/wall.deleteComment?owner_id=-137949809&comment_id=${CID}&access_token=${VK_USER_TOKEN}&v=5.199" >/dev/null 2>&1
            else
              add "NO_COMMENT_CREATED"
            fi
          fi

          # 2. Send test to N8N
          add "=== N8N TEST ==="
          TS=$(date +%s)
          HC=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            -X POST "${N8N_BASE_URL}/webhook/vk-events" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"photo_comment_new\",\"group_id\":137949809,\"event_id\":\"t-${TS}\",\"comment\":{\"id\":${TS},\"from_id\":123456789,\"post_id\":99999,\"text\":\"Test diван M\",\"date\":${TS},\"owner_id\":-137949809}}")
          add "Webhook:${HC}"
          sleep 15

          # 3. Check executions
          LATEST=$(curl -s --max-time 10 -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            "${N8N_BASE_URL}/api/v1/executions?limit=4")
          EXEC_SUM=$(echo "$LATEST" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for e in d.get('data',[]):
              wf=e.get('workflowData',{}).get('name','?')
              print(f'[{e.get(\"status\")}] #{e[\"id\"]} {wf}')
          " 2>/dev/null)
          add "Execs: ${EXEC_SUM}"

          # 4. Detail of latest 2
          for EID in $(echo "$LATEST" | python3 -c "
          import sys,json
          for e in json.load(sys.stdin).get('data',[])[:2]: print(e['id'])
          " 2>/dev/null); do
            DET=$(curl -s --max-time 10 -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
              "${N8N_BASE_URL}/api/v1/executions/${EID}?includeData=true")
            NODE_INFO=$(echo "$DET" | python3 -c "
          import sys,json
          e=json.load(sys.stdin)
          wf=e.get('workflowData',{}).get('name','?')
          print(f'#{e[\"id\"]} {wf} [{e.get(\"status\")}]')
          rd=e.get('data',{}).get('resultData',{})
          for nn,runs in rd.get('runData',{}).items():
              for r in runs:
                  s=r.get('executionStatus','?')
                  err=''
                  if r.get('error'):
                      em=r['error']
                      err=' ERR:'+((em.get('message','') if isinstance(em,dict) else str(em))[:150])
                  out=''
                  if 'VK:' in nn:
                      try:
                          d2=r.get('data',{}).get('main',[[]])[0]
                          if d2: out=' OUT:'+json.dumps(d2[0].get('json',{}),ensure_ascii=False)[:300]
                      except: pass
                  print(f'  [{s}] {nn}{err}{out}')
          " 2>/dev/null)
            add "--- ${NODE_INFO}"
          done

          echo "::notice::${MSG}"
