name: "Fetch Real Task Output v2"

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/fetch-task-output.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fetch dashboard status from VPS
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          {
            echo "=== Dashboard Service ==="
            $SSH_CMD "systemctl status dashboard.service --no-pager 2>&1 | head -10" || true
            echo ""
            echo "=== Port 3100 ==="
            $SSH_CMD "ss -tlnp | grep 3100 || echo '(not listening)'"
            echo ""
            echo "=== Dashboard HTTP response ==="
            $SSH_CMD "curl -sI --max-time 5 http://127.0.0.1:3100/ 2>&1 | head -5" || true
            echo ""
            echo "=== Dashboard /tasks page (first 30 chars) ==="
            $SSH_CMD "curl -s --max-time 5 http://127.0.0.1:3100/tasks 2>&1 | head -c 200" || true
            echo ""
            echo ""
            echo "=== Nginx → dashboard proxy ==="
            $SSH_CMD "curl -sI --max-time 5 https://webhook.marbomebel.ru/ 2>&1 | head -5" || true
            echo ""
            echo "=== Nginx → /tasks proxy ==="
            $SSH_CMD "curl -sI --max-time 5 https://webhook.marbomebel.ru/tasks 2>&1 | head -5" || true
          } > real-task-output.txt
          cat real-task-output.txt

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B ops/task-output origin/main
          git add -f real-task-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "ops: real task output from VPS [skip ci]"
            git push -f origin ops/task-output
          }
