name: "Fetch Real Task Output v3"

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/fetch-task-output.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fetch dashboard status from VPS
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          {
            echo "=== Dashboard Service ==="
            $SSH_CMD "systemctl status dashboard.service --no-pager 2>&1 | head -10" || true
            echo ""
            echo "=== Port 3200 ==="
            $SSH_CMD "ss -tlnp | grep 3200 || echo '(not listening)'"
            echo ""
            echo "=== Dashboard HTTP response ==="
            $SSH_CMD "curl -sI --max-time 5 http://127.0.0.1:3200/ 2>&1 | head -5" || true
            echo ""
            echo "=== Dashboard /tasks page (first 30 chars) ==="
            $SSH_CMD "curl -s --max-time 5 http://127.0.0.1:3200/tasks 2>&1 | head -c 200" || true
            echo ""
            echo ""
            echo "=== Nginx config test ==="
            $SSH_CMD "nginx -t 2>&1" || true
            echo ""
            echo "=== Nginx sites-available/webhook dashboard section ==="
            $SSH_CMD "grep -A5 'Task Dashboard' /etc/nginx/sites-available/webhook 2>/dev/null || echo '(not found)'"
            echo ""
            echo "=== Nginx → dashboard proxy (HTTP, port 80) ==="
            $SSH_CMD "curl -sI --max-time 5 -H 'Host: webhook.marbomebel.ru' http://127.0.0.1:80/ 2>&1 | head -5" || true
            echo ""
            echo "=== Traefik docker-compose location ==="
            $SSH_CMD "find /opt /root /home -name 'docker-compose*' -path '*traefik*' 2>/dev/null | head -10" || true
            $SSH_CMD "find /opt /root /home -name 'docker-compose*' -path '*n8n*' 2>/dev/null | head -10" || true
            echo ""
            echo "=== Traefik static config ==="
            $SSH_CMD "docker inspect n8n-traefik-traefik-1 --format '{{.Args}}' 2>/dev/null" || true
            echo ""
            echo "=== Traefik dynamic config files ==="
            $SSH_CMD "docker exec n8n-traefik-traefik-1 ls /etc/traefik/ 2>/dev/null" || true
            $SSH_CMD "docker exec n8n-traefik-traefik-1 cat /etc/traefik/traefik.yml 2>/dev/null || echo '(no static config file)'" || true
            echo ""
            echo "=== Traefik container mounts ==="
            $SSH_CMD "docker inspect n8n-traefik-traefik-1 --format '{{range .Mounts}}{{.Source}}:{{.Destination}} {{end}}' 2>/dev/null" || true
            echo ""
            echo "=== Traefik routers (API) ==="
            $SSH_CMD "docker exec n8n-traefik-traefik-1 wget -qO- http://localhost:8080/api/http/routers 2>/dev/null | python3 -m json.tool 2>/dev/null | head -60 || echo '(traefik API not available)'" || true
            echo ""
            echo "=== Docker labels on traefik container ==="
            $SSH_CMD "docker inspect n8n-traefik-traefik-1 --format '{{json .Config.Labels}}' 2>/dev/null | python3 -m json.tool 2>/dev/null | head -30" || true
            echo ""
            echo "=== N8N docker-compose.yml ==="
            $SSH_CMD "cat /opt/n8n-docker/docker-compose.yml 2>/dev/null || cat /root/n8n/docker-compose.yml 2>/dev/null || echo '(not found at common locations)'" || true
            echo ""
            echo "=== Direct dashboard /tasks via port 3200 ==="
            $SSH_CMD "curl -s --max-time 5 http://127.0.0.1:3200/tasks 2>&1 | head -c 300" || true
          } > real-task-output.txt
          cat real-task-output.txt

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B ops/task-output origin/main
          git add -f real-task-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "ops: real task output from VPS [skip ci]"
            git push -f origin ops/task-output
          }
