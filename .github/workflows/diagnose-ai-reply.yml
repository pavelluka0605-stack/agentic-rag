name: "Diagnose AI Reply Chain v2"

on:
  push:
    branches:
      - 'claude/vk-token-*'
    paths:
      - '.github/workflows/diagnose-ai-reply.yml'

jobs:
  diagnose:
    name: "AI Reply Chain Diagnostics"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: "Run full diagnostics on VPS"
        id: diag
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          # Function to send message to Telegram
          send_tg() {
            local msg="$1"
            curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              --data-urlencode "text=${msg}" > /dev/null 2>&1 || true
          }

          # ─── PART 1: Workflows & URLs ───
          PART1=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'

          source /opt/p0-foundation/.env 2>/dev/null

          echo "=== WORKFLOWS ==="
          curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            http://localhost:5678/api/v1/workflows 2>/dev/null | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          for w in data:
            s = 'ON' if w.get('active') else 'OFF'
            print(f'[{s}] {w[\"name\"]} (id={w[\"id\"]})')
          " 2>/dev/null

          echo ""
          echo "=== P0-03 URLs ==="
          curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            http://localhost:5678/api/v1/workflows 2>/dev/null | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          for w in data:
            if 'P0-03' in w.get('name','') or 'Event' in w.get('name',''):
              for n in w.get('nodes',[]):
                u = n.get('parameters',{}).get('url','')
                if u: print(f'{n[\"name\"]}: {u}')
          " 2>/dev/null

          echo ""
          echo "=== P0-07 INFO ==="
          curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            http://localhost:5678/api/v1/workflows 2>/dev/null | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          for w in data:
            if 'P0-07' in w.get('name','') or 'AI_Comment' in w.get('name',''):
              print(f'active={w.get(\"active\")}')
              for n in w.get('nodes',[]):
                t = n.get('type','')
                p = n.get('parameters',{})
                if 'webhook' in t: print(f'webhook path: {p.get(\"path\",\"?\")}')
                u = p.get('url','')
                if 'vk.com' in u: print(f'{n[\"name\"]}: {u[:150]}')
                b = p.get('body','')
                if 'vk.com' in b or 'VK_TOKEN' in b: print(f'{n[\"name\"]} body: {b[:150]}')
                if 'openai' in u.lower(): print(f'{n[\"name\"]}: {u}')
          " 2>/dev/null

          echo ""
          echo "=== ENV ==="
          echo "VK_TOKEN=${#VK_TOKEN}ch VK_GROUP_ID=${VK_GROUP_ID} OPENAI=${#OPENAI_API_KEY}ch"

          REMOTE
          )
          echo "$PART1"
          send_tg "1/4 Workflows:
          $PART1"

          # ─── PART 2: Executions ───
          PART2=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'

          source /opt/p0-foundation/.env 2>/dev/null

          echo "=== LAST 20 EXECUTIONS ==="
          curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            "http://localhost:5678/api/v1/executions?limit=20" 2>/dev/null | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          if not data: print('NO EXECUTIONS')
          for e in data:
            wf = e.get('workflowData',{}).get('name', e.get('workflowId','?'))
            st = e.get('status','?')
            at = (e.get('stoppedAt') or e.get('startedAt','?'))[:19]
            print(f'[{st}] {wf} at={at}')
          " 2>/dev/null

          echo ""
          echo "=== FAILED DETAILS ==="
          curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" \
            "http://localhost:5678/api/v1/executions?limit=5&status=error" 2>/dev/null | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          if not data: print('No failed executions')
          for e in data:
            wf = e.get('workflowData',{}).get('name','?')
            print(f'FAIL: {wf}')
            d = e.get('data',{})
            if isinstance(d,dict):
              rd = d.get('resultData',{})
              err = rd.get('error')
              if err: print(f'  err: {str(err)[:200]}')
              for nn,nr in rd.get('runData',{}).items():
                if isinstance(nr,list):
                  for r in nr:
                    if r.get('error'):
                      print(f'  [{nn}]: {r[\"error\"].get(\"message\",str(r[\"error\"]))[:150]}')
          " 2>/dev/null

          REMOTE
          )
          echo "$PART2"
          send_tg "2/4 Executions:
          $PART2"

          # ─── PART 3: Direct P0-07 test ───
          PART3=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'

          echo "=== P0-07 DIRECT TEST ==="
          RESP=$(curl -s -w "\nHTTP:%{http_code}" --max-time 30 \
            -X POST http://localhost:5678/webhook/vk-ai-reply \
            -H "Content-Type: application/json" \
            -d '{"comment_id":99999,"from_id":1,"post_id":1,"text":"ТЕСТ: цена дивана?","date":"2026-03-12T12:00:00Z"}')
          echo "$RESP"

          echo ""
          echo "=== VK wall.get TEST ==="
          source /opt/p0-foundation/.env 2>/dev/null
          RESP2=$(curl -s --max-time 10 \
            "https://api.vk.com/method/wall.get?owner_id=-${VK_GROUP_ID}&count=1&access_token=${VK_TOKEN}&v=5.199")
          echo "$RESP2" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if 'error' in d: print(f'FAIL: {d[\"error\"][\"error_msg\"]}')
          elif 'response' in d: print(f'OK: count={d[\"response\"][\"count\"]}')
          else: print(f'UNKNOWN: {str(d)[:200]}')
          " 2>/dev/null

          echo ""
          echo "=== VK wall.createComment TEST (fake post, expect error) ==="
          RESP3=$(curl -s --max-time 10 \
            "https://api.vk.com/method/wall.createComment?owner_id=-${VK_GROUP_ID}&post_id=999999999&message=test&access_token=${VK_TOKEN}&v=5.199")
          echo "$RESP3" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if 'error' in d:
            code=d['error']['error_code']
            msg=d['error']['error_msg']
            if code==100: print(f'OK: token CAN comment (error={code} = post not found, expected)')
            elif code==15: print(f'FAIL: Access denied — token lacks wall scope (error={code})')
            elif code==7: print(f'FAIL: Permission denied (error={code}: {msg})')
            else: print(f'Error {code}: {msg}')
          elif 'response' in d: print(f'OK: comment created (unexpected!)')
          " 2>/dev/null

          REMOTE
          )
          echo "$PART3"
          send_tg "3/4 P0-07+VK test:
          $PART3"

          # ─── PART 4: Long Poll logs ───
          PART4=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'

          echo "=== VK-LONGPOLL LOGS (last 30) ==="
          journalctl -u vk-longpoll -n 30 --no-pager 2>&1

          echo ""
          echo "=== VK-LONGPOLL HEALTH ==="
          curl -s http://127.0.0.1:3100/health 2>&1

          REMOTE
          )
          echo "$PART4"
          send_tg "4/4 Long Poll logs:
          $PART4"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
