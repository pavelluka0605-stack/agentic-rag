name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fix - disable systemd, use PM2 only
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          OUT="diag-output.txt"

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee $OUT
          echo "=== STEP 1: PM2 status ==="
          pm2 list

          echo ""
          echo "=== STEP 2: Health check ==="
          curl -s --max-time 5 http://localhost:3847/api/health

          echo ""
          echo "=== STEP 3: index.html version check ==="
          echo "--- First 5 lines of title/meta ---"
          grep -i '<title\|<meta.*description\|version\|double-tap\|дублирован' /opt/claude-chat/public/index.html || echo "no matches"

          echo ""
          echo "--- File sizes ---"
          ls -la /opt/claude-chat/public/index.html /opt/claude-chat/server.js /opt/claude-chat/package.json

          echo ""
          echo "--- package.json version ---"
          cat /opt/claude-chat/package.json | head -5

          echo ""
          echo "=== STEP 4: Curl main page (first 30 lines) ==="
          curl -s --max-time 5 http://localhost:3847/ | head -30

          echo ""
          echo "DONE"
          REMOTE

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: verify march 14 version deployed [skip ci]"
            git push origin main
          }
