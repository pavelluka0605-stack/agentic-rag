name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fix nginx proxy timeouts
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          # Show current nginx config for chat
          echo "=== CURRENT NGINX CONFIG ==="
          $SSH "cat /etc/nginx/sites-enabled/chat* 2>/dev/null || ls /etc/nginx/sites-enabled/"

          # Check if nginx has proxy timeout settings for the chat location
          echo ""
          echo "=== CHECKING PROXY TIMEOUTS ==="
          $SSH "grep -r 'proxy_read_timeout\|proxy_send_timeout\|proxy_connect_timeout\|proxy_buffering' /etc/nginx/ 2>/dev/null || echo 'no proxy timeout settings found'"

          # Add/update proxy timeouts for SSE support
          # Find the nginx config file for chat.marbomebel.ru
          CONF=$($SSH "ls /etc/nginx/sites-enabled/chat* 2>/dev/null | head -1")
          if [ -z "$CONF" ]; then
            CONF=$($SSH "grep -rl 'chat.marbomebel' /etc/nginx/sites-enabled/ 2>/dev/null | head -1")
          fi
          if [ -z "$CONF" ]; then
            CONF=$($SSH "grep -rl '3847' /etc/nginx/sites-enabled/ 2>/dev/null | head -1")
          fi
          echo "Config file: $CONF"

          if [ -n "$CONF" ]; then
            # Check if proxy_read_timeout already exists
            HAS_TIMEOUT=$($SSH "grep -c 'proxy_read_timeout' $CONF 2>/dev/null || echo 0")
            if [ "$HAS_TIMEOUT" = "0" ]; then
              echo "Adding proxy timeout settings..."
              # Add timeout settings after proxy_pass line
              $SSH "sed -i '/proxy_pass.*3847/a\\
        proxy_read_timeout 600s;\\
        proxy_send_timeout 600s;\\
        proxy_connect_timeout 60s;\\
        proxy_buffering off;\\
        proxy_cache off;\\
        proxy_http_version 1.1;\\
        proxy_set_header Connection \"\";' $CONF"
              echo "Added proxy timeout settings"
            else
              echo "Proxy timeout already configured, updating..."
              $SSH "sed -i 's/proxy_read_timeout.*/proxy_read_timeout 600s;/' $CONF"
              $SSH "sed -i 's/proxy_send_timeout.*/proxy_send_timeout 600s;/' $CONF"
            fi

            echo ""
            echo "=== UPDATED NGINX CONFIG ==="
            $SSH "cat $CONF"

            # Test and reload nginx
            $SSH "nginx -t && systemctl reload nginx && echo 'nginx reloaded OK' || echo 'nginx reload FAILED'"
          else
            echo "No nginx config found for chat - checking if Traefik handles it directly"
            $SSH "docker ps --filter name=traefik 2>/dev/null"
          fi

      - name: Verify everything works
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          echo "=== HEALTH CHECK ==="
          $SSH "curl -s http://localhost:3847/api/health"
          echo ""

          echo "=== SERVICE STATUS ==="
          $SSH "systemctl is-active claude-chat 2>/dev/null || echo 'checking pm2...' && pm2 list 2>/dev/null || echo 'manual process'"
          $SSH "ps aux | grep 'node.*server.js' | grep -v grep"

          echo ""
          echo "=== EXTERNAL TEST ==="
          curl -s -o /dev/null -w "HTTP %{http_code} (%{time_total}s)" https://chat.marbomebel.ru/api/health 2>/dev/null && echo "" || echo "External access failed (may need auth)"
