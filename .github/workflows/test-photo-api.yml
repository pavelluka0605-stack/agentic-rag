name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fix EADDRINUSE crash loop
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          OUT="diag-output.txt"

          # Do everything in ONE SSH session to avoid race conditions
          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee $OUT
          set -x

          # 1. Disable restart in systemd unit
          sed -i 's/^Restart=always/Restart=no/' /etc/systemd/system/claude-chat.service
          systemctl daemon-reload

          # 2. Stop service (now it won't auto-restart)
          systemctl stop claude-chat
          sleep 3

          # 3. Kill everything on port 3847
          for i in 1 2 3; do
            pids=$(lsof -t -i:3847 2>/dev/null || true)
            if [ -z "$pids" ]; then
              echo "Port 3847 is free"
              break
            fi
            echo "Killing PIDs: $pids"
            echo "$pids" | xargs kill -9 2>/dev/null || true
            sleep 2
          done

          # 4. Final verify
          if lsof -i:3847 >/dev/null 2>&1; then
            echo "FATAL: Port still busy after 3 kill rounds"
            lsof -i:3847
            exit 1
          fi

          # 5. Restore Restart=always and start
          sed -i 's/^Restart=no/Restart=always/' /etc/systemd/system/claude-chat.service
          systemctl daemon-reload
          systemctl start claude-chat
          sleep 5

          # 6. Check
          if systemctl is-active --quiet claude-chat; then
            echo "=== SUCCESS ==="
            curl -s --max-time 5 http://localhost:3847/api/health
          else
            echo "=== STILL FAILING ==="
            journalctl -u claude-chat -n 20 --no-pager
          fi
          REMOTE

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: fix result [skip ci]"
            git push origin main
          }
