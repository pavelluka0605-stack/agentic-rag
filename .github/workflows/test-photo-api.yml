name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fix - disable systemd, use PM2 only
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          OUT="diag-output.txt"

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee $OUT
          echo "=== STEP 1: Disable systemd for claude-chat ==="
          systemctl stop claude-chat 2>/dev/null || true
          systemctl disable claude-chat 2>/dev/null || true
          echo "systemd disabled"

          echo ""
          echo "=== STEP 2: Restart PM2 claude-chat ==="
          pm2 restart claude-chat 2>&1
          sleep 3

          echo ""
          echo "=== STEP 3: Check ==="
          pm2 list
          curl -s --max-time 5 http://localhost:3847/api/health
          echo ""
          echo "DONE"
          REMOTE

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: fix - disable systemd, pm2 restart [skip ci]"
            git push origin main
          }
