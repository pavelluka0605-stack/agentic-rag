name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Full VPS Diagnostics
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          set +e
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=15 $VPS_USER@$VPS_HOST"

          # === 1. ALL RUNNING SERVICES ===
          echo "::group::1. All Custom Services"
          R1=$($SSH "systemctl list-units --type=service --state=running --no-pager | grep -vE 'systemd|dbus|ssh|cron|snap|serial|getty|journal|log|networkd|resolved|udev|polkit|modprobe|user@|packagekit|multipathd|unattended' || echo 'none'" 2>&1)
          echo "$R1"
          echo "::endgroup::"
          echo "::notice::Services: $(echo "$R1" | grep -c 'running' || echo 0) running"

          # === 2. WEBAPP STATUS & LOGS ===
          echo "::group::2. Webapp Service"
          R2=$($SSH "systemctl status webapp.service 2>/dev/null | head -20; echo '--- LOGS ---'; journalctl -u webapp -n 30 --no-pager 2>/dev/null" 2>&1)
          echo "$R2"
          echo "::endgroup::"
          echo "::notice::webapp: $(echo "$R2" | head -1)"

          # === 3. FULL NGINX CONFIG ===
          echo "::group::3. Nginx Config"
          R3=$($SSH "cat /etc/nginx/sites-enabled/chat-marbomebel 2>/dev/null || cat /etc/nginx/sites-enabled/* 2>/dev/null | head -150 || echo 'no nginx config'" 2>&1)
          echo "$R3"
          echo "::endgroup::"
          echo "::notice::nginx config: $(echo "$R3" | head -3)"

          # === 4. ALL PORTS ===
          echo "::group::4. Listening Ports"
          R4=$($SSH "ss -tlnp 2>/dev/null" 2>&1)
          echo "$R4"
          echo "::endgroup::"
          echo "::notice::ports: $(echo "$R4" | grep -c LISTEN) listening"

          # === 5. DOCKER ===
          echo "::group::5. Docker Containers"
          R5=$($SSH "docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' 2>/dev/null || echo 'NO DOCKER'" 2>&1)
          echo "$R5"
          echo "::endgroup::"
          echo "::notice::docker: $R5"

          # === 6. SEARCH FOR CHAT UI CODE (the AI Assistant interface) ===
          echo "::group::6. Search for Chat UI"
          R6=$($SSH "echo '--- /opt/ ---'; grep -rln 'Соединение прервано\|AI Ассистент\|VPS статус\|Проверьте интернет' /opt/ 2>/dev/null || echo 'not in /opt'; echo '--- /var/www/ ---'; grep -rln 'Соединение прервано\|AI Ассистент\|VPS статус' /var/www/ 2>/dev/null || echo 'not in /var/www'; echo '--- /home/ ---'; grep -rln 'Соединение прервано\|AI Ассистент\|VPS статус' /home/ 2>/dev/null || echo 'not in /home'; echo '--- /root/ ---'; grep -rln 'Соединение прервано\|AI Ассистент\|VPS статус' /root/ 2>/dev/null || echo 'not in /root'; echo '--- /srv/ ---'; grep -rln 'Соединение прервано\|AI Ассистент\|VPS статус' /srv/ 2>/dev/null || echo 'not in /srv'" 2>&1)
          echo "$R6"
          echo "::endgroup::"
          echo "::notice::chat UI search: $R6"

          # === 7. ALL HTML FILES ON VPS ===
          echo "::group::7. HTML Files"
          R7=$($SSH "find / -name '*.html' -not -path '*/node_modules/*' -not -path '*/venv/*' -not -path '*/proc/*' -not -path '*/sys/*' 2>/dev/null | head -30 || echo 'none'" 2>&1)
          echo "$R7"
          echo "::endgroup::"
          echo "::notice::HTML files: $R7"

          # === 8. ALL CUSTOM PY FILES ===
          echo "::group::8. Python Files in /opt/"
          R8=$($SSH "find /opt/ -name '*.py' 2>/dev/null | sort" 2>&1)
          echo "$R8"
          echo "::endgroup::"
          echo "::notice::Python files: $(echo "$R8" | wc -l) files"

          # === 9. CURL TESTS ===
          echo "::group::9. Curl Tests"
          R9=$($SSH "echo '--- localhost:8000 ---'; curl -s -o /dev/null -w 'HTTP %{http_code} (%{time_total}s)' http://localhost:8000/ 2>&1; echo ''; echo '--- localhost:8000 HTML ---'; curl -s http://localhost:8000/ 2>/dev/null | head -10; echo ''; echo '--- localhost:8000/api/stats ---'; curl -s http://localhost:8000/api/stats 2>/dev/null | head -5; echo ''; echo '--- chat.marbomebel.ru ---'; curl -s -o /dev/null -w 'HTTP %{http_code} (%{time_total}s)' https://chat.marbomebel.ru/ 2>&1; echo ''" 2>&1)
          echo "$R9"
          echo "::endgroup::"
          echo "::notice::curl: $R9"

          # === 10. OPENAI KEY CHECK ===
          echo "::group::10. Environment"
          R10=$($SSH "grep -c OPENAI_API_KEY /opt/p0-foundation/.env 2>/dev/null && echo 'OPENAI_API_KEY in .env' || echo 'NO OPENAI_API_KEY'; echo '---'; cat /opt/p0-foundation/.env 2>/dev/null | grep -v KEY | grep -v TOKEN | grep -v PASS | grep -v SECRET | head -20 || echo 'no .env'" 2>&1)
          echo "$R10"
          echo "::endgroup::"
          echo "::notice::env: $R10"

          # === 11. N8N CHECK ===
          echo "::group::11. N8N Status"
          R11=$($SSH "systemctl status n8n 2>/dev/null | head -10; echo '--- N8N port ---'; ss -tlnp | grep 5678" 2>&1)
          echo "$R11"
          echo "::endgroup::"
          echo "::notice::n8n: $(echo "$R11" | head -1)"

          # === 12. RESOURCES ===
          echo "::group::12. Resources"
          R12=$($SSH "df -h / && echo '---' && free -h && echo '---' && uptime" 2>&1)
          echo "$R12"
          echo "::endgroup::"
          echo "::notice::resources: $R12"

          echo "DIAGNOSTICS COMPLETE v3"
