name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/fix-connection-error-oXw4p
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Download index.html from VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          mkdir -p claude-chat/public
          $SCP "$VPS_USER@$VPS_HOST:/opt/claude-chat/public/index.html" claude-chat/public/
          wc -l claude-chat/public/index.html
          ls -la claude-chat/public/

      - name: Get proxy configs
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          echo "=== NGINX CONFIGS ==="
          $SSH "ls /etc/nginx/sites-enabled/ 2>/dev/null && echo '---' && cat /etc/nginx/sites-enabled/* 2>/dev/null" || echo "no nginx"
          echo "=== TRAEFIK DYNAMIC ==="
          $SSH "find /opt/ -name 'traefik*' -o -name 'dynamic*' 2>/dev/null | head -10"
          $SSH "docker inspect traefik 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(l) for l in d[0].get(\"Args\",[]) if \"timeout\" in l.lower() or \"idle\" in l.lower()]' 2>/dev/null" || echo "no traefik timeout args"
          echo "=== CLAUDE-CHAT SERVICE ==="
          $SSH "systemctl cat claude-chat 2>/dev/null" || echo "no service"
          echo "=== CLAUDE-CHAT LOGS (last 20) ==="
          $SSH "journalctl -u claude-chat -n 20 --no-pager 2>/dev/null" || echo "no logs"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claude-chat/
          git diff --cached --stat
          git commit -m "chore: add index.html from VPS" || echo "No changes"
          git push origin claude/fix-connection-error-oXw4p
