name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Full VPS diagnostics
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          echo "=== SERVICE STATUS ==="
          $SSH "systemctl status claude-chat --no-pager 2>/dev/null || echo 'service not found'"
          echo ""

          echo "=== JOURNAL (last 40 lines) ==="
          $SSH "journalctl -u claude-chat -n 40 --no-pager 2>/dev/null || echo 'no journal'"
          echo ""

          echo "=== PORT 3847 ==="
          $SSH "lsof -i:3847 2>/dev/null || ss -tlnp | grep 3847 || echo 'port free'"
          echo ""

          echo "=== NODE VERSION ==="
          $SSH "node --version 2>/dev/null || echo 'no node'"
          echo ""

          echo "=== SERVER.JS head ==="
          $SSH "head -5 /opt/claude-chat/server.js 2>/dev/null || echo 'no server.js'"
          echo ""

          echo "=== SYSTEMD UNIT FILE ==="
          $SSH "cat /etc/systemd/system/claude-chat.service 2>/dev/null || echo 'no unit file'"
          echo ""

          echo "=== .ENV (masked) ==="
          $SSH "test -f /opt/claude-chat/.env && echo '.env exists, PORT=' && grep PORT /opt/claude-chat/.env || echo 'no .env'"
          echo ""

          echo "=== NPM LS ==="
          $SSH "cd /opt/claude-chat && npm ls --depth=0 2>&1 | tail -10 || echo 'npm ls failed'"
          echo ""

          echo "=== HEALTH CHECK ==="
          $SSH "curl -s --max-time 5 http://localhost:3847/api/health 2>/dev/null || echo 'health check failed'"
          echo ""

          echo "=== TRY MANUAL START ==="
          $SSH "systemctl stop claude-chat 2>/dev/null; sleep 2; kill \$(lsof -t -i:3847) 2>/dev/null; sleep 1; cd /opt/claude-chat && timeout 5 node server.js 2>&1 || echo 'manual start exit code: '\$?"
          echo ""
