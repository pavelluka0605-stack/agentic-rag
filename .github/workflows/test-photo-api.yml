name: "Fix Chat NOW"

on:
  push:
    branches: [main, "claude/*"]
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fix-chat-now
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check, fix, watch
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          OUT="diag-output.txt"

          echo "=== STEP 1: What is on VPS RIGHT NOW? $(date) ===" | tee $OUT
          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee -a $OUT
          echo "Title: $(grep -oP '<title>[^<]+</title>' /opt/claude-chat/public/index.html)"
          echo "RAG in HTML: $(grep -c 'rag-badge\|RAG Memory\|rag_search\|ragBadge' /opt/claude-chat/public/index.html || echo 0)"
          echo "Manifest link: $(grep -c '<link.*manifest' /opt/claude-chat/public/index.html || echo 0)"
          echo "File modified: $(stat -c '%y' /opt/claude-chat/public/index.html)"
          echo "MD5: $(md5sum /opt/claude-chat/public/index.html | cut -d' ' -f1)"
          echo "Process on 3847: $(ss -tlnp | grep 3847)"
          echo "PM2: $(pm2 list 2>/dev/null | grep claude-chat || echo 'NOT RUNNING')"
          echo "Systemd: $(systemctl is-active claude-chat 2>/dev/null || echo 'inactive')"
          echo ""
          echo "--- First 15 lines of HTML ---"
          curl -s http://localhost:3847/ | head -15
          REMOTE

          echo "" | tee -a $OUT
          echo "=== STEP 2: FORCE DEPLOY from this checkout ===" | tee -a $OUT
          echo "Local title: $(grep -oP '<title>[^<]+</title>' claude-chat/public/index.html)" | tee -a $OUT

          # Copy ALL files
          $SCP -r claude-chat/ $VPS_USER@$VPS_HOST:/opt/ 2>&1 | tee -a $OUT

          # Restart
          $SSH 'bash -s' <<'REMOTE2' 2>&1 | tee -a $OUT
          # Kill absolutely everything
          systemctl stop claude-chat 2>/dev/null; systemctl disable claude-chat 2>/dev/null
          rm -f /etc/systemd/system/claude-chat.service; systemctl daemon-reload 2>/dev/null
          pm2 delete claude-chat 2>/dev/null; pkill -9 -f 'node.*claude-chat' 2>/dev/null
          sleep 2

          # Start
          cd /opt/claude-chat
          npm install --omit=dev 2>&1 | tail -2
          mkdir -p data
          pm2 start server.js --name claude-chat
          sleep 3
          pm2 save --force

          echo ""
          echo "After deploy:"
          echo "Title: $(curl -s http://localhost:3847/ | grep -oP '<title>[^<]+</title>')"
          echo "MD5: $(md5sum /opt/claude-chat/public/index.html | cut -d' ' -f1)"
          echo "Health: $(curl -s http://localhost:3847/api/health)"
          REMOTE2

          echo "" | tee -a $OUT
          echo "=== STEP 3: Wait 60s and check if overwritten ===" | tee -a $OUT
          sleep 60

          $SSH 'bash -s' <<'REMOTE3' 2>&1 | tee -a $OUT
          echo "After 60s wait:"
          echo "Title: $(grep -oP '<title>[^<]+</title>' /opt/claude-chat/public/index.html)"
          echo "MD5: $(md5sum /opt/claude-chat/public/index.html | cut -d' ' -f1)"
          echo "File modified: $(stat -c '%y' /opt/claude-chat/public/index.html)"
          echo "Process: $(ss -tlnp | grep 3847)"
          REMOTE3

          echo "" | tee -a $OUT
          echo "=== STEP 4: External check ===" | tee -a $OUT
          echo "HTTPS title: $(curl -sk https://chat.marbomebel.ru/ | grep -oP '<title>[^<]+</title>')" | tee -a $OUT
          echo "HTTPS health: $(curl -sk https://chat.marbomebel.ru/api/health)" | tee -a $OUT
          echo "HTTPS first 10 lines:" | tee -a $OUT
          curl -sk https://chat.marbomebel.ru/ | head -10 | tee -a $OUT

          echo "" | tee -a $OUT
          echo "DONE $(date)" | tee -a $OUT

      - name: Save
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet || {
            git commit -m "fix: force deploy + overwrite watch [skip ci]"
            git push origin HEAD
          }
