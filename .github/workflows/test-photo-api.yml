name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Find the real problem
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          OUT="diag-output.txt"

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee $OUT

          echo "=== 1. Traefik dynamic config directory ==="
          echo "Files in /opt/n8n-traefik/dynamic/:"
          ls -la /opt/n8n-traefik/dynamic/ 2>/dev/null || echo "directory not found"
          echo ""
          echo "Content of ALL files in dynamic dir:"
          for f in /opt/n8n-traefik/dynamic/*; do
            if [ -f "$f" ]; then
              echo "--- $f ---"
              cat "$f"
              echo ""
            fi
          done

          echo ""
          echo "=== 2. Traefik API — all routers ==="
          TRAEFIK_ID=$(docker ps -q --filter "name=traefik")
          # API is on 8080 inside container, exposed via --api.insecure=true
          # Check if 8080 is exposed
          docker port $TRAEFIK_ID 2>/dev/null
          echo ""
          # Try API from inside traefik network
          docker exec $TRAEFIK_ID wget -qO- http://localhost:8080/api/http/routers 2>/dev/null | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          for r in data:
            name = r.get('name','?')
            rule = r.get('rule','?')
            service = r.get('service','?')
            status = r.get('status','?')
            provider = r.get('provider','?')
            print(f'  {name}: rule=\"{rule}\" service={service} status={status} provider={provider}')
          " 2>/dev/null || echo "wget in traefik failed"

          echo ""
          echo "=== 3. Traefik API — all services ==="
          docker exec $TRAEFIK_ID wget -qO- http://localhost:8080/api/http/services 2>/dev/null | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          for s in data:
            name = s.get('name','?')
            lb = s.get('loadBalancer',{})
            servers = lb.get('servers',[])
            status = s.get('status','?')
            provider = s.get('provider','?')
            print(f'  {name}: servers={servers} status={status} provider={provider}')
          " 2>/dev/null || echo "services API failed"

          echo ""
          echo "=== 4. Full external HTTPS response ==="
          echo "Headers:"
          curl -svk --max-time 10 https://chat.marbomebel.ru/ 2>&1 | grep -E '^[<>*]' | head -30
          echo ""
          echo "Body first 20 lines:"
          curl -sk --max-time 10 https://chat.marbomebel.ru/ | head -20
          echo ""
          echo "Body version check:"
          curl -sk --max-time 10 https://chat.marbomebel.ru/ | grep -oP 'v15\.03|2026-03-15|version|<title>[^<]*</title>' | head -10

          echo ""
          echo "=== 5. PM2 direct vs HTTPS full comparison ==="
          echo "--- PM2 first 5 lines ---"
          curl -s http://localhost:3847/ | head -5
          echo ""
          echo "--- HTTPS first 5 lines ---"
          curl -sk https://chat.marbomebel.ru/ | head -5
          echo ""
          echo "PM2 size: $(curl -s http://localhost:3847/ | wc -c)"
          echo "HTTPS size: $(curl -sk https://chat.marbomebel.ru/ | wc -c)"

          echo ""
          echo "=== 6. Check if there are multiple processes on 3847 ==="
          ss -tlnp | grep 3847

          echo ""
          echo "=== 7. PM2 logs (last 20 lines) ==="
          pm2 logs claude-chat --nostream --lines 20 2>/dev/null

          echo ""
          echo "DONE"
          REMOTE

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: traefik dynamic config + API routers [skip ci]"
            git push origin main
          }
