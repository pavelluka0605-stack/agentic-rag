name: Find the real problem

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check systemd vs PM2 conflict
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          OUT="diag-output.txt"

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee $OUT

          echo "=== 1. Systemd claude-chat service ==="
          systemctl status claude-chat 2>&1 || echo "systemd service not found"
          echo ""
          echo "=== 2. PM2 status ==="
          pm2 list 2>/dev/null || echo "PM2 not found"
          echo ""
          echo "=== 3. What process is ACTUALLY on port 3847? ==="
          ss -tlnp | grep 3847
          echo ""
          echo "=== 4. ALL node processes ==="
          ps aux | grep '[n]ode.*claude-chat' || echo "none"
          echo ""
          echo "=== 5. Current index.html — does it have #cc0000 (red) or RAG/manifest? ==="
          echo "Has #cc0000: $(grep -c '#cc0000' /opt/claude-chat/public/index.html)"
          echo "Has manifest: $(grep -c 'manifest' /opt/claude-chat/public/index.html)"
          echo "Has RAG: $(grep -c 'rag\|RAG' /opt/claude-chat/public/index.html)"
          echo "Has photo/Vision: $(grep -c 'vision\|Vision\|photo-analysis\|GPT-4o' /opt/claude-chat/public/index.html)"
          echo "Title: $(grep -oP '<title>[^<]+</title>' /opt/claude-chat/public/index.html)"
          echo ""
          echo "=== 6. Systemd service file ==="
          cat /etc/systemd/system/claude-chat.service 2>/dev/null || echo "No systemd service file"
          echo ""
          echo "=== 7. Recent deploy-p0 runs (check systemd journal) ==="
          journalctl -u claude-chat --since "2026-03-15 08:00" --no-pager 2>/dev/null | tail -20
          echo ""
          echo "=== 8. File modification times ==="
          stat -c "%n %y" /opt/claude-chat/server.js /opt/claude-chat/public/index.html
          echo ""
          echo "=== 9. Stop systemd, verify PM2 takes over ==="
          echo "Stopping systemd..."
          systemctl stop claude-chat 2>/dev/null || echo "systemctl stop failed"
          systemctl disable claude-chat 2>/dev/null || echo "systemctl disable failed"
          sleep 1
          echo "After stop — what's on 3847:"
          ss -tlnp | grep 3847 || echo "Nothing on 3847"
          echo ""
          echo "=== 10. Kill ALL node claude-chat processes ==="
          pkill -f 'node.*claude-chat/server' 2>/dev/null || true
          pm2 delete claude-chat 2>/dev/null || true
          sleep 1
          echo "After kill all — port 3847:"
          ss -tlnp | grep 3847 || echo "Port 3847 is FREE"
          echo ""

          echo "DONE"
          REMOTE

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: systemd vs PM2 conflict check [skip ci]"
            git push origin HEAD
          }
