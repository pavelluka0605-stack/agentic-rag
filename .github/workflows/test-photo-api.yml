name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Get server.js
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          echo "===SERVER.JS=START==="
          $SSH "cat /opt/claude-chat/server.js"
          echo "===SERVER.JS=END==="

      - name: Get index.html part1
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          echo "===INDEX.HTML.P1=START==="
          $SSH "head -700 /opt/claude-chat/public/index.html"
          echo "===INDEX.HTML.P1=END==="

      - name: Get index.html part2
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          echo "===INDEX.HTML.P2=START==="
          $SSH "tail -n +701 /opt/claude-chat/public/index.html"
          echo "===INDEX.HTML.P2=END==="

      - name: Get package.json
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          echo "===PACKAGE.JSON=START==="
          $SSH "cat /opt/claude-chat/package.json"
          echo "===PACKAGE.JSON=END==="

      - name: Get nginx and traefik config
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          echo "=== NGINX CONFIG ==="
          $SSH "cat /etc/nginx/sites-enabled/chat.marbomebel.ru 2>/dev/null || cat /etc/nginx/sites-enabled/default 2>/dev/null || echo 'no config found'"
          echo "=== TRAEFIK DOCKER ==="
          $SSH "docker ps --filter name=traefik --format '{{.Names}} {{.Ports}}' 2>/dev/null || echo 'no traefik'"
          echo "=== SYSTEMD claude-chat ==="
          $SSH "systemctl cat claude-chat.service 2>/dev/null || echo 'no service file'"
          echo "=== CLAUDE-CHAT STATUS ==="
          $SSH "systemctl status claude-chat.service 2>/dev/null || echo 'not found'"
          echo "=== CLAUDE-CHAT LOGS ==="
          $SSH "journalctl -u claude-chat -n 30 --no-pager 2>/dev/null || echo 'no logs'"
