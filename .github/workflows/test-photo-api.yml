name: "Deploy & Verify Chat (March 14)"

on:
  push:
    branches: [main, "claude/*"]
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-chat-final
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy and start
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"

          echo "=== 1. Pre-deploy: verify repo has correct version ==="
          echo "Local title: $(grep -oP '<title>[^<]+</title>' claude-chat/public/index.html)"
          echo "Local RAG count: $(grep -c 'RAG\|rag' claude-chat/public/index.html || echo 0)"

          echo ""
          echo "=== 2. Copy files ==="
          $SCP -r claude-chat/ $VPS_USER@$VPS_HOST:/opt/

          $SSH 'bash -s' <<'REMOTE'
          set -e

          echo ""
          echo "=== 3. Stop ALL previous processes ==="
          systemctl stop claude-chat 2>/dev/null || true
          systemctl disable claude-chat 2>/dev/null || true
          pm2 delete claude-chat 2>/dev/null || true
          pkill -f 'node.*claude-chat' 2>/dev/null || true
          sleep 2

          echo ""
          echo "=== 4. Verify files on VPS ==="
          echo "VPS title: $(grep -oP '<title>[^<]+</title>' /opt/claude-chat/public/index.html)"
          echo "VPS RAG count: $(grep -c 'RAG\|rag' /opt/claude-chat/public/index.html || echo 0)"
          echo "VPS statusLine: $(grep -oP 'id=\"statusLine\">[^<]+<' /opt/claude-chat/public/index.html)"

          echo ""
          echo "=== 5. Install & Start ==="
          cd /opt/claude-chat
          npm install --omit=dev 2>&1 | tail -3
          mkdir -p data
          pm2 start server.js --name claude-chat
          sleep 3
          pm2 list | grep claude-chat
          pm2 save --force

          echo ""
          echo "=== 6. Test localhost ==="
          echo "Health: $(curl -s --max-time 5 http://localhost:3847/api/health | head -1)"
          echo "Title from HTTP: $(curl -s --max-time 5 http://localhost:3847/ | grep -oP '<title>[^<]+</title>')"
          echo "RAG from HTTP: $(curl -s --max-time 5 http://localhost:3847/ | grep -c 'RAG\|rag' || echo 0)"
          REMOTE

      - name: External verification
        run: |
          echo "=== EXTERNAL CHECK from GitHub runner ==="
          sleep 5
          echo "Title: $(curl -sk https://chat.marbomebel.ru/ | grep -oP '<title>[^<]+</title>')"
          echo "RAG: $(curl -sk https://chat.marbomebel.ru/ | grep -c 'RAG\|rag' || echo 0)"
          echo "StatusLine: $(curl -sk https://chat.marbomebel.ru/ | grep -oP 'id=\"statusLine\">[^<]+<')"
          echo "Health: $(curl -sk https://chat.marbomebel.ru/api/health | head -1)"
          echo ""
          RESULT_TITLE=$(curl -sk https://chat.marbomebel.ru/ | grep -oP '<title>[^<]+</title>')
          RESULT_RAG=$(curl -sk https://chat.marbomebel.ru/ | grep -c 'RAG\|rag' || echo 0)
          if [ "$RESULT_TITLE" = "<title>AI Ассистент</title>" ] && [ "$RESULT_RAG" = "0" ]; then
            echo "SUCCESS: March 14 version confirmed!"
          else
            echo "FAIL: title=$RESULT_TITLE rag=$RESULT_RAG"
            exit 1
          fi
