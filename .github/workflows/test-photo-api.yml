name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: VK-Callback
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "cat /etc/systemd/system/vk-callback.service 2>/dev/null || echo 'NOT_FOUND'" 2>&1)
          echo "::warning::VK_CALLBACK: $R"

      - name: Traefik
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "find / -maxdepth 4 -name 'docker-compose*' -o -name 'traefik*' 2>/dev/null | grep -v proc | head -10" 2>&1)
          echo "::warning::TRAEFIK_FILES: $R"

      - name: TraefikConfig
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "docker inspect n8n-traefik-traefik-1 --format '{{json .Config.Labels}}' 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(f\"{k}={v}\") for k,v in d.items() if \"route\" in k.lower() or \"host\" in k.lower() or \"chat\" in k.lower()]' 2>/dev/null || echo 'NO_LABELS'" 2>&1)
          echo "::warning::TRAEFIK_LABELS: $R"

      - name: N8NLabels
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "docker ps --format '{{.Names}}' 2>/dev/null | while read c; do echo \"--- \$c ---\"; docker inspect \$c --format '{{json .Config.Labels}}' 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(f\"  {k}={v}\") for k,v in d.items() if \"host\" in k.lower() or \"rule\" in k.lower() or \"route\" in k.lower()]' 2>/dev/null; done || echo 'FAIL'" 2>&1)
          echo "::warning::LABELS: $R"

      - name: Port3847
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "curl -s http://localhost:3847/ 2>/dev/null | head -5 || echo 'NO_RESPONSE'" 2>&1)
          echo "::warning::PORT3847: $R"

      - name: Port3102
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "curl -s http://localhost:3102/ 2>/dev/null | head -5 || echo 'NO_RESPONSE'" 2>&1)
          echo "::warning::PORT3102: $R"

      - name: WebPyFix
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "grep 'conn-error\|retries\|Соединение\|fetchJSON' /opt/webapp/web.py 2>/dev/null | wc -l" 2>&1)
          echo "::warning::WEBPY_FIX_LINES: $R"

      - name: DockerCompose
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "cat /opt/n8n-traefik/docker-compose.yml 2>/dev/null | head -40 || find / -maxdepth 3 -name 'docker-compose.yml' 2>/dev/null | head -5 || echo 'NOT_FOUND'" 2>&1)
          echo "::warning::COMPOSE: $R"
