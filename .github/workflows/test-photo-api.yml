name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run All Diagnostics
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          set +e
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          OUT="diagnostic-report.txt"
          > $OUT

          echo "=== NGINX CONFIG ===" | tee -a $OUT
          $SSH "cat /etc/nginx/sites-enabled/chat-marbomebel 2>/dev/null || echo 'FILE NOT FOUND'" 2>&1 | tee -a $OUT

          echo "" | tee -a $OUT
          echo "=== CHAT UI SEARCH ===" | tee -a $OUT
          $SSH "grep -rn 'Соединение прервано' /opt/ /var/ /home/ /root/ /srv/ /.cache/ /tmp/ 2>/dev/null | head -10 || echo 'NOT FOUND: Соединение прервано'" 2>&1 | tee -a $OUT
          $SSH "grep -rn 'AI Ассистент' /opt/ /var/ /home/ /root/ /srv/ /.cache/ /tmp/ 2>/dev/null | head -10 || echo 'NOT FOUND: AI Ассистент'" 2>&1 | tee -a $OUT
          $SSH "grep -rn 'VPS статус' /opt/ /var/ /home/ /root/ /srv/ /.cache/ /tmp/ 2>/dev/null | head -10 || echo 'NOT FOUND: VPS статус'" 2>&1 | tee -a $OUT

          echo "" | tee -a $OUT
          echo "=== DOCKER ===" | tee -a $OUT
          $SSH "docker ps -a 2>/dev/null || echo 'NO DOCKER'" 2>&1 | tee -a $OUT

          echo "" | tee -a $OUT
          echo "=== CURL LOCALHOST:8000 ===" | tee -a $OUT
          $SSH "curl -s -o /dev/null -w 'HTTP %{http_code} time=%{time_total}s\n' http://localhost:8000/ 2>&1" 2>&1 | tee -a $OUT
          $SSH "curl -s http://localhost:8000/ 2>/dev/null | head -3" 2>&1 | tee -a $OUT

          echo "" | tee -a $OUT
          echo "=== WEBAPP SERVICE ===" | tee -a $OUT
          $SSH "systemctl is-active webapp 2>&1; journalctl -u webapp -n 20 --no-pager 2>/dev/null | tail -15" 2>&1 | tee -a $OUT

          echo "" | tee -a $OUT
          echo "=== WEB.PY CHECK ===" | tee -a $OUT
          $SSH "wc -l /opt/webapp/web.py 2>/dev/null; grep -c 'conn-error' /opt/webapp/web.py 2>/dev/null && echo 'HAS conn-error fix' || echo 'NO conn-error fix'; grep -c 'fetchJSON' /opt/webapp/web.py 2>/dev/null" 2>&1 | tee -a $OUT

          echo "" | tee -a $OUT
          echo "=== ALL SERVICES ===" | tee -a $OUT
          $SSH "systemctl list-units --type=service --state=running --no-pager | grep -vE 'systemd|dbus|ssh|cron|snap|serial|getty|journal|log|networkd|resolved|udev|polkit|modprobe|user@|packagekit|multipathd|unattended'" 2>&1 | tee -a $OUT

          echo "" | tee -a $OUT
          echo "=== PORTS ===" | tee -a $OUT
          $SSH "ss -tlnp" 2>&1 | tee -a $OUT

          echo "" | tee -a $OUT
          echo "=== RESOURCES ===" | tee -a $OUT
          $SSH "df -h / && free -h && uptime" 2>&1 | tee -a $OUT

          echo "DONE" | tee -a $OUT

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-diagnostic-report
          path: diagnostic-report.txt
          retention-days: 3

      - name: Show Report Summary
        if: always()
        run: |
          if [ -f diagnostic-report.txt ]; then
            echo "::warning::$(cat diagnostic-report.txt | head -80 | tr '\n' '|')"
          fi
