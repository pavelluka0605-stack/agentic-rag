name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Investigate and fix
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          OUT="diag-output.txt"

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee $OUT
          echo "=== WHO IS ON PORT 3847 ==="
          PID=$(lsof -t -i:3847 2>/dev/null | head -1)
          if [ -n "$PID" ]; then
            echo "PID: $PID"
            echo "CMD: $(cat /proc/$PID/cmdline 2>/dev/null | tr '\0' ' ')"
            echo "CWD: $(readlink /proc/$PID/cwd 2>/dev/null)"
            echo "PPID: $(grep PPid /proc/$PID/status 2>/dev/null)"
            PPID=$(grep PPid /proc/$PID/status 2>/dev/null | awk '{print $2}')
            echo "PARENT CMD: $(cat /proc/$PPID/cmdline 2>/dev/null | tr '\0' ' ')"
            echo "PARENT NAME: $(cat /proc/$PPID/comm 2>/dev/null)"
            echo ""
            echo "=== PROCESS TREE ==="
            pstree -ap $PID 2>/dev/null || ps -ef | grep $PID
          fi

          echo ""
          echo "=== ALL NODE PROCESSES ==="
          ps aux | grep node | grep -v grep

          echo ""
          echo "=== ALL SYSTEMD UNITS WITH 'chat' ==="
          systemctl list-units --all | grep -i chat

          echo ""
          echo "=== CRONTAB ==="
          crontab -l 2>/dev/null || echo "no crontab"

          echo ""
          echo "=== PM2 ==="
          pm2 list 2>/dev/null || echo "no pm2"

          echo ""
          echo "=== MASK + KILL + START ==="
          systemctl mask claude-chat
          systemctl stop claude-chat 2>/dev/null || true
          sleep 2
          for p in $(lsof -t -i:3847 2>/dev/null); do kill -9 $p; done
          sleep 2
          for p in $(lsof -t -i:3847 2>/dev/null); do kill -9 $p; done
          sleep 2

          echo "Port check:"
          lsof -i:3847 2>/dev/null && echo "STILL BUSY" || echo "PORT FREE"

          systemctl unmask claude-chat
          systemctl daemon-reload
          systemctl start claude-chat
          sleep 5

          echo ""
          echo "=== FINAL STATUS ==="
          systemctl is-active claude-chat && echo "SERVICE OK" || echo "SERVICE FAIL"
          curl -s --max-time 5 http://localhost:3847/api/health || echo "health fail"
          journalctl -u claude-chat -n 5 --no-pager
          REMOTE

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: investigate + fix [skip ci]"
            git push origin main
          }
