name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Nginx
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 15 $SSH "cat /etc/nginx/sites-enabled/chat-marbomebel 2>/dev/null || echo 'NOT FOUND'" 2>&1)
          echo "::warning::NGINX: $R"

      - name: Chat Search
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 20 $SSH "grep -rl 'Соединение прервано' /opt/ /var/ /home/ /root/ 2>/dev/null | head -5 || echo 'NOT_FOUND'" 2>&1)
          echo "::warning::SEARCH_CONNECTION: $R"

      - name: Chat Search 2
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 20 $SSH "grep -rl 'VPS статус\|AI Ассистент' /opt/ /var/ /home/ /root/ 2>/dev/null | head -5 || echo 'NOT_FOUND'" 2>&1)
          echo "::warning::SEARCH_ASSISTANT: $R"

      - name: Docker
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "docker ps --format '{{.Names}} | {{.Status}} | {{.Ports}}' 2>/dev/null || echo 'NO_DOCKER'" 2>&1)
          echo "::warning::DOCKER: $R"

      - name: Curl
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "curl -s http://localhost:8000/ 2>/dev/null | grep -oE '<title>[^<]+</title>' || echo 'NO_TITLE'" 2>&1)
          echo "::warning::CURL_TITLE: $R"

      - name: WebPy
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "wc -lc /opt/webapp/web.py; grep -c 'conn-error' /opt/webapp/web.py && echo 'HAS_FIX' || echo 'NO_FIX'" 2>&1)
          echo "::warning::WEBPY: $R"

      - name: Services
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "systemctl list-units --type=service --state=running --no-pager | grep -vE 'systemd|dbus|ssh|cron|snap|serial|getty|journal|log|networkd|resolved|udev|polkit|modprobe|user@|packagekit|multipathd|unattended' | awk '{print \$1}' | tr '\n' ' '" 2>&1)
          echo "::warning::SERVICES: $R"

      - name: Logs
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "journalctl -u webapp -n 5 --no-pager 2>/dev/null | tail -5" 2>&1)
          echo "::warning::LOGS: $R"
