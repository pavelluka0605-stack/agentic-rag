name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy server.js fix and patch index.html
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          # 1. Backup and deploy server.js
          $SSH "cp /opt/claude-chat/server.js /opt/claude-chat/server.js.bak"
          $SCP claude-chat/server.js "$VPS_USER@$VPS_HOST:/opt/claude-chat/server.js"
          echo "✓ server.js deployed"

          # 2. Patch index.html on VPS to improve error handling
          # Replace the generic "Соединение прервано" with auto-recovery
          $SSH 'cd /opt/claude-chat/public && cp index.html index.html.bak'

          # Use sed to modify the error handling: add auto-retry after connection error
          $SSH "cd /opt/claude-chat/public && sed -i \"s/errMsg = '\\\"Соединение прервано\\. Проверьте интернет и попробуйте ещё раз\\.\\\"';/errMsg = '\\\"Соединение прервано\\. Автоматически переподключаемся\\.\\.\\.\\\"';\\n              setTimeout(() => { if (typeof recoverBackgroundRequest === 'function') recoverBackgroundRequest(); }, 3000);/\" index.html" || echo "sed patch failed (non-critical)"

          # 3. Restart service
          $SSH "systemctl restart claude-chat 2>/dev/null || (cd /opt/claude-chat && pm2 restart claude-chat 2>/dev/null) || (pkill -f 'node.*server.js' 2>/dev/null; sleep 1; cd /opt/claude-chat && nohup node server.js >> /var/log/claude-chat.log 2>&1 &)"
          sleep 3

          # 4. Health check
          echo "=== HEALTH CHECK ==="
          $SSH "curl -s http://localhost:3847/api/health" && echo ""

          # 5. Verify heartbeat config in deployed server.js
          echo "=== DEPLOYED SERVER.JS KEY LINES ==="
          $SSH "grep -n 'heartbeat\|setInterval\|TIMEOUT_MS\|5000\|clearInterval' /opt/claude-chat/server.js"

          # 6. Check nginx proxy timeouts
          echo "=== NGINX PROXY TIMEOUTS ==="
          $SSH "grep -i 'timeout\|proxy_read\|proxy_send\|proxy_connect\|keepalive' /etc/nginx/sites-enabled/* 2>/dev/null || echo 'no timeout configs in nginx'"

      - name: Test SSE connection
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        continue-on-error: true
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          # Get the bearer token from .env
          TOKEN=$($SSH "grep BEARER_TOKEN /opt/claude-chat/.env | cut -d= -f2")

          # Test SSE endpoint with a simple message
          echo "=== SSE TEST (10s timeout) ==="
          $SSH "timeout 10 curl -s -N -X POST http://localhost:3847/api/chat \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer $TOKEN' \
            -d '{\"message\": \"echo hello\"}' 2>&1 || echo 'SSE test completed/timed out'"
