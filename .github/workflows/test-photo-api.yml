name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy and fix
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"

          # 1. Deploy server.js if it exists in repo
          if [ -f claude-chat/server.js ]; then
            $SSH "cp /opt/claude-chat/server.js /opt/claude-chat/server.js.bak"
            $SCP claude-chat/server.js "$VPS_USER@$VPS_HOST:/opt/claude-chat/server.js"
            echo "✓ server.js deployed"
          fi

          # 2. Fix nginx proxy timeouts for SSE
          echo "=== Fixing nginx timeouts ==="
          # Find the nginx config for chat
          CONF=$($SSH "grep -rl '3847\|chat.marbomebel' /etc/nginx/sites-enabled/ 2>/dev/null | head -1")
          echo "Nginx config: $CONF"

          if [ -n "$CONF" ]; then
            # Check if already has long timeout
            HAS=$($SSH "grep -c 'proxy_read_timeout 600' $CONF 2>/dev/null" || echo "0")
            if [ "$HAS" = "0" ]; then
              # Check if has any proxy_read_timeout
              HAS_ANY=$($SSH "grep -c 'proxy_read_timeout' $CONF 2>/dev/null" || echo "0")
              if [ "$HAS_ANY" != "0" ]; then
                # Update existing
                $SSH "sed -i 's/proxy_read_timeout.*/proxy_read_timeout 600s;/' $CONF"
                $SSH "sed -i 's/proxy_send_timeout.*/proxy_send_timeout 600s;/' $CONF"
                echo "Updated existing timeout values"
              else
                # Add after proxy_pass
                $SSH "sed -i '/proxy_pass.*3847/a\\        proxy_read_timeout 600s;\\n        proxy_send_timeout 600s;\\n        proxy_connect_timeout 60s;\\n        proxy_buffering off;\\n        proxy_cache off;' $CONF"
                echo "Added timeout settings after proxy_pass"
              fi
              $SSH "nginx -t && systemctl reload nginx && echo '✓ nginx reloaded' || echo '✗ nginx reload failed'"
            else
              echo "Nginx timeout already set to 600s"
            fi
            $SSH "cat $CONF"
          else
            echo "No nginx config for chat found - checking if Traefik handles it"
            $SSH "docker ps 2>/dev/null | grep -i traefik || echo 'no traefik'"
          fi

          # 3. Restart claude-chat
          $SSH "systemctl restart claude-chat 2>/dev/null && echo '✓ systemd restart' || echo 'trying pm2...'"
          $SSH "pm2 restart claude-chat 2>/dev/null && echo '✓ pm2 restart' || echo 'trying manual...'"

          sleep 3

          # 4. Verify
          echo ""
          echo "=== HEALTH CHECK ==="
          HEALTH=$($SSH "curl -s http://localhost:3847/api/health")
          echo "$HEALTH"

          echo ""
          echo "=== KEY SERVER.JS LINES ==="
          $SSH "grep -n 'heartbeat\|TIMEOUT_MS\|5000\|clearInterval\|clearTimeout' /opt/claude-chat/server.js"
