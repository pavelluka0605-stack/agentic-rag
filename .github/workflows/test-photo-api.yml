name: Deploy red header test

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy and verify
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          OUT="diag-output.txt"

          echo "=== Deploy red header test ===" | tee $OUT
          $SCP claude-chat/public/index.html $VPS_USER@$VPS_HOST:/opt/claude-chat/public/index.html 2>&1 | tee -a $OUT
          $SCP claude-chat/server.js $VPS_USER@$VPS_HOST:/opt/claude-chat/server.js 2>&1 | tee -a $OUT

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee -a $OUT
          cd /opt/claude-chat
          pm2 restart claude-chat
          sleep 3

          echo ""
          echo "=== Verify from localhost ==="
          echo "Header bg color:"
          curl -s http://localhost:3847/ | grep -oP 'background:\s*[^;]+' | head -5
          echo ""
          echo "Contains #cc0000 (red):"
          curl -s http://localhost:3847/ | grep -c '#cc0000'
          REMOTE

          echo "" | tee -a $OUT
          echo "=== Verify from OUTSIDE (GitHub runner) ===" | tee -a $OUT
          echo "Header bg color from HTTPS:" | tee -a $OUT
          curl -sk https://chat.marbomebel.ru/ | grep -oP 'background:\s*[^;]+' | head -5 | tee -a $OUT
          echo "" | tee -a $OUT
          echo "Contains #cc0000:" | tee -a $OUT
          curl -sk https://chat.marbomebel.ru/ | grep -c '#cc0000' | tee -a $OUT
          echo "" | tee -a $OUT
          echo "Full page size:" | tee -a $OUT
          curl -sk https://chat.marbomebel.ru/ | wc -c | tee -a $OUT
          echo "" | tee -a $OUT
          echo "DONE" | tee -a $OUT

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "test: red header deployed and verified [skip ci]"
            git push origin HEAD
          }
