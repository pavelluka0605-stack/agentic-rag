name: Test Photo API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploy to finish
        run: sleep 180

      - name: Test /api/photo endpoint availability
        run: |
          echo "=== Testing chat.marbomebel.ru /api/photo ==="

          # Test 1: GET should return 405 (Method Not Allowed) — endpoint exists
          echo "--- Test 1: GET /api/photo (expect 405) ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://chat.marbomebel.ru/api/photo)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "405" ]; then
            echo "PASS: Endpoint exists (405 Method Not Allowed for GET)"
          elif [ "$STATUS" = "200" ]; then
            echo "PASS: Endpoint exists (200 OK)"
          else
            echo "WARN: Unexpected status $STATUS"
          fi

          # Test 2: POST without file — should return 422 (validation error)
          echo ""
          echo "--- Test 2: POST /api/photo without file (expect 422) ---"
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 10 -X POST https://chat.marbomebel.ru/api/photo)
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -1)
          echo "HTTP Status: $STATUS"
          echo "Body: $BODY"
          if [ "$STATUS" = "422" ]; then
            echo "PASS: Validation error as expected (no file provided)"
          else
            echo "INFO: Status $STATUS"
          fi

          # Test 3: POST with a test image file
          echo ""
          echo "--- Test 3: POST /api/photo with test image ---"
          # Create a minimal valid JPEG (1x1 pixel)
          printf '\xff\xd8\xff\xe0\x00\x10JFIF\x00\x01\x01\x00\x00\x01\x00\x01\x00\x00\xff\xdb\x00C\x00\x08\x06\x06\x07\x06\x05\x08\x07\x07\x07\t\t\x08\n\x0c\x14\r\x0c\x0b\x0b\x0c\x19\x12\x13\x0f\x14\x1d\x1a\x1f\x1e\x1d\x1a\x1c\x1c $.\x27 ",#\x1c\x1c(7),01444\x1f\x27444444444444\xff\xc0\x00\x0b\x08\x00\x01\x00\x01\x01\x01\x11\x00\xff\xc4\x00\x1f\x00\x00\x01\x05\x01\x01\x01\x01\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x01\x02\x03\x04\x05\x06\x07\x08\t\n\x0b\xff\xc4\x00\xb5\x10\x00\x02\x01\x03\x03\x02\x04\x03\x05\x05\x04\x04\x00\x00\x01}\x01\x02\x03\x00\x04\x11\x05\x12!1A\x06\x13Qa\x07"q\x142\x81\x91\xa1\x08#B\xb1\xc1\x15R\xd1\xf0$3br\x82\t\n\x16\x17\x18\x19\x1a%&\x27()*456789:CDEFGHIJSTUVWXYZcdefghijstuvwxyz\x83\x84\x85\x86\x87\x88\x89\x8a\x92\x93\x94\x95\x96\x97\x98\x99\x9a\xa2\xa3\xa4\xa5\xa6\xa7\xa8\xa9\xaa\xb2\xb3\xb4\xb5\xb6\xb7\xb8\xb9\xba\xc2\xc3\xc4\xc5\xc6\xc7\xc8\xc9\xca\xd2\xd3\xd4\xd5\xd6\xd7\xd8\xd9\xda\xe1\xe2\xe3\xe4\xe5\xe6\xe7\xe8\xe9\xea\xf1\xf2\xf3\xf4\xf5\xf6\xf7\xf8\xf9\xfa\xff\xda\x00\x08\x01\x01\x00\x00?\x00\xfb\xd2\x8a(\x03\xff\xd9' > /tmp/test.jpg

          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 \
            -X POST https://chat.marbomebel.ru/api/photo \
            -F "file=@/tmp/test.jpg;type=image/jpeg")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -1)
          echo "HTTP Status: $STATUS"
          echo "Body: $BODY"

          # Test 4: POST /api/photo/analyze
          echo ""
          echo "--- Test 4: POST /api/photo/analyze with test image ---"
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 \
            -X POST https://chat.marbomebel.ru/api/photo/analyze \
            -F "file=@/tmp/test.jpg;type=image/jpeg")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -1)
          echo "HTTP Status: $STATUS"
          echo "Body: $BODY"

          # Test 5: Basic health
          echo ""
          echo "--- Test 5: GET / (homepage) ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://chat.marbomebel.ru/)
          echo "HTTP Status: $STATUS"

          echo ""
          echo "=== Tests complete ==="
