name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fetch VPS data
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          OUT="diag-output.txt"

          echo "=== VPS DIAG $(date -u) ===" > $OUT

          echo "" >> $OUT
          echo "=== HEALTH ===" >> $OUT
          $SSH "curl -s http://localhost:3847/api/health" >> $OUT 2>&1

          echo "" >> $OUT
          echo "=== JOURNAL (last 50) ===" >> $OUT
          $SSH "journalctl -u claude-chat -n 50 --no-pager" >> $OUT 2>&1

          echo "" >> $OUT
          echo "=== CONVERSATION DATA ON DISK ===" >> $OUT
          $SSH "ls -la /opt/claude-chat/data/ 2>/dev/null || echo 'no data dir'" >> $OUT 2>&1
          $SSH "cat /opt/claude-chat/data/conversations.json 2>/dev/null | python3 -m json.tool 2>/dev/null || echo 'no conversations.json'" >> $OUT 2>&1

          echo "" >> $OUT
          echo "=== SERVICE UPTIME ===" >> $OUT
          $SSH "systemctl status claude-chat --no-pager 2>&1 | head -15" >> $OUT 2>&1

          cat $OUT

      - name: Save to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: VPS data dump [skip ci]"
            git push origin main
          }
