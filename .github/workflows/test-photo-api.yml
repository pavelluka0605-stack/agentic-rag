name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Force redeploy and verify
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          OUT="diag-output.txt"

          echo "=== STEP 1: Copy fresh files to VPS ===" | tee $OUT

          # Полная перезаливка claude-chat на VPS
          $SCP -r claude-chat/ $VPS_USER@$VPS_HOST:/opt/ 2>&1 | tee -a $OUT
          echo "Files copied" | tee -a $OUT

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee -a $OUT

          echo ""
          echo "=== STEP 2: Stop and delete old PM2 process ==="
          pm2 stop claude-chat 2>/dev/null || true
          pm2 delete claude-chat 2>/dev/null || true
          echo "Old process removed"

          echo ""
          echo "=== STEP 3: Install deps ==="
          cd /opt/claude-chat
          npm install --omit=dev 2>&1 | tail -5
          mkdir -p data

          echo ""
          echo "=== STEP 4: Start fresh PM2 process ==="
          pm2 start server.js --name claude-chat
          sleep 4
          pm2 list

          echo ""
          echo "=== STEP 5: Health check ==="
          HEALTH=$(curl -s --max-time 5 http://localhost:3847/api/health)
          echo "$HEALTH"

          echo ""
          echo "=== STEP 6: Verify index.html on disk ==="
          md5sum /opt/claude-chat/public/index.html /opt/claude-chat/server.js
          ls -la /opt/claude-chat/public/index.html /opt/claude-chat/server.js

          echo ""
          echo "=== STEP 7: What browser actually gets ==="
          RESPONSE=$(curl -s --max-time 5 http://localhost:3847/)
          echo "$RESPONSE" | head -10
          echo "..."
          echo "$RESPONSE" | grep -o '<title>[^<]*</title>'
          echo "Response length: $(echo "$RESPONSE" | wc -c) bytes"
          echo "Has double-tap protection: $(echo "$RESPONSE" | grep -c 'lastSendTime')"
          echo "Has PWA manifest: $(echo "$RESPONSE" | grep -c 'manifest')"
          echo "Avatar type: $(echo "$RESPONSE" | grep -o '&#[0-9]*;' | head -1)"

          echo ""
          echo "=== STEP 8: Docker containers ==="
          docker ps --format 'table {{.ID}}\t{{.Names}}\t{{.Ports}}\t{{.Image}}' 2>/dev/null

          echo ""
          echo "=== STEP 9: Docker reverse proxy config ==="
          # Check Caddy
          docker exec $(docker ps -q --filter "ancestor=caddy" 2>/dev/null || docker ps -q --filter "name=caddy" 2>/dev/null) cat /etc/caddy/Caddyfile 2>/dev/null || echo "no caddy"
          # Check Traefik
          docker exec $(docker ps -q --filter "name=traefik" 2>/dev/null) cat /etc/traefik/traefik.yml 2>/dev/null || echo "no traefik"
          # Check nginx-proxy
          docker exec $(docker ps -q --filter "name=nginx" 2>/dev/null) cat /etc/nginx/conf.d/default.conf 2>/dev/null || echo "no docker nginx"

          echo ""
          echo "=== STEP 10: Docker compose files ==="
          find /opt /root -name 'docker-compose.yml' -o -name 'docker-compose.yaml' -o -name 'Caddyfile' 2>/dev/null | head -10
          for f in $(find /opt /root -name 'docker-compose.yml' -o -name 'Caddyfile' 2>/dev/null | head -5); do
            echo "--- $f ---"
            cat "$f" 2>/dev/null | head -40
            echo ""
          done

          echo ""
          echo "=== STEP 11: Test direct curl vs domain ==="
          echo "Direct localhost:3847:"
          curl -s --max-time 5 http://localhost:3847/ | grep '<title>' || echo "no title"
          echo "Via domain (host header):"
          curl -s --max-time 5 -H "Host: chat.marbomebel.ru" http://localhost:80/ | grep '<title>' 2>/dev/null || echo "port 80 blocked or different"
          echo "External HTTPS:"
          curl -sL --max-time 5 https://chat.marbomebel.ru/ | grep '<title>' 2>/dev/null || echo "HTTPS failed"

          echo ""
          echo "DONE"
          REMOTE

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: force redeploy march 14 version [skip ci]"
            git push origin main
          }
