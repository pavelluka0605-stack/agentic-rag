name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy chat with cache-bust redirect
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          OUT="diag-output.txt"

          echo "=== 1. Copy fresh files ===" | tee $OUT
          $SCP -r claude-chat/ $VPS_USER@$VPS_HOST:/opt/ 2>&1 | tee -a $OUT

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee -a $OUT

          echo ""
          echo "=== 2. Restart PM2 ==="
          cd /opt/claude-chat
          npm install --omit=dev 2>&1 | tail -3
          mkdir -p data
          pm2 stop claude-chat 2>/dev/null || true
          pm2 delete claude-chat 2>/dev/null || true
          pm2 start server.js --name claude-chat
          sleep 3
          pm2 list

          echo ""
          echo "=== 3. Test redirect (no version param) ==="
          echo "curl -sI http://localhost:3847/ :"
          curl -sI --max-time 5 http://localhost:3847/
          echo ""
          echo "curl -sI http://localhost:3847/?v=20260315v3 :"
          curl -sI --max-time 5 "http://localhost:3847/?v=20260315v3"

          echo ""
          echo "=== 4. Test HTTPS redirect ==="
          echo "HTTPS without param (should redirect):"
          curl -skI --max-time 5 https://chat.marbomebel.ru/
          echo ""
          echo "HTTPS with correct param (should 200):"
          curl -skI --max-time 5 "https://chat.marbomebel.ru/?v=20260315v3"

          echo ""
          echo "=== 5. Full follow redirect test ==="
          curl -skL --max-time 5 https://chat.marbomebel.ru/ | grep -oP '<title>[^<]*</title>|v15\.03|2026-03-15-v2' | head -5
          echo "Size: $(curl -skL --max-time 5 https://chat.marbomebel.ru/ | wc -c)"

          echo ""
          echo "=== 6. PM2 health ==="
          curl -s --max-time 5 http://localhost:3847/api/health

          echo ""
          echo "DONE"
          REMOTE

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: cache-bust redirect deployed [skip ci]"
            git push origin main
          }
