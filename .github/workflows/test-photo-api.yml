name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fix and restart service
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          OUT="diag-output.txt"

          echo "=== FIX SERVICE $(date -u) ===" > $OUT

          echo "" >> $OUT
          echo "=== STEP 1: Disable auto-restart ===" >> $OUT
          $SSH "systemctl stop claude-chat 2>/dev/null; systemctl disable claude-chat 2>/dev/null; echo 'stopped and disabled'" >> $OUT 2>&1
          sleep 3

          echo "" >> $OUT
          echo "=== STEP 2: Kill ALL on port 3847 ===" >> $OUT
          $SSH "for p in \$(lsof -t -i:3847 2>/dev/null); do echo \"killing \$p\"; kill -9 \$p; done; echo done" >> $OUT 2>&1
          sleep 3

          echo "" >> $OUT
          echo "=== STEP 3: Verify port free ===" >> $OUT
          $SSH "lsof -i:3847 2>/dev/null && echo 'PORT STILL BUSY' || echo 'PORT IS FREE'" >> $OUT 2>&1

          echo "" >> $OUT
          echo "=== STEP 4: Re-enable and start ===" >> $OUT
          $SSH "systemctl daemon-reload; systemctl enable claude-chat; systemctl start claude-chat" >> $OUT 2>&1
          sleep 5

          echo "" >> $OUT
          echo "=== STEP 5: Check result ===" >> $OUT
          $SSH "systemctl is-active claude-chat && echo 'SERVICE_OK' || echo 'SERVICE_FAIL'" >> $OUT 2>&1
          $SSH "curl -s --max-time 5 http://localhost:3847/api/health || echo 'health failed'" >> $OUT 2>&1

          echo "" >> $OUT
          echo "=== JOURNAL (last 15) ===" >> $OUT
          $SSH "journalctl -u claude-chat -n 15 --no-pager" >> $OUT 2>&1

          cat $OUT

      - name: Save output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: fix service restart [skip ci]"
            git push origin main
          }
