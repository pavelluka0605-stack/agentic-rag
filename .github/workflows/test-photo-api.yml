name: Test Photo API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test /api/photo endpoint and report
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          REPORT=""
          ALL_PASS=true

          # Test 1: GET should return 405
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://chat.marbomebel.ru/api/photo || echo "000")
          if [ "$STATUS" = "405" ]; then
            REPORT+="✅ GET /api/photo → 405 (endpoint exists)\n"
          else
            REPORT+="❌ GET /api/photo → $STATUS (expected 405)\n"
            ALL_PASS=false
          fi

          # Test 2: POST without file
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -X POST https://chat.marbomebel.ru/api/photo || echo "000")
          if [ "$STATUS" = "422" ]; then
            REPORT+="✅ POST /api/photo (no file) → 422\n"
          else
            REPORT+="❌ POST /api/photo (no file) → $STATUS (expected 422)\n"
            ALL_PASS=false
          fi

          # Test 3: POST with test image
          python3 -c "
          import struct
          # Create minimal 1x1 PNG
          data = b'\\x89PNG\\r\\n\\x1a\\n'
          # IHDR
          ihdr = struct.pack('>IIBBBBB', 1, 1, 8, 2, 0, 0, 0)
          import zlib
          crc = struct.pack('>I', zlib.crc32(b'IHDR' + ihdr) & 0xffffffff)
          data += struct.pack('>I', len(ihdr)) + b'IHDR' + ihdr + crc
          # IDAT
          raw = zlib.compress(b'\\x00\\xff\\x00\\x00')
          crc2 = struct.pack('>I', zlib.crc32(b'IDAT' + raw) & 0xffffffff)
          data += struct.pack('>I', len(raw)) + b'IDAT' + raw + crc2
          # IEND
          crc3 = struct.pack('>I', zlib.crc32(b'IEND') & 0xffffffff)
          data += struct.pack('>I', 0) + b'IEND' + crc3
          with open('/tmp/test.png', 'wb') as f:
              f.write(data)
          "

          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 60 \
            -X POST https://chat.marbomebel.ru/api/photo \
            -F "file=@/tmp/test.png;type=image/png" || echo -e "\n000")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -1)
          if [ "$STATUS" = "200" ]; then
            REPORT+="✅ POST /api/photo (with image) → 200\n"
            REPORT+="   Response: ${BODY:0:200}\n"
          else
            REPORT+="❌ POST /api/photo (with image) → $STATUS\n"
            REPORT+="   Response: ${BODY:0:200}\n"
            ALL_PASS=false
          fi

          # Test 4: POST /api/photo/analyze
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 60 \
            -X POST https://chat.marbomebel.ru/api/photo/analyze \
            -F "file=@/tmp/test.png;type=image/png" || echo -e "\n000")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -1)
          if [ "$STATUS" = "200" ]; then
            REPORT+="✅ POST /api/photo/analyze → 200\n"
            REPORT+="   Response: ${BODY:0:200}\n"
          else
            REPORT+="❌ POST /api/photo/analyze → $STATUS\n"
            REPORT+="   Response: ${BODY:0:200}\n"
            ALL_PASS=false
          fi

          # Test 5: Homepage
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://chat.marbomebel.ru/ || echo "000")
          if [ "$STATUS" = "200" ]; then
            REPORT+="✅ GET / (homepage) → 200\n"
          else
            REPORT+="❌ GET / (homepage) → $STATUS\n"
            ALL_PASS=false
          fi

          echo -e "$REPORT"

          # Send to Telegram
          if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            HEADER="📸 Photo API Test Results"
            if [ "$ALL_PASS" = true ]; then
              HEADER+=" ✅ ALL PASS"
            else
              HEADER+=" ⚠️ SOME FAILED"
            fi
            MSG="$HEADER\n\n$REPORT"
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="$TG_CHAT_ID" \
              -d text="$(echo -e "$MSG")" \
              -d parse_mode="HTML" > /dev/null 2>&1 || true
          fi

          # Fail workflow if any test failed
          if [ "$ALL_PASS" = false ]; then
            echo "::error::Some tests failed"
            exit 1
          fi
