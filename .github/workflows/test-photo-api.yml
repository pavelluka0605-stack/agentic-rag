name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Full verification
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          echo "=== 1. HEALTH CHECK ==="
          $SSH "curl -s http://localhost:3847/api/health"
          echo ""

          echo "=== 2. SERVER.JS VERSION CHECK ==="
          $SSH "grep -n 'heartbeat\|TIMEOUT_MS\|5000\|clearInterval\|clearTimeout\|processTimeout' /opt/claude-chat/server.js"
          echo ""

          echo "=== 3. NGINX CONFIG ==="
          $SSH "cat /etc/nginx/sites-enabled/* 2>/dev/null"
          echo ""

          echo "=== 4. SERVICE STATUS ==="
          $SSH "systemctl status claude-chat --no-pager 2>/dev/null | head -15 || echo 'no systemd'"
          echo ""

          echo "=== 5. SSE TEST ==="
          TOKEN=$($SSH "grep BEARER_TOKEN /opt/claude-chat/.env | cut -d= -f2")
          $SSH "timeout 15 curl -sN -X POST http://localhost:3847/api/chat \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer $TOKEN' \
            -d '{\"message\":\"echo test-ok\"}' 2>&1" || echo "SSE test completed"
          echo ""

          echo "=== 6. EXTERNAL CURL (through Traefik+nginx) ==="
          $SSH "curl -sI https://chat.marbomebel.ru/ 2>/dev/null | head -10 || echo 'external test failed'"
          echo ""

          echo "=== 7. INDEX.HTML ERROR LINES ==="
          $SSH "grep -n 'Соединение прервано\|recoverBackground\|savePendingRequest\|reconnect\|getReader' /opt/claude-chat/public/index.html | head -20"
