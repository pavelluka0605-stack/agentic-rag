name: "CLEAN Deploy March 14"

on:
  push:
    branches: [main, "claude/*"]
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: clean-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: CLEAN deploy
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          OUT="diag-output.txt"

          echo "=== CLEAN DEPLOY $(date) ===" | tee $OUT
          echo "Files in checkout:" | tee -a $OUT
          find claude-chat/ -type f | sort | tee -a $OUT

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee -a $OUT

          echo ""
          echo "=== 1. Stop everything ==="
          pm2 delete claude-chat 2>/dev/null || true
          systemctl stop claude-chat 2>/dev/null || true
          systemctl disable claude-chat 2>/dev/null || true
          rm -f /etc/systemd/system/claude-chat.service
          pkill -9 -f 'node.*claude-chat' 2>/dev/null || true
          sleep 2

          echo ""
          echo "=== 2. WIPE public/ (keep uploads and data) ==="
          # Save uploads and data
          [ -d /opt/claude-chat/uploads ] && mv /opt/claude-chat/uploads /tmp/chat-uploads-bak 2>/dev/null
          [ -d /opt/claude-chat/public/uploads ] && mv /opt/claude-chat/public/uploads /tmp/chat-pub-uploads-bak 2>/dev/null
          [ -d /opt/claude-chat/data ] && mv /opt/claude-chat/data /tmp/chat-data-bak 2>/dev/null
          [ -f /opt/claude-chat/.env ] && cp /opt/claude-chat/.env /tmp/chat-env-bak 2>/dev/null
          [ -d /opt/claude-chat/node_modules ] && mv /opt/claude-chat/node_modules /tmp/chat-nm-bak 2>/dev/null

          # WIPE everything
          rm -rf /opt/claude-chat/*
          rm -rf /opt/claude-chat/.deploy-trigger

          echo "Wiped /opt/claude-chat/"
          ls -la /opt/claude-chat/
          REMOTE

          echo "" | tee -a $OUT
          echo "=== 3. Copy ONLY March 14 files ===" | tee -a $OUT
          $SCP claude-chat/package.json $VPS_USER@$VPS_HOST:/opt/claude-chat/ 2>&1 | tee -a $OUT
          $SCP claude-chat/server.js $VPS_USER@$VPS_HOST:/opt/claude-chat/ 2>&1 | tee -a $OUT
          $SSH "mkdir -p /opt/claude-chat/public" 2>&1 | tee -a $OUT
          $SCP claude-chat/public/index.html $VPS_USER@$VPS_HOST:/opt/claude-chat/public/ 2>&1 | tee -a $OUT

          $SSH 'bash -s' <<'REMOTE2' 2>&1 | tee -a $OUT

          echo ""
          echo "=== 4. Restore backups ==="
          [ -d /tmp/chat-pub-uploads-bak ] && mv /tmp/chat-pub-uploads-bak /opt/claude-chat/public/uploads
          [ -d /tmp/chat-uploads-bak ] && mv /tmp/chat-uploads-bak /opt/claude-chat/uploads
          [ -d /tmp/chat-data-bak ] && mv /tmp/chat-data-bak /opt/claude-chat/data
          [ -f /tmp/chat-env-bak ] && mv /tmp/chat-env-bak /opt/claude-chat/.env
          [ -d /tmp/chat-nm-bak ] && mv /tmp/chat-nm-bak /opt/claude-chat/node_modules

          echo ""
          echo "=== 5. Files after clean deploy ==="
          find /opt/claude-chat/ -maxdepth 2 -not -path '*/node_modules/*' -not -path '*/uploads/*' | sort

          echo ""
          echo "=== 6. Install & start ==="
          cd /opt/claude-chat
          npm install --omit=dev 2>&1 | tail -3
          mkdir -p data
          pm2 start server.js --name claude-chat
          sleep 3
          pm2 save --force

          echo ""
          echo "=== 7. Verify ==="
          echo "Title: $(curl -s http://localhost:3847/ | grep -oP '<title>[^<]+</title>')"
          echo "Manifest: $(curl -s http://localhost:3847/ | grep -c 'manifest' || echo 0)"
          echo "RAG badge: $(curl -s http://localhost:3847/ | grep -c 'rag-badge' || echo 0)"
          echo "Logo: $(curl -s http://localhost:3847/ | grep -c 'logo.svg' || echo 0)"
          echo "Health: $(curl -s http://localhost:3847/api/health)"
          echo "Files in public:"
          ls -la /opt/claude-chat/public/ | grep -v uploads
          REMOTE2

          echo "" | tee -a $OUT
          echo "=== 8. External check ===" | tee -a $OUT
          sleep 3
          echo "Title: $(curl -sk https://chat.marbomebel.ru/ | grep -oP '<title>[^<]+</title>')" | tee -a $OUT
          echo "Manifest: $(curl -sk https://chat.marbomebel.ru/ | grep -c 'manifest' || echo 0)" | tee -a $OUT
          echo "RAG badge: $(curl -sk https://chat.marbomebel.ru/ | grep -c 'rag-badge' || echo 0)" | tee -a $OUT
          echo "Logo: $(curl -sk https://chat.marbomebel.ru/ | grep -c 'logo.svg' || echo 0)" | tee -a $OUT
          echo "Health: $(curl -sk https://chat.marbomebel.ru/api/health)" | tee -a $OUT

          echo "" | tee -a $OUT
          echo "DONE $(date)" | tee -a $OUT

      - name: Save
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet || {
            git commit -m "clean-deploy: March 14 verified [skip ci]"
            git push origin HEAD
          }
