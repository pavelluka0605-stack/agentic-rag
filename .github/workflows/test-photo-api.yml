name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Diagnostics to summary
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          {
            echo "## Health Check"
            echo '```json'
            $SSH "curl -s http://localhost:3847/api/health"
            echo ''
            echo '```'

            echo "## Server.js Heartbeat/Timeout Lines"
            echo '```'
            $SSH "grep -n 'heartbeat\|setInterval\|TIMEOUT_MS\|5000\|15000\|clearInterval\|clearTimeout' /opt/claude-chat/server.js"
            echo '```'

            echo "## Nginx Config"
            echo '```'
            $SSH "cat /etc/nginx/sites-enabled/* 2>/dev/null || echo 'no configs'"
            echo '```'

            echo "## Index.html Error Handler (lines 1200-1260)"
            echo '```javascript'
            $SSH "sed -n '1200,1260p' /opt/claude-chat/public/index.html"
            echo '```'

            echo "## Index.html SSE/Fetch (lines 700-780)"
            echo '```javascript'
            $SSH "sed -n '700,780p' /opt/claude-chat/public/index.html"
            echo '```'

            echo "## Index.html reconnect/recovery functions"
            echo '```javascript'
            $SSH "grep -n -A5 'Соединение прервано\|recoverBackground\|savePendingRequest\|reconnect\|EventSource\|reader\|getReader\|ReadableStream' /opt/claude-chat/public/index.html | head -80"
            echo '```'

            echo "## Claude-chat service"
            echo '```'
            $SSH "systemctl status claude-chat --no-pager 2>/dev/null | head -15 || echo 'no systemd service'"
            $SSH "pm2 list 2>/dev/null || echo 'no pm2'"
            echo '```'

            echo "## Claude-chat logs (last 15)"
            echo '```'
            $SSH "journalctl -u claude-chat -n 15 --no-pager 2>/dev/null || echo 'no journalctl logs'"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
