name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Download index.html via SSH cat
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          mkdir -p claude-chat/public
          $SSH "cat /opt/claude-chat/public/index.html" > claude-chat/public/index.html
          echo "Downloaded: $(wc -l < claude-chat/public/index.html) lines, $(wc -c < claude-chat/public/index.html) bytes"

      - name: Verify server.js fix deployed
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        continue-on-error: true
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          echo "=== HEALTH ==="
          $SSH "curl -s http://localhost:3847/api/health"
          echo ""
          echo "=== HEARTBEAT CONFIG ==="
          $SSH "grep -n 'heartbeat\|setInterval\|TIMEOUT_MS' /opt/claude-chat/server.js"
          echo ""
          echo "=== NGINX ==="
          $SSH "cat /etc/nginx/sites-enabled/* 2>/dev/null | head -60"
          echo ""
          echo "=== SERVICE ==="
          $SSH "systemctl status claude-chat --no-pager 2>/dev/null | head -15"

      - name: Commit index.html to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f claude-chat/public/index.html ] && [ -s claude-chat/public/index.html ]; then
            git add claude-chat/public/index.html
            CHANGES=$(git diff --cached --stat)
            if [ -n "$CHANGES" ]; then
              echo "$CHANGES"
              git commit -m "chore: add index.html from VPS"
              git push origin main
            else
              echo "No changes to commit"
            fi
          else
            echo "ERROR: index.html not downloaded or empty"
            exit 1
          fi
