name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: FindDir
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "ls -la /opt/claud* 2>/dev/null; echo '---'; find /opt -maxdepth 2 -name '*.js' -path '*claud*' 2>/dev/null | head -5; echo '---'; cat /proc/630484/cmdline 2>/dev/null | tr '\0' ' ' || ps aux | grep 3847 | grep -v grep" 2>&1)
          echo "::warning::DIR: $R"

      - name: MainJS
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "find /opt -maxdepth 3 -name 'server.js' -o -name 'app.js' -o -name 'index.js' 2>/dev/null | while read f; do echo \"--- \$f ---\"; head -5 \$f; done" 2>&1)
          echo "::warning::MAINJS: $R"

      - name: ErrSource
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "grep -rn 'Соединение прервано\|Проверьте интернет' /opt/claud* /opt/vk-callback/ 2>/dev/null | head -5 || echo 'NOT_FOUND'" 2>&1)
          echo "::warning::ERRSRC: $R"

      - name: VKCBFiles
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "ls -la /opt/vk-callback/ 2>/dev/null | head -15; echo '---'; cat /opt/vk-callback/package.json 2>/dev/null | head -10 || echo 'no package.json'" 2>&1)
          echo "::warning::VKCB: $R"

      - name: Logs3847
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "journalctl -u vk-callback -n 10 --no-pager 2>/dev/null | tail -8" 2>&1)
          echo "::warning::LOGS: $R"

      - name: ServiceUnit
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "systemctl cat vk-callback 2>/dev/null | head -15" 2>&1)
          echo "::warning::UNIT: $R"

      - name: ConnErrCode
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "grep -n 'Соединение\|прервано\|Проверьте\|интернет\|connection\|abort\|timeout' /opt/claud*/server.js /opt/claud*/app.js /opt/claud*/index.js /opt/claud*/src/*.js 2>/dev/null | head -10 || echo 'NOT_FOUND'" 2>&1)
          echo "::warning::CONN: $R"
