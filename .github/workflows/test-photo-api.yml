name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/fix-connection-error-oXw4p
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Download index.html via SSH cat
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          # Check what files exist
          echo "=== Files in /opt/claude-chat/public/ ==="
          $SSH "ls -la /opt/claude-chat/public/" || echo "directory not found"

          # Download via SSH cat (more reliable than SCP for large files)
          mkdir -p claude-chat/public
          $SSH "cat /opt/claude-chat/public/index.html" > claude-chat/public/index.html
          echo "Downloaded index.html: $(wc -l < claude-chat/public/index.html) lines, $(wc -c < claude-chat/public/index.html) bytes"

      - name: Verify deploy and get configs
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        continue-on-error: true
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          echo "=== HEALTH CHECK ==="
          $SSH "curl -s http://localhost:3847/api/health" || echo "health check failed"

          echo ""
          echo "=== SERVER.JS HEARTBEAT LINE ==="
          $SSH "grep -n 'heartbeat\|setInterval\|timeout\|TIMEOUT' /opt/claude-chat/server.js" || echo "no matches"

          echo ""
          echo "=== NGINX CONFIG ==="
          $SSH "cat /etc/nginx/sites-enabled/* 2>/dev/null | head -80" || echo "no nginx configs"

          echo ""
          echo "=== CLAUDE-CHAT SERVICE STATUS ==="
          $SSH "systemctl status claude-chat --no-pager 2>/dev/null || pm2 status 2>/dev/null || echo 'no service manager'"

          echo ""
          echo "=== CLAUDE-CHAT LOGS (last 10) ==="
          $SSH "journalctl -u claude-chat -n 10 --no-pager 2>/dev/null || pm2 logs claude-chat --lines 10 --nostream 2>/dev/null || echo 'no logs'"

      - name: Commit index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f claude-chat/public/index.html ] && [ -s claude-chat/public/index.html ]; then
            git add claude-chat/public/index.html
            git diff --cached --stat
            git commit -m "chore: add index.html from VPS (via ssh cat)" || echo "No changes"
            git push origin claude/fix-connection-error-oXw4p || echo "Push to claude branch failed"
          else
            echo "ERROR: index.html not downloaded or empty"
          fi
