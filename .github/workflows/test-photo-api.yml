name: Test Photo API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test endpoints
        continue-on-error: true
        id: test
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set +e
          REPORT=""

          # Test homepage
          R1=$(curl -s -o /tmp/r1.txt -w "%{http_code}" --max-time 10 https://chat.marbomebel.ru/ 2>&1)
          REPORT+="GET / → $R1\n"
          echo "::notice::GET / → $R1"
          echo "::notice::Body: $(head -c 200 /tmp/r1.txt)"

          # Test POST /api/photo without file
          R2=$(curl -s -o /tmp/r2.txt -w "%{http_code}" --max-time 10 -X POST https://chat.marbomebel.ru/api/photo 2>&1)
          REPORT+="POST /api/photo (no file) → $R2\n"
          echo "::notice::POST /api/photo (no file) → $R2"
          echo "::notice::Body: $(head -c 300 /tmp/r2.txt)"

          # Test GET /api/photo
          R3=$(curl -s -o /tmp/r3.txt -w "%{http_code}" --max-time 10 https://chat.marbomebel.ru/api/photo 2>&1)
          REPORT+="GET /api/photo → $R3\n"
          echo "::notice::GET /api/photo → $R3"
          echo "::notice::Body: $(head -c 300 /tmp/r3.txt)"

          # Test GET /docs (FastAPI swagger)
          R4=$(curl -s -o /tmp/r4.txt -w "%{http_code}" --max-time 10 https://chat.marbomebel.ru/docs 2>&1)
          REPORT+="GET /docs → $R4\n"
          echo "::notice::GET /docs → $R4"

          # Send to Telegram
          MSG="📸 Photo API Test\n\n$REPORT"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="$TG_CHAT_ID" \
            --data-urlencode "text=$(echo -e "$MSG")" > /dev/null 2>&1 || true

          echo "Tests done"
