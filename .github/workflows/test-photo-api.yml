name: Full site verification

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Full verification from OUTSIDE
        run: |
          OUT="diag-output.txt"
          echo "=== EXTERNAL CHECK (from GitHub runner, NOT VPS) ===" | tee $OUT

          echo "" | tee -a $OUT
          echo "=== A. Full HTML from https://chat.marbomebel.ru ===" | tee -a $OUT
          curl -skL --max-time 15 https://chat.marbomebel.ru/ > /tmp/full_page.html 2>/dev/null
          echo "Size: $(wc -c < /tmp/full_page.html) bytes" | tee -a $OUT
          echo "Status: $(curl -skI --max-time 10 https://chat.marbomebel.ru/ | head -1)" | tee -a $OUT
          echo "--- FULL HTML ---" | tee -a $OUT
          cat /tmp/full_page.html | tee -a $OUT
          echo "" | tee -a $OUT
          echo "--- END HTML ---" | tee -a $OUT

          echo "" | tee -a $OUT
          echo "=== B. Test chat API (health) ===" | tee -a $OUT
          curl -sk --max-time 10 https://chat.marbomebel.ru/api/health | tee -a $OUT
          echo "" | tee -a $OUT

      - name: Check VPS internal state
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          OUT="diag-output.txt"

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee -a $OUT

          echo ""
          echo "=== C. What files are actually on VPS ==="
          echo "server.js md5: $(md5sum /opt/claude-chat/server.js)"
          echo "index.html md5: $(md5sum /opt/claude-chat/public/index.html)"
          echo ""
          echo "server.js first 10 lines:"
          head -10 /opt/claude-chat/server.js
          echo ""
          echo "index.html statusLine:"
          grep -n 'statusLine\|version\|v15' /opt/claude-chat/public/index.html || echo "(not found)"

          echo ""
          echo "=== D. PM2 status and logs ==="
          pm2 list
          echo ""
          echo "PM2 last 30 lines of error log:"
          pm2 logs claude-chat --nostream --lines 30 --err 2>/dev/null
          echo ""
          echo "PM2 last 10 lines of out log:"
          pm2 logs claude-chat --nostream --lines 10 --out 2>/dev/null

          echo ""
          echo "=== E. Test Claude CLI directly ==="
          which claude 2>/dev/null && echo "Claude CLI found" || echo "Claude CLI NOT FOUND"
          claude --version 2>/dev/null || echo "claude --version failed"

          echo ""
          echo "=== F. Test API chat endpoint (send test message) ==="
          TOKEN=$(grep BEARER_TOKEN /opt/claude-chat/.env | cut -d= -f2)
          echo "Token found: $([ -n "$TOKEN" ] && echo 'yes' || echo 'NO')"
          echo "Sending test message..."
          timeout 30 curl -s http://localhost:3847/api/chat \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"message":"Скажи просто: тест успешен"}' \
            --max-time 25 2>&1 | head -20
          echo ""

          echo ""
          echo "=== G. Crontab / watchdog that might restore files ==="
          crontab -l 2>/dev/null || echo "No crontab"
          echo ""
          echo "Watchdog scripts:"
          ls -la /opt/claude-chat/watchdog* /opt/watchdog* /opt/scripts/watchdog* 2>/dev/null || echo "No watchdog found"
          echo ""
          echo "Systemd timers:"
          systemctl list-timers --no-pager 2>/dev/null | head -10

          echo ""
          echo "=== H. pm2 startup / save ==="
          pm2 save --force 2>&1
          cat /root/.pm2/dump.pm2 2>/dev/null | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for p in d:
            print(f'  name={p.get(\"name\")} script={p.get(\"pm_exec_path\")} cwd={p.get(\"pm_cwd\")}')
          " 2>/dev/null || echo "Could not parse dump"

          echo ""
          echo "DONE"
          REMOTE

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "verify: полная проверка сайта извне и изнутри [skip ci]"
            git push origin HEAD
          }
