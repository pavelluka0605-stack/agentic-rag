name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Download Source
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"

          mkdir -p /tmp/chat-src

          # Download key files
          $SCP "$VPS_USER@$VPS_HOST:/opt/claude-chat/server.js" /tmp/chat-src/ 2>/dev/null || echo "no server.js"
          $SCP "$VPS_USER@$VPS_HOST:/opt/claude-chat/public/index.html" /tmp/chat-src/ 2>/dev/null || echo "no index.html"
          $SCP "$VPS_USER@$VPS_HOST:/opt/claude-chat/package.json" /tmp/chat-src/ 2>/dev/null || echo "no package.json"
          $SCP -r "$VPS_USER@$VPS_HOST:/opt/claude-chat/.env" /tmp/chat-src/ 2>/dev/null || echo "no .env"

          echo "Downloaded files:"
          ls -la /tmp/chat-src/

      - name: Copy to repo
        continue-on-error: true
        run: |
          mkdir -p claude-chat
          cp /tmp/chat-src/server.js claude-chat/ 2>/dev/null || true
          cp /tmp/chat-src/index.html claude-chat/ 2>/dev/null || true
          cp /tmp/chat-src/package.json claude-chat/ 2>/dev/null || true
          # Don't copy .env (secrets)

          echo "=== server.js (lines around error) ==="
          grep -n 'Соединение\|прервано\|Проверьте\|timeout\|connection\|abort\|error\|ECONNRESET\|ETIMEDOUT' claude-chat/server.js 2>/dev/null | head -20 || echo "no matches in server.js"

          echo ""
          echo "=== index.html (lines around error) ==="
          grep -n 'Соединение\|прервано\|Проверьте\|timeout\|connection\|error\|fetch\|abort' claude-chat/index.html 2>/dev/null | head -20 || echo "no matches in index.html"

      - name: Commit Source
        run: |
          if [ -f claude-chat/server.js ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add claude-chat/
            git commit -m "chore: add claude-chat source from VPS for analysis" || echo "No changes"
            git push origin main || echo "Push to main failed"
          fi

      - name: ErrorLines
        continue-on-error: true
        run: |
          if [ -f claude-chat/index.html ]; then
            # Show 10 lines around the error message
            R=$(grep -n -B5 -A5 'Соединение прервано' claude-chat/index.html 2>/dev/null | head -20)
            echo "::warning::ERRCTX: $R"
          fi

      - name: ServerTimeout
        continue-on-error: true
        run: |
          if [ -f claude-chat/server.js ]; then
            R=$(grep -n 'timeout\|TIMEOUT\|120\|setTimeout\|maxTime\|abort' claude-chat/server.js 2>/dev/null | head -15)
            echo "::warning::TIMEOUT: $R"
          fi

      - name: ServerAPI
        continue-on-error: true
        run: |
          if [ -f claude-chat/server.js ]; then
            R=$(grep -n 'app.post\|app.get\|router\.\|ssh\|exec\|spawn\|child_process' claude-chat/server.js 2>/dev/null | head -15)
            echo "::warning::API: $R"
          fi
