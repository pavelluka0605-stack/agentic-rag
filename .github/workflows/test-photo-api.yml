name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fix Traefik routing + redeploy chat
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          OUT="diag-output.txt"

          # 1. Copy fresh chat files
          echo "=== 1. Copy fresh chat files ===" | tee $OUT
          $SCP -r claude-chat/ $VPS_USER@$VPS_HOST:/opt/ 2>&1 | tee -a $OUT
          echo "Files copied" | tee -a $OUT

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee -a $OUT

          echo ""
          echo "=== 2. Restart PM2 ==="
          cd /opt/claude-chat
          npm install --omit=dev 2>&1 | tail -3
          mkdir -p data
          pm2 stop claude-chat 2>/dev/null || true
          pm2 delete claude-chat 2>/dev/null || true
          pm2 start server.js --name claude-chat
          sleep 3
          pm2 list

          echo ""
          echo "=== 3. Check current Traefik entrypoints/config ==="
          TRAEFIK_ID=$(docker ps -q --filter "name=traefik")
          echo "Traefik ID: $TRAEFIK_ID"

          # Get Traefik command-line args (startup config)
          echo "Traefik startup command:"
          docker inspect $TRAEFIK_ID --format '{{.Config.Cmd}}' 2>/dev/null
          docker inspect $TRAEFIK_ID --format '{{json .Config.Cmd}}' 2>/dev/null

          # Check Traefik volumes
          echo "Traefik volumes:"
          docker inspect $TRAEFIK_ID --format '{{range .Mounts}}{{.Source}} -> {{.Destination}}{{"\n"}}{{end}}' 2>/dev/null

          echo ""
          echo "=== 4. Check Traefik API for all routers ==="
          # Traefik API might be on port 8080
          curl -s --max-time 5 http://localhost:8080/api/rawdata 2>/dev/null | python3 -c "
          import json,sys
          try:
            data=json.load(sys.stdin)
            routers = data.get('routers',{})
            services = data.get('services',{})
            print('ROUTERS:')
            for name,r in routers.items():
              print(f'  {name}: rule={r.get(\"rule\",\"?\")} service={r.get(\"service\",\"?\")} status={r.get(\"status\",\"?\")}')
            print()
            print('SERVICES:')
            for name,s in services.items():
              lb = s.get('loadBalancer',{})
              servers = lb.get('servers',[])
              print(f'  {name}: servers={servers} status={s.get(\"status\",\"?\")}')
          except Exception as e:
            print(f'Error: {e}')
          " 2>/dev/null || echo "Traefik API not accessible"

          echo ""
          echo "=== 5. Add Traefik file provider for chat ==="
          # Create dynamic config for chat.marbomebel.ru -> host port 3847
          # First check what static config traefik uses
          TRAEFIK_COMPOSE_DIR=$(docker inspect $TRAEFIK_ID --format '{{range .Mounts}}{{if eq .Destination "/etc/traefik"}}{{.Source}}{{end}}{{end}}' 2>/dev/null)
          echo "Traefik config dir on host: $TRAEFIK_COMPOSE_DIR"

          # Check if there's a traefik.yml in the mount
          if [ -n "$TRAEFIK_COMPOSE_DIR" ]; then
            echo "Contents of $TRAEFIK_COMPOSE_DIR:"
            ls -la "$TRAEFIK_COMPOSE_DIR" 2>/dev/null
            cat "$TRAEFIK_COMPOSE_DIR/traefik.yml" 2>/dev/null || echo "no traefik.yml"
          fi

          # Also check docker-compose location for traefik
          echo ""
          echo "Looking for traefik docker-compose..."
          find /opt /root -maxdepth 3 -name "docker-compose*" -exec grep -l "traefik" {} \; 2>/dev/null
          TRAEFIK_COMPOSE=$(find /opt /root -maxdepth 3 -name "docker-compose*" -exec grep -l "traefik" {} \; 2>/dev/null | head -1)
          if [ -n "$TRAEFIK_COMPOSE" ]; then
            echo "Found: $TRAEFIK_COMPOSE"
            cat "$TRAEFIK_COMPOSE"
          fi

          echo ""
          echo "=== 6. Full Traefik docker inspect ==="
          docker inspect $TRAEFIK_ID --format '{{json .Config.Cmd}}' 2>/dev/null | python3 -c "
          import json,sys
          cmd = json.load(sys.stdin)
          for arg in cmd:
            print(f'  {arg}')
          " 2>/dev/null

          echo ""
          echo "=== 7. Verify HTTPS response ==="
          curl -sI --max-time 5 https://chat.marbomebel.ru/ 2>/dev/null
          echo "---"
          curl -s --max-time 5 https://chat.marbomebel.ru/ | grep -oP 'v\d+\.\d+|version.*?>' | head -5
          echo "Title:"
          curl -s --max-time 5 https://chat.marbomebel.ru/ | grep -o '<title>[^<]*</title>'
          echo "Version meta:"
          curl -s --max-time 5 https://chat.marbomebel.ru/ | grep -o 'content="2026[^"]*"'

          echo ""
          echo "=== 8. DNS check ==="
          host chat.marbomebel.ru 2>/dev/null || dig +short chat.marbomebel.ru 2>/dev/null || echo "DNS tools not available"
          echo "Server IP:"
          hostname -I 2>/dev/null | head -1

          echo ""
          echo "DONE"
          REMOTE

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: traefik fix + redeploy with version stamp [skip ci]"
            git push origin main
          }
