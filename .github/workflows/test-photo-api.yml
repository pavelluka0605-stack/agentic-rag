name: "VPS Diagnostic — Dashboard & webhook.marbomebel.ru"

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: "Dashboard & webhook diagnostic"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run dashboard diagnostics
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          OUT="diag-output.txt"

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee "$OUT"

          echo "========================================"
          echo "=== DASHBOARD DIAGNOSTIC $(date -u) ==="
          echo "========================================"

          # -----------------------------------------------
          echo ""
          echo "=== 1. Dashboard service status ==="
          systemctl status dashboard.service --no-pager 2>&1 || echo "(dashboard.service not found)"

          # -----------------------------------------------
          echo ""
          echo "=== 2. Control API service status ==="
          systemctl status control-api.service --no-pager 2>&1 || echo "(control-api.service not found)"

          # -----------------------------------------------
          echo ""
          echo "=== 3. Ports listening (3200, 3901, 3847, 3900, 80, 443) ==="
          ss -tlnp 2>/dev/null | grep -E ':3200\b|:3901\b|:3847\b|:3900\b|:80\b|:443\b' || echo "(nothing on those ports)"

          # -----------------------------------------------
          echo ""
          echo "=== 4. Dashboard logs (last 30 lines) ==="
          journalctl -u dashboard.service -n 30 --no-pager 2>&1 || echo "(no journal logs)"

          # -----------------------------------------------
          echo ""
          echo "=== 5. Control API logs (last 20 lines) ==="
          journalctl -u control-api.service -n 20 --no-pager 2>&1 || echo "(no journal logs)"

          # -----------------------------------------------
          echo ""
          echo "=== 6. Dashboard .next/ build exists? ==="
          ls -la /opt/claude-code/dashboard/.next/ 2>/dev/null | head -10 || echo "(.next/ does not exist — build needed)"

          # -----------------------------------------------
          echo ""
          echo "=== 7. Dashboard .env.local ==="
          cat /opt/claude-code/dashboard/.env.local 2>/dev/null || echo "(.env.local not found)"

          # -----------------------------------------------
          echo ""
          echo "=== 8. curl localhost:3200 (dashboard) ==="
          curl -sI --max-time 5 http://127.0.0.1:3200/ 2>&1 || echo "(no response on 3200)"

          # -----------------------------------------------
          echo ""
          echo "=== 9. curl localhost:3200/tasks ==="
          curl -s --max-time 5 http://127.0.0.1:3200/tasks 2>&1 | head -30 || echo "(no response)"

          # -----------------------------------------------
          echo ""
          echo "=== 10. curl localhost:3901/health (control API) ==="
          curl -s --max-time 5 http://127.0.0.1:3901/health 2>&1 || echo "(no response on 3901)"

          # -----------------------------------------------
          echo ""
          echo "=== 11. curl https://webhook.marbomebel.ru/ ==="
          curl -skI --max-time 10 https://webhook.marbomebel.ru/ 2>&1 || echo "(no response)"

          # -----------------------------------------------
          echo ""
          echo "=== 12. curl https://webhook.marbomebel.ru/tasks ==="
          curl -sk --max-time 10 https://webhook.marbomebel.ru/tasks 2>&1 | head -30 || echo "(no response)"

          # -----------------------------------------------
          echo ""
          echo "=== 13. Traefik dynamic configs ==="
          ls -la /opt/n8n-traefik/dynamic/ 2>/dev/null || echo "(no traefik dynamic dir)"
          echo "--- dashboard.yml ---"
          cat /opt/n8n-traefik/dynamic/dashboard.yml 2>/dev/null || echo "(not found)"

          # -----------------------------------------------
          echo ""
          echo "=== 14. Nginx config test ==="
          nginx -t 2>&1 || echo "(nginx not installed or config error)"
          echo "--- sites-enabled ---"
          ls -la /etc/nginx/sites-enabled/ 2>/dev/null || echo "(no sites-enabled)"

          # -----------------------------------------------
          echo ""
          echo "=== 15. Docker containers ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || echo "(docker not available)"

          # -----------------------------------------------
          echo ""
          echo "=== 16. PM2 processes ==="
          pm2 list 2>/dev/null || echo "(pm2 not available)"

          # -----------------------------------------------
          echo ""
          echo "=== 17. chat.marbomebel.ru status ==="
          curl -sI --max-time 5 https://chat.marbomebel.ru/ 2>&1 | head -10 || echo "(no response)"

          # -----------------------------------------------
          echo ""
          echo "=== 18. Dashboard package.json exists? ==="
          cat /opt/claude-code/dashboard/package.json 2>/dev/null | head -20 || echo "(package.json not found)"

          # -----------------------------------------------
          echo ""
          echo "=== 19. Control Bridge service ==="
          systemctl is-active control-bridge 2>&1
          systemctl status control-bridge --no-pager -l 2>&1 | tail -10 || echo "(control-bridge not found)"

          # -----------------------------------------------
          echo ""
          echo "=== 20. Control Bridge local health ==="
          curl -sf --max-time 5 http://127.0.0.1:3000/health 2>&1 || echo "(LOCAL_FAIL: port 3000 not responding)"

          # -----------------------------------------------
          echo ""
          echo "=== 21. Control Bridge HTTPS (api.marbomebel.ru) ==="
          curl -sv --max-time 10 https://api.marbomebel.ru/health 2>&1 || echo "(HTTPS_FAIL)"

          # -----------------------------------------------
          echo ""
          echo "=== 22. TLS cert for api.marbomebel.ru ==="
          echo | openssl s_client -servername api.marbomebel.ru -connect api.marbomebel.ru:443 2>/dev/null | openssl x509 -noout -subject -issuer -dates 2>/dev/null || echo "(CERT_CHECK_FAIL)"

          # -----------------------------------------------
          echo ""
          echo "=== 23. Docker bridge → port 3000 ==="
          curl -sf --max-time 5 http://172.17.0.1:3000/health 2>&1 || echo "(DOCKER_BRIDGE_FAIL: Traefik can't reach control-bridge)"

          # -----------------------------------------------
          echo ""
          echo "=== 24. CORS check (api.marbomebel.ru) ==="
          curl -sI -X OPTIONS https://api.marbomebel.ru/health \
            -H "Origin: https://chat.openai.com" \
            -H "Access-Control-Request-Method: GET" \
            --max-time 10 2>&1 | grep -i "access-control\|HTTP/" || echo "(NO_CORS_HEADERS)"

          # -----------------------------------------------
          echo ""
          echo "=== 25. Traefik api-bridge.yml ==="
          cat /opt/n8n-traefik/dynamic/api-bridge.yml 2>/dev/null || echo "(api-bridge.yml not found)"

          # -----------------------------------------------
          echo ""
          echo "=== 26. Traefik logs (api/cert errors) ==="
          docker logs $(docker ps -q --filter "name=traefik" 2>/dev/null) --tail 100 2>&1 | grep -i "api\.\|marbomebel\|acme\|cert\|error\|ERR\|404\|502" | tail -15 || echo "(no relevant traefik logs)"

          # -----------------------------------------------
          echo ""
          echo "=== 27. VPS exec result.json ==="
          cat /tmp/vps-exec-result.json 2>/dev/null || echo "(no exec result)"

          echo ""
          echo "========================================"
          echo "=== DIAGNOSTIC COMPLETE ==="
          echo "========================================"

          REMOTE

      - name: Commit diagnostic output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "diag: dashboard & webhook diagnostic [skip ci]"
            git push origin HEAD
          }
