name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy fixed server.js to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          # Backup
          $SSH "cp /opt/claude-chat/server.js /opt/claude-chat/server.js.bak.$(date +%s)"

          # Upload fixed server.js
          $SCP claude-chat/server.js "$VPS_USER@$VPS_HOST:/opt/claude-chat/server.js"
          echo "Uploaded server.js"

          # Restart
          $SSH "systemctl restart claude-chat 2>/dev/null && echo 'systemd restarted' || (cd /opt/claude-chat && pm2 restart claude-chat 2>/dev/null && echo 'pm2 restarted') || (cd /opt/claude-chat && pkill -f 'node server.js' 2>/dev/null; sleep 1; cd /opt/claude-chat && nohup node server.js > /var/log/claude-chat.log 2>&1 & echo 'manual restart')"

          sleep 3
          echo "=== HEALTH ==="
          $SSH "curl -s http://localhost:3847/api/health"

      - name: Get index.html error handler and nginx config
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          echo "=== INDEX.HTML ERROR HANDLER (lines 1200-1260) ==="
          $SSH "sed -n '1200,1260p' /opt/claude-chat/public/index.html"

          echo ""
          echo "=== INDEX.HTML SSE/FETCH SECTION (lines 700-800) ==="
          $SSH "sed -n '700,800p' /opt/claude-chat/public/index.html"

          echo ""
          echo "=== NGINX CONFIG ==="
          $SSH "cat /etc/nginx/sites-enabled/* 2>/dev/null | head -80"

          echo ""
          echo "=== HEARTBEAT IN DEPLOYED SERVER.JS ==="
          $SSH "grep -n 'heartbeat\|setInterval\|TIMEOUT_MS\|5000\|15000' /opt/claude-chat/server.js"
