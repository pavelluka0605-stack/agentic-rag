name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/fix-connection-error-oXw4p
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Download source files from VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          mkdir -p claude-chat/public
          $SCP "$VPS_USER@$VPS_HOST:/opt/claude-chat/server.js" claude-chat/
          $SCP "$VPS_USER@$VPS_HOST:/opt/claude-chat/package.json" claude-chat/
          $SCP "$VPS_USER@$VPS_HOST:/opt/claude-chat/public/index.html" claude-chat/public/
          echo "Files downloaded:"
          ls -la claude-chat/ claude-chat/public/

      - name: Commit and push to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claude-chat/
          git diff --cached --stat
          git commit -m "chore: copy claude-chat source from VPS for analysis" || echo "No changes to commit"
          git push origin claude/fix-connection-error-oXw4p
