name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check chat conversations
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          echo "=== SERVICE STATUS ==="
          $SSH "systemctl is-active claude-chat && echo OK || echo FAIL"

          echo ""
          echo "=== HEALTH ==="
          $SSH "curl -s http://localhost:3847/api/health"

          echo ""
          echo "=== ACTIVE CONVERSATIONS ==="
          TOKEN=$($SSH "grep BEARER_TOKEN /opt/claude-chat/.env | cut -d= -f2")
          echo "Token found: ${#TOKEN} chars"

          echo ""
          echo "=== CONVERSATION DATA ==="
          $SSH "ls -la /opt/claude-chat/data/ 2>/dev/null || echo 'no data dir'"
          $SSH "cat /opt/claude-chat/data/conversations.json 2>/dev/null | head -c 5000 || echo 'no conversations file'"

          echo ""
          echo "=== RECENT LOGS ==="
          $SSH "journalctl -u claude-chat -n 20 --no-pager 2>/dev/null"
