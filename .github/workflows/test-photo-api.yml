name: Test Photo API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test webapp on VPS via SSH
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          REPORT=""
          ALL_PASS=true

          # Check systemd service
          SVC_STATUS=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "systemctl is-active webapp.service 2>/dev/null || echo 'inactive'" )
          if [ "$SVC_STATUS" = "active" ]; then
            REPORT+="✅ webapp.service: active\n"
          else
            REPORT+="❌ webapp.service: $SVC_STATUS\n"
            ALL_PASS=false
            # Get more details
            LOGS=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "journalctl -u webapp.service --no-pager -n 30 2>/dev/null || echo 'no logs'" )
            REPORT+="   Logs:\n$LOGS\n"
          fi

          # Check if web.py exists and has /api/photo
          FILE_CHECK=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "grep -c 'api/photo' /opt/webapp/web.py 2>/dev/null || echo 0" )
          if [ "$FILE_CHECK" -gt 0 ]; then
            REPORT+="✅ web.py contains /api/photo ($FILE_CHECK matches)\n"
          else
            REPORT+="❌ web.py does NOT contain /api/photo\n"
            ALL_PASS=false
          fi

          # Check port 8000 locally
          PORT_CHECK=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:8000/ 2>/dev/null || echo '000'" )
          if [ "$PORT_CHECK" = "200" ]; then
            REPORT+="✅ localhost:8000 → 200\n"
          else
            REPORT+="❌ localhost:8000 → $PORT_CHECK\n"
            ALL_PASS=false
          fi

          # Test POST /api/photo locally on VPS
          PHOTO_TEST=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "curl -s -o /dev/null -w '%{http_code}' --max-time 5 -X POST http://localhost:8000/api/photo 2>/dev/null || echo '000'" )
          if [ "$PHOTO_TEST" = "422" ]; then
            REPORT+="✅ POST /api/photo (no file) → 422\n"
          elif [ "$PHOTO_TEST" = "405" ]; then
            REPORT+="✅ POST /api/photo → 405 (endpoint exists)\n"
          else
            REPORT+="❌ POST /api/photo → $PHOTO_TEST\n"
            ALL_PASS=false
          fi

          # Test external access
          EXT_CHECK=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://chat.marbomebel.ru/ 2>/dev/null || echo "000")
          if [ "$EXT_CHECK" = "200" ]; then
            REPORT+="✅ External https://chat.marbomebel.ru/ → 200\n"
          else
            REPORT+="⚠️ External https://chat.marbomebel.ru/ → $EXT_CHECK\n"
          fi

          # Test external /api/photo
          EXT_PHOTO=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -X POST https://chat.marbomebel.ru/api/photo 2>/dev/null || echo "000")
          REPORT+="📡 External POST /api/photo → $EXT_PHOTO\n"

          # Check requirements.txt has needed deps
          DEPS=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cat /opt/webapp/requirements.txt 2>/dev/null | grep -iE 'fastapi|uvicorn|openai|python-multipart' || echo 'none'" )
          REPORT+="📦 Key deps: $DEPS\n"

          echo -e "$REPORT"

          # Send to Telegram
          if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            HEADER="📸 Photo API Test"
            if [ "$ALL_PASS" = true ]; then
              HEADER+=" ✅ ALL PASS"
            else
              HEADER+=" ⚠️ ISSUES FOUND"
            fi
            MSG=$(echo -e "$HEADER\n\n$REPORT")
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="$TG_CHAT_ID" \
              --data-urlencode "text=$MSG" > /dev/null 2>&1 || true
          fi

          if [ "$ALL_PASS" = false ]; then
            exit 1
          fi
