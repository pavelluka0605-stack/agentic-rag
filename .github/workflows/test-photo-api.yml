name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fix service (disable watchdog, kill port, restart)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          OUT="diag-output.txt"

          echo "=== FIX $(date -u) ===" > $OUT

          # Step 1: Pause watchdog cron
          echo "=== Pause watchdog ===" >> $OUT
          $SSH "crontab -l > /tmp/cron_backup.txt 2>/dev/null; crontab -l 2>/dev/null | grep -v watchdog | crontab - 2>/dev/null; echo 'watchdog paused'" >> $OUT 2>&1

          # Step 2: Stop service completely
          echo "=== Stop service ===" >> $OUT
          $SSH "systemctl stop claude-chat 2>/dev/null; echo 'stopped'" >> $OUT 2>&1
          sleep 2

          # Step 3: Kill EVERYTHING on port 3847 repeatedly
          echo "=== Kill port 3847 ===" >> $OUT
          $SSH "for i in 1 2 3 4 5; do for p in \$(lsof -t -i:3847 2>/dev/null); do kill -9 \$p 2>/dev/null && echo \"killed \$p (attempt \$i)\"; done; sleep 2; done" >> $OUT 2>&1

          # Step 4: Final check port is free
          echo "=== Verify port ===" >> $OUT
          $SSH "lsof -i:3847 2>/dev/null && echo 'STILL BUSY' || echo 'PORT FREE'" >> $OUT 2>&1

          # Step 5: Start service
          echo "=== Start service ===" >> $OUT
          $SSH "systemctl daemon-reload; systemctl enable claude-chat; systemctl start claude-chat" >> $OUT 2>&1
          sleep 5

          # Step 6: Check
          echo "=== Check ===" >> $OUT
          $SSH "systemctl is-active claude-chat && echo 'SERVICE_OK' || echo 'SERVICE_FAIL'" >> $OUT 2>&1
          $SSH "curl -s --max-time 5 http://localhost:3847/api/health || echo 'health fail'" >> $OUT 2>&1
          $SSH "journalctl -u claude-chat -n 10 --no-pager" >> $OUT 2>&1

          # Step 7: Restore watchdog
          echo "=== Restore watchdog ===" >> $OUT
          $SSH "crontab /tmp/cron_backup.txt 2>/dev/null; echo 'watchdog restored'" >> $OUT 2>&1

          cat $OUT

      - name: Save output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: fix result [skip ci]"
            git push origin main
          }
