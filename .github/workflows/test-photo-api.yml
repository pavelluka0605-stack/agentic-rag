name: Deploy chat rollback to March 14

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy March 14 rollback
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          OUT="diag-output.txt"

          echo "=== 1. Copy fresh files to VPS ===" | tee $OUT
          $SCP claude-chat/server.js $VPS_USER@$VPS_HOST:/opt/claude-chat/server.js 2>&1 | tee -a $OUT
          $SCP claude-chat/public/index.html $VPS_USER@$VPS_HOST:/opt/claude-chat/public/index.html 2>&1 | tee -a $OUT

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee -a $OUT

          echo ""
          echo "=== 2. Restart PM2 ==="
          cd /opt/claude-chat
          pm2 stop claude-chat 2>/dev/null || true
          pm2 delete claude-chat 2>/dev/null || true
          pm2 start server.js --name claude-chat
          sleep 3
          pm2 list

          echo ""
          echo "=== 3. Test — no more redirect, direct 200 ==="
          echo "HTTP Status:"
          curl -sI --max-time 5 http://localhost:3847/ | head -5
          echo ""
          echo "First 10 lines of HTML:"
          curl -s --max-time 5 http://localhost:3847/ | head -10

          echo ""
          echo "=== 4. HTTPS test ==="
          echo "HTTPS Status (should be 200, NOT 302):"
          curl -skI --max-time 5 https://chat.marbomebel.ru/ | head -5
          echo ""
          echo "HTTPS first 10 lines:"
          curl -sk --max-time 5 https://chat.marbomebel.ru/ | head -10

          echo ""
          echo "=== 5. Verify NO version stamp in status line ==="
          curl -sk --max-time 5 https://chat.marbomebel.ru/ | grep -o 'id="statusLine">[^<]*<' || echo "(statusLine not found)"

          echo ""
          echo "=== 6. MD5 comparison ==="
          echo "server.js: $(md5sum /opt/claude-chat/server.js)"
          echo "index.html: $(md5sum /opt/claude-chat/public/index.html)"

          echo ""
          echo "DONE — March 14 version restored"
          REMOTE

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "deploy: rollback to March 14 version [skip ci]"
            git push origin HEAD
          }
