name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/fix-connection-error-oXw4p
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Download index.html from VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          mkdir -p claude-chat/public
          $SCP "$VPS_USER@$VPS_HOST:/opt/claude-chat/public/index.html" claude-chat/public/index.html
          echo "index.html downloaded: $(wc -l < claude-chat/public/index.html) lines, $(wc -c < claude-chat/public/index.html) bytes"

      - name: Deploy fixed server.js to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SCP="scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no"
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"

          # Backup current server.js
          $SSH "cp /opt/claude-chat/server.js /opt/claude-chat/server.js.bak"
          echo "Backed up server.js"

          # Upload fixed server.js
          $SCP claude-chat/server.js "$VPS_USER@$VPS_HOST:/opt/claude-chat/server.js"
          echo "Uploaded fixed server.js"

          # Restart claude-chat service
          $SSH "systemctl restart claude-chat 2>/dev/null || (cd /opt/claude-chat && pm2 restart claude-chat 2>/dev/null) || echo 'Manual restart needed'"
          echo "Restarted service"

          # Verify it's running
          sleep 2
          $SSH "curl -s http://localhost:3847/api/health" || echo "Health check failed"

      - name: Get proxy timeout configs
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        continue-on-error: true
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          echo "=== NGINX CONFIG ==="
          $SSH "cat /etc/nginx/sites-enabled/* 2>/dev/null" || echo "no nginx configs"
          echo ""
          echo "=== TRAEFIK CONFIG ==="
          $SSH "docker inspect traefik 2>/dev/null | head -100" || echo "no traefik"
          echo ""
          echo "=== TRAEFIK DYNAMIC CONFIG ==="
          $SSH "find /opt/ -path '*/traefik/*' -name '*.yml' -o -name '*.yaml' -o -name '*.toml' 2>/dev/null | xargs head -50 2>/dev/null" || echo "no dynamic config"

      - name: Commit index.html to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claude-chat/public/
          git diff --cached --stat
          git commit -m "chore: add index.html from VPS" || echo "No changes"
          git push origin claude/fix-connection-error-oXw4p || echo "Push failed (will be in main via auto-merge)"
