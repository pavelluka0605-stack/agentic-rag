name: "Verify Chat Deploy"

on:
  push:
    branches: [main, "claude/*"]
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-chat
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Check external
        run: |
          OUT="diag-output.txt"
          echo "=== External check $(date) ===" > $OUT
          echo "Title: $(curl -sk https://chat.marbomebel.ru/ | grep -oP '<title>[^<]+</title>')" >> $OUT
          echo "RAG count: $(curl -sk https://chat.marbomebel.ru/ | grep -c 'RAG\|rag' || echo 0)" >> $OUT
          echo "StatusLine: $(curl -sk https://chat.marbomebel.ru/ | grep -oP 'id=\"statusLine\">[^<]+<')" >> $OUT
          echo "Health: $(curl -sk https://chat.marbomebel.ru/api/health)" >> $OUT
          echo "Size: $(curl -sk https://chat.marbomebel.ru/ | wc -c)" >> $OUT
          echo "Manifest link: $(curl -sk https://chat.marbomebel.ru/ | grep -c 'manifest' || echo 0)" >> $OUT
          echo "HTTP status: $(curl -skI https://chat.marbomebel.ru/ | head -1)" >> $OUT
          cat $OUT

      - name: Save
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet || {
            git commit -m "verify: external check [skip ci]"
            git push origin HEAD
          }
