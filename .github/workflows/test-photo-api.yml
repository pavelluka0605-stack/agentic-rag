name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
      - "claude-chat/**"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Get diagnostics and files
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          mkdir -p output

          # Get index.html
          $SSH "cat /opt/claude-chat/public/index.html" > output/index.html
          echo "index.html: $(wc -l < output/index.html) lines"

          # Get nginx config
          $SSH "cat /etc/nginx/sites-enabled/* 2>/dev/null" > output/nginx.conf || echo "no nginx"

          # Get health check
          $SSH "curl -s http://localhost:3847/api/health" > output/health.json

          # Get deployed server.js key lines
          $SSH "grep -n 'heartbeat\|setInterval\|TIMEOUT_MS\|5000\|15000\|clearInterval\|clearTimeout' /opt/claude-chat/server.js" > output/server-grep.txt

          # Get service status
          $SSH "systemctl status claude-chat --no-pager 2>/dev/null || pm2 list 2>/dev/null || echo 'no service'" > output/service.txt

          # Get logs
          $SSH "journalctl -u claude-chat -n 20 --no-pager 2>/dev/null || echo 'no logs'" > output/logs.txt

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: vps-diagnostics
          path: output/
          retention-days: 1
