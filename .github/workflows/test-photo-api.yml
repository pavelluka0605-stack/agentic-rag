name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

concurrency:
  group: vps-diag
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Port3847HTML
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "curl -s http://localhost:3847/ 2>/dev/null | head -30" 2>&1)
          echo "::warning::HTML3847: $R"

      - name: Port3847Title
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "curl -s http://localhost:3847/ 2>/dev/null | grep -oE '<title>[^<]+</title>|Ассистент|Соединение|VPS статус|fetchJSON'" 2>&1)
          echo "::warning::TITLE3847: $R"

      - name: Port3847Process
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "ss -tlnp | grep 3847; echo '---'; ps aux | grep -E '3847|vk-callback' | grep -v grep" 2>&1)
          echo "::warning::PROC3847: $R"

      - name: VKCallbackUnit
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "cat /etc/systemd/system/vk-callback.service 2>/dev/null" 2>&1)
          echo "::warning::VKCB_UNIT: $R"

      - name: VKCallbackDir
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "ls -la /opt/vk-callback/ 2>/dev/null || ls -la /opt/p0-foundation/vk-callback/ 2>/dev/null || echo 'DIR_NOT_FOUND'" 2>&1)
          echo "::warning::VKCB_DIR: $R"

      - name: Port3847SearchErr
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "curl -s http://localhost:3847/ 2>/dev/null | grep -oE 'Соединение|прервано|Проверьте|интернет|error|Error|timeout'" 2>&1)
          echo "::warning::ERR3847: $R"

      - name: TraefikRoutes
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "curl -s http://localhost:8080/api/http/routers 2>/dev/null | python3 -c 'import sys,json;[print(f\"{r.get(\"name\",\"\")}: {r.get(\"rule\",\"\")}\") for r in json.load(sys.stdin)]' 2>/dev/null || echo 'NO_TRAEFIK_API'" 2>&1)
          echo "::warning::ROUTES: $R"

      - name: Port3847GrepAll
        continue-on-error: true
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"
          R=$(timeout 10 $SSH "curl -s http://localhost:3847/ 2>/dev/null | grep -c 'Ассистент'; echo 'lines:'; curl -s http://localhost:3847/ 2>/dev/null | wc -l" 2>&1)
          echo "::warning::SIZE3847: $R"
