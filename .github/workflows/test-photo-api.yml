name: VPS Diagnostics

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - ".github/workflows/test-photo-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vps-diag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Investigate Traefik routing for chat.marbomebel.ru
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST"
          OUT="diag-output.txt"

          $SSH 'bash -s' <<'REMOTE' 2>&1 | tee $OUT

          echo "=== 1. Traefik container name ==="
          TRAEFIK_ID=$(docker ps -q --filter "name=traefik")
          echo "Traefik container: $TRAEFIK_ID"

          echo ""
          echo "=== 2. Traefik static config ==="
          docker exec $TRAEFIK_ID cat /etc/traefik/traefik.yml 2>/dev/null || \
          docker exec $TRAEFIK_ID cat /traefik.yml 2>/dev/null || \
          docker exec $TRAEFIK_ID traefik version 2>/dev/null || \
          echo "cannot read traefik config"

          echo ""
          echo "=== 3. Traefik dynamic config files ==="
          docker exec $TRAEFIK_ID ls -la /etc/traefik/ 2>/dev/null
          docker exec $TRAEFIK_ID find / -name "*.yml" -path "*/traefik/*" 2>/dev/null | head -10
          docker exec $TRAEFIK_ID find / -name "*.toml" -path "*/traefik/*" 2>/dev/null | head -10

          echo ""
          echo "=== 4. Traefik dynamic config content ==="
          for f in $(docker exec $TRAEFIK_ID find /etc/traefik/ -name "*.yml" -o -name "*.toml" 2>/dev/null); do
            echo "--- $f ---"
            docker exec $TRAEFIK_ID cat "$f" 2>/dev/null
            echo ""
          done

          echo ""
          echo "=== 5. Traefik routers via API ==="
          # Check if Traefik API is enabled
          curl -s --max-time 5 http://localhost:8080/api/http/routers 2>/dev/null | python3 -c "
          import json,sys
          try:
            data=json.load(sys.stdin)
            for r in data:
              print(f'{r.get(\"name\",\"?\")} rule={r.get(\"rule\",\"?\")} service={r.get(\"service\",\"?\")} status={r.get(\"status\",\"?\")}')
          except: print('Traefik API not available or error')
          " 2>/dev/null || echo "Traefik API not accessible"

          echo ""
          echo "=== 6. Traefik docker-compose (n8n) ==="
          cat /opt/n8n/docker-compose.yml 2>/dev/null

          echo ""
          echo "=== 7. All Traefik labels on running containers ==="
          docker inspect --format '{{.Name}}: {{json .Config.Labels}}' $(docker ps -q) 2>/dev/null | python3 -c "
          import json,sys
          for line in sys.stdin:
            name, labels_json = line.split(': ', 1)
            labels = json.loads(labels_json)
            traefik_labels = {k:v for k,v in labels.items() if 'traefik' in k.lower()}
            if traefik_labels:
              print(f'\n{name}:')
              for k,v in sorted(traefik_labels.items()):
                print(f'  {k} = {v}')
          " 2>/dev/null || echo "Failed to read labels"

          echo ""
          echo "=== 8. What does HTTPS return (full response headers) ==="
          curl -sI --max-time 5 https://chat.marbomebel.ru/ 2>/dev/null
          echo "---"
          curl -s --max-time 5 https://chat.marbomebel.ru/ 2>/dev/null | head -15

          echo ""
          echo "=== 9. Compare: direct PM2 vs HTTPS ==="
          echo "PM2 direct md5:"
          curl -s --max-time 5 http://localhost:3847/ | md5sum
          echo "HTTPS md5:"
          curl -s --max-time 5 https://chat.marbomebel.ru/ | md5sum
          echo "PM2 file on disk md5:"
          md5sum /opt/claude-chat/public/index.html

          echo ""
          echo "=== 10. Nginx status ==="
          systemctl is-active nginx 2>/dev/null || echo "nginx not a systemd service"
          nginx -t 2>&1 || echo "nginx not installed or error"
          # What process listens on what
          echo "Processes on key ports:"
          ss -tlnp | grep -E ':80|:443|:3847|:8080' 2>/dev/null

          echo ""
          echo "DONE"
          REMOTE

      - name: Save output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f diag-output.txt
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "diag: traefik routing investigation [skip ci]"
            git push origin main
          }
