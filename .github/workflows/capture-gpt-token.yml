name: "Capture GPT Token and Secure"

on:
  push:
    branches: ["claude/*"]
    paths: [".github/workflows/capture-gpt-token.yml"]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  capture:
    name: "Capture and Secure"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Read captured token, add to env, disable debug, deploy, verify
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'bash -l -c '\''
          export PATH="/usr/bin:/bin:/usr/local/bin:$PATH"

          echo "=== 1. READ CAPTURED TOKEN ==="
          if [ ! -f /opt/control-bridge/.captured-token ]; then
            echo "NO CAPTURE FILE FOUND"
            journalctl -u control-bridge -n 20 --no-pager 2>&1 | grep "AUTH_DEBUG" | tail -10
            exit 1
          fi

          GPT_TOKEN=$(cat /opt/control-bridge/.captured-token)
          echo "captured prefix: $(echo ${GPT_TOKEN} | cut -c1-8)..."
          echo "captured length: ${#GPT_TOKEN}"
          echo "captured repr (hex first 20 bytes):"
          echo -n "${GPT_TOKEN}" | xxd | head -3
          echo ""

          echo "=== 2. COMPARE WITH KNOWN TOKENS ==="
          CURRENT=$(grep "^BRIDGE_API_TOKEN=" /opt/control-bridge/.env | cut -d= -f2-)
          LEGACY=$(grep "^BRIDGE_API_TOKEN_LEGACY=" /opt/control-bridge/.env | cut -d= -f2-)
          echo "current: $(echo ${CURRENT} | cut -c1-8)... len=${#CURRENT}"
          echo "legacy:  $(echo ${LEGACY} | cut -c1-8)... len=${#LEGACY}"
          echo "gpt:     $(echo ${GPT_TOKEN} | cut -c1-8)... len=${#GPT_TOKEN}"

          # Character-by-character diff with legacy
          echo ""
          echo "Char diff vs legacy (first difference):"
          for i in $(seq 0 $((${#GPT_TOKEN} > ${#LEGACY} ? ${#GPT_TOKEN} : ${#LEGACY}))); do
            C_GPT=$(echo "${GPT_TOKEN}" | cut -c$((i+1)))
            C_LEG=$(echo "${LEGACY}" | cut -c$((i+1)))
            if [ "${C_GPT}" != "${C_LEG}" ]; then
              echo "  pos ${i}: gpt='${C_GPT}' (hex $(printf '%02x' "'${C_GPT}")) vs legacy='${C_LEG}' (hex $(printf '%02x' "'${C_LEG}"))"
            fi
          done | head -10
          echo ""

          echo "=== 3. ADD GPT TOKEN TO ENV ==="
          if grep -q "^BRIDGE_API_TOKEN_GPT=" /opt/control-bridge/.env; then
            sed -i "s|^BRIDGE_API_TOKEN_GPT=.*|BRIDGE_API_TOKEN_GPT=${GPT_TOKEN}|" /opt/control-bridge/.env
          else
            echo "BRIDGE_API_TOKEN_GPT=${GPT_TOKEN}" >> /opt/control-bridge/.env
          fi
          echo "Added BRIDGE_API_TOKEN_GPT"
          echo ""

          echo "=== 4. DISABLE DEBUG ==="
          sed -i "s/^BRIDGE_DEBUG_ACCEPT_ANY=.*/BRIDGE_DEBUG_ACCEPT_ANY=0/" /opt/control-bridge/.env
          rm -f /opt/control-bridge/.captured-token
          echo "Debug OFF, capture file removed"
          echo ""

          echo "=== 5. RESTART SECURE ==="
          systemctl restart control-bridge
          sleep 3
          systemctl is-active control-bridge && echo "SERVICE_OK" || echo "SERVICE_FAIL"
          echo ""

          echo "=== 6. VERIFY: GPT token accepted ==="
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer ${GPT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"gpt-verify\",\"raw_user_request\":\"x\",\"normalized_brief\":\"x\"}" 2>&1 | head -4
          echo ""

          echo "=== 7. VERIFY: current token accepted ==="
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer ${CURRENT}" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"current-verify\",\"raw_user_request\":\"x\",\"normalized_brief\":\"x\"}" 2>&1 | head -4
          echo ""

          echo "=== 8. VERIFY: bad token rejected ==="
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer INVALID_GARBAGE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"x\",\"raw_user_request\":\"x\",\"normalized_brief\":\"x\"}" 2>&1 | head -4
          echo ""

          echo "=== 9. HTTPS full cycle with GPT token ==="
          CREATE=$(curl -s --connect-timeout 10 -X POST https://api.marbomebel.ru/jobs \
            -H "Authorization: Bearer ${GPT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"HTTPS secure\",\"raw_user_request\":\"final\",\"normalized_brief\":\"done\"}")
          echo "createJob: ${CREATE}"
          JOB_ID=$(echo "${CREATE}" | grep -o "\"job_id\":\"[^\"]*\"" | cut -d"\"" -f4)

          if [ -n "${JOB_ID}" ]; then
            echo "confirmJob: $(curl -s --connect-timeout 10 -X POST "https://api.marbomebel.ru/jobs/${JOB_ID}/confirm" -H "Authorization: Bearer ${GPT_TOKEN}")"
            echo "getJobStatus: $(curl -s --connect-timeout 10 "https://api.marbomebel.ru/jobs/${JOB_ID}/status" -H "Authorization: Bearer ${GPT_TOKEN}")"
            echo "getJobResult: $(curl -s --connect-timeout 10 "https://api.marbomebel.ru/jobs/${JOB_ID}/result" -H "Authorization: Bearer ${GPT_TOKEN}")"
            C2=$(curl -s --connect-timeout 10 -X POST https://api.marbomebel.ru/jobs \
              -H "Authorization: Bearer ${GPT_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"cancel\",\"raw_user_request\":\"x\",\"normalized_brief\":\"x\"}")
            CID=$(echo "${C2}" | grep -o "\"job_id\":\"[^\"]*\"" | cut -d"\"" -f4)
            echo "cancelJob: $(curl -s --connect-timeout 10 -X POST "https://api.marbomebel.ru/jobs/${CID}/cancel" -H "Authorization: Bearer ${GPT_TOKEN}")"
          fi
          echo ""

          echo "=== 10. FINAL ENV ==="
          grep -E "TOKEN|DEBUG" /opt/control-bridge/.env | sed "s/=.\{6\}/=XXXXXX/"
          echo ""
          echo "=== DONE ==="
          '\''' | tee /tmp/capture-output.txt

      - name: Post results
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, traceback
          try:
              with open("/tmp/capture-output.txt") as f:
                  content = f.read()
              body = "## GPT Token Captured Final\n\n```\n" + content[:60000] + "\n```"
              payload = json.dumps({"title": "Token Captured Final ${{ github.run_id }}", "body": body}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/repos/${{ github.repository }}/issues",
                  data=payload,
                  headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"], "Accept": "application/vnd.github+json", "Content-Type": "application/json"},
                  method="POST")
              resp = urllib.request.urlopen(req)
              data = json.loads(resp.read())
              print(f"Issue #{data['number']}: {data['html_url']}")
          except Exception as e:
              traceback.print_exc()
              with open("/tmp/capture-output.txt") as f:
                  print(f.read())
          PYEOF
