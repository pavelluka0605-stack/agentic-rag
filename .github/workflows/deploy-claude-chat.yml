name: "Deploy Claude Chat"

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - "claude-chat/**"
      - ".github/workflows/deploy-claude-chat.yml"
  workflow_dispatch:

env:
  SSH_CMD: ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
  SCP_CMD: scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }}
  REMOTE_DIR: /opt/claude-chat

jobs:
  deploy:
    name: "Deploy Claude Chat to VPS"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Create directories on VPS
        run: |
          $SSH_CMD "mkdir -p $REMOTE_DIR/public"

      - name: Copy files to VPS
        run: |
          $SCP_CMD claude-chat/server.js ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/
          $SCP_CMD claude-chat/package.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/
          $SCP_CMD claude-chat/package-lock.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/
          $SCP_CMD claude-chat/setup.sh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/
          $SCP_CMD claude-chat/traefik-route.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/
          $SCP_CMD claude-chat/public/index.html ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/public/
          $SCP_CMD claude-chat/public/manifest.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/public/

      - name: Create .env on VPS
        run: |
          $SSH_CMD << 'ENVEOF'
          cat > /opt/claude-chat/.env << 'EOF'
          BEARER_TOKEN=cfc6b39d4152f7dc6a49b8445d1bb4fe45e742af56eb5581d2b8e23179d2acc6
          PORT=3847
          EOF
          ENVEOF

      - name: Install deps and start
        run: |
          $SSH_CMD << 'EOF'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
          command -v node || { curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs; }
          echo "node=$(node --version) npm=$(npm --version)"

          # Install PM2 globally if needed
          command -v pm2 || npm install -g pm2

          cd /opt/claude-chat
          chmod +x setup.sh
          bash setup.sh
          EOF

      - name: Run proxy fix with diagnostics
        run: |
          $SCP_CMD claude-chat/fix-proxy.sh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/fix-proxy.sh
          $SSH_CMD "chmod +x /tmp/fix-proxy.sh && TG_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }} TG_CHAT_ID=${{ secrets.TG_CHAT_ID }} bash /tmp/fix-proxy.sh" || true

      - name: Fetch and publish diagnostics
        if: always()
        run: |
          $SCP_CMD ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/proxy-diag.txt /tmp/proxy-diag.txt || echo "No diag file"
          if [ -f /tmp/proxy-diag.txt ]; then
            echo "--- DIAGNOSTICS ---"
            cat /tmp/proxy-diag.txt
            echo "--- END ---"
            # Write to GitHub Step Summary (visible in Actions UI)
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/proxy-diag.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            # Upload diagnostics via GitHub API as a gist-like issue comment
            DIAG_CONTENT=$(cat /tmp/proxy-diag.txt | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
            curl -s -X PATCH \
              -H "Authorization: token ${{ github.token }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              -d "{\"name\":\"diag\"}" > /dev/null 2>&1 || true
            # Create/update a file via Contents API
            # Get existing file SHA if exists
            EXISTING=$(curl -s -H "Authorization: token ${{ github.token }}" \
              "https://api.github.com/repos/${{ github.repository }}/contents/diagnostics/latest.txt?ref=${{ github.ref_name }}" 2>&1)
            EXISTING_SHA=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")
            CONTENT_B64=$(base64 -w0 /tmp/proxy-diag.txt)
            if [ -n "$EXISTING_SHA" ]; then
              curl -s -X PUT \
                -H "Authorization: token ${{ github.token }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/contents/diagnostics/latest.txt" \
                -d "{\"message\":\"auto: proxy diagnostics\",\"content\":\"${CONTENT_B64}\",\"sha\":\"${EXISTING_SHA}\",\"branch\":\"${{ github.ref_name }}\"}" || echo "Update failed"
            else
              curl -s -X PUT \
                -H "Authorization: token ${{ github.token }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/contents/diagnostics/latest.txt" \
                -d "{\"message\":\"auto: proxy diagnostics\",\"content\":\"${CONTENT_B64}\",\"branch\":\"${{ github.ref_name }}\"}" || echo "Create failed"
            fi
          fi

      - name: Healthcheck
        run: |
          $SSH_CMD << 'EOF'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
          sleep 2
          HEALTH=$(curl -s http://127.0.0.1:3847/api/health)
          echo "Health: $HEALTH"
          echo "$HEALTH" | grep -q '"ok"' && echo "✓ Claude Chat is running!" || { echo "✗ Health check failed"; exit 1; }
          pm2 list | grep claude-chat
          echo "=== Deploy Complete ==="
          EOF

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ Claude Chat deployed successfully to VPS
          🌐 https://chat.marbomebel.ru
          📦 Port: 3847"
          else
            MSG="❌ Claude Chat deploy FAILED
          🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d text="$MSG" \
            -d parse_mode=HTML || true

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
