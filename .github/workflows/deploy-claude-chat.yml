name: "Deploy Claude Chat"

on:
  push:
    branches:
      - main
      - "claude/*"
    paths:
      - "claude-chat/**"
      - ".github/workflows/deploy-claude-chat.yml"
  workflow_dispatch:

env:
  SSH_CMD: ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
  SCP_CMD: scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }}
  REMOTE_DIR: /opt/claude-chat

jobs:
  deploy:
    name: "Deploy Claude Chat to VPS"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Create directories on VPS
        run: |
          $SSH_CMD "mkdir -p $REMOTE_DIR/public"

      - name: Copy files to VPS
        run: |
          $SCP_CMD claude-chat/server.js ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/
          $SCP_CMD claude-chat/package.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/
          $SCP_CMD claude-chat/package-lock.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/
          $SCP_CMD claude-chat/setup.sh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/
          $SCP_CMD claude-chat/traefik-route.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/
          $SCP_CMD claude-chat/public/index.html ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/public/
          $SCP_CMD claude-chat/public/manifest.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$REMOTE_DIR/public/

      - name: Create .env on VPS
        run: |
          $SSH_CMD << 'ENVEOF'
          cat > /opt/claude-chat/.env << 'EOF'
          BEARER_TOKEN=cfc6b39d4152f7dc6a49b8445d1bb4fe45e742af56eb5581d2b8e23179d2acc6
          PORT=3847
          EOF
          ENVEOF

      - name: Install deps and start
        run: |
          $SSH_CMD << 'EOF'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
          command -v node || { curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs; }
          echo "node=$(node --version) npm=$(npm --version)"

          # Install PM2 globally if needed
          command -v pm2 || npm install -g pm2

          cd /opt/claude-chat
          chmod +x setup.sh
          bash setup.sh
          EOF

      - name: Diagnose and fix proxy
        run: |
          $SSH_CMD << 'DIAG'
          set -x
          echo "=== DIAGNOSTICS ==="

          # 1. What's on port 80?
          echo "--- Port 80 ---"
          ss -tlnp | grep ':80 ' || echo "Nothing on port 80!"

          # 2. What's on port 443?
          echo "--- Port 443 ---"
          ss -tlnp | grep ':443 ' || echo "Nothing on port 443!"

          # 3. App health
          echo "--- App on 3847 ---"
          curl -s http://127.0.0.1:3847/api/health || echo "App NOT responding on 3847!"

          # 4. Caddy check
          echo "--- Caddy ---"
          which caddy 2>/dev/null && caddy version || echo "No caddy binary"
          systemctl is-active caddy 2>/dev/null || echo "caddy service not active"
          ls -la /etc/caddy/ 2>/dev/null || echo "No /etc/caddy/"
          cat /etc/caddy/Caddyfile 2>/dev/null || echo "No Caddyfile"

          # 5. NGINX check
          echo "--- NGINX ---"
          which nginx 2>/dev/null && nginx -v 2>&1 || echo "No nginx"
          systemctl is-active nginx 2>/dev/null || echo "nginx not active"

          # 6. PM2
          echo "--- PM2 ---"
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
          pm2 list 2>/dev/null || echo "No pm2"

          # 7. Test curl from VPS to itself via domain
          echo "--- curl chat.marbomebel.ru from VPS ---"
          curl -s -o /dev/null -w "HTTP %{http_code}" http://chat.marbomebel.ru/api/health 2>&1 || true
          echo ""
          curl -s http://chat.marbomebel.ru/api/health 2>&1 | head -5 || true

          # 8. All listening ports
          echo "--- All listening TCP ports ---"
          ss -tlnp | head -20

          echo "=== END DIAGNOSTICS ==="
          DIAG

      - name: Fix proxy config
        run: |
          $SSH_CMD << 'FIX'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true

          echo "=== FIXING PROXY ==="

          # Detect what's serving port 80
          PORT80_PROC=$(ss -tlnp | grep ':80 ' | head -1 || true)

          if echo "$PORT80_PROC" | grep -q caddy; then
            echo "Caddy detected on port 80"

            # Find Caddyfile
            CADDYFILE=""
            for f in /etc/caddy/Caddyfile /root/Caddyfile /opt/caddy/Caddyfile; do
              [ -f "$f" ] && CADDYFILE="$f" && break
            done

            # Also check caddy config location
            if [ -z "$CADDYFILE" ]; then
              CADDYFILE=$(caddy environ 2>/dev/null | grep -oP 'CADDYFILE=\K.*' || true)
            fi

            if [ -z "$CADDYFILE" ]; then
              echo "Can't find Caddyfile, creating /etc/caddy/Caddyfile"
              mkdir -p /etc/caddy
              CADDYFILE="/etc/caddy/Caddyfile"
            fi

            echo "Using Caddyfile: $CADDYFILE"
            echo "Current content:"
            cat "$CADDYFILE" 2>/dev/null || true

            # Remove old chat entry if malformed, then add clean one
            if grep -q "chat.marbomebel.ru" "$CADDYFILE"; then
              echo "chat.marbomebel.ru already in Caddyfile, replacing..."
              # Remove existing block (between chat.marbomebel.ru and next closing brace)
              python3 -c "
import re
with open('$CADDYFILE') as f:
    content = f.read()
# Remove chat.marbomebel.ru block
content = re.sub(r'\nchat\.marbomebel\.ru\s*\{[^}]*\}\n?', '\n', content)
content = re.sub(r'chat\.marbomebel\.ru\s*\{[^}]*\}', '', content)
with open('$CADDYFILE', 'w') as f:
    f.write(content)
"
            fi

            # Append clean config
            cat >> "$CADDYFILE" << 'CADDY'

chat.marbomebel.ru {
    reverse_proxy 127.0.0.1:3847
}
CADDY

            echo "Updated Caddyfile:"
            cat "$CADDYFILE"

            # Validate and reload
            caddy validate --config "$CADDYFILE" 2>&1 || true
            caddy reload --config "$CADDYFILE" 2>&1 || systemctl reload caddy 2>&1 || systemctl restart caddy 2>&1
            echo "Caddy reloaded"

          elif echo "$PORT80_PROC" | grep -q nginx; then
            echo "NGINX on port 80, configuring..."
            cat > /etc/nginx/sites-enabled/chat-marbomebel << 'NGINX'
server {
    listen 80;
    server_name chat.marbomebel.ru;
    location / {
        proxy_pass http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
NGINX
            nginx -t && systemctl reload nginx

          else
            echo "Unknown service on port 80: $PORT80_PROC"
            echo "Installing NGINX..."
            # Stop whatever is on port 80
            PORT80_PID=$(echo "$PORT80_PROC" | grep -oP 'pid=\K[0-9]+' || true)
            [ -n "$PORT80_PID" ] && kill "$PORT80_PID" && sleep 2

            apt-get update -qq && apt-get install -y -qq nginx
            cat > /etc/nginx/sites-enabled/chat-marbomebel << 'NGINX'
server {
    listen 80;
    server_name chat.marbomebel.ru;
    location / {
        proxy_pass http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
NGINX
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl start nginx
          fi

          # Final verification
          sleep 3
          echo "=== VERIFICATION ==="
          echo "Direct app:"
          curl -s http://127.0.0.1:3847/api/health
          echo ""
          echo "Via proxy:"
          curl -s -H "Host: chat.marbomebel.ru" http://127.0.0.1/api/health
          echo ""
          echo "Via domain:"
          curl -s http://chat.marbomebel.ru/api/health 2>&1 | head -3
          echo ""
          echo "=== DONE ==="
          FIX

      - name: Healthcheck
        run: |
          $SSH_CMD << 'EOF'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
          sleep 2
          HEALTH=$(curl -s http://127.0.0.1:3847/api/health)
          echo "Health: $HEALTH"
          echo "$HEALTH" | grep -q '"ok"' && echo "✓ Claude Chat is running!" || { echo "✗ Health check failed"; exit 1; }
          pm2 list | grep claude-chat
          echo "=== Deploy Complete ==="
          EOF

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ Claude Chat deployed successfully to VPS
          🌐 https://chat.marbomebel.ru
          📦 Port: 3847"
          else
            MSG="❌ Claude Chat deploy FAILED
          🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d text="$MSG" \
            -d parse_mode=HTML || true

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
