name: "Deploy Control Bridge API"

on:
  push:
    branches:
      - main
      - "claude/*"
      - "claude/**"
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - healthcheck

jobs:
  deploy:
    name: "Deploy Control Bridge"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy files to VPS
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          SCP_CMD="scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }}"
          $SSH_CMD "rm -rf /tmp/control-bridge-deploy && mkdir -p /tmp/control-bridge-deploy"
          $SCP_CMD \
            control-bridge/app.py \
            control-bridge/requirements.txt \
            control-bridge/nginx-api.conf \
            control-bridge/nginx-http.conf \
            control-bridge/control-bridge.service \
            control-bridge/deploy.sh \
            control-bridge/rotate-token.sh \
            control-bridge/report-complete.sh \
            control-bridge/report-review.sh \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/control-bridge-deploy/

      - name: VPS Resource Cleanup (kill zombies + stale processes)
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'bash -s' << 'CLEANUP'
          echo "=== PRE-DEPLOY CLEANUP ==="
          echo "Before: $(ps -e | wc -l) processes, $(ps -eo stat | grep -c "^Z" || echo 0) zombies"
          echo "Memory: $(free -m | awk 'NR==2{printf "%dM/%dM (%.0f%%)", $3, $2, $3/$2*100}')"
          echo "Load: $(cat /proc/loadavg)"

          # Kill zombies
          ZOMBIE_PIDS=$(ps -eo pid,ppid,stat | awk '$3~/^Z/{print $1,$2}')
          if [ -n "$ZOMBIE_PIDS" ]; then
            echo "$ZOMBIE_PIDS" | while read ZPID ZPPID; do
              kill -SIGCHLD $ZPPID 2>/dev/null
              sleep 0.1
              if ps -p $ZPID -o stat= 2>/dev/null | grep -q '^Z'; then
                kill -9 $ZPPID 2>/dev/null || true
              fi
            done
            echo "Zombie cleanup done"
          fi

          # Kill stale claude/timeout processes (>2h old)
          STALE_PIDS=$(ps -eo pid,etimes,comm --no-headers | awk '$2 > 7200 && ($3 ~ /claude|timeout/)' | awk '{print $1}')
          if [ -n "$STALE_PIDS" ]; then
            echo "Killing stale processes: $STALE_PIDS"
            echo "$STALE_PIDS" | xargs kill -9 2>/dev/null || true
          fi

          echo "After: $(ps -e | wc -l) processes, $(ps -eo stat | grep -c "^Z" || echo 0) zombies"
          echo "Memory: $(free -m | awk 'NR==2{printf "%dM/%dM (%.0f%%)", $3, $2, $3/$2*100}')"
          echo "=== CLEANUP DONE ==="
          CLEANUP

      - name: Install packages on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "apt-get update -qq && apt-get install -y -qq python3 python3-venv python3-pip nginx certbot python3-certbot-nginx curl dnsutils 2>&1 | tail -5"

      - name: Setup app and venv
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p /opt/control-bridge && cp /tmp/control-bridge-deploy/app.py /tmp/control-bridge-deploy/requirements.txt /tmp/control-bridge-deploy/rotate-token.sh /tmp/control-bridge-deploy/report-complete.sh /tmp/control-bridge-deploy/report-review.sh /opt/control-bridge/ && chmod +x /opt/control-bridge/rotate-token.sh /opt/control-bridge/report-complete.sh /opt/control-bridge/report-review.sh && (test -d /opt/control-bridge/venv || python3 -m venv /opt/control-bridge/venv) && /opt/control-bridge/venv/bin/pip install --upgrade pip -q && /opt/control-bridge/venv/bin/pip install -r /opt/control-bridge/requirements.txt -q && echo VENV_OK"

      - name: Generate API token (if missing)
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "if [ -f /opt/control-bridge/.env ] && grep -q BRIDGE_API_TOKEN /opt/control-bridge/.env; then echo TOKEN_EXISTS; else TOKEN=\$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))') && echo \"BRIDGE_API_TOKEN=\${TOKEN}\" > /opt/control-bridge/.env && chmod 600 /opt/control-bridge/.env && echo TOKEN_GENERATED; fi"

      - name: Set Memory + Telegram env vars
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << ENVSETUP
          # MEMORY_DB_PATH
          grep -q MEMORY_DB_PATH /opt/control-bridge/.env 2>/dev/null || echo "MEMORY_DB_PATH=/opt/claude-code/memory/memory.db" >> /opt/control-bridge/.env
          # TG_BOT_TOKEN
          if ! grep -q TG_BOT_TOKEN /opt/control-bridge/.env 2>/dev/null; then
            echo "TG_BOT_TOKEN=${TG_BOT_TOKEN}" >> /opt/control-bridge/.env
            echo "TG_CHAT_ID=${TG_CHAT_ID}" >> /opt/control-bridge/.env
            echo "TG_VARS_ADDED"
          else
            echo "TG_VARS_EXIST"
          fi
          ENVSETUP

      - name: Setup systemd service and restart
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cp /tmp/control-bridge-deploy/control-bridge.service /etc/systemd/system/control-bridge.service && systemctl daemon-reload && systemctl enable control-bridge && systemctl restart control-bridge && sleep 3 && systemctl is-active control-bridge && echo SERVICE_OK || (journalctl -u control-bridge --no-pager -n 30 && exit 1)"

      - name: Test local health
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "curl -sf http://127.0.0.1:3000/health && echo ' LOCAL_OK' || (echo LOCAL_FAIL && exit 1)"

      - name: Deploy updated control-api server.js
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} \
            vps-runtime/control-api/server.js \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/claude-code/control-api/server.js
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "systemctl restart control-api.service 2>/dev/null && echo CONTROL_API_RESTARTED || echo CONTROL_API_RESTART_SKIPPED"

      - name: Install persistent cleanup cron (every 10 min)
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'bash -s' << 'CRON'
          # Create cleanup script
          cat > /opt/control-bridge/cleanup-processes.sh << 'SCRIPT'
          #!/bin/bash
          # Kill zombie processes
          ZOMBIES=$(ps -eo pid,ppid,stat --no-headers | awk '$3~/^Z/{print $2}' | sort -u)
          for PPID in $ZOMBIES; do
            kill -SIGCHLD $PPID 2>/dev/null
          done

          # Kill stale timeout processes (>30 min old)
          ps -eo pid,etimes,comm --no-headers | awk '$2 > 1800 && $3 == "timeout"' | awk '{print $1}' | while read PID; do
            kill -9 $PID 2>/dev/null
          done

          # Kill stale claude --print processes (>20 min old)
          ps -eo pid,etimes,args --no-headers | awk '$2 > 1200 && $0 ~ /claude.*--print/' | awk '{print $1}' | while read PID; do
            kill -9 $PID 2>/dev/null
          done
          SCRIPT
          chmod +x /opt/control-bridge/cleanup-processes.sh

          # Install cron (every 10 min)
          CRON_LINE="*/10 * * * * /opt/control-bridge/cleanup-processes.sh >> /var/log/process-cleanup.log 2>&1"
          (crontab -l 2>/dev/null | grep -v cleanup-processes; echo "$CRON_LINE") | crontab -
          echo "CRON_INSTALLED"
          crontab -l | grep cleanup
          CRON

      - name: Setup Traefik routing
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.VPS_PORT || 22 }} \
            control-bridge/traefik-api-bridge.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/traefik-api-bridge.yml
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'TRAEFIK'
          # Find Traefik dynamic config dir
          for d in /opt/n8n-traefik/dynamic /opt/traefik/dynamic /etc/traefik/dynamic; do
            [ -d "$d" ] && TRAEFIK_DYN="$d" && break
          done
          if [ -n "$TRAEFIK_DYN" ]; then
            cp /tmp/traefik-api-bridge.yml "$TRAEFIK_DYN/api-bridge.yml"
            echo "TRAEFIK_CONFIG_OK ($TRAEFIK_DYN/api-bridge.yml)"
          else
            echo "TRAEFIK_DIR_NOT_FOUND"
          fi
          # Remove any conflicting nginx config for api domain
          rm -f /etc/nginx/sites-enabled/api-marbomebel 2>/dev/null || true
          TRAEFIK

      - name: Service and HTTPS diagnostics
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'DIAG'
          echo "=== systemctl status control-bridge ==="
          systemctl status control-bridge --no-pager 2>&1 || true
          echo ""
          echo "=== /opt/control-bridge/.env exists ==="
          test -f /opt/control-bridge/.env && echo "YES ($(stat -c '%a' /opt/control-bridge/.env) permissions)" || echo "NO"
          echo ""
          echo "=== Traefik logs (api.marbomebel.ru) ==="
          docker logs $(docker ps -q --filter "name=traefik" 2>/dev/null) --tail 50 2>&1 | grep -i "api\.\|marbomebel\|acme\|cert\|error\|ERR" | tail -20 || echo "no traefik logs"
          echo ""
          echo "=== HTTPS verbose test ==="
          curl -sv --max-time 10 https://api.marbomebel.ru/health 2>&1 || echo "HTTPS_FAIL"
          echo ""
          echo "=== TLS cert check ==="
          echo | openssl s_client -servername api.marbomebel.ru -connect api.marbomebel.ru:443 2>/dev/null | openssl x509 -noout -subject -issuer -dates 2>/dev/null || echo "CERT_CHECK_FAIL"
          echo ""
          echo "=== Docker bridge connectivity ==="
          curl -sf --max-time 5 http://172.17.0.1:3000/health 2>&1 && echo " DOCKER_BRIDGE_OK" || echo "DOCKER_BRIDGE_FAIL"
          DIAG

      - name: Run full endpoint verification
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'VERIFY'
          TOKEN=$(grep BRIDGE_API_TOKEN /opt/control-bridge/.env | cut -d= -f2-)
          echo "=== LIVE ENDPOINT VERIFICATION ==="

          echo ""
          echo "--- health (local) ---"
          curl -si http://127.0.0.1:3000/health 2>&1
          echo ""

          echo ""
          echo "--- health (public HTTPS) ---"
          curl -si https://api.marbomebel.ru/health 2>&1 || echo "HTTPS_UNREACHABLE"
          echo ""

          echo ""
          echo "--- createJob ---"
          CREATE=$(curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"title":"Verification test","raw_user_request":"Automated verification","normalized_brief":"Verify all endpoints"}')
          echo "${CREATE}"
          JOB_ID=$(echo "${CREATE}" | tail -1 | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])" 2>/dev/null)
          echo ""

          echo ""
          echo "--- confirmJob ---"
          curl -si -X POST "http://127.0.0.1:3000/jobs/${JOB_ID}/confirm" \
            -H "Authorization: Bearer ${TOKEN}" 2>&1
          echo ""

          echo ""
          echo "--- getJobStatus ---"
          curl -si "http://127.0.0.1:3000/jobs/${JOB_ID}/status" \
            -H "Authorization: Bearer ${TOKEN}" 2>&1
          echo ""

          echo ""
          echo "--- getJobResult ---"
          curl -si "http://127.0.0.1:3000/jobs/${JOB_ID}/result" \
            -H "Authorization: Bearer ${TOKEN}" 2>&1
          echo ""

          echo ""
          echo "--- cancelJob (new job) ---"
          CANCEL_CREATE=$(curl -s -X POST http://127.0.0.1:3000/jobs \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"title":"Cancel test","raw_user_request":"Test cancel","normalized_brief":"Cancel"}')
          CID=$(echo "${CANCEL_CREATE}" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])" 2>/dev/null)
          curl -si -X POST "http://127.0.0.1:3000/jobs/${CID}/cancel" \
            -H "Authorization: Bearer ${TOKEN}" 2>&1
          echo ""

          echo ""
          echo "--- memory/stats ---"
          curl -si "http://127.0.0.1:3000/memory/stats" \
            -H "Authorization: Bearer ${TOKEN}" 2>&1
          echo ""

          echo ""
          echo "--- memory/bootstrap ---"
          curl -si "http://127.0.0.1:3000/memory/bootstrap" \
            -H "Authorization: Bearer ${TOKEN}" 2>&1
          echo ""

          echo ""
          echo "--- pending-reviews ---"
          curl -si "http://127.0.0.1:3000/jobs/pending-reviews" \
            -H "Authorization: Bearer ${TOKEN}" 2>&1
          echo ""

          echo ""
          echo "--- auth rejection test (no token) ---"
          curl -si -X POST http://127.0.0.1:3000/jobs \
            -H "Content-Type: application/json" \
            -d '{"title":"Should fail","raw_user_request":"No token","normalized_brief":""}' 2>&1
          echo ""

          echo ""
          echo "=== VERIFICATION COMPLETE ==="
          echo "TOKEN=*****(rotated, masked)"
          echo "URL=https://api.marbomebel.ru"
          VERIFY

      - name: Cleanup
        if: always()
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "rm -rf /tmp/control-bridge-deploy" 2>/dev/null || true

      - name: Send API token to Telegram (for GPT Actions setup)
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          # Read current token from VPS
          BRIDGE_TOKEN=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "grep BRIDGE_API_TOKEN /opt/control-bridge/.env | cut -d= -f2-")

          MSG="GPT Actions Token: ${BRIDGE_TOKEN}
          Auth Type: API Key | Header: Authorization | Prefix: Bearer
          URL: https://api.marbomebel.ru"

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}" > /dev/null 2>&1 || true

      - name: Send Telegram notification
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          MSG="Control Bridge Deploy: ${STATUS}
          Token: rotated
          URL: https://api.marbomebel.ru
          Run: ${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}" > /dev/null 2>&1 || true
