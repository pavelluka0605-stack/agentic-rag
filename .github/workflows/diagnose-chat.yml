name: "Diagnose Chat App"

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: "Full Chat Diagnostics"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run Full Diagnostics
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          set +e
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"

          echo "========================================="
          echo "=== 1. PM2 PROCESS LIST ==="
          echo "========================================="
          $SSH "pm2 list 2>/dev/null || echo 'PM2 NOT FOUND'"

          echo ""
          echo "========================================="
          echo "=== 2. PM2 CLAUDE-CHAT LOGS (last 30) ==="
          echo "========================================="
          $SSH "pm2 logs claude-chat --lines 30 --nostream 2>/dev/null || echo 'no logs'"

          echo ""
          echo "========================================="
          echo "=== 3. PORT 3847 LISTENER ==="
          echo "========================================="
          $SSH "ss -tlnp | grep 3847 || echo 'PORT 3847 NOT LISTENING'"

          echo ""
          echo "========================================="
          echo "=== 4. CURL HEALTH ENDPOINT ==="
          echo "========================================="
          $SSH "curl -s --max-time 5 http://localhost:3847/api/health 2>/dev/null | python3 -m json.tool 2>/dev/null || echo 'HEALTH CHECK FAILED'"

          echo ""
          echo "========================================="
          echo "=== 5. FILES IN /opt/claude-chat/ ==="
          echo "========================================="
          $SSH "ls -la /opt/claude-chat/ 2>/dev/null || echo '/opt/claude-chat NOT FOUND'"
          $SSH "ls -la /opt/claude-chat/public/ 2>/dev/null || echo '/opt/claude-chat/public NOT FOUND'"

          echo ""
          echo "========================================="
          echo "=== 6. .ENV FILE (keys only) ==="
          echo "========================================="
          $SSH "grep -oP '^[A-Z_]+' /opt/claude-chat/.env 2>/dev/null || echo 'NO .env'"

          echo ""
          echo "========================================="
          echo "=== 7. CLAUDE CLI CHECK ==="
          echo "========================================="
          $SSH "which claude 2>/dev/null || echo 'claude NOT IN PATH'"
          $SSH "claude --version 2>/dev/null || echo 'claude --version FAILED'"

          echo ""
          echo "========================================="
          echo "=== 8. NODE/NPM VERSION ==="
          echo "========================================="
          $SSH "node --version 2>/dev/null && npm --version 2>/dev/null || echo 'NODE NOT FOUND'"

          echo ""
          echo "========================================="
          echo "=== 9. PACKAGE.JSON DEPS ==="
          echo "========================================="
          $SSH "cat /opt/claude-chat/package.json 2>/dev/null || echo 'NO package.json'"

          echo ""
          echo "========================================="
          echo "=== 10. SERVER.JS FIRST 20 LINES ==="
          echo "========================================="
          $SSH "head -20 /opt/claude-chat/server.js 2>/dev/null || echo 'NO server.js'"

          echo ""
          echo "========================================="
          echo "=== 11. INDEX.HTML TITLE ==="
          echo "========================================="
          $SSH "grep -i 'title\|Ассистент\|quick-btns\|VPS статус' /opt/claude-chat/public/index.html 2>/dev/null | head -10 || echo 'NO index.html'"

          echo ""
          echo "========================================="
          echo "=== 12. NGINX/TRAEFIK CONFIG ==="
          echo "========================================="
          $SSH "grep -r 'chat.marbomebel\|3847' /etc/nginx/ 2>/dev/null | head -10 || echo 'NO NGINX CONFIG'"
          $SSH "docker ps --format '{{.Names}} {{.Ports}}' 2>/dev/null | grep -i traefik || echo 'NO TRAEFIK CONTAINER'"

          echo ""
          echo "========================================="
          echo "=== 13. CURL CHAT PAGE (first 5 lines) ==="
          echo "========================================="
          $SSH "curl -s --max-time 5 http://localhost:3847/ 2>/dev/null | head -5 || echo 'NO RESPONSE'"

          echo ""
          echo "========================================="
          echo "=== 14. DISK & MEMORY ==="
          echo "========================================="
          $SSH "df -h / && echo '---' && free -h"

          echo ""
          echo "========================================="
          echo "=== 15. ALL SERVICES ON KEY PORTS ==="
          echo "========================================="
          $SSH "ss -tlnp | grep -E ':80 |:443 |:3847 |:5678 '"

          echo ""
          echo "========================================="
          echo "=== 16. NODE_MODULES CHECK ==="
          echo "========================================="
          $SSH "ls /opt/claude-chat/node_modules/ 2>/dev/null | wc -l; echo 'packages installed'"

          echo ""
          echo "DIAGNOSTICS COMPLETE"
