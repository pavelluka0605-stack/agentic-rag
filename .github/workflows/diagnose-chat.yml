name: "Diagnose & Fix Chat App"

on:
  workflow_dispatch:
    inputs:
      auto_fix:
        description: "Auto-restart if down"
        type: boolean
        default: true

jobs:
  diagnose:
    name: "Chat App Diagnostics"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout (for deploy files)
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run Diagnostics
        id: diag
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          set +e
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"

          echo "=== 1. PM2 STATUS ==="
          $SSH "pm2 list 2>/dev/null || echo 'PM2 NOT FOUND'"

          echo ""
          echo "=== 2. PM2 LOGS claude-chat (last 30) ==="
          $SSH "pm2 logs claude-chat --lines 30 --nostream 2>/dev/null || echo 'no logs'"

          echo ""
          echo "=== 3. PORT 3847 LISTENER ==="
          $SSH "ss -tlnp | grep 3847 || echo 'PORT 3847 NOT LISTENING'"

          echo ""
          echo "=== 4. CURL localhost:3847 ==="
          HEALTH=$($SSH "curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:3847/api/health 2>/dev/null" || echo "000")
          echo "Health endpoint: HTTP $HEALTH"

          echo ""
          echo "=== 5. NGINX CONFIG ==="
          $SSH "grep -A5 'chat.marbomebel' /etc/nginx/sites-enabled/* 2>/dev/null || echo 'NO CONFIG'"

          echo ""
          echo "=== 6. NGINX proxy_pass target ==="
          $SSH "grep proxy_pass /etc/nginx/sites-enabled/*chat* 2>/dev/null || grep -r proxy_pass /etc/nginx/ 2>/dev/null | grep -i chat || echo 'NOT FOUND'"

          echo ""
          echo "=== 7. DOCKER (if any) ==="
          $SSH "docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' 2>/dev/null | head -10 || echo 'no docker'"

          echo ""
          echo "=== 8. DISK & MEMORY ==="
          $SSH "df -h / && echo '---' && free -h"

          echo ""
          echo "=== 9. NODE PROCESSES ==="
          $SSH "ps aux | grep -E 'node|pm2' | grep -v grep || echo 'NO NODE PROCESSES'"

          echo ""
          echo "=== 10. FILES IN /opt/claude-chat/ ==="
          $SSH "ls -la /opt/claude-chat/ 2>/dev/null || echo '/opt/claude-chat NOT FOUND'"

          # Set output for auto-fix step
          if [ "$HEALTH" != "200" ]; then
            echo "app_down=true" >> "$GITHUB_OUTPUT"
            echo ""
            echo "⚠️ APP IS DOWN (HTTP $HEALTH)"
          else
            echo "app_down=false" >> "$GITHUB_OUTPUT"
            echo ""
            echo "✅ APP IS HEALTHY"
          fi

      - name: Auto-Fix (restart)
        if: steps.diag.outputs.app_down == 'true' && inputs.auto_fix
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          set +e
          SSH="ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10 $VPS_USER@$VPS_HOST"

          echo "=== ATTEMPTING AUTO-FIX ==="

          echo "--- Step 1: Kill stuck processes on port 3847 ---"
          $SSH "fuser -k 3847/tcp 2>/dev/null; sleep 1"

          echo "--- Step 2: PM2 delete and restart ---"
          $SSH 'bash -s' <<'SCRIPT'
          set -e
          cd /opt/claude-chat

          # Ensure .env exists
          if [ ! -f .env ]; then
            . /opt/p0-foundation/.env 2>/dev/null || true
            printf 'BEARER_TOKEN=%s\nOPENAI_API_KEY=%s\nPORT=3847\n' \
              "$(openssl rand -hex 32)" "${OPENAI_API_KEY:-}" > .env
            echo "Recreated .env"
          fi

          # Reinstall deps if node_modules missing
          [ -d node_modules ] || npm install --omit=dev 2>&1 | tail -5

          # Restart
          pm2 delete claude-chat 2>/dev/null || true
          pm2 start server.js --name claude-chat
          sleep 4

          # Verify
          pm2 list | grep claude-chat
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:3847/api/health)
          echo "Health after restart: HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ FIX SUCCESSFUL"
          else
            echo "❌ STILL DOWN — check logs:"
            pm2 logs claude-chat --lines 30 --nostream
            exit 1
          fi
          SCRIPT

      - name: Final external check
        if: always()
        run: |
          echo "=== External check: chat.marbomebel.ru ==="
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 https://chat.marbomebel.ru/ 2>/dev/null || echo "000")
          echo "HTTPS response: $HTTP"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "301" ] || [ "$HTTP" = "302" ]; then
            echo "✅ Site is accessible externally"
          else
            echo "⚠️ Site returns HTTP $HTTP externally"
          fi
