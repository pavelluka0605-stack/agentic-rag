name: Google Sheets Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - list-sheets
          - delete-sheet
          - delete-sheet-by-id
          - add-sheet
          - setup-svodka-formulas
          - update-spros-headers
      sheet_name:
        description: 'Sheet name (for delete/add actions)'
        required: false
        type: string
      sheet_id:
        description: 'Sheet ID (for delete-sheet-by-id action)'
        required: false
        type: string

jobs:
  manage-sheets:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth requests

      - name: Execute Google Sheets action
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ACTION: ${{ inputs.action }}
          SHEET_NAME: ${{ inputs.sheet_name }}
          SHEET_ID: ${{ inputs.sheet_id }}
        run: |
          python3 << 'PYEOF'
          import json, os, requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request

          import base64
          raw = os.environ["GOOGLE_SA_JSON"]
          # Support both raw JSON and base64-encoded JSON
          try:
              sa_info = json.loads(raw)
          except json.JSONDecodeError:
              sa_info = json.loads(base64.b64decode(raw))
          creds = service_account.Credentials.from_service_account_info(
              sa_info, scopes=["https://www.googleapis.com/auth/spreadsheets"]
          )
          creds.refresh(Request())

          SPREADSHEET_ID = os.environ["SPREADSHEET_ID"]
          ACTION = os.environ["ACTION"]
          SHEET_NAME = os.environ.get("SHEET_NAME", "")
          headers = {"Authorization": f"Bearer {creds.token}"}

          # Get current sheets
          resp = requests.get(
              f"https://sheets.googleapis.com/v4/spreadsheets/{SPREADSHEET_ID}",
              headers=headers
          )
          resp.raise_for_status()
          data = resp.json()

          sheets = {s["properties"]["title"]: s["properties"]["sheetId"] for s in data["sheets"]}
          print("Current sheets:")
          for title, sid in sheets.items():
              print(f"  [{sid}] {title}")

          if ACTION == "list-sheets":
              print("\nDone.")

          elif ACTION == "delete-sheet":
              if not SHEET_NAME:
                  print("\nERROR: sheet_name is required for delete action")
                  exit(1)
              if SHEET_NAME not in sheets:
                  print(f"\nERROR: Sheet '{SHEET_NAME}' not found")
                  exit(1)
              sheet_id = sheets[SHEET_NAME]
              print(f"\nDeleting '{SHEET_NAME}' (id={sheet_id})...")
              del_resp = requests.post(
                  f"https://sheets.googleapis.com/v4/spreadsheets/{SPREADSHEET_ID}:batchUpdate",
                  headers={**headers, "Content-Type": "application/json"},
                  json={"requests": [{"deleteSheet": {"sheetId": sheet_id}}]}
              )
              del_resp.raise_for_status()
              print("Deleted successfully!")

          elif ACTION == "delete-sheet-by-id":
              SHEET_ID = os.environ.get("SHEET_ID", "")
              if not SHEET_ID:
                  print("\nERROR: sheet_id is required for delete-sheet-by-id action")
                  exit(1)
              sheet_id = int(SHEET_ID)
              # Find name for logging
              name = next((t for t, sid in sheets.items() if sid == sheet_id), f"id={sheet_id}")
              print(f"\nDeleting '{name}' (id={sheet_id})...")
              del_resp = requests.post(
                  f"https://sheets.googleapis.com/v4/spreadsheets/{SPREADSHEET_ID}:batchUpdate",
                  headers={**headers, "Content-Type": "application/json"},
                  json={"requests": [{"deleteSheet": {"sheetId": sheet_id}}]}
              )
              del_resp.raise_for_status()
              print("Deleted successfully!")

          elif ACTION == "add-sheet":
              if not SHEET_NAME:
                  print("\nERROR: sheet_name is required for add action")
                  exit(1)
              print(f"\nAdding sheet '{SHEET_NAME}'...")
              add_resp = requests.post(
                  f"https://sheets.googleapis.com/v4/spreadsheets/{SPREADSHEET_ID}:batchUpdate",
                  headers={**headers, "Content-Type": "application/json"},
                  json={"requests": [{"addSheet": {"properties": {"title": SHEET_NAME}}}]}
              )
              add_resp.raise_for_status()
              print("Added successfully!")

          elif ACTION == "setup-svodka-formulas":
              print("\nSetting up formulas in Сводка_спроса...")
              svodka_id = sheets.get("Сводка_спроса")
              if svodka_id is None:
                  print("ERROR: Sheet 'Сводка_спроса' not found")
                  exit(1)

              # Set header row
              header_resp = requests.put(
                  f"https://sheets.googleapis.com/v4/spreadsheets/{SPREADSHEET_ID}/values/Сводка_спроса!A1:J1",
                  headers={**headers, "Content-Type": "application/json"},
                  params={"valueInputOption": "RAW"},
                  json={"values": [["Название_товара", "ID_поста", "XS", "S", "M", "L", "XL", "XXL", "Итого", "Статус_товара"]]}
              )
              header_resp.raise_for_status()
              print("  Headers set")

              # Set formulas for rows 2-50
              formulas = []
              sizes = ["XS", "S", "M", "L", "XL", "XXL"]
              for row in range(2, 51):
                  row_formulas = [
                      f'=IFERROR(INDEX(Товары!B:B,SMALL(IF(COUNTIF(INDIRECT("A1:A"&ROW()-1),Товары!B$2:B$500)=0,ROW(Товары!B$2:B$500)-1),1)),"")' if row == 2 else f'=IFERROR(INDEX(Товары!B:B,SMALL(IF(COUNTIF(INDIRECT("A1:A"&ROW()-1),Товары!B$2:B$500)=0,ROW(Товары!B$2:B$500)-1),1)),"")',
                      f'=IFERROR(VLOOKUP(A{row},Товары!B:A,1,FALSE),"")',
                  ]
                  for size in sizes:
                      row_formulas.append(f'=COUNTIFS(Спрос!B:B,B{row},Спрос!E:E,"{size}",Спрос!I:I,"<>отменено")')
                  row_formulas.append(f'=SUM(C{row}:H{row})')
                  row_formulas.append(f'=IFERROR(VLOOKUP(B{row},Товары!A:G,7,FALSE),"")')
                  formulas.append(row_formulas)

              formula_resp = requests.put(
                  f"https://sheets.googleapis.com/v4/spreadsheets/{SPREADSHEET_ID}/values/Сводка_спроса!A2:J50",
                  headers={**headers, "Content-Type": "application/json"},
                  params={"valueInputOption": "USER_ENTERED"},
                  json={"values": formulas}
              )
              formula_resp.raise_for_status()
              print("  Formulas set for rows 2-50")
              print("Setup complete!")

          elif ACTION == "update-spros-headers":
              print("\nUpdating headers in Спрос sheet for P0-08...")
              if "Спрос" not in sheets:
                  print("ERROR: Sheet 'Спрос' not found")
                  exit(1)

              new_headers = [
                  "ID_записи", "created_at", "ID_поста_VK", "VK_ID_клиента",
                  "Имя_клиента", "Текст_комментария", "intent_type", "confidence",
                  "product_name", "Размер", "Количество", "color", "Статус",
                  "bluesales_order_id", "reply_text", "post_url", "Источник"
              ]

              # Read existing headers
              existing = requests.get(
                  f"https://sheets.googleapis.com/v4/spreadsheets/{SPREADSHEET_ID}/values/Спрос!1:1",
                  headers=headers
              )
              existing.raise_for_status()
              old_headers = existing.json().get("values", [[]])[0] if existing.json().get("values") else []
              print(f"  Old headers ({len(old_headers)}): {old_headers}")

              # Write new headers
              resp = requests.put(
                  f"https://sheets.googleapis.com/v4/spreadsheets/{SPREADSHEET_ID}/values/Спрос!A1:Q1",
                  headers={**headers, "Content-Type": "application/json"},
                  params={"valueInputOption": "RAW"},
                  json={"values": [new_headers]}
              )
              resp.raise_for_status()
              print(f"  New headers ({len(new_headers)}): {new_headers}")
              print("Headers updated successfully!")
          PYEOF
