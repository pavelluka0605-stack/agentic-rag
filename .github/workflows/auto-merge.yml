name: Auto-merge claude branch to main

on:
  push:
    branches:
      - 'claude/**'

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge branch into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main..."

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main
          git merge --no-ff "$BRANCH" -m "Merge $BRANCH into main (auto-merge)"
          git push origin main

      - name: Trigger deploy workflow
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-p0.yml/dispatches" \
            -d '{"ref":"main","inputs":{"action":"webapp"}}'

      - name: Trigger Control Bridge deploy
        run: |
          curl -sv -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-control-bridge.yml/dispatches" \
            -d '{"ref":"main","inputs":{"action":"deploy"}}' 2>&1 || true

      - name: Trigger photo API test
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/test-photo-api.yml/dispatches" \
            -d '{"ref":"main"}'
